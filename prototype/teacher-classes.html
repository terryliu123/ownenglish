<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OwnEnglish Teacher Classes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Noto+Sans+SC:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="teacher-page">
    <div class="page-shell">
      <header class="app-topbar">
        <div class="brand-lockup">
          <div class="brand-mark">OE</div>
          <div>
            <p class="eyebrow">Teacher Studio</p>
            <h1>班级与学生管理</h1>
          </div>
        </div>
        <nav class="app-top-actions">
          <a href="./index.html">返回入口</a>
          <a href="./student.html">打开学生端</a>
        </nav>
      </header>

      <div class="workspace">
        <aside class="sidebar">
          <div class="sidebar-class-card">
            <span class="eyebrow">当前班级</span>
            <strong>周二晚 20:00 口语提升班</strong>
            <p>A2 - B1 · 32 名学生</p>
          </div>
          <nav class="sidebar-nav">
            <a class="sidebar-link" href="./teacher.html">总览</a>
            <a class="sidebar-link is-active" href="./teacher-classes.html">班级</a>
            <a class="sidebar-link" href="./teacher-live.html">课堂模式</a>
            <a class="sidebar-link" href="./teacher-packs.html">学习包</a>
            <a class="sidebar-link" href="./teacher-analytics.html">综合分析</a>
          </nav>
        </aside>

        <main class="main-stage">
          <section class="panel-head">
            <div>
              <p class="eyebrow">Classes</p>
              <h2>课程、班级与学生在这里统一管理</h2>
            </div>
            <div class="panel-actions">
              <a class="solid-button" href="./teacher-live.html">去课堂模式</a>
            </div>
          </section>

          <section class="teacher-grid split-2">
            <article class="surface-card">
              <div class="surface-head">
                <h3>当前班级信息</h3>
                <span>周二晚 20:00 班</span>
              </div>
              <div class="info-list">
                <div>
                  <label>课程名</label>
                  <strong>L3 直播口语提升营</strong>
                </div>
                <div>
                  <label>邀请码</label>
                  <strong>EN-2034</strong>
                </div>
                <div>
                  <label>直播入口</label>
                  <strong>腾讯会议已绑定</strong>
                </div>
                <div>
                  <label>上课时间</label>
                  <strong>每周二 20:00 - 21:10</strong>
                </div>
              </div>
            </article>

            <article class="surface-card">
              <div class="surface-head">
                <h3>学生名单</h3>
                <span>活跃 26 人</span>
              </div>
              <div class="roster-list">
                <div class="roster-row"><strong>Olivia</strong><span>需跟进口语</span></div>
                <div class="roster-row"><strong>Jason</strong><span>句型薄弱</span></div>
                <div class="roster-row"><strong>Emma</strong><span>课堂参与稳定</span></div>
                <div class="roster-row"><strong>Leo</strong><span>弱网设备提醒</span></div>
                <div class="roster-row"><strong>Anna</strong><span>课后完成率偏低</span></div>
              </div>
            </article>
          </section>
        </main>
      </div>
    </div>
  </body>
</html>
