<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OwnEnglish Teacher Published</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Noto+Sans+SC:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="teacher-page">
    <div class="page-shell">
      <header class="app-topbar">
        <div class="brand-lockup">
          <div class="brand-mark">OE</div>
          <div>
            <p class="eyebrow">Teacher Studio</p>
            <h1>学习包已发布</h1>
          </div>
        </div>
        <nav class="app-top-actions">
          <a href="./teacher-packs.html">返回学习包</a>
          <a href="./student-home.html">查看学生首页</a>
        </nav>
      </header>

      <main class="main-stage standalone-stage">
        <section class="surface-card confirmation-card">
          <div class="confirmation-mark">Ready</div>
          <div class="confirmation-copy">
            <p class="eyebrow">Published</p>
            <h2>Lesson 12 学习包已经发送到班级</h2>
            <p>本次发布包含 4 个模块、12 道任务。平台已推送到学生首页，并同步生成班级分享海报。现在可以直接去看综合分析，或者回到老师总览继续管理本节课。</p>
          </div>
          <div class="teacher-grid split-2">
            <article class="surface-card">
              <div class="surface-head">
                <h3>发布结果</h3>
                <span>即时反馈</span>
              </div>
              <div class="surface-list">
                <div class="surface-row"><strong>学习包结构</strong><span>4 模块 / 12 题</span></div>
                <div class="surface-row"><strong>站内消息</strong><span>已触达 32 人</span></div>
                <div class="surface-row"><strong>班级海报</strong><span>已生成</span></div>
                <div class="surface-row"><strong>提醒策略</strong><span>明晚 20:00 自动提醒未完成人员</span></div>
              </div>
            </article>

            <article class="surface-card">
              <div class="surface-head">
                <h3>接下来做什么</h3>
                <span>建议动作</span>
              </div>
              <div class="action-stack">
                <a class="solid-button" href="./teacher-analytics.html">进入综合分析</a>
                <a class="ghost-button" href="./teacher.html">回到老师总览</a>
              </div>
            </article>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
