<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>维维尼亚定理 - 数字化教具</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f0f2f5;
            color: #333;
        }
        #container {
            position: relative;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            margin-top: 20px;
        }
        canvas {
            cursor: crosshair;
            border: 1px solid #ddd;
        }
        .controls {
            margin-top: 20px;
            text-align: left;
            width: 100%;
        }
        .info {
            font-size: 1.2rem;
            line-height: 1.6;
        }
        .formula {
            font-weight: bold;
            color: #d32f2f;
            background: #ffebee;
            padding: 2px 8px;
            border-radius: 4px;
        }
        .legend {
            display: flex;
            gap: 20px;
            margin-bottom: 10px;
        }
        .label-red { color: #f44336; }
        .label-green { color: #4caf50; }
        .label-blue { color: #2196f3; }
        .label-sum { border-bottom: 2px solid #333; font-weight: bold; }
    </style>
</head>
<body>

    <h1>维维尼亚定理 (Viviani's Theorem)</h1>
    <p>定理：等边三角形内任意一点到三边的距离之和等于其高。</p>

    <div id="container">
        <canvas id="canvas" width="600" height="500"></canvas>
        
        <div class="controls">
            <div class="legend">
                <span class="label-red">距离 d1</span>
                <span class="label-green">距离 d2</span>
                <span class="label-blue">距离 d3</span>
            </div>
            <div class="info">
                <span class="label-red" id="d1">0</span> + 
                <span class="label-green" id="d2">0</span> + 
                <span class="label-blue" id="d3">0</span> = 
                <span class="label-sum" id="sum">0</span>
                <br>
                等边三角形高度 (h): <span id="height">0</span>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const d1Label = document.getElementById('d1');
        const d2Label = document.getElementById('d2');
        const d3Label = document.getElementById('d3');
        const sumLabel = document.getElementById('sum');
        const hLabel = document.getElementById('height');

        // 三角形配置
        const sideLength = 400;
        const h = (Math.sqrt(3) / 2) * sideLength;
        const center = { x: 300, y: 300 };
        
        // 顶点坐标
        const A = { x: center.x, y: center.y - (2/3)*h };
        const B = { x: center.x - sideLength/2, y: center.y + (1/3)*h };
        const C = { x: center.x + sideLength/2, y: center.y + (1/3)*h };

        // 内部点 P (初始在重心)
        let P = { x: center.x, y: center.y };

        function getDistanceToLine(p, a, b) {
            // 点到直线的距离公式: |(y2-y1)x - (x2-x1)y + x2y1 - y2x1| / sqrt((y2-y1)^2 + (x2-x1)^2)
            const num = Math.abs((b.y - a.y) * p.x - (b.x - a.x) * p.y + b.x * a.y - b.y * a.x);
            const den = Math.sqrt(Math.pow(b.y - a.y, 2) + Math.pow(b.x - a.x, 2));
            return num / den;
        }

        function getProjectedPoint(p, a, b) {
            // 计算点在直线上的投影点
            const k = ((b.y - a.y) * (p.x - a.x) - (b.x - a.x) * (p.y - a.y)) / (Math.pow(b.y - a.y, 2) + Math.pow(b.x - a.x, 2));
            return {
                x: p.x - k * (b.y - a.y),
                y: p.y + k * (b.x - a.x)
            };
        }

        function isPointInTriangle(p, a, b, c) {
            const area = 0.5 * (-b.y * c.x + a.y * (-b.x + c.x) + a.x * (b.y - c.y) + b.x * c.y);
            const s = 1 / (2 * area) * (a.y * c.x - a.x * c.y + (c.y - a.y) * p.x + (a.x - c.x) * p.y);
            const t = 1 / (2 * area) * (a.x * b.y - a.y * b.x + (a.y - b.y) * p.x + (b.x - a.x) * p.y);
            return s > 0 && t > 0 && (1 - s - t) > 0;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. 画主三角形
            ctx.beginPath();
            ctx.moveTo(A.x, A.y);
            ctx.lineTo(B.x, B.y);
            ctx.lineTo(C.x, C.y);
            ctx.closePath();
            ctx.lineWidth = 3;
            ctx.strokeStyle = '#333';
            ctx.stroke();
            ctx.fillStyle = '#fafafa';
            ctx.fill();

            // 2. 计算距离和投影点
            const d1 = getDistanceToLine(P, B, C);
            const d2 = getDistanceToLine(P, A, C);
            const d3 = getDistanceToLine(P, A, B);
            
            const proj1 = getProjectedPoint(P, B, C);
            const proj2 = getProjectedPoint(P, A, C);
            const proj3 = getProjectedPoint(P, A, B);

            // 3. 画距离线段
            const drawLine = (p1, p2, color) => {
                ctx.beginPath();
                ctx.moveTo(p1.x, p1.y);
                ctx.lineTo(p2.x, p2.y);
                ctx.strokeStyle = color;
                ctx.lineWidth = 2;
                ctx.setLineDash([5, 5]);
                ctx.stroke();
                ctx.setLineDash([]);
            };

            drawLine(P, proj1, '#f44336'); // Red
            drawLine(P, proj2, '#4caf50'); // Green
            drawLine(P, proj3, '#2196f3'); // Blue

            // 4. 画点 P
            ctx.beginPath();
            ctx.arc(P.x, P.y, 6, 0, Math.PI * 2);
            ctx.fillStyle = '#ff9800';
            ctx.fill();
            ctx.strokeStyle = '#fff';
            ctx.stroke();

            // 5. 更新数据
            d1Label.textContent = d1.toFixed(1);
            d2Label.textContent = d2.toFixed(1);
            d3Label.textContent = d3.toFixed(1);
            sumLabel.textContent = (d1 + d2 + d3).toFixed(1);
            hLabel.textContent = h.toFixed(1);

            // 6. 辅助标注：顶点 A,B,C
            ctx.fillStyle = "#333";
            ctx.font = "bold 16px Arial";
            ctx.fillText("A", A.x - 5, A.y - 10);
            ctx.fillText("B", B.x - 20, B.y + 20);
            ctx.fillText("C", C.x + 10, C.y + 20);
            ctx.fillText("P (可拖动)", P.x + 10, P.y - 10);
        }

        // 交互逻辑
        let isDragging = false;

        function handleMove(e) {
            const rect = canvas.getBoundingClientRect();
            const mouseX = (e.clientX || e.touches[0].clientX) - rect.left;
            const mouseY = (e.clientY || e.touches[0].clientY) - rect.top;
            
            const tempP = { x: mouseX, y: mouseY };
            
            // 限制点只能在三角形内移动
            if (isPointInTriangle(tempP, A, B, C)) {
                P = tempP;
                draw();
            }
        }

        canvas.addEventListener('mousedown', () => isDragging = true);
        window.addEventListener('mouseup', () => isDragging = false);
        canvas.addEventListener('mousemove', (e) => {
            if (isDragging) handleMove(e);
        });

        // 移动端支持
        canvas.addEventListener('touchstart', (e) => {
            isDragging = true;
            handleMove(e);
            e.preventDefault();
        }, {passive: false});
        canvas.addEventListener('touchmove', (e) => {
            if (isDragging) handleMove(e);
            e.preventDefault();
        }, {passive: false});

        draw();
    </script>
</body>
</html>
