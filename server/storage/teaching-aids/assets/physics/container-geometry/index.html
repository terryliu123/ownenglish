<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生活中的几何体：集装箱 (抽象与具象)</title>
    <style>
        :root {
            --bg-color: #1e1e1e;
            --text-color: #d0d0d0;
            --accent-color: #ffffff;
            --container-width: 800px;
            --container-height: 450px;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            max-width: var(--container-width);
            padding: 20px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            font-size: 1.2rem;
            font-weight: normal;
            margin: 0;
        }

        .badge {
            border: 1px solid #666;
            border-radius: 15px;
            padding: 4px 12px;
            font-size: 0.8rem;
            color: #888;
        }

        /* 核心交互区域 */
        .interactive-area {
            position: relative;
            width: 100%;
            max-width: var(--container-width);
            height: var(--container-height);
            background: #333;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            user-select: none;
        }

        /* 两个层级：底层是几何(抽象)，上层是实物(具象) */
        .layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .layer-geo {
            background: #2a2a2a; /* 深灰色背景 */
            z-index: 1;
        }

        .layer-real {
            background: linear-gradient(to bottom, #87CEEB 0%, #e0f7fa 50%, #90a4ae 100%); /* 模拟天空地面 */
            z-index: 2;
            width: 50%; /* 初始宽度 */
            border-right: 2px solid white;
        }

        /* SVG 绘图样式 */
        svg {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }

        /* 几何层样式 */
        .geo-lines {
            fill: none;
            stroke: rgba(255, 255, 255, 0.8);
            stroke-width: 3;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .geo-hidden-lines {
            fill: none;
            stroke: rgba(255, 255, 255, 0.3);
            stroke-width: 2;
            stroke-dasharray: 8, 6;
        }
        .vertex-dot {
            fill: white;
            filter: drop-shadow(0 0 5px rgba(255,255,255,0.8));
        }

        /* 实物层样式 */
        .real-face-front { fill: #dbe2e6; stroke: #bdc3c7; stroke-width: 1; }
        .real-face-side { fill: #bdc3c7; stroke: #95a5a6; stroke-width: 1; }
        .real-face-top { fill: #ecf0f1; stroke: #bdc3c7; stroke-width: 1; }
        .corrugation { fill: none; stroke: rgba(0,0,0,0.1); stroke-width: 2; }
        .door-detail { fill: none; stroke: #7f8c8d; stroke-width: 2; }

        /* 滑块手柄 */
        .handle {
            position: absolute;
            top: 0;
            bottom: 0;
            left: 50%; /* 初始位置 */
            width: 40px;
            transform: translateX(-50%);
            z-index: 10;
            cursor: ew-resize;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .handle-line {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 2px;
            background: white;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        .handle-btn {
            width: 50px;
            height: 50px;
            background: rgba(0,0,0,0.6);
            border: 2px solid white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        
        .handle-btn::after {
            content: '';
            border-top: 8px solid transparent;
            border-bottom: 8px solid transparent;
            border-left: 12px solid white;
            margin-left: 4px; /* 模拟播放按钮三角形 */
        }

        /* 文本说明区域 */
        .info-box {
            max-width: var(--container-width);
            margin-top: 20px;
            padding: 20px;
            line-height: 1.6;
            background: #252525;
            border-radius: 8px;
        }

        .info-box h2 {
            font-size: 1rem;
            color: #fff;
            margin-top: 0;
        }

        .info-box p {
            font-size: 0.9rem;
            color: #aaa;
            margin-bottom: 10px;
        }
        
        .label-overlay {
            position: absolute;
            color: white;
            font-weight: bold;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            pointer-events: none;
            opacity: 0.8;
        }

        /* 响应式调整 */
        @media (max-width: 820px) {
            :root { --container-width: 95vw; --container-height: 50vw; }
            .handle-btn { width: 40px; height: 40px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>生活中的几何体 (集装箱)</h1>
        <div class="badge">可交互微件</div>
    </header>

    <div class="interactive-area" id="containerArea">
        
        <!-- 底层：几何抽象 (Geometric Abstraction) -->
        <div class="layer layer-geo">
            <div class="label-overlay" style="top: 20px; left: 20px;">几何概念 (长方体)</div>
            <svg viewBox="0 0 800 450" preserveAspectRatio="xMidYMid slice">
                <!-- 辅助线：高度 -->
                <line x1="250" y1="100" x2="250" y2="350" class="geo-hidden-lines" />
                
                <!-- 隐藏的边 (虚线) -->
                <line x1="250" y1="350" x2="650" y2="350" class="geo-hidden-lines" /> <!-- 底后 -->
                <line x1="250" y1="350" x2="150" y2="400" class="geo-hidden-lines" /> <!-- 侧底隐 -->

                <!-- 可见的线框 -->
                <path d="M150 150 L550 150 L650 100 L250 100 Z" class="geo-lines" /> <!-- 顶面 -->
                <path d="M150 150 L150 400 L550 400 L550 150 Z" class="geo-lines" /> <!-- 正面 -->
                <path d="M550 150 L650 100 L650 350 L550 400 Z" class="geo-lines" /> <!-- 侧面 -->
                
                <!-- 顶点 (Highlight Dots) -->
                <circle cx="150" cy="150" r="6" class="vertex-dot" />
                <circle cx="550" cy="150" r="6" class="vertex-dot" />
                <circle cx="550" cy="400" r="6" class="vertex-dot" />
                <circle cx="150" cy="400" r="6" class="vertex-dot" />
                <circle cx="650" cy="100" r="6" class="vertex-dot" />
                <circle cx="250" cy="100" r="6" class="vertex-dot" />
                <circle cx="650" cy="350" r="6" class="vertex-dot" />
                <!-- 隐藏点 -->
                <circle cx="250" cy="350" r="4" class="vertex-dot" style="opacity:0.5" />
            </svg>
        </div>

        <!-- 上层：实物具象 (Realistic Object) -->
        <div class="layer layer-real" id="realLayer">
            <div class="label-overlay" style="top: 20px; right: 20px;">实物 (集装箱)</div>
            <svg viewBox="0 0 800 450" preserveAspectRatio="xMidYMid slice">
                <!-- 背景环境 -->
                <rect x="0" y="350" width="800" height="100" fill="#7f8c8d" /> <!-- 地面 -->
                <path d="M0 350 L800 350" stroke="#95a5a6" stroke-width="2" />

                <!-- 集装箱体 -->
                <!-- 后面(不可见但为了填充缝隙) -->
                <path d="M250 100 L650 100 L650 350 L250 350 Z" fill="#bdc3c7" />

                <!-- 顶面 -->
                <path d="M150 150 L550 150 L650 100 L250 100 Z" class="real-face-top" />
                
                <!-- 侧面 (长边) -->
                <path d="M550 150 L650 100 L650 350 L550 400 Z" class="real-face-side" />
                <!-- 侧面纹理 -->
                <path d="M570 140 L570 390" class="corrugation" />
                <path d="M590 130 L590 380" class="corrugation" />
                <path d="M610 120 L610 370" class="corrugation" />
                <path d="M630 110 L630 360" class="corrugation" />

                <!-- 正面 (门) -->
                <path d="M150 150 L550 150 L550 400 L150 400 Z" class="real-face-front" />
                <!-- 正面纹理 (凹凸感) -->
                <g stroke="rgba(0,0,0,0.05)" stroke-width="2">
                    <line x1="180" y1="150" x2="180" y2="400" />
                    <line x1="210" y1="150" x2="210" y2="400" />
                    <line x1="240" y1="150" x2="240" y2="400" />
                    <line x1="270" y1="150" x2="270" y2="400" />
                    <line x1="300" y1="150" x2="300" y2="400" />
                    <line x1="400" y1="150" x2="400" y2="400" />
                    <line x1="430" y1="150" x2="430" y2="400" />
                    <line x1="460" y1="150" x2="460" y2="400" />
                    <line x1="490" y1="150" x2="490" y2="400" />
                    <line x1="520" y1="150" x2="520" y2="400" />
                </g>
                
                <!-- 门框细节 -->
                <rect x="330" y="160" width="40" height="230" stroke="#95a5a6" fill="none" />
                <line x1="350" y1="150" x2="350" y2="400" stroke="#bdc3c7" stroke-width="3" /> <!-- 门缝 -->
                
                <!-- 锁杆 -->
                <line x1="340" y1="170" x2="340" y2="380" stroke="#555" stroke-width="3" />
                <line x1="360" y1="170" x2="360" y2="380" stroke="#555" stroke-width="3" />

            </svg>
        </div>

        <!-- 交互手柄 -->
        <div class="handle" id="dragHandle">
            <div class="handle-line"></div>
            <div class="handle-btn"></div>
        </div>
    </div>

    <div class="info-box">
        <h2>生活中的几何体：几何体亦称立体，是立体几何的基本概念之一。</h2>
        <p>几何体概念产生于人们对客观世界中各种物体的数学抽象。当人们只考虑物体的形状、大小、位置关系等数学性质，而不考虑它的物理的、化学的、生物的、社会的等属性时，就获得几何体的概念。</p>
        <p>通过将生活中常见的物体（如集装箱）进行抽象，展示抽象之后对应的几何体（长方体），联系实际，让学生更加清楚理解几何体的本质概念。</p>
        <p style="font-size: 0.8rem; color: #666; margin-top: 15px;">适配教科书：北师大版 / 苏科版 / 人教版 / 沪教版 / 浙教版</p>
    </div>

    <script>
        const container = document.getElementById('containerArea');
        const realLayer = document.getElementById('realLayer');
        const handle = document.getElementById('dragHandle');
        
        let isDragging = false;

        // 初始化
        function setPosition(x) {
            const rect = container.getBoundingClientRect();
            let percentage = ((x - rect.left) / rect.width) * 100;
            
            // 限制范围
            percentage = Math.max(0, Math.min(100, percentage));

            // 更新实物层的宽度 (从左向右遮挡)
            // 注意：这里的逻辑是 左侧显示几何(底层)，右侧显示实物(上层，但宽度变化)
            // 如果想左边是几何，右边是实物：
            // 实际上截图是：左边是几何线框，右边是实物。
            // 所以我们让实物层（realLayer）浮在上面，改变它的 clip-path 或者 width。
            
            // 修正逻辑：为了达到截图效果（左虚右实），
            // 我们让实物层(realLayer) 覆盖全屏，然后用 clip-path 裁剪左边。
            // clip-path: inset(0 0 0 X%); 意思是左边裁剪掉 X%。
            
            realLayer.style.width = '100%'; // 确保占满
            realLayer.style.clipPath = `inset(0 0 0 ${percentage}%)`;

            handle.style.left = `${percentage}%`;
        }

        // 鼠标/触摸事件处理
        function startDrag(e) {
            isDragging = true;
            e.preventDefault(); // 防止文本选中
        }

        function stopDrag() {
            isDragging = false;
        }

        function doDrag(e) {
            if (!isDragging) return;
            
            let clientX;
            if (e.type.includes('touch')) {
                clientX = e.touches[0].clientX;
            } else {
                clientX = e.clientX;
            }
            
            setPosition(clientX);
        }

        // 绑定事件
        handle.addEventListener('mousedown', startDrag);
        handle.addEventListener('touchstart', startDrag);

        container.addEventListener('mousemove', doDrag);
        container.addEventListener('touchmove', doDrag);

        window.addEventListener('mouseup', stopDrag);
        window.addEventListener('touchend', stopDrag);

        // 点击容器也可以跳转位置
        container.addEventListener('mousedown', function(e) {
            if(e.target !== handle && !handle.contains(e.target)) {
                setPosition(e.clientX);
                startDrag(e); // 允许点下后继续拖动
            }
        });

        // 初始化位置在 50%
        const rect = container.getBoundingClientRect();
        setPosition(rect.left + rect.width * 0.5);

    </script>
</body>
</html>
