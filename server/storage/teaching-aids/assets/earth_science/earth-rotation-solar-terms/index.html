<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地球公转自转与24节气可视化</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Microsoft YaHei', sans-serif;
            background-color: #000;
            color: #fff;
        }

        #container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        #info {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 10px;
            max-width: 300px;
        }

        #time {
            font-size: 1.2em;
            margin-bottom: 10px;
        }

        #solar-term-info {
            border-top: 1px solid rgba(255, 255, 255, 0.3);
            padding-top: 10px;
            display: none; /* 初始隐藏节气信息 */
        }

        #current-term {
            margin-top: 0;
            color: #ffcc00;
        }

        #term-description {
            font-size: 0.9em;
            line-height: 1.5;
        }
        
        /* 添加节气标签样式 */
        .term-label {
            color: white;
            font-size: 12px;
            background-color: rgba(0, 0, 0, 0.5);
            padding: 2px 5px;
            border-radius: 3px;
            cursor: pointer;
            pointer-events: auto;
            transition: background-color 0.3s;
        }
        
        .term-label:hover {
            background-color: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>
    <div id="container"></div>
    <div id="info">
        <div id="time"></div>
        <div id="solar-term-info">
            <h2 id="current-term"></h2>
            <p id="term-description"></p>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/renderers/CSS2DRenderer.js"></script>

            {

            {

                date: "12月21-23日",
                angle: 270,
                color: "#ECF0F1"
            },
            {
                name: "小寒",
                description: "小寒表示天气寒冷，但还未到最冷的时候。气温持续走低，寒气渐深。",
                date: "1月5-7日",
                angle: 285,
                color: "#ABB7B7"
            },
            {
                name: "大寒",
                description: "大寒是一年中最冷的节气，正值\"三九天\"，是一年中气温最低的时期。",
                date: "1月20-21日",
                angle: 300,
                color: "#6C7A89"
            }
        ];

        // 场景初始化
        let scene, camera, renderer, controls;
        let labelRenderer; // 添加CSS2D渲染器变量声明
        let earth, sun, earthOrbit;
        let solarTermMarkers = [];
        let solarTermLines = [];
        let solarTermFans = [];
        let solarTermLabels = []; // 添加节气标签数组
        let clock = new THREE.Clock();
        let currentTermIndex = 0;
        let speedFactor = 3; // 降低速度因子，从10降到3
        let selectedTerm = null; // 当前选中的节气

        // 初始化函数
        function init() {
            // 创建场景
            scene = new THREE.Scene();
            
            // 创建相机
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 30, 50);
            
            // 创建渲染器
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setClearColor(0x000000);
            document.getElementById('container').appendChild(renderer.domElement);
            
            // 创建CSS2D渲染器用于显示HTML标签
            labelRenderer = new THREE.CSS2DRenderer();
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.domElement.style.position = 'absolute';
            labelRenderer.domElement.style.top = '0';
            labelRenderer.domElement.style.pointerEvents = 'none';
            document.getElementById('container').appendChild(labelRenderer.domElement);
            
            // 添加轨道控制
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            
            // 添加环境光
            const ambientLight = new THREE.AmbientLight(0x333333);
            scene.add(ambientLight);
            
            // 创建太阳
            createSun();
            
            // 创建地球轨道
            createEarthOrbit();
            
            // 创建地球
            createEarth();
            
            // 创建24节气标记
            createSolarTermMarkers();
            
            // 添加窗口大小调整监听
            window.addEventListener('resize', onWindowResize, false);
            
            // 开始动画
            animate();
        }

        // 创建太阳
        function createSun() {
            const sunGeometry = new THREE.SphereGeometry(5, 32, 32);
            // 修正：使用MeshPhongMaterial替代MeshBasicMaterial
            const sunMaterial = new THREE.MeshPhongMaterial({
                color: 0xffff00,
                emissive: 0xffff00,
                emissiveIntensity: 1
            });
            sun = new THREE.Mesh(sunGeometry, sunMaterial);
            scene.add(sun);
            
            // 添加太阳光源
            const sunLight = new THREE.PointLight(0xffffff, 2, 300);
            sun.add(sunLight);
            
            // 添加太阳光晕
            const sunGlowGeometry = new THREE.SphereGeometry(5.5, 32, 32);
            const sunGlowMaterial = new THREE.MeshBasicMaterial({
                color: 0xffff00,
                transparent: true,
                opacity: 0.3
            });
            const sunGlow = new THREE.Mesh(sunGlowGeometry, sunGlowMaterial);
            sun.add(sunGlow);
        }

        // 创建地球轨道
        function createEarthOrbit() {
            earthOrbit = new THREE.Object3D();
            scene.add(earthOrbit);
            
            // 可视化轨道路径
            const orbitGeometry = new THREE.RingGeometry(30, 30.1, 128);
            const orbitMaterial = new THREE.MeshBasicMaterial({
                color: 0x3366ff,
                side: THREE.DoubleSide,
                transparent: true,
                opacity: 0.3
            });
            const orbitPath = new THREE.Mesh(orbitGeometry, orbitMaterial);
            orbitPath.rotation.x = Math.PI / 2;
            scene.add(orbitPath);
        }

        // 创建地球
        function createEarth() {
            const earthGeometry = new THREE.SphereGeometry(2, 64, 64); // 增加分段数提高质量
            
            // 加载地球纹理 - 使用更好的地球纹理
            const textureLoader = new THREE.TextureLoader();
            
            // 创建地球材质
            const earthMaterial = new THREE.MeshPhongMaterial({
                shininess: 15,
                specular: new THREE.Color(0x333333)
            });
            
            // 加载地球表面纹理
            textureLoader.load(
                'https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/textures/planets/earth_atmos_2048.jpg',
                function(texture) {
                    earthMaterial.map = texture;
                    earthMaterial.needsUpdate = true;
                }
            );
            
            // 加载地球法线贴图以增加细节
            textureLoader.load(
                'https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/textures/planets/earth_normal_2048.jpg',
                function(texture) {
                    earthMaterial.normalMap = texture;
                    earthMaterial.normalScale.set(0.85, 0.85);
                    earthMaterial.needsUpdate = true;
                }
            );
            
            // 加载地球高光贴图
            textureLoader.load(
                'https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/textures/planets/earth_specular_2048.jpg',
                function(texture) {
                    earthMaterial.specularMap = texture;
                    earthMaterial.needsUpdate = true;
                }
            );
            
            earth = new THREE.Mesh(earthGeometry, earthMaterial);
            
            // 设置地球倾斜角度（23.5度）
            earth.rotation.z = 23.5 * Math.PI / 180;
            
            // 将地球放置在轨道上
            earth.position.set(30, 0, 0);
            earthOrbit.add(earth);
            
            // 添加云层
            const cloudGeometry = new THREE.SphereGeometry(2.05, 64, 64);
            const cloudMaterial = new THREE.MeshPhongMaterial({
                map: null,
                transparent: true,
                opacity: 0.4
            });
            
            // 加载云层纹理
            textureLoader.load(
                'https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/textures/planets/earth_clouds_1024.jpg',
                function(texture) {
                    cloudMaterial.map = texture;
                    cloudMaterial.needsUpdate = true;
                }
            );
            
            const clouds = new THREE.Mesh(cloudGeometry, cloudMaterial);
            earth.add(clouds);
            
            // 添加大气层光晕效果
            const glowGeometry = new THREE.SphereGeometry(2.1, 64, 64);
            const glowMaterial = new THREE.MeshPhongMaterial({
                color: 0x6699ff,
                transparent: true,
                opacity: 0.15,
                side: THREE.BackSide
            });
            const glow = new THREE.Mesh(glowGeometry, glowMaterial);
            earth.add(glow);
        }

        // 创建24节气标记
        function createSolarTermMarkers() {
            // 清除现有标记
            solarTermMarkers.forEach(marker => scene.remove(marker));
            solarTermLines.forEach(line => scene.remove(line));
            solarTermFans.forEach(fan => scene.remove(fan));
            solarTermLabels.forEach(label => scene.remove(label));
            
            solarTermMarkers = [];
            solarTermLines = [];
            solarTermFans = [];
            solarTermLabels = [];
            
            // 创建节气标记和连线
            solarTerms.forEach((term, index) => {
                // 计算节气在轨道上的位置
                const angle = term.angle * Math.PI / 180;
                const x = 30 * Math.cos(angle);
                const z = 30 * Math.sin(angle);
                
                // 创建节气标记
                const markerGeometry = new THREE.SphereGeometry(0.5, 16, 16);
                const markerMaterial = new THREE.MeshBasicMaterial({ color: term.color });
                const marker = new THREE.Mesh(markerGeometry, markerMaterial);
                marker.position.set(x, 0, z);
                scene.add(marker);
                solarTermMarkers.push(marker);
                
                // 创建节气标签
                const labelDiv = document.createElement('div');
                labelDiv.className = 'term-label';
                labelDiv.textContent = term.name;
                labelDiv.style.color = term.color;
                
                const label = new THREE.CSS2DObject(labelDiv);
                label.position.set(x * 1.1, 0.8, z * 1.1); // 稍微偏移一点位置
                scene.add(label);
                solarTermLabels.push(label);
                
                // 添加点击事件
                labelDiv.addEventListener('click', function() {
                    selectedTerm = term;
                    showTermInfo(term);
                });
                
                // 创建连接太阳和节气的线
                const lineGeometry = new THREE.BufferGeometry().setFromPoints([
                    new THREE.Vector3(0, 0, 0),  // 太阳位置
                    new THREE.Vector3(x, 0, z)   // 节气位置
                ]);
                const lineMaterial = new THREE.LineBasicMaterial({ color: term.color, transparent: true, opacity: 0.6 });
                const line = new THREE.Line(lineGeometry, lineMaterial);
                scene.add(line);
                solarTermLines.push(line);
                
                // 创建扇面
                if (index > 0) {
                    const prevTerm = solarTerms[index - 1];
                    const prevAngle = prevTerm.angle * Math.PI / 180;
                    
                    // 创建扇面几何体
                    const fanShape = new THREE.Shape();
                    fanShape.moveTo(0, 0);
                    fanShape.lineTo(30 * Math.cos(prevAngle), 30 * Math.sin(prevAngle));
                    
                    // 添加弧线
                    const arcCenterX = 0;
                    const arcCenterY = 0;
                    const arcRadius = 30;
                    const arcStartAngle = prevAngle;
                    const arcEndAngle = angle;
                    const arcClockwise = arcStartAngle > arcEndAngle;
                    
                    fanShape.absarc(arcCenterX, arcCenterY, arcRadius, arcStartAngle, arcEndAngle, arcClockwise);
                    fanShape.lineTo(0, 0);
                    
                    const fanGeometry = new THREE.ShapeGeometry(fanShape);
                    const fanMaterial = new THREE.MeshBasicMaterial({
                        color: term.color,
                        transparent: true,
                        opacity: 0.2,
                        side: THREE.DoubleSide
                    });
                    
                    const fan = new THREE.Mesh(fanGeometry, fanMaterial);
                    fan.rotation.x = -Math.PI / 2; // 旋转到水平面
                    scene.add(fan);
                    solarTermFans.push(fan);
                }
            });
            
            // 连接最后一个和第一个节气
            const firstTerm = solarTerms[0];
            const lastTerm = solarTerms[solarTerms.length - 1];
            const firstAngle = firstTerm.angle * Math.PI / 180;
            const lastAngle = lastTerm.angle * Math.PI / 180;
            
            // 创建扇面几何体
            const fanShape = new THREE.Shape();
            fanShape.moveTo(0, 0);
            fanShape.lineTo(30 * Math.cos(lastAngle), 30 * Math.sin(lastAngle));
            
            // 添加弧线
            const arcCenterX = 0;
            const arcCenterY = 0;
            const arcRadius = 30;
            const arcStartAngle = lastAngle;
            const arcEndAngle = firstAngle;
            const arcClockwise = arcStartAngle > arcEndAngle;
            
            fanShape.absarc(arcCenterX, arcCenterY, arcRadius, arcStartAngle, arcEndAngle, arcClockwise);
            fanShape.lineTo(0, 0);
            
            const fanGeometry = new THREE.ShapeGeometry(fanShape);
            const fanMaterial = new THREE.MeshBasicMaterial({
                color: firstTerm.color,
                transparent: true,
                opacity: 0.2,
                side: THREE.DoubleSide
            });
            
            const fan = new THREE.Mesh(fanGeometry, fanMaterial);
            fan.rotation.x = -Math.PI / 2; // 旋转到水平面
            scene.add(fan);
            solarTermFans.push(fan);
        }

        // 显示节气信息
        function showTermInfo(term) {
            const infoDiv = document.getElementById('solar-term-info');
            document.getElementById('current-term').textContent = term.name;
            document.getElementById('term-description').textContent = `${term.date}：${term.description}`;
            infoDiv.style.display = 'block';
        }

        // 窗口大小调整函数
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        }

        // 更新时间和节气信息
        function updateInfo(elapsedTime) {
            // 模拟一年的时间
            const yearInSeconds = 120; // 增加一年的模拟时间（秒），从60秒增加到120秒
            const yearProgress = (elapsedTime % yearInSeconds) / yearInSeconds;
            
            // 计算当前日期（模拟）
            const now = new Date();
            const startOfYear = new Date(now.getFullYear(), 0, 1);
            const yearInMs = 365 * 24 * 60 * 60 * 1000;
            const simulatedDate = new Date(startOfYear.getTime() + yearProgress * yearInMs);
            
            // 显示时间
            const timeString = simulatedDate.toLocaleDateString('zh-CN') + ' ' + 
                            simulatedDate.toLocaleTimeString('zh-CN');
            document.getElementById('time').textContent = '当前时间：' + timeString;
            
            // 确定当前节气（仅在未选择节气时自动更新）
            if (!selectedTerm) {
                const angleInDegrees = yearProgress * 360;
                let currentTerm = solarTerms[0];
                
                for (let i = 0; i < solarTerms.length; i++) {
                    const term = solarTerms[i];
                    const nextTerm = solarTerms[(i + 1) % solarTerms.length];
                    
                    let termAngle = term.angle;
                    let nextTermAngle = nextTerm.angle;
                    
                    // 处理跨年的情况
                    if (nextTermAngle < termAngle) {
                        nextTermAngle += 360;
                    }
                    
                    let currentAngle = angleInDegrees;
                    if (currentAngle < termAngle) {
                        currentAngle += 360;
                    }
                    
                    if (currentAngle >= termAngle && currentAngle < nextTermAngle) {
                        currentTerm = term;
                        currentTermIndex = i;
                        break;
                    }
                }
                
                // 更新当前节气标记的大小
                solarTermMarkers.forEach((marker, i) => {
                    if (i === currentTermIndex) {
                        marker.scale.set(1.5, 1.5, 1.5);
                    } else {
                        marker.scale.set(1, 1, 1);
                    }
                });
            }
        }

        // 动画函数
        function animate() {
            requestAnimationFrame(animate);
            
            const elapsedTime = clock.getElapsedTime() * speedFactor;
            
            // 地球公转（绕太阳）
            const yearInSeconds = 120; // 一年的模拟时间（秒）
            const orbitAngle = (elapsedTime % yearInSeconds) / yearInSeconds * Math.PI * 2;
            earthOrbit.rotation.y = orbitAngle;
            
            // 地球自转 - 降低自转速度
            const dayInSeconds = yearInSeconds / 24; // 修改这里，从365改为24，大幅降低自转速度
            const rotationAngle = (elapsedTime % dayInSeconds) / dayInSeconds * Math.PI * 2;
            earth.rotation.y = rotationAngle;
            
            // 更新信息显示
            updateInfo(elapsedTime);
            
            // 更新控制器
            controls.update();
            
            // 渲染场景
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }

        // 启动应用
        init();
    </script>
</body>
</html>
