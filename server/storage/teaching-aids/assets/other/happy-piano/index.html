<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>快乐钢琴 - 平板大屏版</title>
    <!-- 引入 VexFlow -->
    <script src="https://cdn.jsdelivr.net/npm/vexflow@4.2.2/build/cjs/vexflow.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f0f8ff;
            display: flex;
            flex-direction: column;
            align-items: center;
            user-select: none;
            -webkit-user-select: none;
            touch-action: pan-x; /* 允许横向滑动，禁止缩放 */
            min-height: 100vh;
            margin: 0;
            padding-top: 20px;
        }

        h1 { color: #333; margin: 10px; font-size: 28px; }

        /* 乐谱容器 */
        #staff-container {
            width: 95%;
            max-width: 1000px;
            height: 200px; /* 加高乐谱区域 */
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin: 10px 0 20px 0;
            overflow-x: auto;
            overflow-y: hidden;
            border: 3px solid #4ECDC4;
            display: flex;
            align-items: center;
        }

        #canvas-output { display: block; }

        /* 按钮样式 - 加大尺寸 */
        .controls { margin-bottom: 25px; display: flex; gap: 20px;}
        button {
            padding: 15px 30px; /* 更大的点击区域 */
            border: none;
            border-radius: 30px;
            background: #FF6B6B;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 18px; /* 更大的字体 */
            box-shadow: 0 4px 0 rgba(0,0,0,0.1);
        }
        button:active { transform: translateY(3px); box-shadow: none; }
        button.play { background: #4ECDC4; }

        /* 钢琴键盘区域 */
        .piano-wrapper {
            width: 100%;
            overflow-x: auto; /* 允许横向滚动 */
            display: flex;
            justify-content: center;
            padding-bottom: 30px;
            -webkit-overflow-scrolling: touch; /* iOS顺滑滚动 */
        }

        .piano {
            position: relative;
            display: flex;
            justify-content: center;
            background: #2c3e50;
            padding: 15px 20px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            /* 
               计算公式: 
               10个白键 * 70px + 左右padding 
               = 700px + 40px = 740px 
            */
            min-width: 740px; 
        }

        .key {
            position: relative;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            cursor: pointer;
            border-radius: 0 0 6px 6px;
            font-weight: bold;
            font-size: 18px; /* 字体加大 */
            padding-bottom: 15px;
            -webkit-tap-highlight-color: transparent;
            box-shadow: inset 0 -2px 5px rgba(0,0,0,0.1);
        }

        /* --- 白键样式 (加大) --- */
        .white {
            width: 70px;   /* 宽度增加 */
            height: 240px; /* 高度增加 */
            background: linear-gradient(to bottom, #fff 0%, #f1f1f1 100%);
            border: 1px solid #bbb;
            z-index: 1;
            color: #555;
            transition: all 0.1s;
        }
        .white.active { 
            background: #ddd; 
            transform: scale(0.98); 
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.2);
            border-radius: 0 0 8px 8px;
        }

        /* --- 黑键样式 (加大) --- */
        .black {
            width: 44px;   /* 宽度增加 */
            height: 150px; /* 高度增加 */
            background: linear-gradient(to bottom, #444 0%, #000 100%);
            color: white;
            position: absolute;
            z-index: 10; /* 确保在白键之上 */
            
            /* 
               定位核心逻辑：
               left值设置为白键的边界线位置
               margin-left设置为负的宽度一半 (-22px)
               这样黑键就会完美居中在两个白键之间
            */
            margin-left: -22px; 
            
            border-bottom: 6px solid #1a1a1a;
            border-radius: 0 0 6px 6px;
            pointer-events: auto;
        }
        .black.active { 
            background: #333; 
            border-bottom: 2px solid #000; 
            transform: translateY(3px);
        }

        #status { height: 30px; color: #666; font-size: 18px; margin-top: 10px;}
    </style>
</head>
<body>

    <h1>🎹 快乐钢琴 - 平板大屏版</h1>
    
    <div class="controls">
        <button class="play" onclick="playAll()">▶ 播放全曲</button>
        <button onclick="undo()">↩ 撤销</button>
        <button onclick="clearAll()">🗑 清空</button>
    </div>

    <div id="staff-container">
        <div id="canvas-output"></div>
    </div>
    
    <div id="status">点击琴键开始演奏...</div>

    <div class="piano-wrapper">
        <div class="piano">
            <!-- 
               白键宽度 = 70px
               left 计算逻辑：第 N 个缝隙 = N * 70px
            -->

            <!-- 1. C4 -->
            <div class="key white" data-note="c/4">C</div>
            <div class="key black" style="left: 70px;" data-note="c#/4"></div>
            
            <!-- 2. D4 -->
            <div class="key white" data-note="d/4">D</div>
            <div class="key black" style="left: 140px;" data-note="d#/4"></div>
            
            <!-- 3. E4 -->
            <div class="key white" data-note="e/4">E</div>
            
            <!-- 4. F4 -->
            <div class="key white" data-note="f/4">F</div>
            <div class="key black" style="left: 280px;" data-note="f#/4"></div>
            
            <!-- 5. G4 -->
            <div class="key white" data-note="g/4">G</div>
            <div class="key black" style="left: 350px;" data-note="g#/4"></div>
            
            <!-- 6. A4 -->
            <div class="key white" data-note="a/4">A</div>
            <div class="key black" style="left: 420px;" data-note="a#/4"></div>
            
            <!-- 7. B4 -->
            <div class="key white" data-note="b/4">B</div>
            
            <!-- 8. C5 (高八度) -->
            <div class="key white" data-note="c/5">C5</div>
            <div class="key black" style="left: 560px;" data-note="c#/5"></div>
            
            <!-- 9. D5 -->
            <div class="key white" data-note="d/5">D5</div>
            <div class="key black" style="left: 630px;" data-note="d#/5"></div>
            
            <!-- 10. E5 -->
            <div class="key white" data-note="e/5">E5</div>
        </div>
    </div>

    <script>
        // === 1. 音频系统 ===
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const frequencies = {
            'c/4': 261.63, 'c#/4': 277.18, 'd/4': 293.66, 'd#/4': 311.13, 'e/4': 329.63,
            'f/4': 349.23, 'f#/4': 369.99, 'g/4': 392.00, 'g#/4': 415.30, 'a/4': 440.00,
            'a#/4': 466.16, 'b/4': 493.88,
            'c/5': 523.25, 'c#/5': 554.37, 'd/5': 587.33, 'd#/5': 622.25, 'e/5': 659.25
        };

        function beep(note) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            // 使用正弦波，声音更像电子琴，比三角形波柔和一点
            osc.type = 'triangle'; 
            osc.frequency.value = frequencies[note];
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.start();
            // 调整音量包络，防止爆音
            const now = audioCtx.currentTime;
            gain.gain.setValueAtTime(0, now);
            gain.gain.linearRampToValueAtTime(0.6, now + 0.02); // 快速起音
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.6); // 缓慢衰减
            
            osc.stop(now + 0.6);
        }

        // === 2. 核心渲染逻辑 ===
        let notesArray = [];

        function render() {
            const container = document.getElementById('canvas-output');
            container.innerHTML = ''; 

            if (typeof Vex === 'undefined') {
                document.getElementById('status').innerText = "加载乐谱库中...";
                return;
            }

            const { Renderer, Stave, StaveNote, Accidental, Formatter } = Vex.Flow;
            
            // 增加音符绘制的宽度，使其在平板上更宽松
            const noteWidth = 60; 
            const width = Math.max(800, notesArray.length * noteWidth + 150);

            const renderer = new Renderer(container, Renderer.Backends.SVG);
            // 增加渲染高度
            renderer.resize(width, 180); 
            const context = renderer.getContext();
            
            // 放大五线谱
            context.scale(1.2, 1.2); 

            const stave = new Stave(10, 10, (width / 1.2) - 20);
            stave.addClef("treble"); 
            stave.setContext(context).draw();

            if (notesArray.length > 0) {
                const vexNotes = notesArray.map(noteKey => {
                    const parts = noteKey.split('/');
                    const keyName = parts[0]; 
                    const octave = parts[1];  
                    
                    const note = new StaveNote({
                        keys: [`${keyName}/${octave}`], 
                        duration: "q", 
                        auto_stem: true 
                    });

                    if (keyName.includes('#')) note.addModifier(new Accidental('#'));
                    else if (keyName.includes('b')) note.addModifier(new Accidental('b'));

                    return note;
                });
                Formatter.FormatAndDraw(context, stave, vexNotes);
            }

            // 自动滚动
            const wrapper = document.getElementById('staff-container');
            wrapper.scrollLeft = wrapper.scrollWidth;
        }

        // === 3. 触屏/点击交互核心 ===
        function handleInput(note) {
            beep(note);
            notesArray.push(note);
            render();
            document.getElementById('status').innerText = `已输入: ${note.replace('/','').toUpperCase()}`;
        }

        document.querySelectorAll('.key').forEach(key => {
            const note = key.getAttribute('data-note');

            const pressHandler = (e) => {
                if (e.cancelable) e.preventDefault(); 
                key.classList.add('active');
                handleInput(note);
            };

            const releaseHandler = (e) => {
                key.classList.remove('active');
            };

            // 多点触控支持
            key.addEventListener('touchstart', pressHandler, { passive: false });
            key.addEventListener('touchend', releaseHandler);
            key.addEventListener('touchcancel', releaseHandler);
            
            // 鼠标支持
            key.addEventListener('mousedown', pressHandler);
            key.addEventListener('mouseup', releaseHandler);
            key.addEventListener('mouseleave', releaseHandler);
        });

        // === 4. 功能函数 ===
        function undo() {
            notesArray.pop();
            render();
            document.getElementById('status').innerText = "撤销上一步";
        }

        function clearAll() {
            notesArray = [];
            render();
            document.getElementById('status').innerText = "乐谱已清空";
        }

        function playAll() {
            if (notesArray.length === 0) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            document.getElementById('status').innerText = "正在播放...";
            notesArray.forEach((note, i) => {
                setTimeout(() => beep(note), i * 500);
            });
            setTimeout(() => {
                document.getElementById('status').innerText = "播放结束";
            }, notesArray.length * 500);
        }

        window.onload = function() {
            render();
            // 防止双击放大
            document.addEventListener('dblclick', function(event) {
                event.preventDefault();
            }, { passive: false });
        };

    </script>
</body>
</html>
