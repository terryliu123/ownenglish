<!-- 
设计理念:
1. 主题表达: "安静养小树" - 通过声音控制生态环境变化，体现安静学习环境的重要性
2. 视觉层次:
   - 背景: 沙漠渐变到绿洲的动态过渡
   - 核心元素: 分贝检测条 + 树木成长系统
   - 反馈机制: 实时分贝数值 + 成长进度提示
3. 交互逻辑:
   - 麦克风权限获取后开始检测
   - 分贝<40持续60秒种一棵树苗
   - 2棵小树合成1棵大树
   - 树木数量影响背景颜色(沙漠→绿洲)
4. 响应式设计:
   - 移动端: 垂直布局，大按钮
   - 平板/桌面: 水平布局，详细信息展示
5. 色彩方案:
   - 主色调: 绿色系(#22c55e → #16a34a)
   - 辅助色: 沙色(#fde68a → #f59e0b)
   - 状态色: 红(警告)、黄(注意)、绿(安全)
-->

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>安静养小树</title>
    <link href="https://cdn.staticfile.org/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <link href="https://cdn.staticfile.org/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans SC', sans-serif;
            transition: background 2s ease;
        }
        
        .tree-transition {
            transition: all 1s ease-in-out;
        }
        
        .meter-bar {
            transition: height 0.3s ease-out, background-color 0.3s ease;
        }
        
        .pulse {
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        .shake {
            animation: shake 0.5s;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        
        .grow {
            animation: grow 1s forwards;
        }
        
        @keyframes grow {
            from { transform: scale(0.2); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        
        .leaf {
            position: absolute;
            width: 20px;
            height: 20px;
            background: #22c55e;
            border-radius: 50% 0;
            transform: rotate(45deg);
            opacity: 0;
        }
        
        .falling {
            animation: fall linear forwards;
        }
        
        @keyframes fall {
            to { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }
        
        /* 沙漠到绿洲的渐变背景 */
        .desert-bg {
            background: linear-gradient(135deg, #fde68a 0%, #f59e0b 50%, #ca8a04 100%);
        }
        
        .oasis-bg {
            background: linear-gradient(135deg, #bbf7d0 0%, #4ade80 50%, #22c55e 100%);
        }
        
        .transition-bg {
            background: linear-gradient(135deg, #fde68a 0%, #bbf7d0 100%);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 desert-bg">
    <div class="w-full max-w-4xl bg-white/90 backdrop-blur-sm rounded-3xl shadow-2xl overflow-hidden">
        <!-- 头部 -->
        <div class="bg-gradient-to-r from-green-500 to-emerald-600 p-6 text-center">
            <h1 class="text-3xl md:text-4xl font-bold text-white mb-2">
                <i class="fas fa-seedling mr-2"></i>安静养小树
            </h1>
            <p class="text-green-100">创造安静的学习环境，让小树茁壮成长</p>
        </div>
        
        <!-- 主体内容 -->
        <div class="p-6">
            <!-- 控制面板 -->
            <div class="flex flex-col md:flex-row gap-6 mb-8">
                <!-- 分贝检测区 -->
                <div class="md:w-1/2 bg-gray-50 rounded-2xl p-6 shadow-lg">
                    <h2 class="text-xl font-semibold text-gray-800 mb-4 flex items-center">
                        <i class="fas fa-microphone-alt text-red-500 mr-2"></i>声音检测
                    </h2>
                    
                    <!-- 分贝条 -->
                    <div class="relative h-64 bg-gray-200 rounded-full flex items-end justify-center p-4 mb-4">
                        <div id="meterBar" class="meter-bar w-full bg-gradient-to-t from-red-500 via-yellow-500 to-green-500 rounded-full"></div>
                        <div class="absolute inset-0 flex items-center justify-center">
                            <span id="decibelValue" class="text-4xl font-bold text-gray-700">0</span>
                            <span class="text-lg text-gray-500">dB</span>
                        </div>
                    </div>
                    
                    <!-- 状态指示 -->
                    <div class="grid grid-cols-3 gap-2 mb-4">
                        <div class="text-center p-2 rounded-lg bg-red-100">
                            <div class="text-red-600 font-semibold">>50dB</div>
                            <div class="text-xs text-red-500">吵闹</div>
                        </div>
                        <div class="text-center p-2 rounded-lg bg-yellow-100">
                            <div class="text-yellow-600 font-semibold">40-50dB</div>
                            <div class="text-xs text-yellow-500">一般</div>
                        </div>
                        <div class="text-center p-2 rounded-lg bg-green-100">
                            <div class="text-green-600 font-semibold"><40dB</div>
                            <div class="text-xs text-green-500">安静</div>
                        </div>
                    </div>
                    
                    <!-- 控制按钮 -->
                    <div class="flex gap-3">
                        <button id="startBtn" class="flex-1 bg-gradient-to-r from-blue-500 to-indigo-600 text-white py-3 px-4 rounded-xl font-semibold hover:opacity-90 transition-all flex items-center justify-center">
                            <i class="fas fa-play mr-2"></i>开始检测
                        </button>
                        <button id="stopBtn" class="flex-1 bg-gradient-to-r from-gray-500 to-gray-600 text-white py-3 px-4 rounded-xl font-semibold hover:opacity-90 transition-all flex items-center justify-center" disabled>
                            <i class="fas fa-stop mr-2"></i>停止
                        </button>
                    </div>
                </div>
                
                <!-- 成长状态区 -->
                <div class="md:w-1/2 bg-gray-50 rounded-2xl p-6 shadow-lg">
                    <h2 class="text-xl font-semibold text-gray-800 mb-4 flex items-center">
                        <i class="fas fa-tree text-green-500 mr-2"></i>成长状态
                    </h2>
                    
                    <!-- 进度条 -->
                    <div class="mb-6">
                        <div class="flex justify-between text-sm text-gray-600 mb-1">
                            <span>安静时间</span>
                            <span id="quietTime">0</span>
                        </div>
                        <div class="h-4 bg-gray-200 rounded-full overflow-hidden">
                            <div id="progressBar" class="h-full bg-gradient-to-r from-green-400 to-emerald-500 rounded-full transition-all duration-1000" style="width: 0%"></div>
                        </div>
                        <div class="text-right text-xs text-gray-500 mt-1">目标: 60秒</div>
                    </div>
                    
                    <!-- 树木展示区 -->
                    <div class="mb-6">
                        <div class="flex justify-between items-center mb-3">
                            <h3 class="font-medium text-gray-700">我的小树林</h3>
                            <span id="treeCount" class="bg-green-100 text-green-800 px-3 py-1 rounded-full text-sm font-semibold">0 棵树</span>
                        </div>
                        
                        <div id="forestContainer" class="min-h-[120px] relative bg-gradient-to-b from-amber-50 to-green-50 rounded-xl border-2 border-dashed border-green-200 flex items-center justify-center">
                            <div id="treesArea" class="flex flex-wrap justify-center gap-4 p-4">
                                <div class="text-gray-400 text-center py-8">
                                    <i class="fas fa-cloud text-4xl mb-2"></i>
                                    <p>还没有小树哦<br>保持安静开始种树吧!</p>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- 提示信息 -->
                    <div class="bg-blue-50 border-l-4 border-blue-500 p-4 rounded-lg">
                        <div class="flex">
                            <i class="fas fa-info-circle text-blue-500 text-xl mr-3"></i>
                            <div class="text-sm text-blue-700">
                                <p class="font-semibold mb-1">成长规则:</p>
                                <ul class="list-disc pl-5 space-y-1">
                                    <li>保持<40分贝持续60秒可种一棵树苗</li>
                                    <li>2棵小树可合成1棵大树</li>
                                    <li>树木越多，环境越美丽!</li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- 环境变化提示 -->
            <div id="environmentTip" class="text-center py-3 px-4 bg-amber-100 rounded-lg text-amber-800 hidden">
                <i class="fas fa-sun mr-2"></i>
                <span>环境正在发生变化...</span>
            </div>
        </div>
    </div>

    <script>
        // 全局变量
        let audioContext = null;
        let analyser = null;
        let microphone = null;
        let animationId = null;
        let isDetecting = false;
        let currentDecibels = 0;
        let quietStartTime = null;
        let treeCount = 0;
        let seedlings = 0; // 树苗数量
        let trees = 0;     // 大树数量
        
        // DOM元素引用
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const decibelValue = document.getElementById('decibelValue');
        const meterBar = document.getElementById('meterBar');
        const progressBar = document.getElementById('progressBar');
        const quietTimeEl = document.getElementById('quietTime');
        const treeCountEl = document.getElementById('treeCount');
        const treesArea = document.getElementById('treesArea');
        const environmentTip = document.getElementById('environmentTip');
        const forestContainer = document.getElementById('forestContainer');
        
        // 初始化事件监听器
        function initEventListeners() {
            startBtn.addEventListener('click', startDetection);
            stopBtn.addEventListener('click', stopDetection);
        }
        
        // 开始检测
        async function startDetection() {
            try {
                // 获取用户媒体权限
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                
                // 创建音频上下文
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                microphone = audioContext.createMediaStreamSource(stream);
                
                // 连接节点
                microphone.connect(analyser);
                analyser.fftSize = 256;
                
                // 更新UI状态
                startBtn.disabled = true;
                stopBtn.disabled = false;
                isDetecting = true;
                
                // 开始检测循环
                detectSound();
                
                console.log("分贝检测已开始");
            } catch (error) {
                alert("无法访问麦克风，请检查权限设置");
                console.error("麦克风访问错误:", error);
            }
        }
        
        // 停止检测
        function stopDetection() {
            if (animationId) {
                cancelAnimationFrame(animationId);
            }
            
            if (microphone) {
                microphone.disconnect();
            }
            
            if (audioContext) {
                audioContext.close();
            }
            
            // 重置状态
            isDetecting = false;
            startBtn.disabled = false;
            stopBtn.disabled = true;
            meterBar.style.height = "0%";
            decibelValue.textContent = "0";
            
            console.log("分贝检测已停止");
        }
        
        // 检测声音
        function detectSound() {
            if (!isDetecting) return;
            
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            analyser.getByteFrequencyData(dataArray);
            
            // 计算平均音量
            let sum = 0;
            for (let i = 0; i < bufferLength; i++) {
                sum += dataArray[i];
            }
            const average = sum / bufferLength;
            
            // 将音量转换为近似分贝值
            currentDecibels = Math.max(0, 20 * Math.log10(average / 0.1));
            currentDecibels = isNaN(currentDecibels) ? 0 : Math.round(currentDecibels);
            
            // 更新UI
            updateUI();
            
            // 继续下一帧
            animationId = requestAnimationFrame(detectSound);
        }
        
        // 更新UI
        function updateUI() {
            // 更新分贝显示
            decibelValue.textContent = currentDecibels;
            
            // 更新分贝条高度和颜色
            const percentage = Math.min(100, Math.max(0, (currentDecibels / 80) * 100));
            meterBar.style.height = `${percentage}%`;
            
            // 根据分贝值改变颜色
            if (currentDecibels < 40) {
                meterBar.className = "meter-bar w-full bg-gradient-to-t from-green-400 to-green-600 rounded-full";
            } else if (currentDecibels < 50) {
                meterBar.className = "meter-bar w-full bg-gradient-to-t from-yellow-400 to-yellow-600 rounded-full";
            } else {
                meterBar.className = "meter-bar w-full bg-gradient-to-t from-red-400 to-red-600 rounded-full";
            }
            
            // 处理安静时间逻辑
            handleQuietTime();
        }
        
        // 处理安静时间
        function handleQuietTime() {
            const now = Date.now();
            
            if (currentDecibels < 40) {
                // 如果之前没有记录安静开始时间，则记录
                if (!quietStartTime) {
                    quietStartTime = now;
                }
                
                // 计算安静持续时间
                const elapsed = Math.floor((now - quietStartTime) / 1000);
                quietTimeEl.textContent = `${elapsed}秒`;
                
                // 更新进度条
                const progress = Math.min(100, (elapsed / 60) * 100);
                progressBar.style.width = `${progress}%`;
                
                // 如果达到60秒，种树
                if (elapsed >= 60) {
                    plantSeedling();
                    quietStartTime = now; // 重新开始计时
                }
            } else {
                // 如果声音过大，重置安静时间
                quietStartTime = null;
                quietTimeEl.textContent = "0秒";
                progressBar.style.width = "0%";
            }
        }
        
        // 种植树苗
        function plantSeedling() {
            seedlings++;
            treeCount++;
            updateTreeDisplay();
            
            // 添加动画效果
            createLeafEffect();
            
            // 检查是否可以合成大树
            if (seedlings >= 2) {
                convertToTree();
            }
            
            // 更新环境
            updateEnvironment();
        }
        
        // 合成大树
        function convertToTree() {
            seedlings -= 2;
            trees++;
            treeCount = seedlings + trees;
            updateTreeDisplay();
            
            // 添加合成动画
            forestContainer.classList.add('pulse');
            setTimeout(() => {
                forestContainer.classList.remove('pulse');
            }, 2000);
        }
        
        // 更新树木显示
        function updateTreeDisplay() {
            treesArea.innerHTML = '';
            
            // 显示大树
            for (let i = 0; i < trees; i++) {
                const tree = document.createElement('div');
                tree.className = 'tree-transition grow';
                tree.innerHTML = `
                    <div class="text-center">
                        <i class="fas fa-tree text-4xl text-green-600"></i>
                        <div class="text-xs text-green-700 mt-1">大树</div>
                    </div>
                `;
                treesArea.appendChild(tree);
            }
            
            // 显示树苗
            for (let i = 0; i < seedlings; i++) {
                const seedling = document.createElement('div');
                seedling.className = 'tree-transition grow';
                seedling.innerHTML = `
                    <div class="text-center">
                        <i class="fas fa-seedling text-2xl text-green-500"></i>
                        <div class="text-xs text-green-600 mt-1">树苗</div>
                    </div>
                `;
                treesArea.appendChild(seedling);
            }
            
            // 更新计数
            treeCountEl.textContent = `${treeCount} 棵树`;
        }
        
        // 更新环境背景
        function updateEnvironment() {
            const body = document.body;
            const progress = Math.min(1, treeCount / 20); // 假设20棵树为满绿洲
            
            if (treeCount === 0) {
                body.className = "min-h-screen flex items-center justify-center p-4 desert-bg";
            } else if (treeCount < 5) {
                body.className = "min-h-screen flex items-center justify-center p-4 transition-bg";
            } else {
                body.className = "min-h-screen flex items-center justify-center p-4 oasis-bg";
            }
            
            // 显示环境变化提示
            if (treeCount > 0 && treeCount % 3 === 0) {
                environmentTip.classList.remove('hidden');
                setTimeout(() => {
                    environmentTip.classList.add('hidden');
                }, 3000);
            }
        }
        
        // 创建叶子飘落效果
        function createLeafEffect() {
            for (let i = 0; i < 5; i++) {
                const leaf = document.createElement('div');
                leaf.className = 'leaf';
                leaf.style.left = `${Math.random() * 100}%`;
                leaf.style.top = '-20px';
                leaf.style.backgroundColor = `hsl(${120 + Math.random() * 30}, 70%, 40%)`;
                leaf.style.animationDuration = `${3 + Math.random() * 5}s`;
                leaf.style.opacity = '1';
                
                document.body.appendChild(leaf);
                
                // 添加飘落动画
                setTimeout(() => {
                    leaf.classList.add('falling');
                }, 100);
                
                // 动画结束后移除元素
                setTimeout(() => {
                    if (leaf.parentNode) {
                        leaf.parentNode.removeChild(leaf);
                    }
                }, 8000);
            }
        }
        
        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', () => {
            initEventListeners();
        });
    </script>
</body>
</html>
