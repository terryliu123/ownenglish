<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>物质的变化 - 微观粒子实验室</title>
    <style>
        :root {
            --primary: #4facfe;
            --secondary: #00f2fe;
            --danger: #ff6b6b;
            --dark: #2c3e50;
            --light: #ecf0f1;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background-color: #1a1a1a;
            color: white;
            overflow: hidden;
            touch-action: none; /* 禁止默认触控行为 */
        }

        /* 顶部导航 */
        .nav-bar {
            display: flex;
            justify-content: center;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 15px;
            gap: 20px;
            position: absolute;
            top: 0;
            width: 100%;
            z-index: 100;
        }

        .nav-btn {
            padding: 10px 25px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 25px;
            background: transparent;
            color: white;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }

        .nav-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            font-weight: bold;
            box-shadow: 0 0 15px var(--primary);
        }

        /* 画布区域 */
        #lab-canvas {
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at center, #2b32b2 0%, #1488cc 100%);
            display: block;
        }

        /* 控制面板 */
        .control-panel {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            padding: 20px;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            width: 80%;
            max-width: 500px;
            text-align: center;
            z-index: 100;
        }

        .instruction {
            font-size: 14px;
            color: #ddd;
            margin-bottom: 5px;
        }

        /* 滑块样式 */
        input[type=range] {
            width: 100%;
            accent-color: var(--secondary);
        }

        /* 标签样式 */
        .tag {
            position: absolute;
            background: rgba(0,0,0,0.6);
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 12px;
            pointer-events: none;
            color: #fff;
        }

        /* 显微镜遮罩 (AR效果) */
        .microscope-lens {
            position: absolute;
            width: 250px;
            height: 250px;
            border-radius: 50%;
            border: 5px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.8); /* 遮罩周围 */
            pointer-events: none;
            display: none;
            z-index: 50;
            overflow: hidden;
            background: transparent;
        }
        
        .microscope-label {
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--danger);
            padding: 5px 10px;
            border-radius: 4px;
            white-space: nowrap;
        }

    </style>
</head>
<body>

    <!-- 导航 -->
    <div class="nav-bar">
        <button class="nav-btn active" onclick="switchMode('physical')">物理变化 (水)</button>
        <button class="nav-btn" onclick="switchMode('chemical')">化学变化 (氢气燃烧)</button>
        <button class="nav-btn" onclick="switchMode('rust')">AR 微观 (铁生锈)</button>
    </div>

    <!-- 画布 -->
    <canvas id="lab-canvas"></canvas>
    
    <!-- 模拟AR透镜 -->
    <div id="ar-lens" class="microscope-lens">
        <div class="microscope-label">微观放大 1000万倍</div>
    </div>

    <!-- 控制面板 -->
    <div class="control-panel" id="panel-physical">
        <h3>水的三态变化 (物理变化)</h3>
        <p class="instruction">拖动滑块改变温度，观察水分子运动状态和间距</p>
        <div style="display:flex; width:100%; justify-content:space-between; margin-bottom:5px;">
            <span>❄️ 固态</span>
            <span>💧 液态</span>
            <span>☁️ 气态</span>
        </div>
        <input type="range" id="tempSlider" min="0" max="2" step="0.01" value="0">
        <p style="font-size:12px; color:#aaa; margin-top:5px;">结论：分子本身结构未改变，只是间隔和运动速度变了。</p>
    </div>

    <div class="control-panel" id="panel-chemical" style="display:none;">
        <h3>氢气在氧气中燃烧 (化学变化)</h3>
        <p class="instruction">👆 用手指/鼠标将氢分子(白)拖拽撞击氧分子(红)</p>
        <div style="display: flex; gap: 10px; align-items: center;">
            <div style="width:15px; height:15px; background:#fff; border-radius:50%"></div> 氢原子(H)
            <div style="width:15px; height:15px; background:#ff4d4d; border-radius:50%"></div> 氧原子(O)
        </div>
        <p id="chem-status" style="font-size:14px; color:var(--secondary); font-weight:bold;">等待反应...</p>
        <button onclick="resetChemical()" style="padding:5px 15px; cursor:pointer; border-radius:5px; background:#444; color:white; border:none;">重置实验</button>
        <p style="font-size:12px; color:#aaa; margin-top:5px;">结论：旧分子破裂，原子重新组合成新分子(水)。</p>
    </div>

    <div class="control-panel" id="panel-rust" style="display:none;">
        <h3>金属锈蚀过程 (模拟AR)</h3>
        <p class="instruction">移动鼠标/手指作为“显微镜”，观察铁块表面的微观反应</p>
        <p style="font-size:12px; color:#aaa;">宏观：银白色金属变红褐色。<br>微观：氧气分子“捕获”铁原子，形成晶格结构。</p>
    </div>

<script>
    const canvas = document.getElementById('lab-canvas');
    const ctx = canvas.getContext('2d');
    const arLens = document.getElementById('ar-lens');
    let currentMode = 'physical';
    let animationId;

    // 自适应屏幕
    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // --- 粒子类定义 ---

    class Atom {
        constructor(x, y, color, radius, label) {
            this.x = x;
            this.y = y;
            this.color = color;
            this.radius = radius;
            this.vx = (Math.random() - 0.5) * 2;
            this.vy = (Math.random() - 0.5) * 2;
            this.label = label;
            this.targetX = null; // 用于化学反应动画
            this.targetY = null;
        }
        draw(ctx) {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fillStyle = this.color;
            ctx.fill();
            
            // 高光效果
            ctx.beginPath();
            ctx.arc(this.x - this.radius*0.3, this.y - this.radius*0.3, this.radius*0.3, 0, Math.PI * 2);
            ctx.fillStyle = "rgba(255,255,255,0.3)";
            ctx.fill();
        }
    }

    class Molecule {
        constructor(type, x, y) {
            this.type = type; // 'H2O', 'H2', 'O2', 'Fe', 'Fe2O3'
            this.x = x;
            this.y = y;
            this.angle = Math.random() * Math.PI * 2;
            this.vx = (Math.random() - 0.5);
            this.vy = (Math.random() - 0.5);
            this.atoms = [];
            this.initAtoms();
            this.isBroken = false; // 用于化学反应
        }

        initAtoms() {
            if (this.type === 'H2O') {
                // 一个大的红氧，两个小的白氢
                this.atoms.push({ dx: 0, dy: 0, r: 12, c: '#ff4d4d' }); // O
                this.atoms.push({ dx: -10, dy: 12, r: 8, c: '#ffffff' }); // H
                this.atoms.push({ dx: 10, dy: 12, r: 8, c: '#ffffff' });  // H
            } else if (this.type === 'H2') {
                this.atoms.push({ dx: -6, dy: 0, r: 8, c: '#ffffff' });
                this.atoms.push({ dx: 6, dy: 0, r: 8, c: '#ffffff' });
            } else if (this.type === 'O2') {
                this.atoms.push({ dx: -8, dy: 0, r: 12, c: '#ff4d4d' });
                this.atoms.push({ dx: 8, dy: 0, r: 12, c: '#ff4d4d' });
            }
        }

        draw(ctx) {
            if (this.isBroken) return;
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.rotate(this.angle);
            this.atoms.forEach(atom => {
                ctx.beginPath();
                ctx.arc(atom.dx, atom.dy, atom.r, 0, Math.PI * 2);
                ctx.fillStyle = atom.c;
                ctx.fill();
                // 简单的连接线视觉
                if(atom.dx !== 0) { 
                    // 略
                }
            });
            ctx.restore();
        }

        updatePhysical(temp) {
            // 物理变化逻辑
            let speed = 0;
            let wiggle = 0;

            if (temp < 0.8) { // 固态
                speed = 0.2;
                wiggle = 0.5;
                // 尝试回到晶格位置 (简单模拟：轻微抖动)
            } else if (temp < 1.5) { // 液态
                speed = 1.5;
                wiggle = 0;
            } else { // 气态
                speed = 4;
                wiggle = 0;
            }

            // 移动
            this.x += this.vx * speed + (Math.random()-0.5)*wiggle;
            this.y += this.vy * speed + (Math.random()-0.5)*wiggle;

            // 旋转
            if (temp > 0.8) this.angle += (Math.random() - 0.5) * 0.1 * speed;

            // 边界反弹
            if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
            if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
            
            // 边界约束
            this.x = Math.max(20, Math.min(canvas.width-20, this.x));
            this.y = Math.max(20, Math.min(canvas.height-20, this.y));
        }
    }

    // --- 状态管理 ---
    let molecules = [];
    let reactionParticles = []; // 存放断键后的原子
    let slider = document.getElementById('tempSlider');
    let mouse = { x: -1000, y: -1000, isDown: false };
    let draggingMolecule = null;

    // --- 物理变化模式 ---
    function initPhysical() {
        molecules = [];
        // 生成水分子矩阵 (初始冰态)
        const cols = 8;
        const rows = 6;
        const startX = canvas.width/2 - (cols*40)/2;
        const startY = canvas.height/2 - (rows*40)/2;

        for(let i=0; i<cols; i++) {
            for(let j=0; j<rows; j++) {
                let m = new Molecule('H2O', startX + i*40, startY + j*40);
                // 记录初始位置用于“固态”回弹
                m.originX = startX + i*40;
                m.originY = startY + j*40;
                molecules.push(m);
            }
        }
    }

    // --- 化学变化模式 ---
    function initChemical() {
        molecules = [];
        reactionParticles = [];
        document.getElementById('chem-status').innerText = "拖拽氢分子撞击氧分子！";
        // 生成一些 H2 和 O2
        for(let i=0; i<5; i++) {
            molecules.push(new Molecule('O2', Math.random() * canvas.width * 0.8 + 50, Math.random() * canvas.height * 0.8 + 50));
        }
        for(let i=0; i<10; i++) {
            molecules.push(new Molecule('H2', Math.random() * canvas.width * 0.8 + 50, Math.random() * canvas.height * 0.8 + 50));
        }
    }

    function resetChemical() {
        initChemical();
    }

    // --- AR 铁锈模式 ---
    let ironAtoms = [];
    let oxygenGas = [];
    function initRust() {
        ironAtoms = [];
        oxygenGas = [];
        
        // 生成铁原子晶格 (背景)
        for(let x=0; x<canvas.width; x+=30) {
            for(let y=0; y<canvas.height; y+=30) {
                ironAtoms.push({
                    x: x, y: y, 
                    r: 14, 
                    state: 'Fe', // Fe or Rust
                    color: '#aaa' 
                });
            }
        }

        // 生成漂浮的氧气
        for(let i=0; i<20; i++) {
            oxygenGas.push({
                x: Math.random()*canvas.width,
                y: Math.random()*canvas.height,
                vx: (Math.random()-0.5),
                vy: (Math.random()-0.5),
                type: 'O2'
            });
        }
    }

    // --- 交互事件监听 ---
    canvas.addEventListener('mousedown', e => {
        mouse.x = e.clientX;
        mouse.y = e.clientY;
        mouse.isDown = true;
        
        if (currentMode === 'chemical') {
            // 检查是否点击了分子
            molecules.forEach(m => {
                let d = Math.hypot(m.x - mouse.x, m.y - mouse.y);
                if (d < 30 && m.type === 'H2') {
                    draggingMolecule = m;
                }
            });
        }
    });

    canvas.addEventListener('mousemove', e => {
        mouse.x = e.clientX;
        mouse.y = e.clientY;
        
        // AR模式下的透镜移动
        if(currentMode === 'rust') {
            arLens.style.left = (e.clientX - 125) + 'px';
            arLens.style.top = (e.clientY - 125) + 'px';
        }
    });

    canvas.addEventListener('touchmove', e => {
        e.preventDefault(); // 防止滚动
        mouse.x = e.touches[0].clientX;
        mouse.y = e.touches[0].clientY;
        
        if(currentMode === 'rust') {
            arLens.style.left = (mouse.x - 125) + 'px';
            arLens.style.top = (mouse.y - 125) + 'px';
            arLens.style.display = 'block';
        }
    }, {passive: false});

    canvas.addEventListener('mouseup', () => {
        mouse.isDown = false;
        draggingMolecule = null;
    });
    
    canvas.addEventListener('touchend', () => {
        mouse.isDown = false;
        draggingMolecule = null;
    });

    // --- 主循环 ---

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (currentMode === 'physical') {
            const temp = parseFloat(slider.value);
            
            molecules.forEach(m => {
                // 固态特殊处理：限制在原点附近震动
                if (temp < 0.5) {
                    let dx = m.x - m.originX;
                    let dy = m.y - m.originY;
                    m.vx += -0.1 * dx; // 弹簧力回原位
                    m.vy += -0.1 * dy;
                    m.vx *= 0.9; // 阻尼
                    m.vy *= 0.9;
                }
                
                m.updatePhysical(temp);
                m.draw(ctx);
            });
            
            // 温度计颜色反馈
            if(temp < 0.5) ctx.fillStyle = "rgba(200,200,255,0.2)"; // 冰蓝
            else if(temp < 1.5) ctx.fillStyle = "rgba(100,150,255,0.1)"; // 水蓝
            else ctx.fillStyle = "rgba(255,255,255,0.05)"; // 蒸汽
            ctx.fillRect(0,0,canvas.width, canvas.height);

        } else if (currentMode === 'chemical') {
            // 拖拽逻辑
            if (draggingMolecule) {
                draggingMolecule.x += (mouse.x - draggingMolecule.x) * 0.2;
                draggingMolecule.y += (mouse.y - draggingMolecule.y) * 0.2;
                draggingMolecule.vx = 0;
                draggingMolecule.vy = 0;
            }

            // 碰撞检测与反应逻辑
            for (let i = 0; i < molecules.length; i++) {
                let m1 = molecules[i];
                if (m1.isBroken) continue;

                // 只有拖拽的 H2 才能触发反应
                if (m1 === draggingMolecule) {
                    for (let j = 0; j < molecules.length; j++) {
                        let m2 = molecules[j];
                        if (m1 !== m2 && !m2.isBroken && m2.type === 'O2') {
                            let dist = Math.hypot(m1.x - m2.x, m1.y - m2.y);
                            if (dist < 40) {
                                // 触发反应!
                                triggerReaction(m1, m2);
                            }
                        }
                    }
                }
                
                // 自然漂浮
                if (m1 !== draggingMolecule) {
                    m1.x += m1.vx;
                    m1.y += m1.vy;
                    if (m1.x < 0 || m1.x > canvas.width) m1.vx *= -1;
                    if (m1.y < 0 || m1.y > canvas.height) m1.vy *= -1;
                }
                m1.draw(ctx);
            }

            // 绘制反应生成的原子/新分子动画
            drawReactionParticles();

        } else if (currentMode === 'rust') {
            drawRustScene();
        }

        animationId = requestAnimationFrame(animate);
    }

    // --- 辅助逻辑：化学反应 ---
    function triggerReaction(h2, o2) {
        h2.isBroken = true;
        o2.isBroken = true;
        document.getElementById('chem-status').innerText = "反应发生！能量释放！生成水分子！";
        document.getElementById('chem-status').style.color = "#ff0";

        // 1. 爆炸闪光
        const flash = { x: (h2.x+o2.x)/2, y: (h2.y+o2.y)/2, r: 5, maxR: 100, alpha: 1 };
        reactionParticles.push({ type: 'flash', data: flash });

        // 2. 生成原子 (2个H，2个O - 注意O2是两个O)
        // 为了简化，我们假设 2 H2 + O2 -> 2 H2O，但这里只有 1 H2 + 1 O2 碰撞
        // 教学演示中，我们让剩余的一个 O 飘走或消失，重点演示 H-O-H 的形成
        
        // 创建一个 H2O 需要 2H + 1O
        // 我们把 h2 拆成 2H，o2 拆成 2O
        let newH1 = new Atom(h2.x-10, h2.y, '#fff', 8, 'H');
        let newH2 = new Atom(h2.x+10, h2.y, '#fff', 8, 'H');
        let newO1 = new Atom(o2.x, o2.y, '#ff4d4d', 12, 'O');
        
        // 设定目标位置：形成水分子结构
        let centerX = (h2.x + o2.x) / 2;
        let centerY = (h2.y + o2.y) / 2;
        
        // 原子重组动画
        reactionParticles.push({ type: 'atom_move', atom: newO1, target: {x: centerX, y: centerY} });
        reactionParticles.push({ type: 'atom_move', atom: newH1, target: {x: centerX-12, y: centerY+10} });
        reactionParticles.push({ type: 'atom_move', atom: newH2, target: {x: centerX+12, y: centerY+10} });
        
        // 延迟后生成新的水分子对象
        setTimeout(() => {
           let water = new Molecule('H2O', centerX, centerY);
           molecules.push(water);
           // 清理动画粒子
           reactionParticles = reactionParticles.filter(p => p.type !== 'atom_move' && p.type !== 'flash');
           document.getElementById('chem-status').innerText = "生成了新物质：水(H₂O)";
           document.getElementById('chem-status').style.color = "#4facfe";
        }, 1000);
    }

    function drawReactionParticles() {
        for (let i = reactionParticles.length - 1; i >= 0; i--) {
            let p = reactionParticles[i];
            if (p.type === 'flash') {
                ctx.beginPath();
                ctx.arc(p.data.x, p.data.y, p.data.r, 0, Math.PI*2);
                ctx.fillStyle = `rgba(255, 255, 0, ${p.data.alpha})`;
                ctx.fill();
                p.data.r += 5;
                p.data.alpha -= 0.05;
                if (p.data.alpha <= 0) reactionParticles.splice(i, 1);
            } else if (p.type === 'atom_move') {
                let a = p.atom;
                let t = p.target;
                // 简单的缓动移动
                a.x += (t.x - a.x) * 0.1;
                a.y += (t.y - a.y) * 0.1;
                a.draw(ctx);
                
                // 绘制连接线提示键的形成
                if (Math.abs(a.x - t.x) < 5) {
                    ctx.beginPath();
                    ctx.strokeStyle = "white";
                    ctx.lineWidth = 2;
                    // 简单画线到中心
                }
            }
        }
    }

    // --- AR 渲染逻辑 ---
    function drawRustScene() {
        // 1. 绘制底层 (模糊的铁块)
        ctx.fillStyle = "#555";
        ctx.fillRect(0,0,canvas.width, canvas.height);
        ctx.fillStyle = "rgba(0,0,0,0.5)";
        ctx.font = "20px Arial";
        ctx.fillText("移动透镜观察微观反应", canvas.width/2 - 100, canvas.height - 50);

        // 2. 裁剪圆形区域 (AR 视角)
        ctx.save();
        ctx.beginPath();
        // 这里的透镜位置跟随鼠标
        let lensX = mouse.x;
        let lensY = mouse.y;
        // 如果鼠标未进入，默认中心
        if (mouse.x < 0) { lensX = canvas.width/2; lensY = canvas.height/2; }

        ctx.arc(lensX, lensY, 120, 0, Math.PI*2);
        ctx.clip();

        // 3. 绘制内部清晰的原子世界
        ctx.fillStyle = "#222"; // 微观背景深色
        ctx.fillRect(0,0,canvas.width, canvas.height);

        // 绘制铁原子矩阵
        ironAtoms.forEach(fe => {
            // 计算与透镜中心的距离，只有附近的才互动
            let d = Math.hypot(fe.x - lensX, fe.y - lensY);
            
            // 绘制铁原子
            ctx.beginPath();
            ctx.arc(fe.x, fe.y, fe.r, 0, Math.PI*2);
            ctx.fillStyle = fe.state === 'Rust' ? '#cd5c5c' : '#aaa'; // 锈是红褐色
            ctx.fill();
            ctx.strokeStyle = "#444";
            ctx.stroke();

            // 反应逻辑：如果有氧气靠近
            if (fe.state === 'Fe') {
                oxygenGas.forEach(o2 => {
                    let dist = Math.hypot(o2.x - fe.x, o2.y - fe.y);
                    if (dist < 20) {
                        fe.state = 'Rust'; // 铁生锈了
                        o2.captured = true; // 氧气被捕获
                    }
                });
            }
        });

        // 绘制氧气
        oxygenGas.forEach(o2 => {
            if (!o2.captured) {
                o2.x += o2.vx;
                o2.y += o2.vy;
                // 边界反弹
                if(o2.x < 0 || o2.x > canvas.width) o2.vx *= -1;
                if(o2.y < 0 || o2.y > canvas.height) o2.vy *= -1;
                
                ctx.beginPath();
                ctx.arc(o2.x, o2.y, 6, 0, Math.PI*2);
                ctx.fillStyle = "#ff4d4d";
                ctx.fill();
                // 氧分子是双原子，画个伴
                ctx.beginPath();
                ctx.arc(o2.x+8, o2.y, 6, 0, Math.PI*2);
                ctx.fillStyle = "#ff4d4d";
                ctx.fill();
            }
        });

        ctx.restore(); // 结束裁剪
    }


    // --- 切换模式 ---
    function switchMode(mode) {
        currentMode = mode;
        
        // 更新按钮状态
        document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');

        // 切换面板
        document.getElementById('panel-physical').style.display = 'none';
        document.getElementById('panel-chemical').style.display = 'none';
        document.getElementById('panel-rust').style.display = 'none';
        document.getElementById('panel-' + mode).style.display = 'flex';

        // AR 镜片显示控制
        arLens.style.display = (mode === 'rust') ? 'block' : 'none';
        
        // 初始化场景
        if (mode === 'physical') initPhysical();
        if (mode === 'chemical') initChemical();
        if (mode === 'rust') initRust();
    }

    // 启动
    initPhysical();
    animate();

</script>
</body>
