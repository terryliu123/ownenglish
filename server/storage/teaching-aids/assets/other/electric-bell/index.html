<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电铃工作原理演示（修复版）</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: "Microsoft YaHei", sans-serif;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 800px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
            display: inline-block;
        }

        /* 画布样式：添加边框确保可见 */
        canvas {
            background-color: #ffffff;
            border: 2px solid #bdc3c7; 
            border-radius: 8px;
            margin-bottom: 20px;
            cursor: pointer;
            /* 确保画布不会被压缩 */
            max-width: 100%; 
            height: auto;
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
            background: #eef2f7;
            padding: 15px;
            border-radius: 50px;
        }

        button {
            padding: 12px 35px;
            font-size: 18px;
            color: white;
            background-color: #2ecc71;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.1s, background-color 0.2s;
            font-weight: bold;
        }

        button:hover { background-color: #27ae60; transform: scale(1.05); }
        button:active { transform: scale(0.95); }
        
        button.stop { background-color: #e74c3c; }
        button.stop:hover { background-color: #c0392b; }

        .desc {
            text-align: left;
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            border-left: 5px solid #3498db;
            color: #555;
            line-height: 1.6;
        }
        .highlight { color: #d35400; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <h1>电铃工作原理演示</h1>

        <!-- 画布：显式设置宽高属性 -->
        <canvas id="bellCanvas" width="800" height="500"></canvas>

        <div class="controls">
            <div style="font-weight: bold; color: #555;">开关状态：<span id="statusText" style="color: #999;">断开</span></div>
            <button id="toggleBtn">▶ 闭合开关</button>
        </div>

        <div class="desc">
            <strong>原理说明：</strong><br>
            1. <strong>通电</strong>：闭合开关，电流流过电磁铁，产生磁性（<span style="color:red">线圈变红</span>）。<br>
            2. <strong>吸合</strong>：电磁铁吸引衔铁向下，小锤敲击铃铛发出声音。<br>
            3. <strong>断电</strong>：衔铁向下运动的同时，与触点螺钉分离，电路断开。<br>
            4. <strong>复位</strong>：电磁铁失去磁性，衔铁在弹簧片作用下弹回，电路重新接通。<br>
            5. <strong>循环</strong>：周而复始，产生连续铃声。
        </div>
    </div>

<script>
    // 等待页面加载完成后执行
    window.onload = function() {
        const canvas = document.getElementById('bellCanvas');
        const ctx = canvas.getContext('2d');
        const btn = document.getElementById('toggleBtn');
        const statusText = document.getElementById('statusText');

        // 物理参数
        let isPowerOn = false;       // 开关是否闭合
        let isContactClosed = true;  // 触点是否接触
        let armAngle = 0;            // 衔铁角度
        let velocity = 0;            // 运动速度
        let waveList = [];           // 声波列表
        let electronOffset = 0;      // 电子流动画

        // 常量
        const MAX_ANGLE = 12;        // 最大敲击角度
        const BREAK_ANGLE = 4;       // 断电角度阈值
        const MAGNET_FORCE = 0.8;    // 磁力
        const SPRING_FORCE = 0.5;    // 弹力

        // 绘图循环
        function loop() {
            updatePhysics();
            draw();
            requestAnimationFrame(loop);
        }

        // 1. 物理更新逻辑
        function updatePhysics() {
            // 判断触点状态
            if (armAngle > BREAK_ANGLE) {
                isContactClosed = false;
            } else {
                isContactClosed = true;
            }

            // 只有当“总开关打开”且“触点接触”时，才有电流
            const hasCurrent = isPowerOn && isContactClosed;

            // 计算受力
            if (hasCurrent) {
                // 通电：受磁力向下 (增加角度)
                velocity += MAGNET_FORCE;
                // 电子流动
                electronOffset -= 3;
            } else {
                // 断电：受弹簧力向上 (减少角度)
                // 只有当偏离平衡位置时才受力
                if (armAngle > 0) {
                    velocity -= SPRING_FORCE;
                }
            }

            // 阻尼 (空气阻力)
            velocity *= 0.92;

            // 更新位置
            armAngle += velocity;

            // 碰撞检测 - 敲到铃铛 (下限)
            if (armAngle > MAX_ANGLE) {
                armAngle = MAX_ANGLE;
                velocity = -velocity * 0.4; // 反弹并损失能量
                
                // 如果有电且力度够，产生声波
                if (isPowerOn && Math.abs(velocity) > 0.1) {
                    waveList.push({r: 0, opacity: 1.0});
                }
            }

            // 碰撞检测 - 回到限位 (上限)
            if (armAngle < 0) {
                armAngle = 0;
                velocity = 0;
            }
        }

        // 2. 绘图逻辑
        function draw() {
            // 清空画布
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const cx = canvas.width / 2;
            const cy = canvas.height / 2;

            const hasCurrent = isPowerOn && isContactClosed;

            // --- 绘制声波 ---
            drawWaves(250, 150);

            // --- 绘制连接线 (Circuit) ---
            drawCircuit(hasCurrent);

            // --- 绘制电池 (Battery) ---
            drawBattery(400, 420);

            // --- 绘制开关 (Switch) ---
            drawSwitch(200, 420, isPowerOn);

            // --- 绘制电磁铁 (Electromagnet) ---
            drawMagnet(550, 250, hasCurrent);

            // --- 绘制铃铛 (Bell) ---
            drawBell(250, 150);

            // --- 绘制衔铁系统 (Armature System) ---
            drawArmature(450, 300, armAngle);

            // --- 绘制触点螺钉 (Contact Screw) ---
            drawScrew(350, 290, hasCurrent, armAngle);
        }

        // 辅助绘图函数
        function drawBattery(x, y) {
            ctx.fillStyle = "#7f8c8d";
            ctx.fillRect(x - 30, y - 15, 60, 30);
            ctx.fillStyle = "#fff";
            ctx.font = "20px Arial";
            ctx.fillText("+  -", x - 18, y + 7);
        }

        function drawSwitch(x, y, on) {
            ctx.fillStyle = "#333";
            ctx.fillRect(x - 30, y, 60, 5); // 底座
            
            ctx.beginPath();
            ctx.lineWidth = 4;
            ctx.strokeStyle = "#333";
            ctx.moveTo(x - 25, y);
            if (on) {
                ctx.lineTo(x + 25, y); // 闭合
            } else {
                ctx.lineTo(x + 20, y - 25); // 断开
            }
            ctx.stroke();
        }

        function drawMagnet(x, y, active) {
            // 铁芯 U型
            ctx.fillStyle = "#95a5a6";
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(x, y + 80);
            ctx.quadraticCurveTo(x + 30, y + 110, x + 60, y + 80);
            ctx.lineTo(x + 60, y);
            ctx.lineTo(x + 40, y);
            ctx.lineTo(x + 40, y + 80);
            ctx.quadraticCurveTo(x + 30, y + 90, x + 20, y + 80);
            ctx.lineTo(x + 20, y);
            ctx.fill();

            // 线圈
            ctx.fillStyle = active ? "#e74c3c" : "#d35400"; // 激活变红
            for(let i=0; i<6; i++) {
                ctx.fillRect(x - 5, y + 10 + i*12, 25, 8); // 左
                ctx.fillRect(x + 40, y + 10 + i*12, 25, 8); // 右
            }
            
            // 磁场指示
            if(active) {
                ctx.strokeStyle = "rgba(231, 76, 60, 0.5)";
                ctx.lineWidth = 2;
                ctx.setLineDash([5, 5]);
                ctx.beginPath();
                ctx.arc(x+30, y, 60, Math.PI, 0);
                ctx.stroke();
                ctx.setLineDash([]);
            }
        }

        function drawBell(x, y) {
            // 铃碗
            const grad = ctx.createRadialGradient(x-10, y-10, 5, x, y, 70);
            grad.addColorStop(0, "#fff");
            grad.addColorStop(1, "#bdc3c7");
            
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(x, y, 70, Math.PI, 0);
            ctx.fill();
            ctx.lineWidth=1;
            ctx.strokeStyle="#999";
            ctx.stroke();
        }

        function drawArmature(pivotX, pivotY, angle) {
            ctx.save();
            ctx.translate(pivotX, pivotY);
            ctx.rotate(angle * Math.PI / 180);

            // 1. 弹簧片 (向左延伸)
            ctx.fillStyle = "#2c3e50";
            ctx.fillRect(-120, -2, 120, 4);

            // 2. 衔铁块 (对应电磁铁)
            ctx.fillStyle = "#7f8c8d";
            ctx.fillRect(100, -5, 60, 10); // 向右延伸至电磁铁上方
            // 这里的坐标需要配合整体布局，稍微调整一下逻辑：
            // 假设 pivot 在中间，右边是衔铁，左边是锤子
            // 重绘：
            // 修正：Pivot 在电磁铁左侧
            
            // 重新定义组件相对位置
            // 弹簧片主体
            ctx.fillStyle = "#34495e";
            ctx.fillRect(0, -3, 140, 6); // 指向电磁铁

            // 衔铁块 (被吸部分)
            ctx.fillStyle = "#95a5a6";
            ctx.fillRect(100, 0, 50, 15); 

            // 锤柄 (向左上弯曲)
            ctx.strokeStyle = "#7f8c8d";
            ctx.lineWidth = 5;
            ctx.beginPath();
            ctx.moveTo(20, 0);
            ctx.lineTo(-160, -120); // 指向铃铛
            ctx.stroke();

            // 锤头
            ctx.fillStyle = "#2c3e50";
            ctx.beginPath();
            ctx.arc(-160, -120, 15, 0, Math.PI*2);
            ctx.fill();

            // 触点片 (在中间)
            ctx.fillStyle = "#f1c40f";
            ctx.fillRect(80, 3, 10, 5); // 向下凸起接触螺钉

            ctx.restore();

            // 固定桩
            ctx.fillStyle = "#000";
            ctx.fillRect(pivotX-5, pivotY, 10, 40);
        }

        function drawScrew(x, y, hasCurrent, angle) {
            // 螺钉支架
            ctx.fillStyle = "#555";
            ctx.fillRect(x, y, 10, 50);
            ctx.fillRect(x, y, 40, 10); // 横杆

            // 螺钉头
            ctx.fillStyle = "#f39c12";
            ctx.beginPath();
            ctx.moveTo(x + 30, y); 
            ctx.lineTo(x + 40, y - 15); // 尖端向上指
            ctx.lineTo(x + 20, y - 15);
            ctx.fill();

            // 如果断开，画个火花
            if (isPowerOn && angle > BREAK_ANGLE && angle < BREAK_ANGLE + 1) {
                ctx.fillStyle = "yellow";
                ctx.beginPath();
                ctx.arc(x + 30, y - 5, 5, 0, Math.PI*2);
                ctx.fill();
            }
        }

        function drawCircuit(hasCurrent) {
            ctx.beginPath();
            ctx.lineWidth = 5;
            ctx.strokeStyle = hasCurrent ? "#f1c40f" : "#bdc3c7"; // 通电变黄
            ctx.lineJoin = "round";

            if (hasCurrent) {
                ctx.setLineDash([15, 10]);
                ctx.lineDashOffset = electronOffset;
            } else {
                ctx.setLineDash([]);
            }

            // 路径：电池正 -> 开关 -> 电磁铁 -> 衔铁 -> 螺钉 -> 电池负
            ctx.moveTo(430, 420); // 电池正
            ctx.lineTo(550, 420); 
            ctx.lineTo(550, 350); // 电磁铁入
            // (电磁铁内部线圈省略，假设连通)
            ctx.moveTo(610, 350); // 电磁铁出
            ctx.lineTo(650, 350);
            ctx.lineTo(650, 300);
            ctx.lineTo(460, 300); // 连到衔铁固定端 (pivotX + 10)

            // 螺钉 -> 电池负
            ctx.moveTo(380, 340); // 螺钉支架底
            ctx.lineTo(380, 420);
            ctx.lineTo(370, 420); // 电池负

            // 开关连接
            ctx.moveTo(230, 420);
            ctx.lineTo(370, 420);

            ctx.stroke();
            ctx.setLineDash([]);
        }

        function drawWaves(x, y) {
            ctx.strokeStyle = "rgba(52, 152, 219, 0.6)";
            ctx.lineWidth = 3;
            
            for (let i = waveList.length - 1; i >= 0; i--) {
                let w = waveList[i];
                w.r += 3;
                w.opacity -= 0.05;
                
                if (w.opacity <= 0) {
                    waveList.splice(i, 1);
                } else {
                    ctx.globalAlpha = w.opacity;
                    ctx.beginPath();
                    ctx.arc(x, y, 70 + w.r, 0, Math.PI, true); // 向上扩散
                    ctx.stroke();
                    ctx.globalAlpha = 1.0;
                }
            }
        }

        // 按钮控制
        btn.addEventListener('click', function() {
            isPowerOn = !isPowerOn;
            if (isPowerOn) {
                btn.innerHTML = "■ 断开开关";
                btn.classList.add("stop");
                statusText.innerText = "闭合 (通电)";
                statusText.style.color = "#2ecc71";
            } else {
                btn.innerHTML = "▶ 闭合开关";
                btn.classList.remove("stop");
                statusText.innerText = "断开";
                statusText.style.color = "#999";
            }
        });

        // 开始循环
        requestAnimationFrame(loop);
    };
</script>
</body>
</html>
