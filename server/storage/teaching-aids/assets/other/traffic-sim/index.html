<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D城市交通仿真：红绿灯与拥堵模拟</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #1a1a1a; font-family: 'Segoe UI', sans-serif; }
        
        /* 控制面板样式 */
        #controls {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 280px;
            background: rgba(30, 30, 30, 0.9);
            color: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            border: 1px solid #444;
        }
        
        h1 { margin: 0 0 15px 0; font-size: 18px; color: #4facfe; }
        
        .control-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 14px; color: #aaa; }
        
        /* 按钮样式 */
        button {
            width: 100%;
            padding: 10px;
            background: #444;
            border: none;
            border-radius: 6px;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            font-weight: bold;
            margin-bottom: 5px;
        }
        button:hover { background: #555; }
        button.active { background: #4facfe; color: #000; }
        
        .light-status {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            background: #222;
            padding: 10px;
            border-radius: 6px;
        }
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
        }
        .dot { width: 12px; height: 12px; border-radius: 50%; background: #333; }
        .dot.red { background: #ff4b4b; box-shadow: 0 0 8px #ff4b4b; }
        .dot.green { background: #00e676; box-shadow: 0 0 8px #00e676; }

        /* 滑块 */
        input[type=range] {
            width: 100%;
            accent-color: #4facfe;
        }

        #stats {
            font-size: 12px;
            color: #888;
            margin-top: 10px;
            border-top: 1px solid #444;
            padding-top: 10px;
        }
    </style>
    <!-- 引入 Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- 引入 OrbitControls -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <div id="controls">
        <h1>🚦 交通拥堵仿真系统</h1>
        
        <div class="control-group">
            <div class="light-status">
                <div class="status-indicator">
                    <div id="ns-light-dot" class="dot green"></div>
                    <span>南北向</span>
                </div>
                <div class="status-indicator">
                    <div id="ew-light-dot" class="dot red"></div>
                    <span>东西向</span>
                </div>
            </div>
            <button id="toggleLightBtn">手动切换红绿灯</button>
            <button id="autoLightBtn">自动轮换 (开/关)</button>
        </div>

        <div class="control-group">
            <label>车流量压力 (生成速度)</label>
            <input type="range" id="trafficDensity" min="1" max="10" value="3">
        </div>

        <div id="stats">
            当前车辆数: <span id="carCount">0</span><br>
            当前行人数: <span id="pedCount">0</span>
        </div>
    </div>

    <script>
        // === 1. 初始化场景 ===
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xa0a0a0);
        scene.fog = new THREE.Fog(0xa0a0a0, 50, 200);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(60, 60, 60);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // 灯光
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(50, 100, 50);
        dirLight.castShadow = true;
        dirLight.shadow.camera.top = 50;
        dirLight.shadow.camera.bottom = -50;
        dirLight.shadow.camera.left = -50;
        dirLight.shadow.camera.right = 50;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        scene.add(dirLight);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // === 2. 城市生成 (道路、建筑) ===
        const roadWidth = 10;
        const blockSize = 40;
        const blockCount = 3; // 3x3 网格

        // 地面
        const groundGeo = new THREE.PlaneGeometry(200, 200);
        const groundMat = new THREE.MeshLambertMaterial({ color: 0x333333 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // 建筑生成器
        function createBuilding(x, z, width, depth) {
            const height = Math.random() * 15 + 5;
            const geometry = new THREE.BoxGeometry(width, height, depth);
            const material = new THREE.MeshPhongMaterial({ color: Math.random() * 0xffffff });
            const building = new THREE.Mesh(geometry, material);
            building.position.set(x, height / 2, z);
            building.castShadow = true;
            building.receiveShadow = true;
            scene.add(building);
        }

        // 十字路口布局：我们在 (0,0) 处保留一个大十字
        // 简单起见，我们在四个象限生成建筑群
        const quadrantOffset = roadWidth / 2 + 2; // 道路半宽 + 边距
        
        // 在四个角落生成建筑
        const positions = [
            {x: 25, z: 25}, {x: -25, z: 25},
            {x: 25, z: -25}, {x: -25, z: -25}
        ];

        positions.forEach(pos => {
            // 每个象限放一个大楼群
            createBuilding(pos.x, pos.z, 30, 30);
            // 添加人行道 (简单的灰色条)
            const sidewalkGeo = new THREE.BoxGeometry(34, 0.2, 34);
            const sidewalkMat = new THREE.MeshLambertMaterial({color: 0x555555});
            const sw = new THREE.Mesh(sidewalkGeo, sidewalkMat);
            sw.position.set(pos.x, 0.1, pos.z);
            sw.receiveShadow = true;
            scene.add(sw);
        });

        // 道路标线 (十字)
        const lineGeo = new THREE.PlaneGeometry(2, 80);
        const lineMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
        
        // 南北线
        const lineNS = new THREE.Mesh(lineGeo, lineMat);
        lineNS.rotation.x = -Math.PI / 2;
        lineNS.position.y = 0.02;
        scene.add(lineNS);

        // 东西线
        const lineEW = new THREE.Mesh(lineGeo, lineMat);
        lineEW.rotation.x = -Math.PI / 2;
        lineEW.rotation.z = Math.PI / 2;
        lineEW.position.y = 0.02;
        scene.add(lineEW);

        // 停止线
        function createStopLine(x, z, rotY) {
            const geo = new THREE.PlaneGeometry(roadWidth, 1);
            const mat = new THREE.MeshBasicMaterial({ color: 0xffffff });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.rotation.x = -Math.PI/2;
            mesh.rotation.z = rotY;
            mesh.position.set(x, 0.03, z);
            scene.add(mesh);
        }
        // 绘制4条停止线
        createStopLine(0, 12, 0); // 北
        createStopLine(0, -12, 0); // 南
        createStopLine(12, 0, Math.PI/2); // 东
        createStopLine(-12, 0, Math.PI/2); // 西

        // === 3. 交通信号灯系统 ===
        // 状态: 'NS' (南北绿) 或 'EW' (东西绿)
        let lightState = 'NS'; 
        const trafficLights = {};

        function createTrafficLight(x, z, type) {
            const poleH = 6;
            const pole = new THREE.Mesh(
                new THREE.CylinderGeometry(0.3, 0.3, poleH),
                new THREE.MeshLambertMaterial({ color: 0x222222 })
            );
            pole.position.set(x, poleH/2, z);
            
            const box = new THREE.Mesh(
                new THREE.BoxGeometry(1, 2, 1),
                new THREE.MeshLambertMaterial({ color: 0x111111 })
            );
            box.position.y = poleH;
            pole.add(box);

            // 灯泡
            const lightGeo = new THREE.SphereGeometry(0.3);
            const redMat = new THREE.MeshBasicMaterial({ color: 0x330000 });
            const greenMat = new THREE.MeshBasicMaterial({ color: 0x003300 });
            
            const redLight = new THREE.Mesh(lightGeo, redMat);
            redLight.position.set(0, 0.5, 0.4); // 面向Z轴
            box.add(redLight);

            const greenLight = new THREE.Mesh(lightGeo, greenMat);
            greenLight.position.set(0, -0.5, 0.4);
            box.add(greenLight);

            // 保存引用以便更新颜色
            // 根据位置旋转灯箱朝向路口中心
            pole.lookAt(0, poleH/2, 0);

            scene.add(pole);
            return { red: redLight, green: greenLight, type: type };
        }

        // 创建四个灯
        const lights = [];
        lights.push(createTrafficLight(-8, -8, 'NS')); // 南北向灯 (控制南边来的车)
        lights.push(createTrafficLight(8, 8, 'NS'));   // 北边来的车
        lights.push(createTrafficLight(-8, 8, 'EW'));  // 东西向灯
        lights.push(createTrafficLight(8, -8, 'EW'));

        function updateLights() {
            const nsColor = lightState === 'NS' ? 0x00ff00 : 0x003300;
            const nsRedColor = lightState === 'NS' ? 0x330000 : 0xff0000;
            
            const ewColor = lightState === 'EW' ? 0x00ff00 : 0x003300;
            const ewRedColor = lightState === 'EW' ? 0x330000 : 0xff0000;

            lights.forEach(l => {
                if (l.type === 'NS') {
                    l.green.material.color.setHex(nsColor);
                    l.red.material.color.setHex(nsRedColor);
                } else {
                    l.green.material.color.setHex(ewColor);
                    l.red.material.color.setHex(ewRedColor);
                }
            });

            // 更新UI
            document.getElementById('ns-light-dot').className = `dot ${lightState === 'NS' ? 'green' : 'red'}`;
            document.getElementById('ew-light-dot').className = `dot ${lightState === 'EW' ? 'green' : 'red'}`;
        }
        updateLights();

        // === 4. 车辆系统 ===
        const cars = [];
        const lanes = [
            { dir: 'N', start: {x: -2.5, z: -60}, move: {x: 0, z: 1}, stopZ: -14, lightGroup: 'NS' },
            { dir: 'S', start: {x: 2.5, z: 60}, move: {x: 0, z: -1}, stopZ: 14, lightGroup: 'NS' },
            { dir: 'E', start: {x: 60, z: -2.5}, move: {x: -1, z: 0}, stopX: 14, lightGroup: 'EW' },
            { dir: 'W', start: {x: -60, z: 2.5}, move: {x: 1, z: 0}, stopX: -14, lightGroup: 'EW' }
        ];

        function createCar() {
            // 随机选择一条车道
            const lane = lanes[Math.floor(Math.random() * lanes.length)];
            
            // 检查生成点是否被占用 (防止重叠)
            for (let c of cars) {
                if (c.lane === lane && new THREE.Vector3(c.mesh.position.x, 0, c.mesh.position.z).distanceTo(new THREE.Vector3(lane.start.x, 0, lane.start.z)) < 8) {
                    return; // 太挤了，本次不生成
                }
            }

            const geometry = new THREE.BoxGeometry(2, 1.2, 4);
            const material = new THREE.MeshPhongMaterial({ color: Math.random() * 0xffffff });
            const carMesh = new THREE.Mesh(geometry, material);
            carMesh.position.set(lane.start.x, 0.6, lane.start.z);
            
            // 旋转车头
            if (lane.dir === 'E') carMesh.rotation.y = -Math.PI/2;
            if (lane.dir === 'W') carMesh.rotation.y = Math.PI/2;
            if (lane.dir === 'S') carMesh.rotation.y = Math.PI;

            carMesh.castShadow = true;
            scene.add(carMesh);

            cars.push({
                mesh: carMesh,
                lane: lane,
                speed: 0,
                maxSpeed: 0.3 + Math.random() * 0.2
            });
        }

        function updateCars() {
            const safeDistance = 6; // 安全车距
            
            for (let i = cars.length - 1; i >= 0; i--) {
                const car = cars[i];
                const mesh = car.mesh;
                const lane = car.lane;

                // 1. 检测前方是否有车
                let distanceToFrontCar = 999;
                cars.forEach(otherCar => {
                    if (otherCar !== car && otherCar.lane === lane) {
                        // 简单的逻辑：计算同一方向且在前面的车
                        let dist;
                        let isInFront = false;
                        
                        if (lane.dir === 'N' && otherCar.mesh.position.z > mesh.position.z) { dist = otherCar.mesh.position.z - mesh.position.z; isInFront = true; }
                        if (lane.dir === 'S' && otherCar.mesh.position.z < mesh.position.z) { dist = mesh.position.z - otherCar.mesh.position.z; isInFront = true; }
                        if (lane.dir === 'W' && otherCar.mesh.position.x > mesh.position.x) { dist = otherCar.mesh.position.x - mesh.position.x; isInFront = true; }
                        if (lane.dir === 'E' && otherCar.mesh.position.x < mesh.position.x) { dist = mesh.position.x - otherCar.mesh.position.x; isInFront = true; }

                        if (isInFront && dist < distanceToFrontCar) {
                            distanceToFrontCar = dist;
                        }
                    }
                });

                // 2. 检测红绿灯
                let shouldStopForLight = false;
                // 只有当 lightState 不等于当前车道的组，且还没过停止线时才停
                if (lightState !== lane.lightGroup) {
                    if (lane.dir === 'N' && mesh.position.z < lane.stopZ && mesh.position.z > lane.stopZ - 10) shouldStopForLight = true;
                    if (lane.dir === 'S' && mesh.position.z > lane.stopZ && mesh.position.z < lane.stopZ + 10) shouldStopForLight = true;
                    if (lane.dir === 'W' && mesh.position.x < lane.stopX && mesh.position.x > lane.stopX - 10) shouldStopForLight = true;
                    if (lane.dir === 'E' && mesh.position.x > lane.stopX && mesh.position.x < lane.stopX + 10) shouldStopForLight = true;
                }

                // 3. 速度控制
                let targetSpeed = car.maxSpeed;

                if (shouldStopForLight) {
                    // 遇到红灯，慢慢停到停止线前
                    let distToLine = 0;
                    if (lane.dir === 'N') distToLine = lane.stopZ - mesh.position.z;
                    if (lane.dir === 'S') distToLine = mesh.position.z - lane.stopZ;
                    if (lane.dir === 'W') distToLine = lane.stopX - mesh.position.x;
                    if (lane.dir === 'E') distToLine = mesh.position.x - lane.stopX;
                    
                    if (distToLine < 2) targetSpeed = 0;
                    else targetSpeed = Math.min(targetSpeed, distToLine * 0.05);
                }

                // 防追尾
                if (distanceToFrontCar < safeDistance) {
                    targetSpeed = 0;
                } else if (distanceToFrontCar < safeDistance * 2) {
                    targetSpeed = car.maxSpeed * 0.5; // 减速
                }

                // 简单的物理插值
                if (car.speed < targetSpeed) car.speed += 0.01;
                if (car.speed > targetSpeed) car.speed -= 0.02;
                if (car.speed < 0) car.speed = 0;

                // 移动
                mesh.position.x += lane.move.x * car.speed;
                mesh.position.z += lane.move.z * car.speed;

                // 4. 销毁越界车辆
                if (Math.abs(mesh.position.x) > 70 || Math.abs(mesh.position.z) > 70) {
                    scene.remove(mesh);
                    cars.splice(i, 1);
                }
            }
            document.getElementById('carCount').innerText = cars.length;
        }

        // === 5. 行人系统 ===
        const peds = [];
        function createPedestrian() {
            if(peds.length > 20) return; // 限制人数
            const geometry = new THREE.CapsuleGeometry(0.3, 1, 4, 8);
            const material = new THREE.MeshLambertMaterial({ color: 0xffffff });
            const mesh = new THREE.Mesh(geometry, material);
            
            // 随机在四个象限的人行道区域生成
            const quadrant = Math.floor(Math.random() * 4);
            const offset = 15 + Math.random() * 10;
            let x, z;
            if(quadrant === 0) { x = offset; z = 8; }
            if(quadrant === 1) { x = -offset; z = 8; }
            if(quadrant === 2) { x = offset; z = -8; }
            if(quadrant === 3) { x = -offset; z = -8; }

            // 随机XY交换让其分布在两条边
            if(Math.random()>0.5) { let temp = x; x = z; z = temp; }

            mesh.position.set(x, 0.8, z);
            mesh.castShadow = true;
            scene.add(mesh);
            
            peds.push({
                mesh: mesh,
                dir: Math.random() > 0.5 ? 1 : -1, // 沿轴运动方向
                axis: Math.abs(x) > 10 ? 'z' : 'x' // 根据位置决定沿哪个轴走
            });
        }

        function updatePeds() {
            peds.forEach(ped => {
                if(ped.axis === 'x') {
                    ped.mesh.position.x += 0.05 * ped.dir;
                    if(Math.abs(ped.mesh.position.x) > 30) ped.dir *= -1;
                } else {
                    ped.mesh.position.z += 0.05 * ped.dir;
                    if(Math.abs(ped.mesh.position.z) > 30) ped.dir *= -1;
                }
                // 简单的跳动动画
                ped.mesh.position.y = 0.8 + Math.abs(Math.sin(Date.now() * 0.01)) * 0.1;
            });
            document.getElementById('pedCount').innerText = peds.length;
        }

        // === 6. 交互控制 ===
        let autoSwitch = false;
        let autoInterval;
        
        document.getElementById('toggleLightBtn').addEventListener('click', () => {
            lightState = lightState === 'NS' ? 'EW' : 'NS';
            updateLights();
        });

        document.getElementById('autoLightBtn').addEventListener('click', (e) => {
            autoSwitch = !autoSwitch;
            e.target.classList.toggle('active');
            if (autoSwitch) {
                autoInterval = setInterval(() => {
                    lightState = lightState === 'NS' ? 'EW' : 'NS';
                    updateLights();
                }, 3000); // 每3秒切换
            } else {
                clearInterval(autoInterval);
            }
        });

        const densitySlider = document.getElementById('trafficDensity');

        // === 7. 主循环 ===
        let frame = 0;
        function animate() {
            requestAnimationFrame(animate);
            
            frame++;
            // 生成车辆：根据滑块值决定生成频率
            // 滑块1-10. 10最快(每10帧尝试一次), 1最慢(每100帧)
            const spawnRate = 110 - (densitySlider.value * 10); 
            if (frame % spawnRate === 0) {
                createCar();
            }
            
            if (frame % 50 === 0) createPedestrian();

            updateCars();
            updatePeds();
            controls.update();
            renderer.render(scene, camera);
        }

        // 窗口缩放
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();

    </script>
</body>
</html>
