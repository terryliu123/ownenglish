<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数字教具：车轮中的数学道理</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f5f5f7;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            color: #333;
            margin-top: 20px;
            font-weight: 300;
        }

        .canvas-container {
            position: relative;
            margin: 20px;
            background: #fff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-radius: 12px;
            padding: 20px;
        }

        canvas {
            display: block;
            border-bottom: 2px solid #ddd; /* 地面装饰 */
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-top: 10px;
            align-items: center;
            background: #eee;
            padding: 10px 25px;
            border-radius: 50px;
        }

        button {
            background-color: #007AFF;
            border: none;
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover { background-color: #0056b3; }
        button.reset { background-color: #FF3B30; }
        button.reset:hover { background-color: #c92b22; }

        .info {
            max-width: 800px;
            margin-top: 10px;
            color: #666;
            font-size: 14px;
            text-align: center;
            line-height: 1.6;
        }

        .legend {
            display: flex;
            gap: 20px;
            margin-bottom: 10px;
            font-size: 12px;
            color: #555;
        }
        .legend-item { display: flex; align-items: center; gap: 5px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }

    </style>
</head>
<body>

    <h1>车轮中的数学道理</h1>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:#FF3B30"></span> 中心点轨迹</div>
        <div class="legend-item"><span class="dot" style="background:#333"></span> 实际地面</div>
    </div>

    <div class="canvas-container">
        <canvas id="wheelCanvas" width="800" height="500"></canvas>
    </div>

    <div class="controls">
        <button onclick="toggleAnimation()" id="playBtn">开始演示</button>
        <button class="reset" onclick="resetSimulation()">重置</button>
        <label style="font-size:14px; color:#555; margin-left:10px;">
            速度: <input type="range" id="speedRange" min="1" max="10" value="3" style="vertical-align:middle;">
        </label>
    </div>

    <div class="info">
        观察三种车轮中心点（红点）的运动轨迹：<br>
        1. <b>正方形</b>：中心到地面的距离不断变化，导致车身剧烈颠簸。<br>
        2. <b>椭圆</b>：中心距离变化平缓，但依然忽高忽低。<br>
        3. <b>圆形</b>：圆心到圆周距离处处相等（半径），中心轨迹是一条直线，行驶最平稳。
    </div>

<script>
    const canvas = document.getElementById('wheelCanvas');
    const ctx = canvas.getContext('2d');
    const playBtn = document.getElementById('playBtn');
    const speedRange = document.getElementById('speedRange');

    // 配置参数
    const config = {
        groundY: [150, 300, 450], // 三条跑道的地面Y坐标
        startX: 100,
        endX: 700,
        size: 40 // 图形的基础半尺寸
    };

    let isPlaying = false;
    let progress = 0; // 0 到 10000 (无限滚动)
    let currentX = config.startX;
    
    // 轨迹点存储
    let paths = {
        square: [],
        ellipse: [],
        circle: []
    };

    // 动画循环
    function animate() {
        if (!isPlaying) return;

        const speed = parseInt(speedRange.value);
        currentX += speed * 0.5;
        
        // 旋转角度 (根据移动距离计算，模拟滚动)
        // 角度 = 弧长 / 半径。这里简化处理，让旋转速度与移动速度成正比
        let rotation = currentX / 40; 

        if (currentX > config.endX) {
            isPlaying = false;
            playBtn.innerText = "重新开始";
            draw(); // 最后画一次定格
            return;
        }

        calculatePositions(currentX, rotation);
        draw();
        requestAnimationFrame(animate);
    }

    // 计算每一帧的位置
    function calculatePositions(x, rotation) {
        // 1. 正方形逻辑
        // 计算正方形旋转后的最低点，从而确定中心高度
        let hSquare = getShapeHeight('square', rotation, config.size);
        let ySquare = config.groundY[0] - hSquare;
        paths.square.push({x: x, y: ySquare});

        // 2. 椭圆逻辑
        let hEllipse = getShapeHeight('ellipse', rotation, config.size);
        let yEllipse = config.groundY[1] - hEllipse;
        paths.ellipse.push({x: x, y: yEllipse});

        // 3. 圆形逻辑
        let hCircle = config.size; // 圆的高度恒定
        let yCircle = config.groundY[2] - hCircle;
        paths.circle.push({x: x, y: yCircle});
    }

    // 核心几何算法：计算旋转后图形中心到地面的距离
    function getShapeHeight(type, angle, size) {
        if (type === 'circle') return size;

        if (type === 'square') {
            // 正方形中心到边的距离随角度变化
            // 角度模 PI/2，因为正方形每90度重复一次
            let normAngle = angle % (Math.PI / 2);
            // 将角度调整到 -45度 到 +45度 之间计算，此时 distance = (size) / cos(alpha)
            // 我们的size是半边长。实际上正方形对角线半径是 size * sqrt(2)
            // 这里的size传入的是类似半径的概念。为了视觉统一，设半边长 = size * 0.8
            const halfSide = size * 0.9; 
            // 距离公式： h = halfSide / cos( |normAngle - PI/4| )
            let alpha = Math.abs(normAngle - Math.PI/4);
            // 对角线转动时，最低点到中心的距离
            return (halfSide * Math.sqrt(2)) * Math.cos(alpha); 
        }

        if (type === 'ellipse') {
            // 椭圆极径近似
            const a = size * 1.2; // 长轴
            const b = size * 0.7; // 短轴
            // 椭圆切线高度计算比较复杂，这里使用极径近似模拟滚动视觉效果
            // 真实的物理滚动：中心高度 h(theta) = sqrt(a^2 sin^2 + b^2 cos^2)
            // 但为了让视觉上长轴落地时中心高，短轴落地时中心低：
            // 我们取切点距离。
            // 简化模型：仅仅为了演示"忽高忽低"
            let normAngle = angle % Math.PI;
            // 椭圆中心高度公式
            return Math.sqrt( (b*Math.cos(angle))**2 + (a*Math.sin(angle))**2 );
        }
        return size;
    }

    // 绘图主函数
    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 绘制地面线
        ctx.strokeStyle = "#333";
        ctx.lineWidth = 3;
        config.groundY.forEach(y => {
            ctx.beginPath();
            ctx.moveTo(0, y);
            ctx.lineTo(canvas.width, y);
            ctx.stroke();
        });

        // 获取当前最新点
        let pSquare = paths.square.length > 0 ? paths.square[paths.square.length-1] : {x: config.startX, y: config.groundY[0] - config.size * 0.9};
        let pEllipse = paths.ellipse.length > 0 ? paths.ellipse[paths.ellipse.length-1] : {x: config.startX, y: config.groundY[1] - config.size * 0.7};
        let pCircle = paths.circle.length > 0 ? paths.circle[paths.circle.length-1] : {x: config.startX, y: config.groundY[2] - config.size};

        let rotation = currentX / 40;

        // 绘制三个车轮
        drawShape(ctx, 'square', pSquare.x, pSquare.y, rotation);
        drawShape(ctx, 'ellipse', pEllipse.x, pEllipse.y, rotation);
        drawShape(ctx, 'circle', pCircle.x, pCircle.y, rotation);

        // 绘制轨迹线 (红色虚线)
        drawTrace(paths.square);
        drawTrace(paths.ellipse);
        drawTrace(paths.circle);
    }

    function drawShape(ctx, type, x, y, angle) {
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(angle);

        // 形状颜色风格
        ctx.fillStyle = "rgba(100, 200, 200, 0.5)"; // 内部填充
        ctx.strokeStyle = "#8B5A2B"; // 边框颜色（棕色）
        ctx.lineWidth = 8;

        ctx.beginPath();
        const size = config.size;

        if (type === 'square') {
            const s = size * 0.9; // 半边长
            ctx.rect(-s, -s, s*2, s*2);
        } else if (type === 'ellipse') {
            ctx.ellipse(0, 0, size*1.2, size*0.7, 0, 0, Math.PI*2);
        } else if (type === 'circle') {
            ctx.arc(0, 0, size, 0, Math.PI*2);
        }

        ctx.fill();
        ctx.stroke();

        // 装饰：内部同心圆/纹理，让旋转更明显
        ctx.beginPath();
        ctx.strokeStyle = "rgba(255,255,255,0.5)";
        ctx.lineWidth = 2;
        if(type === 'square') ctx.rect(-size*0.5, -size*0.5, size, size);
        if(type === 'ellipse') ctx.ellipse(0, 0, size*0.6, size*0.35, 0, 0, Math.PI*2);
        if(type === 'circle') ctx.arc(0, 0, size*0.6, 0, Math.PI*2);
        ctx.stroke();

        // 恢复坐标系
        ctx.restore();

        // 绘制中心红点 (不随旋转转动)
        ctx.beginPath();
        ctx.arc(x, y, 6, 0, Math.PI*2);
        ctx.fillStyle = "#FF3B30";
        ctx.fill();
    }

    function drawTrace(path) {
        if (path.length < 2) return;
        ctx.beginPath();
        ctx.strokeStyle = "#FF3B30";
        ctx.lineWidth = 2;
        ctx.setLineDash([5, 5]); // 虚线
        ctx.moveTo(path[0].x, path[0].y);
        for (let i = 1; i < path.length; i++) {
            ctx.lineTo(path[i].x, path[i].y);
        }
        ctx.stroke();
        ctx.setLineDash([]); // 重置
    }

    function toggleAnimation() {
        if (currentX >= config.endX) {
            resetSimulation();
        }
        isPlaying = !isPlaying;
        playBtn.innerText = isPlaying ? "暂停" : "继续";
        if (isPlaying) animate();
    }

    function resetSimulation() {
        isPlaying = false;
        playBtn.innerText = "开始演示";
        currentX = config.startX;
        paths.square = [];
        paths.ellipse = [];
        paths.circle = [];
        draw();
    }

    // 初始化
    draw();

</script>
</body>
</html>
