<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>埃舍尔密铺生成器 v3.6 (全屏密铺版)</title>
    <style>
        :root {
            --primary: #5a5cec;
            --primary-hover: #4345c9;
            --bg-color: #f3f5f9;
            --panel-bg: #ffffff;
            --text-main: #2d3748;
            --text-muted: #718096;
            --border-color: #e2e8f0;
            --red-dot: #f56565;
            --blue-dot: #4299e1;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            overflow: hidden;
            touch-action: none;
        }

        .app-container { display: flex; width: 100%; height: 100%; }

        /* 侧边栏 */
        .sidebar {
            width: 320px;
            background: var(--panel-bg);
            border-right: 1px solid var(--border-color);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
            box-shadow: 2px 0 10px rgba(0,0,0,0.03);
            z-index: 10;
        }

        .header h1 { font-size: 20px; margin: 0; color: var(--primary); }
        .header p { margin: 5px 0 0 0; font-size: 12px; color: var(--text-muted); }

        .card { background: #fafbfc; border: 1px solid var(--border-color); border-radius: 8px; padding: 15px; }
        .card-title { font-size: 14px; font-weight: 600; margin-bottom: 12px; display: flex; align-items: center; gap: 5px; }

        .btn {
            width: 100%; padding: 12px; border: none; border-radius: 6px; cursor: pointer;
            font-size: 14px; font-weight: 500; text-align: center; transition: all 0.2s;
            margin-bottom: 10px;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-outline { background: white; border: 1px solid var(--border-color); color: var(--text-main); }
        .btn-outline:hover { background: #f1f5f9; }

        .num-control { display: flex; align-items: center; gap: 5px; background: white; border: 1px solid var(--border-color); border-radius: 4px; }
        .num-control button { border: none; background: #f1f5f9; width: 32px; height: 32px; cursor: pointer; font-weight: bold; }
        .num-control input { width: 40px; border: none; text-align: center; font-size: 14px; outline: none; }
        
        .row-flex { display: flex; justify-content: space-between; gap: 10px; align-items: center; margin-bottom: 10px;}

        .color-palette { display: flex; gap: 8px; margin-top: 10px; }
        .color-picker { flex: 1; height: 36px; border: none; border-radius: 4px; padding: 0; cursor: pointer; }

        /* 编辑区 */
        .editor-area {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px; background: white; min-width: 420px;
        }
        #editCanvas { 
            background: #f8f9fa; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
            border: 1px solid var(--border-color); touch-action: none;
        }

        /* 预览区 */
        .preview-area {
            flex: 1.5; background: #e2e8f0; position: relative; overflow: hidden;
            border-left: 1px solid var(--border-color);
        }
        #patternCanvas { position: absolute; top:0; left:0; width: 100%; height: 100%; }
        .area-label { 
            position: absolute; top: 15px; left: 15px; z-index: 10;
            background: rgba(255,255,255,0.9); padding: 5px 12px; border-radius: 20px;
            font-size: 12px; font-weight: 600; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .template-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="sidebar">
        <div class="header">
            <h1>🎨 埃舍尔生成器</h1>
            <p>v3.6 - 无缝密铺全能版</p>
        </div>

        <div class="card">
            <div class="card-title">📏 密度设置 (网格数量)</div>
            <div class="row-flex">
                <div class="col-flex">
                    <span style="font-size: 11px; color:var(--text-muted)">横向数量</span>
                    <div class="num-control">
                        <button onclick="changeGrid('cols', -1)">-</button>
                        <input type="text" id="colsInput" value="8" readonly>
                        <button onclick="changeGrid('cols', 1)">+</button>
                    </div>
                </div>
                <div style="font-size: 11px; color:var(--text-muted)">* 自动充满全屏</div>
            </div>
            <div class="row-flex" style="margin-top: 15px;">
                <label style="font-size: 13px;"><input type="checkbox" id="showEye" checked> 眼睛</label>
                <label style="font-size: 13px;"><input type="checkbox" id="showLine"> 网格</label>
            </div>
        </div>

        <div class="card">
            <div class="card-title">〰️ 连线样式</div>
            <div style="display:flex; gap:15px; font-size:13px;">
                <label><input type="radio" name="lineStyle" value="straight" checked onchange="updateLineStyle(this.value)"> 直线</label>
                <label><input type="radio" name="lineStyle" value="curved" onchange="updateLineStyle(this.value)"> 曲线</label>
            </div>
        </div>

        <div class="card">
            <div class="card-title">🎨 配色方案</div>
            <div class="color-palette">
                <input type="color" class="color-picker" id="color0" value="#0ea5e9">
                <input type="color" class="color-picker" id="color1" value="#bef264">
                <input type="color" class="color-picker" id="color2" value="#e2e8f0">
            </div>
            <div style="text-align:right; margin-top:8px; font-size:12px; color:var(--primary); cursor:pointer" onclick="randomColors()">🎲 随机配色</div>
        </div>

        <div class="card">
            <div class="card-title">✨ 快速模板</div>
            <div class="template-grid">
                <button class="btn btn-outline" style="padding:8px" onclick="loadTemplate('reset')">复位</button>
                <button class="btn btn-outline" style="padding:8px" onclick="loadTemplate('bird')">飞鸟</button>
                <button class="btn btn-outline" style="padding:8px" onclick="loadTemplate('fish')">游鱼</button>
                <button class="btn btn-outline" style="padding:8px" onclick="loadTemplate('puzzle')">拼图</button>
            </div>
        </div>

        <div style="margin-top:auto">
            <button class="btn btn-primary" onclick="generatePattern()">🚀 生成完整密铺</button>
            <button class="btn btn-outline" onclick="exportImage()">💾 导出图片</button>
        </div>
    </div>

    <div class="editor-area">
        <div class="area-label">编辑单元 (拖拽红蓝点)</div>
        <canvas id="editCanvas" width="400" height="400"></canvas>
    </div>

    <div class="preview-area" id="previewContainer">
        <div class="area-label">预览区 (已自动充满)</div>
        <canvas id="patternCanvas"></canvas>
    </div>
</div>

<script>
    const editCanvas = document.getElementById('editCanvas');
    const editCtx = editCanvas.getContext('2d');
    const patternCanvas = document.getElementById('patternCanvas');
    const patternCtx = patternCanvas.getContext('2d');
    const previewContainer = document.getElementById('previewContainer');

    // --- 核心常量 ---
    const SCALE_FACTOR = 1.5;
    const BASE_SIZE = 160 * SCALE_FACTOR;
    const OFFSET_X = (400 - BASE_SIZE) / 2;
    const OFFSET_Y = (400 - BASE_SIZE) / 2;
    
    let state = {
        cols: 8, // 这里的 cols 决定了单元格的缩放比例
        showEye: true, showLine: false,
        lineStyle: 'straight',
        colors: ['#0ea5e9', '#bef264', '#e2e8f0'],
        patternGenerated: false,
        animIndex: 0
    };

    let shape = {
        top: [
            {x: 20*SCALE_FACTOR, y: 0}, {x: 40*SCALE_FACTOR, y: 0}, {x: 60*SCALE_FACTOR, y: 0}, 
            {x: 100*SCALE_FACTOR, y: 0}, {x: 120*SCALE_FACTOR, y: 0}, {x: 140*SCALE_FACTOR, y: 0}
        ],
        left: [
            {x: 0, y: 20*SCALE_FACTOR}, {x: 0, y: 40*SCALE_FACTOR}, {x: 0, y: 60*SCALE_FACTOR}, 
            {x: 0, y: 100*SCALE_FACTOR}, {x: 0, y: 120*SCALE_FACTOR}, {x: 0, y: 140*SCALE_FACTOR}
        ],
        eye: {x: 80*SCALE_FACTOR, y: 40*SCALE_FACTOR}
    };

    let draggingPoint = null;
    let animationTimer = null;

    // --- 绘图函数 ---

    function traceTilePath(ctx, S, dX, dY, curShape, style) {
        const T = curShape.top, L = curShape.left;
        ctx.beginPath();
        ctx.moveTo(dX, dY);
        // 顶
        if (style === 'straight') {
            T.forEach(p => ctx.lineTo(dX + p.x, dY + p.y));
        } else {
            ctx.quadraticCurveTo(dX+T[0].x, dY+T[0].y, dX+(T[0].x+T[1].x)/2, dY+(T[0].y+T[1].y)/2);
            for(let i=1; i<T.length-1; i++) ctx.quadraticCurveTo(dX+T[i].x, dY+T[i].y, dX+(T[i].x+T[i+1].x)/2, dY+(T[i].y+T[i+1].y)/2);
            ctx.quadraticCurveTo(dX+T[T.length-1].x, dY+T[T.length-1].y, dX+S, dY);
        }
        ctx.lineTo(dX + S, dY);
        // 右
        if (style === 'straight') {
            L.forEach(p => ctx.lineTo(dX + p.x + S, dY + p.y));
        } else {
            ctx.quadraticCurveTo(dX+L[0].x+S, dY+L[0].y, dX+(L[0].x+L[1].x)/2+S, dY+(L[0].y+L[1].y)/2);
            for(let i=1; i<L.length-1; i++) ctx.quadraticCurveTo(dX+L[i].x+S, dY+L[i].y, dX+(L[i].x+L[i+1].x)/2+S, dY+(L[i].y+L[i+1].y)/2);
            ctx.quadraticCurveTo(dX+L[L.length-1].x+S, dY+L[L.length-1].y, dX+S, dY+S);
        }
        ctx.lineTo(dX + S, dY + S);
        // 底 (反向)
        if (style === 'straight') {
            for(let i=T.length-1; i>=0; i--) ctx.lineTo(dX + T[i].x, dY + T[i].y + S);
        } else {
            ctx.quadraticCurveTo(dX+T[T.length-1].x, dY+T[T.length-1].y+S, dX+(T[T.length-1].x+T[T.length-2].x)/2, dY+(T[T.length-1].y+T[T.length-2].y)/2+S);
            for(let i=T.length-2; i>0; i--) ctx.quadraticCurveTo(dX+T[i].x, dY+T[i].y+S, dX+(T[i].x+T[i-1].x)/2, dY+(T[i].y+T[i-1].y)/2+S);
            ctx.quadraticCurveTo(dX+T[0].x, dY+T[0].y+S, dX, dY+S);
        }
        ctx.lineTo(dX, dY + S);
        // 左 (反向)
        if (style === 'straight') {
            for(let i=L.length-1; i>=0; i--) ctx.lineTo(dX + L[i].x, dY + L[i].y);
        } else {
            ctx.quadraticCurveTo(dX+L[L.length-1].x, dY+L[L.length-1].y, dX+(L[L.length-1].x+L[L.length-2].x)/2, dY+(L[L.length-1].y+L[L.length-2].y)/2);
            for(let i=L.length-2; i>0; i--) ctx.quadraticCurveTo(dX+L[i].x, dY+L[i].y, dX+(L[i].x+L[i-1].x)/2, dY+(L[i].y+L[i-1].y)/2);
            ctx.quadraticCurveTo(dX+L[0].x, dY+L[0].y, dX, dY);
        }
        ctx.closePath();
    }

    function drawEditor() {
        editCtx.clearRect(0, 0, 400, 400);
        editCtx.strokeStyle = '#cbd5e1';
        editCtx.setLineDash([5, 5]);
        editCtx.strokeRect(OFFSET_X, OFFSET_Y, BASE_SIZE, BASE_SIZE);
        editCtx.setLineDash([]);
        
        traceTilePath(editCtx, BASE_SIZE, OFFSET_X, OFFSET_Y, shape, state.lineStyle);
        editCtx.fillStyle = 'rgba(14, 165, 233, 0.1)';
        editCtx.fill();
        editCtx.strokeStyle = '#0ea5e9';
        editCtx.lineWidth = 2;
        editCtx.stroke();

        const drawPt = (p, col, ox=0, oy=0) => {
            editCtx.beginPath();
            editCtx.arc(OFFSET_X + p.x + ox, OFFSET_Y + p.y + oy, 8, 0, Math.PI*2);
            editCtx.fillStyle = col;
            editCtx.fill();
            editCtx.strokeStyle = '#fff';
            editCtx.lineWidth = 2;
            editCtx.stroke();
        };

        shape.top.forEach(p => { drawPt(p, 'var(--blue-dot)'); drawPt(p, 'var(--blue-dot)', 0, BASE_SIZE); });
        shape.left.forEach(p => { drawPt(p, 'var(--red-dot)'); drawPt(p, 'var(--red-dot)', BASE_SIZE, 0); });
        if (state.showEye) drawPt(shape.eye, '#000');
    }

    function drawPreview(maxCount = -1) {
        const rect = previewContainer.getBoundingClientRect();
        patternCanvas.width = rect.width;
        patternCanvas.height = rect.height;
        
        if (!state.patternGenerated) return;

        // 【算法优化点】：S 的计算直接关联预览区宽度，确保横向始终满格
        const S = rect.width / state.cols; 
        const ratio = S / BASE_SIZE;

        const sShape = {
            top: shape.top.map(p => ({x:p.x*ratio, y:p.y*ratio})),
            left: shape.left.map(p => ({x:p.x*ratio, y:p.y*ratio})),
            eye: {x:shape.eye.x*ratio, y:shape.eye.y*ratio}
        };

        // 计算纵向需要多少行才能填满
        const rowsNeeded = Math.ceil(rect.height / S) + 2; 
        const colsNeeded = state.cols + 2;

        if (maxCount === -1) patternCtx.clearRect(0, 0, rect.width, rect.height);

        let count = 0;
        // 从 -1 开始循环，确保边缘凸出的部分也能绘制
        for(let r=-1; r < rowsNeeded; r++){
            for(let c=-1; c < colsNeeded; c++){
                if (maxCount !== -1 && ++count > maxCount) return;
                
                const dX = c * S, dY = r * S;
                traceTilePath(patternCtx, S, dX, dY, sShape, state.lineStyle);
                
                // 3色对角线算法
                const colorIdx = ((r + c) % 3 + 3) % 3;
                patternCtx.fillStyle = state.colors[colorIdx];
                patternCtx.fill();
                
                patternCtx.strokeStyle = 'rgba(0,0,0,0.1)';
                patternCtx.lineWidth = 0.5;
                patternCtx.stroke();

                if(state.showLine) {
                    patternCtx.strokeStyle = 'rgba(255,255,255,0.2)';
                    patternCtx.strokeRect(dX, dY, S, S);
                }

                if(state.showEye){
                    patternCtx.beginPath();
                    patternCtx.arc(dX + sShape.eye.x, dY + sShape.eye.y, S/30, 0, Math.PI*2);
                    patternCtx.fillStyle = '#000';
                    patternCtx.fill();
                }
            }
        }
    }

    // --- 触控交互 (Pointer Events) ---

    function getPointerPos(e) {
        const rect = editCanvas.getBoundingClientRect();
        return { x: e.clientX - rect.left - OFFSET_X, y: e.clientY - rect.top - OFFSET_Y };
    }

    function distSq(p1, p2) { return (p1.x - p2.x)**2 + (p1.y - p2.y)**2; }

    editCanvas.addEventListener('pointerdown', (e) => {
        const pos = getPointerPos(e);
        const hit = 600; // 适配触屏，判定范围稍大
        draggingPoint = null;

        for (let p of shape.top) {
            if (distSq(pos, p) < hit) { draggingPoint = p; break; }
            if (distSq(pos, {x:p.x, y:p.y+BASE_SIZE}) < hit) { draggingPoint = p; break; }
        }
        if(!draggingPoint) {
            for (let p of shape.left) {
                if (distSq(pos, p) < hit) { draggingPoint = p; break; }
                if (distSq(pos, {x:p.x+BASE_SIZE, y:p.y}) < hit) { draggingPoint = p; break; }
            }
        }
        if(!draggingPoint && state.showEye && distSq(pos, shape.eye) < hit) draggingPoint = shape.eye;
        
        if (draggingPoint) editCanvas.setPointerCapture(e.pointerId);
    });

    editCanvas.addEventListener('pointermove', (e) => {
        if (!draggingPoint) return;
        const pos = getPointerPos(e);
        
        if (shape.top.includes(draggingPoint)) {
            const rect = editCanvas.getBoundingClientRect();
            // 如果点在下方，说明在拖拽镜像点
            if (e.clientY - rect.top > OFFSET_Y + BASE_SIZE*0.7) pos.y -= BASE_SIZE;
            draggingPoint.x = Math.max(0, Math.min(BASE_SIZE, pos.x));
            draggingPoint.y = pos.y;
        } else if (shape.left.includes(draggingPoint)) {
            const rect = editCanvas.getBoundingClientRect();
            if (e.clientX - rect.left > OFFSET_X + BASE_SIZE*0.7) pos.x -= BASE_SIZE;
            draggingPoint.x = pos.x;
            draggingPoint.y = Math.max(0, Math.min(BASE_SIZE, pos.y));
        } else {
            draggingPoint.x = pos.x; draggingPoint.y = pos.y;
        }

        drawEditor();
        if (state.patternGenerated && !animationTimer) drawPreview();
    });

    editCanvas.addEventListener('pointerup', () => draggingPoint = null);

    // --- UI 逻辑 ---

    function changeGrid(type, delta) {
        state.cols = Math.max(4, Math.min(30, state.cols + delta));
        document.getElementById('colsInput').value = state.cols;
        if (state.patternGenerated) drawPreview();
    }

    function updateLineStyle(s) { state.lineStyle = s; drawEditor(); if(state.patternGenerated) drawPreview(); }

    function randomColors() {
        state.colors = state.colors.map((c, i) => {
            const rc = '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6, '0');
            document.getElementById('color'+i).value = rc;
            return rc;
        });
        if (state.patternGenerated) drawPreview();
    }

    function generatePattern() {
        if (animationTimer) clearTimeout(animationTimer);
        state.patternGenerated = true;
        
        // 计算预览区所需总块数
        const rect = previewContainer.getBoundingClientRect();
        const S = rect.width / state.cols;
        const rowsNeeded = Math.ceil(rect.height / S) + 2;
        const total = (state.cols + 2) * rowsNeeded;

        let cur = 0;
        const animate = () => {
            if (cur <= total) {
                drawPreview(cur++);
                animationTimer = setTimeout(animate, 2000 / total); // 2秒内生成完毕
            } else animationTimer = null;
        };
        animate();
    }

    function loadTemplate(key) {
        const T = {
            reset: {
                top: [20,40,60,100,120,140].map(x=>({x:x*SCALE_FACTOR, y:0})),
                left: [20,40,60,100,120,140].map(y=>({x:0, y:y*SCALE_FACTOR})),
                eye: {x:80*SCALE_FACTOR, y:40*SCALE_FACTOR}
            },
            bird: {
                top: [{x:10,y:-30},{x:30,y:-50},{x:60,y:-40},{x:100,y:-20},{x:130,y:0},{x:150,y:10}].map(p=>({x:p.x*SCALE_FACTOR,y:p.y*SCALE_FACTOR})),
                left: [{x:-20,y:10},{x:0,y:40},{x:10,y:70},{x:-5,y:100},{x:10,y:130},{x:20,y:150}].map(p=>({x:p.x*SCALE_FACTOR,y:p.y*SCALE_FACTOR})),
                eye: {x:35*SCALE_FACTOR, y:30*SCALE_FACTOR}
            },
            fish: {
                top: [{x:20,y:-20},{x:50,y:-40},{x:80,y:-20},{x:110,y:0},{x:130,y:10},{x:140,y:30}].map(p=>({x:p.x*SCALE_FACTOR,y:p.y*SCALE_FACTOR})),
                left: [{x:20,y:20},{x:0,y:50},{x:-15,y:80},{x:0,y:110},{x:10,y:130},{x:30,y:140}].map(p=>({x:p.x*SCALE_FACTOR,y:p.y*SCALE_FACTOR})),
                eye: {x:120*SCALE_FACTOR, y:70*SCALE_FACTOR}
            },
            puzzle: {
                top: [{x:30,y:-20},{x:50,y:-40},{x:70,y:-30},{x:90,y:-30},{x:110,y:-40},{x:130,y:-20}].map(p=>({x:p.x*SCALE_FACTOR,y:p.y*SCALE_FACTOR})),
                left: [{x:20,y:30},{x:40,y:50},{x:30,y:70},{x:30,y:90},{x:40,y:110},{x:20,y:130}].map(p=>({x:p.x*SCALE_FACTOR,y:p.y*SCALE_FACTOR})),
                eye: {x:80*SCALE_FACTOR, y:80*SCALE_FACTOR}
            }
        };
        shape = JSON.parse(JSON.stringify(T[key]));
        state.patternGenerated = false;
        drawEditor();
        patternCtx.clearRect(0,0,patternCanvas.width,patternCanvas.height);
    }

    function exportImage() {
        if (!state.patternGenerated) return alert('请先生成密铺');
        const link = document.createElement('a');
        link.download = 'Escher_Tiling.png';
        link.href = patternCanvas.toDataURL();
        link.click();
    }

    // 初始化
    window.onload = drawEditor;
    window.onresize = () => { drawEditor(); if(state.patternGenerated) drawPreview(); };
    ['color0','color1','color2'].forEach((id,i)=>document.getElementById(id).oninput=(e)=>{state.colors[i]=e.target.value; if(state.patternGenerated) drawPreview();});
    document.getElementById('showEye').onchange = (e) => { state.showEye = e.target.checked; drawEditor(); if(state.patternGenerated) drawPreview(); };
    document.getElementById('showLine').onchange = (e) => { state.showLine = e.target.checked; if(state.patternGenerated) drawPreview(); };
</script>
</body>
</html>
