<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>一年级数学游园会</title>
    <style>
        :root {
            --red: #d62828;
            --gold: #fcbf49;
            --paper: #fffcf2;
            --dark: #003049;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: radial-gradient(circle, #e5383b 0%, #a4161a 100%);
            height: 100vh; display: flex; justify-content: center; align-items: center;
            overflow: hidden; touch-action: manipulation;
        }

        #app {
            width: 96vw; height: 94vh;
            background: var(--paper); border: 6px solid var(--gold);
            border-radius: 30px; position: relative;
            display: flex; flex-direction: column; box-sizing: border-box;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
        }

        /* 头部状态栏 */
        .header {
            padding: 10px 20px; display: flex; justify-content: space-between; align-items: center;
            background: white; border-radius: 24px 24px 0 0; border-bottom: 2px dashed var(--gold);
        }

        .btn-back {
            background: var(--dark); color: white; border: none;
            padding: 8px 15px; border-radius: 10px; cursor: pointer;
        }

        .status-center { text-align: center; flex: 1; }
        .timer { font-size: 22px; font-weight: bold; color: var(--red); }
        .star-row { font-size: 24px; color: #ddd; letter-spacing: 5px; }
        .star-row .active { color: #ffcc00; text-shadow: 0 0 5px rgba(255,204,0,0.5); }

        /* 内容区 */
        .main-content {
            flex: 1; display: flex; flex-direction: column; align-items: center;
            padding: 15px; overflow-y: auto; text-align: center;
        }

        /* 首页和选择页 */
        .menu-grid { display: flex; flex-direction: column; gap: 20px; margin-top: 40px; }
        .btn-main {
            background: var(--red); color: white; padding: 20px 40px;
            border-radius: 20px; font-size: 24px; border: 4px solid var(--gold);
            box-shadow: 0 6px 0 var(--dark); cursor: pointer;
        }
        .item-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 30px; }
        .gift-box { font-size: 60px; background: white; padding: 15px; border-radius: 20px; border: 3px solid var(--red); cursor: pointer; }

        /* 题目展示 */
        .q-text-l1 { font-size: 60px; font-weight: 900; margin: 20px 0; color: var(--dark); }
        .q-text-l2 { font-size: 22px; font-weight: bold; text-align: left; margin-bottom: 10px; width: 100%; }
        
        .img-main { max-width: 90%; max-height: 180px; margin: 10px 0; border: 1px solid #eee; border-radius: 8px; }
        .opts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; margin-top: 10px; }
        .btn-opt {
            background: white; border: 2px solid #ddd; padding: 10px;
            border-radius: 12px; font-size: 18px; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .btn-opt.selected { border-color: var(--red); background: #fff5f5; }
        .img-opt { height: 60px; margin-top: 5px; }

        /* 键盘 */
        .input-box { font-size: 50px; width: 180px; height: 70px; text-align: center; border: 4px solid var(--gold); border-radius: 15px; margin-bottom: 15px; color: var(--red); font-weight: bold; }
        .keyboard { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; width: 100%; max-width: 400px; }
        .key { background: white; border: 2px solid var(--dark); padding: 15px 0; border-radius: 10px; font-size: 20px; font-weight: bold; cursor: pointer; box-shadow: 0 3px 0 #ccc; }
        .key:active { transform: translateY(2px); box-shadow: 0 1px 0 #ccc; }

        /* 结果页星星 */
        .res-star-row { font-size: 40px; color: #ddd; margin: 10px 0; }
        .res-star-row .active { color: #ffcc00; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="app">
    <div id="ui-header" class="header hidden">
        <button class="btn-back" onclick="location.reload()">🏠 退出</button>
        <div class="status-center">
            <div id="ui-timer" class="timer">60s</div>
            <div id="ui-stars" class="star-row"></div>
        </div>
        <div id="ui-page" style="font-weight:bold;">1/5</div>
    </div>

    <div class="main-content">
        <!-- 首页 -->
        <div id="screen-home" class="menu-grid">
            <h1 style="color:var(--red); font-size: 32px;">🧧 数学游园会 🧧</h1>
            <button class="btn-main" onclick="showSelect(1)">第一关：口算红包翻翻乐</button>
            <button class="btn-main" style="background:#fb8500" onclick="showSelect(2)">第二关：新春福袋智慧选</button>
        </div>

        <!-- 选择页 -->
        <div id="screen-select" class="hidden">
            <h2 id="select-title" style="color:var(--red);">请选择挑战</h2>
            <div id="select-grid" class="item-grid"></div>
        </div>

        <!-- 答题页 -->
        <div id="screen-quiz" class="hidden" style="width:100%">
            <div id="quiz-body" style="width:100%; display:flex; flex-direction:column; align-items:center;"></div>
            
            <div id="l1-controls" class="hidden">
                <input type="text" id="l1-input" class="input-box" readonly>
                <div class="keyboard">
                    <div class="key" onclick="pressNum(1)">1</div>
                    <div class="key" onclick="pressNum(2)">2</div>
                    <div class="key" onclick="pressNum(3)">3</div>
                    <div class="key" onclick="pressNum(4)">4</div>
                    <div class="key" onclick="pressNum(5)">5</div>
                    <div class="key" onclick="pressNum(6)">6</div>
                    <div class="key" onclick="pressNum(7)">7</div>
                    <div class="key" onclick="pressNum(8)">8</div>
                    <div class="key" onclick="pressNum(9)">9</div>
                    <div class="key" onclick="pressNum(0)">0</div>
                    <div class="key" style="grid-column: span 2; background:#eee" onclick="pressNum('del')">退格</div>
                    <div class="key" style="grid-column: span 3; background:var(--gold)" onclick="submitAns()">确定</div>
                </div>
            </div>

            <div id="l2-controls" class="hidden" style="margin-top:20px;">
                <button id="btn-next-l2" class="btn-main" style="padding:10px 40px;" onclick="submitAns()">确认提交</button>
            </div>
        </div>

        <!-- 结果页 -->
        <div id="screen-result" class="hidden">
            <h1 id="res-title" style="color:var(--red); font-size:36px; margin-bottom:10px;">挑战完成</h1>
            <div id="res-stars-display" class="res-star-row"></div>
            <div id="res-stickers" style="font-size:80px; margin:10px 0;"></div>
            <p id="res-detail" style="font-size:20px; line-height:1.6;"></p>
            <button class="btn-main" onclick="location.reload()">返回主页</button>
        </div>
    </div>
</div>

<script>
    // --- 题库数据 (完全依照 sx.md) ---
    const L1_DATA = [
        { name: "红包1", q: ["5+3=", "8-7=", "6-0=", "3+7-2=", "( )+5=9"], a: ["8", "1", "6", "8", "4"] },
        { name: "红包2", q: ["2+6=", "9-8=", "8-0=", "6+4-3=", "( )+3=8"], a: ["8", "1", "8", "7", "5"] },
        { name: "红包3", q: ["7+2=", "10-9=", "9-0=", "2+8-9=", "( )+6=9"], a: ["9", "1", "9", "1", "3"] }
    ];

    const L2_DATA = [
        { name: "福袋1", qs: [
            { t: "1. 下图中有（ ）个长方体。", img: "1-1-1.jpg", opts: ["A. 1", "B. 2", "C. 3", "D. 4"], a: 1 },
            { t: "2. 下面的钟面表示5时半的是（ ）。", img: "1-2-1.jpg", opts: ["A. ①", "B. ②", "C. ③", "D. ④"], a: 1 },
            { t: "3. 下面几个物品中，（ ）和其他不同类。", opts: [
                { id: "A", img: "1-3-1.jpg" }, { id: "B", img: "1-3-2.jpg" }, { id: "C", img: "1-3-3.jpg" }, { id: "D", img: "1-3-4.jpg" }
            ], a: 3, type: "img-opts" },
            { t: "4. 看下图，正确的算式是（ ）。", img: "1-4-1.jpg", opts: ["A. 2+6+3=11", "B. 2+6-3=5", "C. 2+5-3=4", "D. 8-3=5"], a: 1 },
            { t: "5. 下图中1个杯子配1根吸管，还缺几根？正确列式是（ ）。", img: "1-5-1.jpg", opts: ["A. 10-5=5", "B. 5+5=10", "C. 10-4=6", "D. 4+6=10"], a: 0 }
        ]},
        { name: "福袋2", qs: [
            { t: "1. 下图中有（ ）个正方体。", img: "2-1-1.jpg", opts: ["A. 1", "B. 2", "C. 3", "D. 4"], a: 0 },
            { t: "2. 下面的钟面表示6时半的是（ ）。", img: "2-2-1.jpg", opts: ["A. ①", "B. ②", "C. ③", "D. ④"], a: 2 },
            { t: "3. 下面几个物品中，（ ）和其他不同类。", opts: [
                { id: "A", img: "2-3-1.jpg" }, { id: "B", img: "2-3-2.jpg" }, { id: "C", img: "2-3-3.jpg" }, { id: "D", img: "2-3-4.jpg" }
            ], a: 0, type: "img-opts" },
            { t: "4. 看下图，正确的算式是（ ）。", img: "2-4-1.jpg", opts: ["A. 2+6+3=11", "B. 2+6-3=5", "C. 2+5-3=4", "D. 8-3=5"], a: 1 },
            { t: "5. 下图中1个杯子配1根吸管，还缺几根？正确列式是（ ）。", img: "2-5-1.jpg", opts: ["A. 10-5=5", "B. 5+5=10", "C. 10-4=6", "D. 4+6=10"], a: 0 }
        ]},
        { name: "福袋3", qs: [
            { t: "1. 下图中有（ ）个圆柱。", img: "3-1-1.jpg", opts: ["A. 1", "B. 2", "C. 3", "D. 4"], a: 1 },
            { t: "2. 下面的钟面表示7时半的是（ ）。", img: "3-2-1.jpg", opts: ["A. ①", "B. ②", "C. ③", "D. ④"], a: 3 },
            { t: "3. 下面几个物品中，（ ）和其他不同类。", opts: [
                { id: "A", img: "3-3-1.jpg" }, { id: "B", img: "3-3-2.jpg" }, { id: "C", img: "3-3-3.jpg" }, { id: "D", img: "3-3-4.jpg" }
            ], a: 2, type: "img-opts" },
            { t: "4. 看下图，正确的算式是（ ）。", img: "3-4-1.jpg", opts: ["A. 2+6+3=11", "B. 2+6-3=5", "C. 2+5-3=4", "D. 8-3=5"], a: 1 },
            { t: "5. 下图中1个杯子配1根吸管，还缺几根？正确列式是（ ）。", img: "3-5-1.jpg", opts: ["A. 10-5=5", "B. 5+5=10", "C. 10-4=6", "D. 4+6=10"], a: 0 }
        ]}
    ];

    const IMG_BASE = "https://www.teachmate.top/storage/sx1/";
    let curLv, curSetIdx, qIdx, timeLeft, timer, selectedOpt = null;
    let correctAnswers = [false, false, false, false, false]; // 显式记录每一题的对错状态

    function showSelect(lv) {
        curLv = lv;
        document.getElementById('screen-home').classList.add('hidden');
        document.getElementById('screen-select').classList.remove('hidden');
        const grid = document.getElementById('select-grid');
        grid.innerHTML = "";
        const data = lv === 1 ? L1_DATA : L2_DATA;
        data.forEach((set, i) => {
            grid.innerHTML += `<div class="gift-box" onclick="startQuiz(${i})">${lv === 1 ? '🧧' : '💰'}<div style="font-size:14px">${set.name}</div></div>`;
        });
    }

    function startQuiz(idx) {
        curSetIdx = idx; qIdx = 0;
        correctAnswers = [false, false, false, false, false]; // 初始化记录
        document.getElementById('screen-select').classList.add('hidden');
        document.getElementById('ui-header').classList.remove('hidden');
        document.getElementById('screen-quiz').classList.remove('hidden');
        
        timeLeft = curLv === 1 ? 60 : 120;
        renderQuestion();
        startTimer();
    }

    function renderQuestion() {
        const body = document.getElementById('quiz-body');
        document.getElementById('ui-page').innerText = `${qIdx + 1} / 5`;
        updateHeaderStars();
        selectedOpt = null;

        if (curLv === 1) {
            document.getElementById('l1-controls').classList.remove('hidden');
            document.getElementById('l2-controls').classList.add('hidden');
            document.getElementById('l1-input').value = "";
            body.innerHTML = `<div class="q-text-l1">${L1_DATA[curSetIdx].q[qIdx]}</div>`;
        } else {
            document.getElementById('l1-controls').classList.add('hidden');
            document.getElementById('l2-controls').classList.remove('hidden');
            const q = L2_DATA[curSetIdx].qs[qIdx];
            let html = `<div class="q-text-l2">${q.t}</div>`;
            if (q.img) html += `<img src="${IMG_BASE + q.img}" class="img-main">`;
            html += `<div class="opts-grid">`;
            q.opts.forEach((opt, i) => {
                if (q.type === 'img-opts') {
                    html += `<div class="btn-opt" id="opt-${i}" onclick="selectOpt(${i})">${opt.id}<img src="${IMG_BASE + opt.img}" class="img-opt"></div>`;
                } else {
                    html += `<div class="btn-opt" id="opt-${i}" onclick="selectOpt(${i})">${opt}</div>`;
                }
            });
            html += `</div>`;
            body.innerHTML = html;
        }
    }

    function pressNum(n) {
        const input = document.getElementById('l1-input');
        if (n === 'del') input.value = input.value.slice(0, -1);
        else if (input.value.length < 2) input.value += n;
    }

    function selectOpt(i) {
        selectedOpt = i;
        document.querySelectorAll('.btn-opt').forEach(el => el.classList.remove('selected'));
        document.getElementById('opt-' + i).classList.add('selected');
    }

    function submitAns() {
        let isCorrect = false;
        if (curLv === 1) {
            const val = document.getElementById('l1-input').value;
            if (!val) return alert("请输入答案！");
            if (val === L1_DATA[curSetIdx].a[qIdx]) isCorrect = true;
        } else {
            if (selectedOpt === null) return alert("请选择一个选项！");
            if (selectedOpt === L2_DATA[curSetIdx].qs[qIdx].a) isCorrect = true;
        }

        correctAnswers[qIdx] = isCorrect; // 存储当前题目对错
        
        if (qIdx < 4) {
            qIdx++;
            renderQuestion();
        } else {
            showResult();
        }
    }

    // 更新顶部状态栏的星星（随着答题点亮）
    function updateHeaderStars() {
        const stars = document.getElementById('ui-stars');
        let str = "";
        for (let i = 0; i < 5; i++) {
            // 注意：星星状态始终代表对应索引题目的正误
            str += `<span class="${correctAnswers[i] ? 'active' : ''}">★</span>`;
        }
        stars.innerHTML = str;
    }

    function startTimer() {
        clearInterval(timer);
        timer = setInterval(() => {
            timeLeft--;
            document.getElementById('ui-timer').innerText = timeLeft + "s";
            if (timeLeft <= 0) {
                clearInterval(timer);
                alert("时间到啦！");
                showResult();
            }
        }, 1000);
    }

    function showResult() {
        clearInterval(timer);
        document.getElementById('screen-quiz').classList.add('hidden');
        document.getElementById('ui-header').classList.add('hidden');
        document.getElementById('screen-result').classList.remove('hidden');

        // 计算总分
        const correctCount = correctAnswers.filter(v => v === true).length;
        
        // 渲染最后的星星状况（与答题一致）
        const resStars = document.getElementById('res-stars-display');
        let starHtml = "";
        for (let i = 0; i < 5; i++) {
            starHtml += `<span class="${correctAnswers[i] ? 'active' : ''}">★</span>`;
        }
        resStars.innerHTML = starHtml;

        // 根据 sx.md 标准决定奖杯数
        let stickers = 0;
        let evaluation = "";
        if (correctCount === 5) {
            stickers = 3; evaluation = "卓越表现！";
        } else if (correctCount >= 3) {
            stickers = 2; evaluation = "良好表现！";
        } else if (correctCount >= 1) {
            stickers = 1; evaluation = "需加油！";
        } else {
            stickers = 0; evaluation = "继续努力！";
        }

        document.getElementById('res-stickers').innerText = stickers > 0 ? "🏆".repeat(stickers) : "加油";
        document.getElementById('res-detail').innerHTML = `
            题目 1-5 对错情况如上图所示<br>
            共答对 <b>${correctCount}</b> 道题<br>
            获得奖杯贴纸：<b>${stickers}</b> 个<br>
            评语：${evaluation}
        `;
    }
</script>

</body>
</html>
