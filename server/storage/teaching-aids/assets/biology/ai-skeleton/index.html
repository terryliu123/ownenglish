<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TensorFlow.js 动作识别 - 全身姿态检测</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/posenet@2.2.2/dist/posenet.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .status {
            background: rgba(255,255,255,0.1);
            padding: 10px 20px;
            border-radius: 25px;
            display: inline-block;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }
        
        .video-container {
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .video-panel, .skeleton-panel {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .panel-title {
            text-align: center;
            margin-bottom: 15px;
            font-size: 1.2em;
            font-weight: bold;
        }
        
        #videoElement {
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        
        #skeletonCanvas {
            border-radius: 15px;
            background: rgba(0,0,0,0.3);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        
        .controls {
            text-align: center;
            margin-top: 20px;
        }
        
        .btn {
            background: linear-gradient(45deg, #ff6b6b, #ee5a24);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            margin: 0 10px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }
        
        .btn:disabled {
            background: #666;
            cursor: not-allowed;
            transform: none;
        }
        
        .info-panel {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
            backdrop-filter: blur(10px);
        }
        
        .pose-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }
        
        .pose-item {
            background: rgba(255,255,255,0.1);
            padding: 10px;
            border-radius: 10px;
            text-align: center;
        }
        
        .toggle-options {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
        }
        
        .toggle-btn {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        
        .toggle-btn.active {
            background: rgba(0,255,0,0.3);
            border-color: #00ff00;
        }
        
        .debug-info {
            background: rgba(255,255,255,0.1);
            padding: 10px;
            border-radius: 10px;
            margin-top: 10px;
            font-size: 12px;
        }
        
        .fps-counter {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.7);
            color: #00ff00;
            padding: 5px 10px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 14px;
        }
        
        @media (max-width: 768px) {
            .video-container {
                flex-direction: column;
                align-items: center;
            }
            
            #videoElement, #skeletonCanvas {
                width: 100%;
                max-width: 400px;
                height: auto;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 AI动作识别系统</h1>
            <div class="status" id="status">正在初始化...</div>
        </div>
        
        <div class="video-container">
            <div class="video-panel">
                <div class="panel-title">📹 摄像头画面</div>
                <video id="videoElement" width="480" height="360" autoplay muted></video>
            </div>
            
            <div class="skeleton-panel" style="position: relative;">
                <div class="panel-title">🦴 骨架检测</div>
                <canvas id="skeletonCanvas" width="480" height="360"></canvas>
                <div class="fps-counter" id="fpsCounter">FPS: 0</div>
                <div class="toggle-options">
                    <button class="toggle-btn active" id="showSkeletonBtn">显示骨架</button>
                    <button class="toggle-btn active" id="showKeypointsBtn">显示关键点</button>
                    <button class="toggle-btn" id="showLabelsBtn">显示标签</button>
                </div>
                <div class="debug-info" id="debugInfo">调试信息</div>
            </div>
        </div>
        
        <div class="controls">
            <button class="btn" id="startBtn">开始检测</button>
            <button class="btn" id="stopBtn" disabled>停止检测</button>
            <button class="btn" id="toggleBtn">切换摄像头</button>
        </div>
        
        <div class="info-panel">
            <h3>📊 检测信息</h3>
            <div id="poseInfo">等待检测...</div>
            <div class="pose-info" id="keypoints"></div>
        </div>
    </div>

    <script>
        class PoseDetector {
            constructor() {
                this.video = document.getElementById('videoElement');
                this.canvas = document.getElementById('skeletonCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.status = document.getElementById('status');
                this.poseInfo = document.getElementById('poseInfo');
                this.keypointsDiv = document.getElementById('keypoints');
                this.debugInfo = document.getElementById('debugInfo');
                this.fpsCounter = document.getElementById('fpsCounter');
                
                this.poseNet = null;
                this.isDetecting = false;
                this.currentStream = null;
                this.facingMode = 'user';
                
                // 显示选项
                this.showSkeleton = true;
                this.showKeypoints = true;
                this.showLabels = false;
                
                // 检测结果
                this.currentPose = null;
                
                // FPS计算
                this.frameCount = 0;
                this.lastTime = Date.now();
                this.fps = 0;
                
                this.initButtons();
                this.initToggleButtons();
                this.setupCanvas();
                
                this.debug('系统初始化完成');
            }
            
            debug(message) {
                console.log(message);
                this.debugInfo.textContent = `${new Date().toLocaleTimeString()}: ${message}`;
            }
            
            updateFPS() {
                this.frameCount++;
                const now = Date.now();
                if (now - this.lastTime >= 1000) {
                    this.fps = this.frameCount;
                    this.frameCount = 0;
                    this.lastTime = now;
                    this.fpsCounter.textContent = `FPS: ${this.fps}`;
                }
            }
            
            initButtons() {
                document.getElementById('startBtn').addEventListener('click', () => this.start());
                document.getElementById('stopBtn').addEventListener('click', () => this.stop());
                document.getElementById('toggleBtn').addEventListener('click', () => this.toggleCamera());
            }
            
            initToggleButtons() {
                document.getElementById('showSkeletonBtn').addEventListener('click', (e) => {
                    this.showSkeleton = !this.showSkeleton;
                    e.target.classList.toggle('active', this.showSkeleton);
                });
                
                document.getElementById('showKeypointsBtn').addEventListener('click', (e) => {
                    this.showKeypoints = !this.showKeypoints;
                    e.target.classList.toggle('active', this.showKeypoints);
                });
                
                document.getElementById('showLabelsBtn').addEventListener('click', (e) => {
                    this.showLabels = !this.showLabels;
                    e.target.classList.toggle('active', this.showLabels);
                });
            }
            
            setupCanvas() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                this.ctx.fillStyle = '#000000';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                this.ctx.fillStyle = '#fff';
                this.ctx.font = '20px Arial';
                this.ctx.textAlign = 'center';
                this.ctx.fillText('等待开始检测...', this.canvas.width/2, this.canvas.height/2);
            }
            
            async loadModel() {
                try {
                    this.status.textContent = '正在加载AI模型...';
                    this.debug('开始加载PoseNet模型');
                    
                    this.poseNet = await posenet.load({
                        architecture: 'MobileNetV1',
                        outputStride: 16,
                        inputResolution: { width: 640, height: 480 },
                        multiplier: 0.75
                    });
                    
                    this.status.textContent = '模型加载完成！';
                    this.debug('PoseNet模型加载完成');
                    return true;
                } catch (error) {
                    console.error('模型加载失败:', error);
                    this.status.textContent = '模型加载失败: ' + error.message;
                    this.debug('模型加载失败: ' + error.message);
                    return false;
                }
            }
            
            async setupCamera() {
                try {
                    this.status.textContent = '正在启动摄像头...';
                    this.debug('启动摄像头');
                    
                    if (this.currentStream) {
                        this.currentStream.getTracks().forEach(track => track.stop());
                    }
                    
                    const stream = await navigator.mediaDevices.getUserMedia({
                        video: {
                            facingMode: this.facingMode,
                            width: { ideal: 640 },
                            height: { ideal: 480 }
                        },
                        audio: false
                    });
                    
                    this.currentStream = stream;
                    this.video.srcObject = stream;
                    
                    return new Promise((resolve) => {
                        this.video.onloadedmetadata = () => {
                            this.status.textContent = '摄像头启动成功！';
                            this.debug('摄像头启动成功');
                            resolve();
                        };
                    });
                } catch (error) {
                    console.error('摄像头启动失败:', error);
                    this.status.textContent = '摄像头启动失败: ' + error.message;
                    this.debug('摄像头启动失败: ' + error.message);
                    throw error;
                }
            }
            
            async start() {
                try {
                    document.getElementById('startBtn').disabled = true;
                    this.debug('开始启动检测');
                    
                    if (!this.poseNet) {
                        const loaded = await this.loadModel();
                        if (!loaded) {
                            document.getElementById('startBtn').disabled = false;
                            return;
                        }
                    }
                    
                    await this.setupCamera();
                    
                    this.isDetecting = true;
                    document.getElementById('stopBtn').disabled = false;
                    this.status.textContent = '正在检测中...';
                    this.debug('开始检测循环');
                    
                    this.detectPose();
                } catch (error) {
                    console.error('启动失败:', error);
                    this.debug('启动失败: ' + error.message);
                    document.getElementById('startBtn').disabled = false;
                }
            }
            
            stop() {
                this.isDetecting = false;
                document.getElementById('startBtn').disabled = false;
                document.getElementById('stopBtn').disabled = true;
                this.status.textContent = '检测已停止';
                this.debug('检测已停止');
                
                if (this.currentStream) {
                    this.currentStream.getTracks().forEach(track => track.stop());
                    this.currentStream = null;
                }
                
                this.setupCanvas();
                this.poseInfo.textContent = '检测已停止';
                this.keypointsDiv.innerHTML = '';
                this.fpsCounter.textContent = 'FPS: 0';
            }
            
            async toggleCamera() {
                if (this.isDetecting) {
                    this.facingMode = this.facingMode === 'user' ? 'environment' : 'user';
                    await this.setupCamera();
                }
            }
            
            async detectPose() {
                if (!this.isDetecting) return;
                
                try {
                    // 检测身体姿态
                    const pose = await this.poseNet.estimateSinglePose(this.video, {
                        flipHorizontal: this.facingMode === 'user'
                    });
                    
                    this.currentPose = pose;
                    this.drawPose();
                    this.updatePoseInfo();
                    this.updateFPS();
                    
                } catch (error) {
                    console.error('检测错误:', error);
                    this.debug('检测错误: ' + error.message);
                }
                
                // 使用requestAnimationFrame获得更好的性能
                if (this.isDetecting) {
                    requestAnimationFrame(() => this.detectPose());
                }
            }
            
            drawPose() {
                // 清空画布
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                this.ctx.fillStyle = '#000000';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                
                if (!this.currentPose) return;
                
                // 绘制骨架连线
                if (this.showSkeleton) {
                    this.drawSkeleton(this.currentPose.keypoints);
                }
                
                // 绘制关键点
                if (this.showKeypoints) {
                    this.drawKeypoints(this.currentPose.keypoints);
                }
            }
            
            drawKeypoints(keypoints) {
                keypoints.forEach(keypoint => {
                    if (keypoint.score > 0.3) {
                        const { x, y } = this.scalePoint(keypoint.position);
                        
                        // 绘制关键点
                        this.ctx.beginPath();
                        this.ctx.arc(x, y, 6, 0, 2 * Math.PI);
                        this.ctx.fillStyle = this.getKeypointColor(keypoint.part);
                        this.ctx.fill();
                        this.ctx.closePath();
                        
                        // 绘制关键点边框
                        this.ctx.beginPath();
                        this.ctx.arc(x, y, 6, 0, 2 * Math.PI);
                        this.ctx.strokeStyle = '#ffffff';
                        this.ctx.lineWidth = 2;
                        this.ctx.stroke();
                        this.ctx.closePath();
                        
                        // 绘制标签
                        if (this.showLabels) {
                            this.ctx.fillStyle = '#fff';
                            this.ctx.font = '10px Arial';
                            this.ctx.textAlign = 'center';
                            this.ctx.strokeStyle = '#000';
                            this.ctx.lineWidth = 3;
                            this.ctx.strokeText(keypoint.part, x, y - 10);
                            this.ctx.fillText(keypoint.part, x, y - 10);
                        }
                    }
                });
            }
            
            drawSkeleton(keypoints) {
                const adjacentKeyPoints = this.getAdjacentKeyPoints();
                
                adjacentKeyPoints.forEach(([i, j]) => {
                    const kp1 = keypoints[i];
                    const kp2 = keypoints[j];
                    
                    if (kp1.score > 0.3 && kp2.score > 0.3) {
                        const pos1 = this.scalePoint(kp1.position);
                        const pos2 = this.scalePoint(kp2.position);
                        
                        // 绘制骨架连线
                        this.ctx.beginPath();
                        this.ctx.moveTo(pos1.x, pos1.y);
                        this.ctx.lineTo(pos2.x, pos2.y);
                        this.ctx.lineWidth = 4;
                        this.ctx.strokeStyle = '#00ff00';
                        this.ctx.lineCap = 'round';
                        this.ctx.stroke();
                        this.ctx.closePath();
                        
                        // 绘制骨架连线边框
                        this.ctx.beginPath();
                        this.ctx.moveTo(pos1.x, pos1.y);
                        this.ctx.lineTo(pos2.x, pos2.y);
                        this.ctx.lineWidth = 6;
                        this.ctx.strokeStyle = '#004400';
                        this.ctx.lineCap = 'round';
                        this.ctx.stroke();
                        this.ctx.closePath();
                        
                        // 重新绘制主线
                        this.ctx.beginPath();
                        this.ctx.moveTo(pos1.x, pos1.y);
                        this.ctx.lineTo(pos2.x, pos2.y);
                        this.ctx.lineWidth = 4;
                        this.ctx.strokeStyle = '#00ff00';
                        this.ctx.lineCap = 'round';
                        this.ctx.stroke();
                        this.ctx.closePath();
                    }
                });
            }
            
            scalePoint(position) {
                return {
                    x: (position.x / this.video.videoWidth) * this.canvas.width,
                    y: (position.y / this.video.videoHeight) * this.canvas.height
                };
            }
            
            getKeypointColor(part) {
                const colors = {
                    'nose': '#ff0000',
                    'leftEye': '#00ff00', 'rightEye': '#00ff00',
                    'leftEar': '#0000ff', 'rightEar': '#0000ff',
                    'leftShoulder': '#ffff00', 'rightShoulder': '#ffff00',
                    'leftElbow': '#ff00ff', 'rightElbow': '#ff00ff',
                    'leftWrist': '#00ffff', 'rightWrist': '#00ffff',
                    'leftHip': '#ffa500', 'rightHip': '#ffa500',
                    'leftKnee': '#800080', 'rightKnee': '#800080',
                    'leftAnkle': '#008000', 'rightAnkle': '#008000'
                };
                return colors[part] || '#ffffff';
            }
            
            getAdjacentKeyPoints() {
                return [
                    [5, 6], [5, 7], [6, 8], [7, 9], [8, 10], // 肩膀到手腕
                    [5, 11], [6, 12], [11, 12], // 肩膀到臀部
                    [11, 13], [12, 14], [13, 15], [14, 16], // 臀部到脚踝
                    [0, 1], [0, 2], [1, 3], [2, 4] // 头部
                ];
            }
            
            updatePoseInfo() {
                if (!this.currentPose) {
                    this.poseInfo.textContent = '等待检测...';
                    return;
                }
                
                const validKeypoints = this.currentPose.keypoints.filter(kp => kp.score > 0.3);
                const confidence = (this.currentPose.score * 100).toFixed(1);
                
                this.poseInfo.textContent = `检测到 ${validKeypoints.length}/17 个关键点，整体置信度: ${confidence}%`;
                
                // 显示详细信息
                const detailsHtml = validKeypoints.slice(0, 8).map(kp => `
                    <div class="pose-item">
                        <strong>${kp.part}</strong><br>
                        置信度: ${(kp.score * 100).toFixed(1)}%<br>
                        位置: (${kp.position.x.toFixed(0)}, ${kp.position.y.toFixed(0)})
                    </div>
                `).join('');
                
                this.keypointsDiv.innerHTML = detailsHtml;
            }
        }
        
        // 初始化应用
        document.addEventListener('DOMContentLoaded', () => {
            new PoseDetector();
        });
        
        // 错误处理
        window.addEventListener('error', (e) => {
            console.error('应用错误:', e.error);
            document.getElementById('status').textContent = '应用发生错误: ' + e.error.message;
        });
    </script>
</body>
</html>
