<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>模拟膈肌的运动 - 生物交互课件</title>
    <style>
        :root {
            --glass-color: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.4);
            --balloon-color: #ff7043;
            --rubber-color: #e6ccb2; /* 肤色/橡胶色 */
        }

        body {
            margin: 0;
            padding: 0;
            font-family: "Microsoft YaHei", sans-serif;
            background-color: #263238; /* 黑板/深色背景 */
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* 1. 顶部标题 */
        header {
            width: 100%;
            padding: 20px 0;
            text-align: center;
            border-bottom: 1px solid #37474f;
            background: #1e272c;
        }
        h1 { margin: 0; font-size: 24px; font-weight: normal; }
        .subtitle { font-size: 14px; color: #b0bec5; margin-top: 5px; }

        /* 2. 中间实验区 */
        .stage {
            position: relative;
            width: 800px;
            height: 500px;
            margin: 20px 0;
            background: radial-gradient(circle at center, #37474f 0%, #263238 70%);
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 装置主体 */
        .apparatus {
            position: relative;
            width: 300px;
            height: 400px;
            /* border: 1px dashed #555; 调试用 */
        }

        /* 玻璃管 (气管) */
        .trachea {
            position: absolute;
            top: 20px;
            left: 140px;
            width: 20px;
            height: 100px;
            background: rgba(255,255,255,0.5);
            border-left: 1px solid rgba(255,255,255,0.8);
            border-right: 1px solid rgba(255,255,255,0.8);
            z-index: 5;
        }
        /* 瓶塞 */
        .stopper {
            position: absolute;
            top: 60px;
            left: 125px;
            width: 50px;
            height: 30px;
            background: #fdd835; /* 黄色塞子 */
            border-radius: 4px;
            z-index: 6;
        }

        /* 玻璃罩 (胸廓) */
        .bell-jar {
            position: absolute;
            top: 80px;
            left: 50px;
            width: 200px;
            height: 220px;
            border: 3px solid var(--glass-border);
            border-bottom: none;
            border-radius: 100px 100px 0 0;
            background: var(--glass-color);
            backdrop-filter: blur(2px);
            z-index: 10;
            box-shadow: inset 10px 10px 20px rgba(255,255,255,0.1);
        }

        /* 支气管 (Y型管) */
        .bronchi {
            position: absolute;
            top: 110px;
            left: 140px;
            width: 20px;
            height: 40px;
            background: rgba(255,255,255,0.5);
            z-index: 4;
        }
        .bronchi::before, .bronchi::after {
            content: '';
            position: absolute;
            top: 30px;
            width: 15px;
            height: 30px;
            background: rgba(255,255,255,0.5);
            border-radius: 10px;
        }
        .bronchi::before { left: -10px; transform: rotate(30deg); }
        .bronchi::after { left: 15px; transform: rotate(-30deg); }

        /* 气球 (肺) */
        .balloon {
            position: absolute;
            top: 150px;
            width: 50px;
            height: 60px;
            background: radial-gradient(circle at 30% 30%, #ffab91, var(--balloon-color));
            border-radius: 50%;
            z-index: 5;
            transition: all 0.1s ease-out; /* 关键动画属性 */
            transform-origin: top center;
        }
        .balloon.left { left: 105px; }
        .balloon.right { left: 145px; }

        /* 底部橡胶膜 (膈肌) 系统 */
        .diaphragm-container {
            position: absolute;
            top: 300px; /* 连接玻璃罩底部 */
            left: 50px;
            width: 200px;
            height: 60px;
            /* border: 1px solid red; */
            overflow: visible;
            z-index: 9;
        }

        /* 橡胶膜本体 (使用 SVG 实现弯曲效果) */
        .rubber-membrane {
            width: 100%;
            height: 100%;
            fill: rgba(255, 255, 255, 0.3);
            stroke: rgba(255, 255, 255, 0.6);
            stroke-width: 2;
        }

        /* 底部托盘/手持部分 */
        .handle-plate {
            position: absolute;
            left: -10px;
            width: 220px;
            height: 10px;
            background: #eee;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
            transition: top 0.1s ease-out;
            cursor: grab;
        }
        
        /* 手 */
        .hand {
            position: absolute;
            left: 60px;
            top: 10px;
            width: 100px;
            height: 120px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120"><path d="M20,10 Q10,40 10,60 Q10,100 40,110 L80,110 L80,60 Q80,10 50,0 Z" fill="%23f0c69e" stroke="none"/></svg>'); /* 简单的手形状 */
            background-size: contain;
            background-repeat: no-repeat;
            opacity: 0.9;
        }

        /* 标签线 */
        .label-line {
            position: absolute;
            height: 1px;
            background: #aaa;
            z-index: 20;
        }
        .label-text {
            position: absolute;
            font-size: 14px;
            color: #ddd;
            white-space: nowrap;
        }

        /* 控制按钮 */
        .controls {
            position: absolute;
            bottom: 20px;
            display: flex;
            gap: 20px;
            align-items: center;
            background: rgba(0,0,0,0.5);
            padding: 10px 20px;
            border-radius: 30px;
        }

        button {
            background: #4caf50;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 20px;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.3s;
        }
        button:hover { background: #43a047; }
        
        /* 滑块样式 */
        input[type=range] {
            width: 150px;
            cursor: pointer;
        }

        /* 3. 底部说明 */
        .footer {
            max-width: 800px;
            padding: 20px;
            text-align: left;
            line-height: 1.6;
            color: #cfd8dc;
            background: #1e272c;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .highlight { color: #ffab91; font-weight: bold; }

    </style>
</head>
<body>

    <header>
        <h1>模拟膈肌的运动</h1>
        <div class="subtitle">可交互式微课件 - 生物学</div>
    </header>

    <div class="stage">
        
        <!-- 标注 -->
        <div style="position: absolute; top: 40px; right: 250px;">
            <div class="label-text" style="right: -60px; top: -10px;">玻璃管 (气管)</div>
            <div class="label-line" style="width: 100px; right: 40px; top: 0;"></div>
        </div>
        <div style="position: absolute; top: 120px; left: 200px;">
            <div class="label-text" style="left: -60px; top: -10px;">玻璃罩 (胸廓)</div>
            <div class="label-line" style="width: 60px; left: 40px; top: 0;"></div>
        </div>
        <div style="position: absolute; top: 200px; right: 220px;">
            <div class="label-text" style="right: -40px; top: -10px;">气球 (肺)</div>
            <div class="label-line" style="width: 100px; right: 40px; top: 0;"></div>
        </div>
        <div style="position: absolute; bottom: 160px; left: 200px;">
            <div class="label-text" style="left: -60px; top: -10px;">橡皮膜 (膈)</div>
            <div class="label-line" style="width: 60px; left: 40px; top: 0;"></div>
        </div>


        <!-- 装置 -->
        <div class="apparatus">
            <div class="trachea"></div>
            <div class="stopper"></div>
            <div class="bronchi"></div>
            
            <!-- 气球 -->
            <div class="balloon left" id="balloonL"></div>
            <div class="balloon right" id="balloonR"></div>

            <div class="bell-jar"></div>

            <!-- 膈肌部分 -->
            <div class="diaphragm-container">
                <!-- SVG 绘制弯曲的膜 -->
                <svg class="rubber-membrane" viewBox="0 0 200 60">
                    <!-- 控制点 y 将随 JS 变化 -->
                    <path id="membranePath" d="M0,0 Q100,-30 200,0" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
                </svg>

                <!-- 手柄/底部 -->
                <div class="handle-plate" id="handlePlate" style="top: 0px;">
                    <div class="hand"></div>
                    <!-- 箭头指示 -->
                    <div style="position:absolute; right: -30px; top:0; color:#4fc3f7; font-size:20px;">↕</div>
                </div>
            </div>
        </div>

        <!-- 控制栏 -->
        <div class="controls">
            <button id="playBtn" onclick="togglePlay()">
                <span id="playIcon">▶</span> <span id="playText">自动演示</span>
            </button>
            <div style="display: flex; align-items: center; gap: 10px; color: #ccc; font-size: 14px;">
                <span>呼气 (推)</span>
                <input type="range" id="rangeInput" min="0" max="100" value="50" oninput="manualControl(this.value)">
                <span>吸气 (拉)</span>
            </div>
        </div>

    </div>

    <div class="footer">
        <p><strong>实验原理：</strong>本装置展示了呼吸运动的原理。</p>
        <ul>
            <li><strong>吸气过程：</strong>手向下拉橡皮膜（模拟<span class="highlight">膈肌收缩</span>，位置下降），玻璃罩内（胸廓）容积增大，气压减小，外界空气进入气球，气球<span class="highlight">变大</span>。</li>
            <li><strong>呼气过程：</strong>手向上推橡皮膜（模拟<span class="highlight">膈肌舒张</span>，位置上升），玻璃罩内（胸廓）容积减小，气压增大，气球内气体排出，气球<span class="highlight">变小</span>。</li>
        </ul>
        <p><strong>适用教科书：</strong>人教版、北师大版、苏教版等初中生物教材《人体的呼吸》章节。</p>
    </div>

    <script>
        const balloonL = document.getElementById('balloonL');
        const balloonR = document.getElementById('balloonR');
        const handlePlate = document.getElementById('handlePlate');
        const membranePath = document.getElementById('membranePath');
        const rangeInput = document.getElementById('rangeInput');
        const playBtn = document.getElementById('playBtn');
        const playIcon = document.getElementById('playIcon');
        const playText = document.getElementById('playText');

        let isPlaying = false;
        let animationFrame;
        let time = 0;

        // 核心渲染函数：根据 0-100 的值更新 UI
        // value: 0 (最上/呼气) -> 100 (最下/吸气)
        function render(value) {
            // 1. 气球大小 (0 -> scale 0.7, 100 -> scale 1.2)
            const scale = 0.7 + (value / 100) * 0.5;
            balloonL.style.transform = `scale(${scale})`;
            balloonR.style.transform = `scale(${scale})`;

            // 2. 手柄位置 (0 -> -20px, 100 -> 40px)
            // 负值表示向上推入玻璃罩内部
            const plateY = -30 + (value / 100) * 70;
            handlePlate.style.top = `${plateY}px`;

            // 3. 橡胶膜曲率 (SVG Path)
            // 0 (Top): Q100,-50 (拱起)
            // 50 (Mid): Q100,0 (平)
            // 100 (Bot): Q100,40 (凹陷 - 虽然物理上拉不到这么凹，但为了视觉效果)
            
            // 实际上，手柄的位置就是膜的中心点位置。
            // SVG 视口高 60。M0,0 和 M200,0 是罩子底边。
            // 我们让曲线控制点跟随 plateY。
            // 当 value=0, plateY=-30, 曲线向上拱。
            // 当 value=100, plateY=40, 曲线向下凹。
            
            const curveY = plateY; 
            membranePath.setAttribute('d', `M0,0 Q100,${curveY} 200,0`);
        }

        // 手动控制
        function manualControl(val) {
            stopAnimation();
            render(val);
        }

        // 自动动画循环
        function animate() {
            // 使用正弦波模拟呼吸节奏
            time += 0.04;
            // sin 值域 -1 到 1，映射到 0 到 100
            const val = (Math.sin(time) + 1) * 50;
            
            render(val);
            rangeInput.value = val; // 同步滑块

            if (isPlaying) {
                animationFrame = requestAnimationFrame(animate);
            }
        }

        // 播放/暂停切换
        function togglePlay() {
            if (isPlaying) {
                stopAnimation();
            } else {
                isPlaying = true;
                playIcon.textContent = "||";
                playText.textContent = "暂停演示";
                animate();
            }
        }

        function stopAnimation() {
            isPlaying = false;
            cancelAnimationFrame(animationFrame);
            playIcon.textContent = "▶";
            playText.textContent = "自动演示";
        }

        // 初始化渲染 (中间状态)
        render(50);

    </script>
</body>
</html>
