<!-- 设计思路：
1. 将原有的简单界面升级为现代化、科技感强的教育互动界面
2. 使用渐变背景和卡片式布局增强视觉层次
3. 添加动画效果和粒子系统提升交互体验
4. 重新设计控制面板，使其更加直观美观
5. 加入数据可视化图表展示实时数据
6. 优化响应式设计适配各种设备
7. 使用更丰富的色彩搭配和阴影效果 -->

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <title>太阳能小车速度探究实验</title>
    <link href="https://cdn.staticfile.org/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <link href="https://cdn.staticfile.org/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;700&family=Noto+Serif+SC:wght@400;700&display=swap');
        
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #1a2a6c);
            overflow-x: hidden;
        }
        
        .solar-car-canvas {
            background: linear-gradient(to bottom, #87CEEB, #E0F7FA);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.2);
        }
        
        .control-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }
        
        .slider-container {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50px;
            padding: 15px 25px;
        }
        
        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 12px;
            border-radius: 10px;
            background: linear-gradient(to right, #3498db, #2ecc71);
            outline: none;
        }
        
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: white;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            border: 2px solid #3498db;
        }
        
        .speed-display {
            font-size: 2.5rem;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }
        
        .particle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.5);
            pointer-events: none;
        }
        
        .chart-container {
            height: 150px;
            background: rgba(0, 0, 0, 0.1);
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }
        
        .data-point {
            position: absolute;
            bottom: 0;
            width: 4px;
            background: #2ecc71;
            transition: height 0.3s ease;
        }
        
        .sun-beam {
            position: absolute;
            background: linear-gradient(to bottom, rgba(255, 215, 0, 0.7), transparent);
            transform-origin: top center;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-8 px-4">
    <!-- 粒子背景 -->
    <div id="particles" class="fixed inset-0 z-0"></div>
    
    <!-- 主标题 -->
    <header class="text-center mb-8 z-10">
        <h1 class="text-4xl md:text-5xl font-bold text-white mb-2 drop-shadow-lg">
            <i class="fas fa-solar-panel mr-3"></i>太阳能小车速度探究实验
        </h1>
        <p class="text-xl text-blue-100 max-w-2xl mx-auto">
            探索太阳能板面积与角度对小车速度的影响关系
        </p>
    </header>
    
    <!-- 控制面板 -->
    <div class="w-full max-w-6xl mb-8 z-10">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- 面积控制 -->
            <div class="control-card p-6">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-xl font-semibold text-white flex items-center">
                        <i class="fas fa-expand-arrows-alt mr-2 text-blue-300"></i>
                        太阳能板面积
                    </h2>
                    <span id="areaValueDisplay" class="text-2xl font-bold text-green-300">100</span>
                    <span class="text-white ml-1">cm²</span>
                </div>
                <div class="slider-container">
                    <input type="range" id="area" min="50" max="200" value="100" class="w-full">
                </div>
                <div class="flex justify-between text-sm text-gray-200 mt-2">
                    <span>最小</span>
                    <span>最大</span>
                </div>
            </div>
            
            <!-- 角度控制 -->
            <div class="control-card p-6">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-xl font-semibold text-white flex items-center">
                        <i class="fas fa-angle-double-up mr-2 text-yellow-300"></i>
                        太阳能板角度
                    </h2>
                    <span id="angleValueDisplay" class="text-2xl font-bold text-yellow-300">45</span>
                    <span class="text-white ml-1">°</span>
                </div>
                <div class="slider-container">
                    <input type="range" id="angle" min="0" max="90" value="45" class="w-full">
                </div>
                <div class="flex justify-between text-sm text-gray-200 mt-2">
                    <span>0°</span>
                    <span>90°</span>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 速度显示 -->
    <div class="w-full max-w-2xl mb-8 z-10">
        <div class="bg-gradient-to-r from-purple-600 to-blue-500 rounded-2xl p-6 shadow-xl">
            <div class="text-center">
                <p class="text-white text-lg mb-2">当前速度</p>
                <div class="speed-display text-white font-bold">
                    <span id="speed">0.00</span> m/s
                </div>
                <div class="mt-4 h-2 bg-black bg-opacity-20 rounded-full overflow-hidden">
                    <div id="speedBar" class="h-full bg-gradient-to-r from-green-400 to-yellow-400 rounded-full" style="width: 0%"></div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 画布区域 -->
    <div class="w-full max-w-6xl z-10">
        <div class="solar-car-canvas p-6">
            <canvas id="scene" width="800" height="300" class="w-full"></canvas>
        </div>
    </div>
    
    <!-- 数据图表 -->
    <div class="w-full max-w-4xl mt-8 z-10">
        <div class="control-card p-6">
            <h2 class="text-xl font-semibold text-white mb-4 flex items-center">
                <i class="fas fa-chart-line mr-2 text-green-300"></i>
                实时数据图表
            </h2>
            <div class="chart-container">
                <div id="dataChart" class="w-full h-full flex items-end justify-between px-2">
                    <!-- 动态生成数据点 -->
                </div>
            </div>
        </div>
    </div>
    
    <!-- 底部说明 -->
    <footer class="mt-8 text-center text-white z-10">
        <p class="text-lg">通过调整太阳能板面积和角度，观察对小车速度的影响</p>
        <p class="text-sm text-blue-200 mt-2">面积越大、角度越合适，小车速度越快</p>
    </footer>

    <script>
        // 创建背景粒子效果
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            const particleCount = 50;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                
                // 随机大小和位置
                const size = Math.random() * 10 + 2;
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                particle.style.left = `${Math.random() * 100}%`;
                particle.style.top = `${Math.random() * 100}%`;
                
                // 随机动画
                particle.style.animation = `float ${Math.random() * 10 + 10}s infinite ease-in-out`;
                particle.style.opacity = Math.random() * 0.5 + 0.1;
                
                particlesContainer.appendChild(particle);
            }
            
            // 添加CSS动画
            const style = document.createElement('style');
            style.textContent = `
                @keyframes float {
                    0%, 100% { transform: translate(0, 0); }
                    25% { transform: translate(${Math.random() * 100 - 50}px, ${Math.random() * 100 - 50}px); }
                    50% { transform: translate(${Math.random() * 100 - 50}px, ${Math.random() * 100 - 50}px); }
                    75% { transform: translate(${Math.random() * 100 - 50}px, ${Math.random() * 100 - 50}px); }
                }
            `;
            document.head.appendChild(style);
        }

        // 获取Canvas上下文
        const canvas = document.getElementById('scene');
        const ctx = canvas.getContext('2d');
        let carPosition = 50;
        
        // 太阳参数
        const sun = {
            x: 700,
            y: 50,
            radius: 30
        };

        // 绘制太阳
        function drawSun() {
            // 太阳本体
            ctx.beginPath();
            ctx.arc(sun.x, sun.y, sun.radius, 0, Math.PI * 2);
            const gradient = ctx.createRadialGradient(
                sun.x, sun.y, 0,
                sun.x, sun.y, sun.radius
            );
            gradient.addColorStop(0, '#FFFF00');
            gradient.addColorStop(1, '#FFA500');
            ctx.fillStyle = gradient;
            ctx.fill();
            
            // 太阳光线
            ctx.strokeStyle = 'rgba(255, 215, 0, 0.3)';
            ctx.lineWidth = 2;
            for (let i = 0; i < 12; i++) {
                const angle = (i * Math.PI / 6);
                const startX = sun.x + Math.cos(angle) * (sun.radius + 5);
                const startY = sun.y + Math.sin(angle) * (sun.radius + 5);
                const endX = sun.x + Math.cos(angle) * (sun.radius + 20);
                const endY = sun.y + Math.sin(angle) * (sun.radius + 20);
                
                ctx.beginPath();
                ctx.moveTo(startX, startY);
                ctx.lineTo(endX, endY);
                ctx.stroke();
            }
        }

        // 绘制小车
        function drawCar(area, angle) {
            // 绘制车身
            ctx.fillStyle = '#e74c3c';
            ctx.fillRect(carPosition, 220, 80, 40);
            
            // 绘制车窗
            ctx.fillStyle = '#aed6f1';
            ctx.fillRect(carPosition + 10, 225, 30, 20);
            ctx.fillRect(carPosition + 40, 225, 30, 20);
            
            // 绘制车轮
            ctx.beginPath();
            ctx.fillStyle = '#2c3e50';
            ctx.arc(carPosition + 20, 260, 12, 0, Math.PI * 2);
            ctx.arc(carPosition + 60, 260, 12, 0, Math.PI * 2);
            ctx.fill();
            
            // 绘制车轮细节
            ctx.beginPath();
            ctx.fillStyle = '#ecf0f1';
            ctx.arc(carPosition + 20, 260, 6, 0, Math.PI * 2);
            ctx.arc(carPosition + 60, 260, 6, 0, Math.PI * 2);
            ctx.fill();
            
            // 绘制太阳能板
            ctx.save();
            ctx.translate(carPosition + 40, 220);
            ctx.rotate(-angle * Math.PI / 180);
            ctx.fillStyle = '#3498db';
            ctx.fillRect(-area / 4, -20, area / 2, 40);
            
            // 太阳能板网格
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.lineWidth = 1;
            for (let i = -area / 4; i < area / 4; i += area / 10) {
                ctx.beginPath();
                ctx.moveTo(i, -20);
                ctx.lineTo(i, 20);
                ctx.stroke();
            }
            for (let i = -20; i < 20; i += 10) {
                ctx.beginPath();
                ctx.moveTo(-area / 4, i);
                ctx.lineTo(area / 4, i);
                ctx.stroke();
            }
            ctx.restore();
        }

        // 计算速度
        function calculateSpeed(area, angle) {
            const angleEffect = Math.cos(angle * Math.PI / 180);
            const areaEffect = area / 100;
            return Math.min(angleEffect * areaEffect * 4, 3.5).toFixed(2);
        }

        // 数据图表数组
        let dataPoints = Array(50).fill(0);

        // 更新数据图表
        function updateChart(speed) {
            // 移除第一个数据点，添加新数据点
            dataPoints.shift();
            dataPoints.push(parseFloat(speed));
            
            const chartContainer = document.getElementById('dataChart');
            chartContainer.innerHTML = '';
            
            const maxValue = Math.max(...dataPoints, 3.5);
            
            dataPoints.forEach((value, index) => {
                const point = document.createElement('div');
                point.className = 'data-point';
                point.style.height = `${(value / maxValue) * 100}%`;
                point.style.backgroundColor = value > 2.5 ? '#2ecc71' : value > 1.5 ? '#f39c12' : '#3498db';
                chartContainer.appendChild(point);
            });
        }

        // 动画循环
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const area = parseInt(document.getElementById('area').value);
            const angle = parseInt(document.getElementById('angle').value);
            const speed = calculateSpeed(area, angle);
            
            // 更新显示值
            document.getElementById('areaValueDisplay').textContent = area;
            document.getElementById('angleValueDisplay').textContent = angle;
            document.getElementById('speed').textContent = speed;
            
            // 更新速度条
            const speedPercentage = (parseFloat(speed) / 3.5) * 100;
            document.getElementById('speedBar').style.width = `${speedPercentage}%`;
            
            // 更新图表
            updateChart(speed);
            
            // 绘制场景
            drawSun();
            drawCar(area, angle);
            
            // 更新小车位置
            carPosition = (carPosition + parseFloat(speed) * 0.6) % (canvas.width + 100);
            
            requestAnimationFrame(animate);
        }

        // 初始化事件监听
        document.getElementById('area').addEventListener('input', () => {
            carPosition = 50;
        });
        
        document.getElementById('angle').addEventListener('input', () => {
            carPosition = 50;
        });

        // 初始化
        window.onload = function() {
            createParticles();
            animate();
        };
    </script>
</body>
</html>
