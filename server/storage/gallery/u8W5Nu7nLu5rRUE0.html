<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>微波加热原理：宏观与微观结合演示</title>
    <style>
        body {
            margin: 0;
            background: #2c3e50;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        h2 { margin: 10px 0; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }

        /* 模拟微波炉外壳 */
        #microwave-container {
            position: relative;
            width: 800px;
            height: 500px;
            background: #dcdcdc;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            display: flex;
            overflow: hidden;
            border: 5px solid #bdc3c7;
        }

        /* 内部加热腔 */
        .chamber {
            flex: 1;
            background: #1a1a1a; /* 暗色内部 */
            position: relative;
            margin: 20px;
            border-radius: 10px;
            border: 2px solid #555;
            overflow: hidden;
            cursor: crosshair;
        }

        /* 侧边控制面板 */
        .panel {
            width: 150px;
            background: #ecf0f1;
            border-left: 2px solid #bdc3c7;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            color: #333;
        }

        /* 液晶屏 */
        .lcd {
            background: #000;
            color: #0f0;
            font-family: 'Courier New', monospace;
            font-size: 24px;
            padding: 10px;
            text-align: center;
            border-radius: 5px;
            margin-bottom: 10px;
            box-shadow: inset 0 0 5px #0f0;
        }

        /* 按钮 */
        button {
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 3px 0 rgba(0,0,0,0.2);
        }
        button:active { transform: translateY(3px); box-shadow: none; }
        
        .btn-start { background: #e74c3c; color: white; font-size: 16px; }
        .btn-reset { background: #95a5a6; color: white; }

        .legend {
            font-size: 12px;
            background: white;
            padding: 10px;
            border-radius: 5px;
            margin-top: auto;
        }
        .legend-item { display: flex; align-items: center; margin-bottom: 5px; gap: 5px;}
        .dot { width: 10px; height: 10px; border-radius: 50%; }

        /* 画布 */
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

    </style>
</head>
<body>

    <h2>微波原理：宏观与微观同步演示</h2>

    <div id="microwave-container">
        <!-- 加热腔体 -->
        <div class="chamber">
            <canvas id="mainCanvas"></canvas>
            
            <!-- 覆盖在上面的网状屏蔽层效果 -->
            <div style="position:absolute; top:0; left:0; width:100%; height:100%; background: radial-gradient(circle, transparent 2px, rgba(0,0,0,0.5) 2px) 0 0/4px 4px; pointer-events:none; opacity:0.3;"></div>
        </div>

        <!-- 控制面板 -->
        <div class="panel">
            <div class="lcd" id="timer">00:00</div>
            <button class="btn-start" onclick="togglePower()">启动 / 暂停</button>
            <button class="btn-reset" onclick="reset()">重置</button>
            
            <div style="text-align:center; font-weight:bold;">当前温度</div>
            <div class="lcd" style="font-size:18px; color:red;" id="temp-display">20°C</div>

            <div class="legend">
                <div style="border-bottom:1px solid #ccc; margin-bottom:5px;">图例说明</div>
                <div class="legend-item"><span class="dot" style="background:red"></span> 氢原子 (+)</div>
                <div class="legend-item"><span class="dot" style="background:blue"></span> 氧原子 (-)</div>
                <div class="legend-item"><span style="color:rgba(0,255,0,0.5); font-weight:bold;">〰〰</span> 微波电场</div>
                <div class="legend-item">🔍 放大镜内展示分子运动</div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        let width, height;

        // 响应式画布
        function resize() {
            width = canvas.offsetWidth;
            height = canvas.offsetHeight;
            canvas.width = width;
            canvas.height = height;
        }
        window.addEventListener('resize', resize);
        resize();

        // === 状态变量 ===
        let isRunning = false;
        let time = 0; // 动画时间
        let temperature = 20; // 食物温度
        let rotationAngle = 0; // 转盘角度
        let wavePhase = 0; // 微波相位

        // === 物理常数 ===
        const MOLECULE_COUNT = 40;
        const LENS_RADIUS = 120; // 放大镜半径
        const WAVE_SPEED = 0.3;
        
        // === 分子类 ===
        class Molecule {
            constructor() {
                // 在放大镜区域内随机分布
                const angle = Math.random() * Math.PI * 2;
                const r = Math.random() * (LENS_RADIUS - 20);
                this.relX = Math.cos(angle) * r;
                this.relY = Math.sin(angle) * r;
                
                this.angle = Math.random() * Math.PI * 2;
                this.angularVel = 0;
            }

            update(electricField) {
                // 1. 电场力矩：极性分子试图与电场对齐
                // 如果电场向上，氧原子(-)向下转，氢原子(+)向上转 -> 目标角度 -PI/2
                // 如果电场向下，目标角度 PI/2
                
                if (isRunning) {
                    const targetAngle = electricField > 0 ? Math.PI / 2 : -Math.PI / 2;
                    
                    // 计算角度差
                    let diff = targetAngle - this.angle;
                    while (diff > Math.PI) diff -= Math.PI * 2;
                    while (diff < -Math.PI) diff += Math.PI * 2;

                    // 施加力矩 (与电场强度成正比)
                    const torque = Math.abs(electricField) * 0.15;
                    this.angularVel += diff * torque;

                    // 摩擦生热：动能 -> 热能 -> 随机抖动
                    if (Math.abs(this.angularVel) > 0.05) {
                        temperature += 0.02; // 升温
                    }
                }

                // 2. 热运动 (温度越高，随机抖动越大)
                const heatJitter = (temperature - 20) * 0.002;
                this.angularVel += (Math.random() - 0.5) * heatJitter;

                // 3. 阻尼 (模拟液体粘滞)
                this.angularVel *= 0.85;
                this.angle += this.angularVel;
            }

            draw(ctx, centerX, centerY) {
                ctx.save();
                ctx.translate(centerX + this.relX, centerY + this.relY);
                ctx.rotate(this.angle);

                // 绘制水分子 (H2O)
                // 氧原子 (负极)
                ctx.beginPath();
                ctx.arc(0, 0, 8, 0, Math.PI * 2);
                ctx.fillStyle = "#3498db"; // 蓝
                ctx.fill();
                ctx.fillStyle = "white";
                ctx.font = "10px Arial";
                ctx.fillText("-", -3, 3);

                // 氢原子 (正极) - 两个耳朵
                ctx.fillStyle = "#e74c3c"; // 红
                // H1
                ctx.beginPath();
                ctx.arc(8, -5, 5, 0, Math.PI * 2);
                ctx.fill();
                // H2
                ctx.beginPath();
                ctx.arc(8, 5, 5, 0, Math.PI * 2);
                ctx.fill();

                // 连接键
                ctx.strokeStyle = "rgba(255,255,255,0.5)";
                ctx.lineWidth = 2;
                ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(8, -5); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(8, 5); ctx.stroke();

                ctx.restore();
            }
        }

        // 初始化分子
        const molecules = Array.from({ length: MOLECULE_COUNT }, () => new Molecule());

        // === 动画循环 ===
        function animate() {
            ctx.clearRect(0, 0, width, height);

            const centerX = width / 2;
            const centerY = height / 2 + 30;

            // 1. 绘制转盘
            if (isRunning) rotationAngle += 0.01;
            drawTurntable(centerX, centerY + 120);

            // 2. 绘制食物 (宏观) - 放在转盘上
            // 颜色随温度变化: 米色 -> 红色
            const heatFactor = Math.min(1, (temperature - 20) / 80);
            const foodR = 240;
            const foodG = 230 - 150 * heatFactor;
            const foodB = 200 - 180 * heatFactor;
            const foodColor = `rgb(${foodR}, ${foodG}, ${foodB})`;

            ctx.save();
            ctx.translate(centerX, centerY);
            // 模拟转盘带来的轻微左右移动
            ctx.translate(Math.cos(rotationAngle)*20, 0); 
            
            // 画一只简化的鸡/肉块
            ctx.fillStyle = foodColor;
            ctx.beginPath();
            ctx.ellipse(0, 0, 140, 90, 0, 0, Math.PI * 2);
            ctx.fill();
            // 加点纹理
            ctx.strokeStyle = "rgba(0,0,0,0.1)";
            ctx.lineWidth = 3;
            ctx.beginPath(); ctx.arc(0, -20, 60, 0.2, Math.PI-0.2); ctx.stroke();
            
            // 冒热气
            if (temperature > 50) drawSteam(ctx, 0, -80, heatFactor);
            ctx.restore();


            // 3. 绘制电磁波 (微波) - 贯穿整个画面
            if (isRunning) {
                wavePhase += WAVE_SPEED;
                drawWaves(ctx, centerX, centerY);
            }

            // 4. 绘制放大镜 (微观世界)
            drawMagnifyingLens(ctx, centerX, centerY);

            // 5. 更新UI
            updateUI();
            
            requestAnimationFrame(animate);
        }

        // === 绘制函数组件 ===

        function drawTurntable(x, y) {
            ctx.save();
            ctx.translate(x, y);
            ctx.scale(1, 0.3); // 压扁成椭圆，模拟透视
            ctx.beginPath();
            ctx.arc(0, 0, 200, 0, Math.PI*2);
            ctx.fillStyle = "rgba(255,255,255,0.3)";
            ctx.fill();
            ctx.lineWidth = 5;
            ctx.strokeStyle = "#888";
            ctx.stroke();
            
            // 转盘上的纹理
            ctx.rotate(rotationAngle);
            ctx.beginPath();
            ctx.moveTo(0, -200); ctx.lineTo(0, 200);
            ctx.moveTo(-200, 0); ctx.lineTo(200, 0);
            ctx.strokeStyle = "rgba(0,0,0,0.1)";
            ctx.stroke();
            ctx.restore();
        }

        function drawWaves(ctx, cx, cy) {
            ctx.save();
            ctx.beginPath();
            ctx.strokeStyle = "rgba(0, 255, 0, 0.4)";
            ctx.lineWidth = 3;
            
            // 在整个宽度上画正弦波
            for (let x = 0; x < width; x += 5) {
                // 计算当前x处的电场强度
                // 波从左向右传播
                const dist = (x - cx) * 0.05;
                const amplitude = 180; // 波的幅度
                const fieldY = Math.sin(dist - wavePhase) * amplitude;
                
                const y = cy + fieldY;
                if (x === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.stroke();
            ctx.restore();
        }

        function drawMagnifyingLens(ctx, cx, cy) {
            // 绘制放大镜外框
            ctx.save();
            ctx.translate(cx, cy);
            
            // 镜片背景
            ctx.beginPath();
            ctx.arc(0, 0, LENS_RADIUS, 0, Math.PI*2);
            ctx.fillStyle = "rgba(0, 0, 0, 0.8)"; // 深色背景，突出分子
            ctx.fill();
            
            // 边框
            ctx.lineWidth = 8;
            ctx.strokeStyle = "#fff";
            ctx.stroke();
            
            // 标注
            ctx.fillStyle = "white";
            ctx.font = "bold 14px Arial";
            ctx.textAlign = "center";
            ctx.fillText("微观放大镜：水分子视角", 0, -LENS_RADIUS - 15);

            // 限制绘制区域在放大镜内
            ctx.beginPath();
            ctx.arc(0, 0, LENS_RADIUS - 4, 0, Math.PI*2);
            ctx.clip();

            // === 绘制分子 ===
            // 计算穿过放大镜中心的电场强度
            // 这里为了简化，假设放大镜内的电场是均匀变化的（只看中心点相位）
            const fieldStrength = isRunning ? Math.sin(-wavePhase) : 0;
            
            // 绘制背景波纹（在放大镜里显示的更明显）
            if (isRunning) {
                const alpha = Math.abs(fieldStrength) * 0.5;
                const color = fieldStrength > 0 ? `rgba(255,0,0,${alpha})` : `rgba(0,0,255,${alpha})`;
                ctx.fillStyle = color;
                ctx.fillRect(-LENS_RADIUS, -LENS_RADIUS, LENS_RADIUS*2, LENS_RADIUS*2);
                
                // 电场方向箭头
                ctx.fillStyle = "white";
                ctx.font = "40px Arial";
                const arrow = fieldStrength > 0 ? "↓ E" : "↑ E"; // 注意Canvas Y轴向下为正
                if (Math.abs(fieldStrength) > 0.2) ctx.fillText(arrow, 0, 0);
            }

            // 更新并绘制每一个分子
            molecules.forEach(m => {
                m.update(fieldStrength); // 传入电场强度
                m.draw(ctx, 0, 0);
            });

            ctx.restore();
        }

        function drawSteam(ctx, x, y, intensity) {
            ctx.save();
            ctx.translate(x, y);
            ctx.globalAlpha = 0.6;
            ctx.strokeStyle = "white";
            ctx.lineWidth = 4;
            
            const timeOffset = Date.now() / 300;
            
            for(let i=-1; i<=1; i++) {
                ctx.beginPath();
                const startX = i * 30;
                // 让蒸汽动起来
                const wave = Math.sin(timeOffset + i);
                ctx.moveTo(startX, 0);
                ctx.bezierCurveTo(
                    startX + 10 + wave*10, -30, 
                    startX - 10 - wave*10, -60, 
                    startX + wave*5, -90
                );
                ctx.stroke();
            }
            ctx.restore();
        }

        function updateUI() {
            // 温度自然冷却
            if (!isRunning && temperature > 20) {
                temperature -= 0.1;
            }
            document.getElementById('temp-display').innerText = Math.floor(temperature) + "°C";
            
            if (isRunning) {
                const now = new Date();
                // 简单的计时动画
                const sec = Math.floor((Date.now() / 1000) % 60).toString().padStart(2, '0');
                const msec = Math.floor((Date.now() / 10) % 100).toString().padStart(2, '0');
                document.getElementById('timer').innerText = `${sec}:${msec}`;
            }
        }

        // === 控制函数 ===
        function togglePower() {
            isRunning = !isRunning;
            const btn = document.querySelector('.btn-start');
            if(isRunning) {
                btn.innerText = "暂停加热";
                btn.style.background = "#c0392b";
            } else {
                btn.innerText = "启动加热";
                btn.style.background = "#e74c3c";
            }
        }

        function reset() {
            isRunning = false;
            temperature = 20;
            time = 0;
            rotationAngle = 0;
            document.getElementById('timer').innerText = "00:00";
            document.querySelector('.btn-start').innerText = "启动加热";
            document.querySelector('.btn-start').style.background = "#e74c3c";
        }

        // 开始动画
        animate();

    </script>
</body>
</html>
