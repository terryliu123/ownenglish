<!--
设计思路:
1. 视觉风格：采用现代科技蓝主题，结合渐变背景营造专业感，使用圆角和阴影增强层次感
2. 布局结构：响应式网格系统，支持移动端和桌面端自适应显示
3. 交互体验：
   - 数字卡片悬停时轻微上浮和阴影增强效果
   - 点击选中卡片时添加脉冲动画效果
   - 匹配成功时卡片缩放并淡出，失败时摇晃提示
   - 添加进度条显示游戏完成度
4. 时间显示优化：
   - 固定宽度数字显示防止跳动
   - 使用monospace字体保证数字宽度一致
   - 只显示秒数，避免格式变化
5. 功能优化：
   - 添加计时器功能增加挑战性
   - 添加音效反馈提升互动体验
   - 添加游戏说明区域帮助用户理解规则
6. 字体排版：使用Noto Sans SC作为主要字体，确保中文显示美观
7. 图标元素：引入Font Awesome图标库增强视觉表现力
-->

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>单位换算挑战 - 秒计时版</title>
    <link href="https://cdn.staticfile.org/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <link href="https://cdn.staticfile.org/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .game-card {
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.3);
            border-radius: 25px;
            overflow: hidden;
            background: white;
            max-width: 900px;
            width: 100%;
        }
        
        .header {
            background: linear-gradient(90deg, #2196F3 0%, #21CBF3 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 18px;
            padding: 25px;
        }
        
        @media (max-width: 768px) {
            .grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 15px;
                padding: 20px;
            }
        }
        
        @media (max-width: 480px) {
            .grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
                padding: 15px;
            }
        }
        
        .card {
            background: white;
            border: 3px solid #2196F3;
            border-radius: 15px;
            padding: 25px 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 700;
            font-size: 1.3rem;
            box-shadow: 0 5px 15px rgba(33, 150, 243, 0.2);
            position: relative;
            overflow: hidden;
            aspect-ratio: 1/1;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 25px rgba(33, 150, 243, 0.3);
        }
        
        .card.selected {
            background: #BBDEFB;
            transform: scale(0.95);
            box-shadow: 0 0 20px rgba(33, 150, 243, 0.5);
            animation: pulse 0.6s;
        }
        
        .card.removed {
            opacity: 0;
            transform: scale(0);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(33, 150, 243, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(33, 150, 243, 0); }
            100% { box-shadow: 0 0 0 0 rgba(33, 150, 243, 0); }
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-8px); }
            40%, 80% { transform: translateX(8px); }
        }
        
        .card.wrong {
            animation: shake 0.6s;
        }
        
        .controls {
            padding: 25px;
            text-align: center;
            background: #f5f9ff;
            border-top: 2px solid #e3f2fd;
        }
        
        .btn {
            background: linear-gradient(90deg, #2196F3 0%, #21CBF3 100%);
            color: white;
            border: none;
            padding: 15px 35px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 700;
            font-size: 1.1rem;
            box-shadow: 0 6px 15px rgba(33, 150, 243, 0.4);
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        
        .btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(33, 150, 243, 0.5);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .message {
            min-height: 40px;
            font-weight: 700;
            margin: 20px 0;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .success {
            color: #4CAF50;
        }
        
        .error {
            color: #F44336;
        }
        
        .progress-container {
            padding: 0 25px 20px;
        }
        
        .progress-bar {
            height: 12px;
            background: #e3f2fd;
            border-radius: 6px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #2196F3 0%, #21CBF3 100%);
            border-radius: 6px;
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .timer {
            font-family: 'Roboto Mono', monospace;
            font-size: 2rem;
            font-weight: 700;
            color: #2196F3;
            letter-spacing: 2px;
            min-width: 80px;
            text-align: center;
            transition: all 0.3s ease;
            display: inline-block;
        }
        
        .instructions {
            background: #e3f2fd;
            padding: 20px;
            border-radius: 15px;
            margin: 20px 25px;
            font-size: 1rem;
            border-left: 5px solid #2196F3;
        }
        
        .instructions h3 {
            margin-top: 0;
            color: #0D47A1;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .stats {
            display: flex;
            justify-content: space-around;
            padding: 20px 25px;
            background: #f5f9ff;
            font-weight: 600;
            border-bottom: 2px solid #e3f2fd;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-label {
            font-size: 1rem;
            color: #666;
            margin-bottom: 5px;
        }
        
        .stat-value {
            font-family: 'Roboto Mono', monospace;
            font-size: 1.8rem;
            color: #2196F3;
            font-weight: 700;
            min-width: 50px;
            display: inline-block;
        }
        
        .unit-display {
            font-size: 1.1rem;
            color: #2196F3;
        }
        
        .time-section {
            text-align: center;
            padding: 15px 0;
            background: #e3f2fd;
            border-top: 2px solid #bbdefb;
        }
        
        .time-label {
            font-size: 1.1rem;
            color: #0D47A1;
            margin-bottom: 5px;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="game-card">
        <div class="header">
            <h1 class="text-4xl md:text-5xl font-bold flex items-center justify-center gap-4">
                <i class="fas fa-exchange-alt"></i>
                单位换算挑战
            </h1>
            <p class="mt-3 text-xl opacity-90">找到相等的单位配对</p>
        </div>
        
        <div class="stats">
            <div class="stat-item">
                <div class="stat-label">步数</div>
                <div class="stat-value" id="moves">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">匹配</div>
                <div class="stat-value" id="matches">0<span class="unit-display">/8</span></div>
            </div>
        </div>
        
        <div class="time-section">
            <div class="time-label">游戏时间 (秒)</div>
            <div class="timer" id="time">0</div>
        </div>
        
        <div class="progress-container">
            <div class="progress-bar">
                <div class="progress-fill" id="progress" style="width: 0%"></div>
            </div>
        </div>
        
        <div class="instructions">
            <h3><i class="fas fa-info-circle"></i> 游戏说明</h3>
            <p>点击两张卡片，如果它们表示相同的数值则会消失。目标是消除所有卡片！<br>注意：每张卡片上的数值都是唯一的整数。</p>
        </div>
        
        <div class="grid" id="grid"></div>
        
        <div class="controls">
            <div class="message" id="message"></div>
            <button class="btn" onclick="startNewGame()">
                <i class="fas fa-sync-alt"></i> 新游戏
            </button>
        </div>
    </div>

    <script>
        // 唯一整数数据池（共30组不同配对）
        const UNIT_POOL = [
            // 长度单位（10组）
            [[100, 'cm'], [1, 'm']],
            [[200, 'cm'], [2, 'm']],
            [[300, 'cm'], [3, 'm']],
            [[400, 'cm'], [4, 'm']],
            [[500, 'cm'], [5, 'm']],
            [[600, 'cm'], [6, 'm']],
            [[700, 'cm'], [7, 'm']],
            [[800, 'cm'], [8, 'm']],
            [[900, 'cm'], [9, 'm']],
            [[1000, 'cm'], [10, 'm']],
            
            // 质量单位（10组）
            [[1000, 'g'], [1, 'kg']],
            [[2000, 'g'], [2, 'kg']],
            [[3000, 'g'], [3, 'kg']],
            [[4000, 'g'], [4, 'kg']],
            [[5000, 'g'], [5, 'kg']],
            [[6000, 'g'], [6, 'kg']],
            [[7000, 'g'], [7, 'kg']],
            [[8000, 'g'], [8, 'kg']],
            [[9000, 'g'], [9, 'kg']],
            [[10000, 'g'], [10, 'kg']],
            
            // 面积单位（10组）
            [[1, 'm²'], [10000, 'cm²']],
            [[2, 'm²'], [20000, 'cm²']],
            [[3, 'm²'], [30000, 'cm²']],
            [[4, 'm²'], [40000, 'cm²']],
            [[5, 'm²'], [50000, 'cm²']],
            [[6, 'm²'], [60000, 'cm²']],
            [[7, 'm²'], [70000, 'cm²']],
            [[8, 'm²'], [80000, 'cm²']],
            [[9, 'm²'], [90000, 'cm²']],
            [[10, 'm²'], [100000, 'cm²']]
        ];

        let currentPairs = [];
        let selectedCards = [];
        let moves = 0;
        let matches = 0;
        let startTime;
        let timerInterval;

        function startNewGame() {
            // 重置游戏状态
            moves = 0;
            matches = 0;
            updateStats();
            
            // 清除定时器
            if (timerInterval) clearInterval(timerInterval);
            startTime = new Date();
            timerInterval = setInterval(updateTimer, 1000);
            updateTimer();
            
            // 更新进度条
            document.getElementById('progress').style.width = '0%';
            document.getElementById('message').textContent = '';
            
            // 生成唯一数据
            const uniqueValues = new Set();
            const selectedPairs = [];
            
            // 随机选择8组配对
            while(selectedPairs.length < 8) {
                const pair = UNIT_POOL[Math.floor(Math.random() * UNIT_POOL.length)];
                const [a, b] = pair;
                if(!uniqueValues.has(a[0]) && !uniqueValues.has(b[0])) {
                    selectedPairs.push(pair);
                    uniqueValues.add(a[0]);
                    uniqueValues.add(b[0]);
                }
            }

            // 生成16个唯一数值
            currentPairs = shuffle(selectedPairs.flat().map(p => `${p[0]}${p[1]}`));
            renderGrid();
        }

        function renderGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            
            currentPairs.forEach(value => {
                const card = document.createElement('div');
                card.className = 'card';
                card.textContent = value;
                card.addEventListener('click', () => handleClick(card));
                grid.appendChild(card);
            });
        }

        function handleClick(card) {
            if(card.classList.contains('removed') || selectedCards.length >= 2) return;
            
            card.classList.add('selected');
            selectedCards.push(card);

            if(selectedCards.length === 2) {
                moves++;
                updateStats();
                setTimeout(checkMatch, 600);
            }
        }

        function checkMatch() {
            const [card1, card2] = selectedCards;
            const isValid = UNIT_POOL.some(pair => {
                const valA = `${pair[0][0]}${pair[0][1]}`;
                const valB = `${pair[1][0]}${pair[1][1]}`;
                return (card1.textContent === valA && card2.textContent === valB) ||
                       (card1.textContent === valB && card2.textContent === valA);
            });

            if(isValid) {
                selectedCards.forEach(card => {
                    card.classList.add('removed');
                });
                document.getElementById('message').innerHTML = '<span class="success"><i class="fas fa-check-circle"></i> 正确匹配！</span>';
                matches++;
                updateStats();
                
                // 更新进度条
                const progress = (matches / 8) * 100;
                document.getElementById('progress').style.width = `${progress}%`;
                
                checkWin();
            } else {
                selectedCards.forEach(card => {
                    card.classList.add('wrong');
                    setTimeout(() => {
                        card.classList.remove('selected', 'wrong');
                    }, 600);
                });
                document.getElementById('message').innerHTML = '<span class="error"><i class="fas fa-times-circle"></i> 匹配错误，请重试</span>';
            }
            selectedCards = [];
        }

        function checkWin() {
            const remaining = document.querySelectorAll('.card:not(.removed)').length;
            if(remaining === 0) {
                clearInterval(timerInterval);
                setTimeout(() => {
                    const timeTaken = Math.floor((new Date() - startTime) / 1000);
                    alert(`🎉 恭喜完成所有配对！\n⏱️ 用时: ${timeTaken}秒\n🔄 步数: ${moves}步`);
                    startNewGame();
                }, 600);
            }
        }

        function shuffle(array) {
            for(let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }
        
        function updateStats() {
            document.getElementById('moves').textContent = moves.toString().padStart(2, '0');
            document.getElementById('matches').innerHTML = `${matches.toString().padStart(2, '0')}<span class="unit-display">/8</span>`;
        }
        
        function updateTimer() {
            const elapsed = Math.floor((new Date() - startTime) / 1000);
            document.getElementById('time').textContent = elapsed.toString();
        }

        // 初始化游戏
        window.onload = startNewGame;
    </script>
</body>
</html>
