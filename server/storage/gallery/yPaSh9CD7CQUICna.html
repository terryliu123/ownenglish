<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>二维码生成器 - 专业版</title>
  <!-- 引入外部资源 -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
  <!-- 引入 QRCode 生成库 -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
  
  <!-- Tailwind 配置 -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#165DFF',
            secondary: '#36D399',
            tech: {
              dark: '#0F172A',
              light: '#E2E8F0'
            }
          },
        }
      }
    }
  </script>
  
  <style type="text/tailwindcss">
    @layer utilities {
      .shadow-tech {
        box-shadow: 0 8px 30px rgba(22, 93, 255, 0.12);
      }
      .qr-container {
        border-radius: 12px;
        overflow: hidden;
        display: inline-block;
      }
      .color-option {
        width: 32px;
        height: 32px;
        border-radius: 6px;
        cursor: pointer;
        transition: transform 0.2s, box-shadow 0.2s;
        border: 1px solid rgba(0,0,0,0.1);
      }
      .color-option:hover {
        transform: scale(1.1);
      }
      .color-option.selected {
        outline: 2px solid #165DFF;
        outline-offset: 2px;
      }
      
      /* 样式选择按钮 */
      .style-btn {
        border: 1px solid #E5E7EB;
        border-radius: 8px;
        padding: 8px;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 4px;
      }
      .style-btn:hover {
        border-color: #165DFF;
        background-color: #F0F9FF;
      }
      .style-btn.selected {
        border-color: #165DFF;
        background-color: #E0E7FF;
        color: #165DFF;
        font-weight: 600;
      }
      
      .shape-preview {
        width: 24px;
        height: 24px;
        background-color: #333;
      }
      /* 预览图标样式 */
      .preview-square { border-radius: 0; }
      .preview-circle { border-radius: 50%; }
      .preview-liquid { border-radius: 6px; }
      .preview-stripe { height: 12px; margin-top: 6px; }
    }
  </style>
  
  <style>
    .loader {
      width: 48px;
      height: 48px;
      border: 4px solid rgba(22, 93, 255, 0.1);
      border-bottom-color: #165DFF;
      border-radius: 50%;
      animation: rotation 1s linear infinite;
    }
    @keyframes rotation {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    /* 隐藏原生文件上传框 */
    input[type="file"]::file-selector-button {
      display: none;
    }
  </style>
</head>

<body class="bg-gradient-to-br from-slate-100 to-white min-h-screen text-slate-800">
  <header class="bg-white/90 backdrop-blur-md shadow-sm sticky top-0 z-50 border-b border-slate-200">
    <div class="container mx-auto px-4 py-3">
      <div class="flex items-center space-x-3">
        <div class="bg-primary text-white p-2 rounded-lg shadow-lg shadow-primary/30">
          <i class="fa fa-qrcode text-lg"></i>
        </div>
        <h1 class="text-xl font-bold bg-gradient-to-r from-primary to-blue-500 bg-clip-text text-transparent">高级二维码</h1>
        <span class="px-2 py-0.5 bg-blue-100 text-primary text-xs rounded-full font-medium">Pro</span>
      </div>
    </div>
  </header>

  <main class="container mx-auto px-4 py-8">
    <section class="max-w-6xl mx-auto grid lg:grid-cols-12 gap-8">
      
      <!-- 左侧：设置区域 (占7列) -->
      <div class="lg:col-span-7 space-y-6">
        
        <!-- 1. 内容输入 -->
        <div class="bg-white rounded-xl shadow-sm border border-slate-100 p-6">
          <h3 class="text-lg font-bold mb-4 text-tech-dark flex items-center">
            <span class="w-8 h-8 rounded-full bg-blue-50 text-primary flex items-center justify-center mr-2 text-sm">1</span>
            输入内容
          </h3>
          <textarea 
            id="qr-content" 
            class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-primary/30 focus:border-primary transition-all resize-none h-24 text-sm"
            placeholder="在此输入网址或文本..."
          >https://www.example.com</textarea>
        </div>

        <!-- 2. 样式设计 (核心新增功能) -->
        <div class="bg-white rounded-xl shadow-sm border border-slate-100 p-6">
          <h3 class="text-lg font-bold mb-4 text-tech-dark flex items-center">
            <span class="w-8 h-8 rounded-full bg-blue-50 text-primary flex items-center justify-center mr-2 text-sm">2</span>
            样式设计
          </h3>

          <!-- A. 码点形状 -->
          <div class="mb-6">
            <label class="block text-sm font-medium text-gray-700 mb-3">码点形状 (Body)</label>
            <div class="grid grid-cols-4 sm:grid-cols-5 gap-3">
              <div class="style-btn selected" data-category="body" data-style="square">
                <div class="shape-preview preview-square"></div>
                <span class="text-xs">方块</span>
              </div>
              <div class="style-btn" data-category="body" data-style="circle">
                <div class="shape-preview preview-circle"></div>
                <span class="text-xs">圆点</span>
              </div>
              <div class="style-btn" data-category="body" data-style="liquid">
                <div class="shape-preview preview-liquid"></div>
                <span class="text-xs">液化</span>
              </div>
              <div class="style-btn" data-category="body" data-style="stripe-h">
                <div class="shape-preview" style="height:10px; margin: 7px 0;"></div>
                <span class="text-xs">横条</span>
              </div>
              <div class="style-btn" data-category="body" data-style="star">
                <i class="fa fa-star" style="font-size:20px; color:#333"></i>
                <span class="text-xs">星形</span>
              </div>
            </div>
          </div>

          <!-- B. 码眼形状 -->
          <div class="mb-6">
            <label class="block text-sm font-medium text-gray-700 mb-3">码眼形状 (Eye)</label>
            <div class="grid grid-cols-4 sm:grid-cols-5 gap-3">
              <div class="style-btn selected" data-category="eye" data-style="square">
                <div class="w-6 h-6 border-4 border-gray-800 flex items-center justify-center">
                  <div class="w-2 h-2 bg-gray-800"></div>
                </div>
                <span class="text-xs">方正</span>
              </div>
              <div class="style-btn" data-category="eye" data-style="circle">
                <div class="w-6 h-6 border-4 border-gray-800 rounded-full flex items-center justify-center">
                  <div class="w-2 h-2 bg-gray-800 rounded-full"></div>
                </div>
                <span class="text-xs">圆形</span>
              </div>
              <div class="style-btn" data-category="eye" data-style="rounded">
                <div class="w-6 h-6 border-4 border-gray-800 rounded-md flex items-center justify-center">
                  <div class="w-2 h-2 bg-gray-800 rounded-sm"></div>
                </div>
                <span class="text-xs">圆角</span>
              </div>
            </div>
          </div>

          <!-- C. 颜色设置 -->
          <div class="grid md:grid-cols-2 gap-6">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">码点颜色</label>
              <div class="flex flex-wrap gap-2" id="color-fg-container">
                <!-- JS生成颜色 -->
              </div>
              <div class="mt-2 flex items-center gap-2">
                 <span class="text-xs text-gray-500">自定义:</span>
                 <input type="color" id="custom-fg" class="h-6 w-8 p-0 border-0 bg-transparent cursor-pointer" value="#0F172A">
              </div>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">背景颜色</label>
              <div class="flex flex-wrap gap-2" id="color-bg-container">
                <!-- JS生成颜色 -->
              </div>
              <div class="mt-2 flex items-center gap-2">
                 <span class="text-xs text-gray-500">自定义:</span>
                 <input type="color" id="custom-bg" class="h-6 w-8 p-0 border-0 bg-transparent cursor-pointer" value="#FFFFFF">
              </div>
            </div>
          </div>
        </div>

        <!-- 3. Logo 设置 -->
        <div class="bg-white rounded-xl shadow-sm border border-slate-100 p-6">
          <h3 class="text-lg font-bold mb-4 text-tech-dark flex items-center">
            <span class="w-8 h-8 rounded-full bg-blue-50 text-primary flex items-center justify-center mr-2 text-sm">3</span>
            Logo 嵌入
          </h3>
          <div class="flex items-center gap-4">
            <div class="relative group w-20 h-20 bg-slate-50 border-2 border-dashed border-slate-300 rounded-lg flex items-center justify-center overflow-hidden hover:border-primary transition-colors cursor-pointer" onclick="document.getElementById('logo-input').click()">
              <img id="logo-preview" class="hidden w-full h-full object-cover">
              <div id="logo-placeholder" class="text-center">
                <i class="fa fa-cloud-upload text-gray-400 text-xl"></i>
                <div class="text-[10px] text-gray-500 mt-1">上传</div>
              </div>
              <input type="file" id="logo-input" accept="image/*" class="hidden">
            </div>
            <div class="flex-1">
              <p class="text-sm text-gray-600 mb-2">支持 JPG, PNG 格式。建议上传正方形透明背景 Logo。</p>
              <button id="clear-logo-btn" class="hidden text-xs text-red-500 hover:text-red-600 underline">移除 Logo</button>
            </div>
          </div>
        </div>

      </div>

      <!-- 右侧：预览与下载 (占5列) -->
      <div class="lg:col-span-5">
        <div class="sticky top-24 space-y-6">
          <div class="bg-white rounded-xl shadow-tech p-6 text-center">
            <h3 class="text-lg font-bold mb-6 text-tech-dark">实时预览</h3>
            
            <!-- 预览画布容器 -->
            <div class="flex items-center justify-center bg-slate-50 rounded-xl p-8 border border-slate-100 min-h-[340px]">
              <div id="qrcode-loader" class="loader hidden"></div>
              <div id="canvas-wrapper" class="transition-all duration-300 hover:scale-[1.02]">
                <!-- Canvas 将在这里生成 -->
                <span class="text-gray-400 text-sm">正在初始化...</span>
              </div>
            </div>

            <!-- 操作按钮 -->
            <div class="mt-6 space-y-3">
              <button id="generate-btn" class="w-full bg-primary hover:bg-blue-600 text-white font-bold py-3 px-4 rounded-xl shadow-lg shadow-blue-500/30 transition-all flex items-center justify-center">
                <i class="fa fa-refresh mr-2"></i> 刷新二维码
              </button>
              
              <button id="download-btn" class="w-full bg-slate-800 hover:bg-slate-900 text-white font-medium py-3 px-4 rounded-xl transition-all flex items-center justify-center">
                <i class="fa fa-download mr-2"></i> 下载 PNG 图片
              </button>
            </div>
          </div>
          
          <!-- 参数微调 -->
          <div class="bg-white rounded-xl shadow-sm border border-slate-100 p-5">
             <div class="flex justify-between items-center mb-2">
               <label class="text-xs font-bold text-gray-500 uppercase">容错率</label>
               <span class="text-xs bg-green-100 text-green-700 px-2 py-0.5 rounded">建议 强 (30%)</span>
             </div>
             <div class="flex gap-2">
               <button class="err-btn flex-1 py-2 text-xs border rounded hover:bg-slate-50" data-level="L">低 (7%)</button>
               <button class="err-btn flex-1 py-2 text-xs border rounded hover:bg-slate-50" data-level="M">中 (15%)</button>
               <button class="err-btn flex-1 py-2 text-xs border rounded hover:bg-slate-50" data-level="Q">高 (25%)</button>
               <button class="err-btn flex-1 py-2 text-xs border rounded border-primary bg-blue-50 text-primary font-bold" data-level="H">强 (30%)</button>
             </div>
          </div>
        </div>
      </div>

    </section>
  </main>

  <!-- 通知组件 -->
  <div id="notification" class="fixed bottom-5 right-5 bg-slate-800 text-white px-4 py-3 rounded-lg shadow-xl transform translate-y-20 opacity-0 transition-all duration-300 flex items-center z-50">
    <i id="notification-icon" class="fa fa-check-circle mr-2 text-green-400"></i>
    <span id="notification-text">操作成功</span>
  </div>

  <script>
    /**
     * 初始化与状态管理
     */
    const state = {
      content: "https://www.example.com",
      size: 1024, // 内部渲染分辨率，下载时更清晰
      displaySize: 300, // CSS显示大小
      fgColor: "#0F172A",
      bgColor: "#FFFFFF",
      bodyStyle: "square", // square, circle, liquid, stripe-h, star
      eyeStyle: "square",  // square, circle, rounded
      errorLevel: "H",     // 默认为高容错，方便插 Logo
      logoImg: null
    };

    // 预设颜色
    const colors = [
      "#0F172A", "#165DFF", "#36D399", "#F87171", "#A78BFA", "#FBBF24", "#EC4899", "#06B6D4"
    ];
    const bgColors = [
      "#FFFFFF", "#F8FAFC", "#EEF2FF", "#ECFDF5", "#FFFBEB", "#FFF1F2"
    ];

    /**
     * DOM 元素获取
     */
    const els = {
      content: document.getElementById('qr-content'),
      canvasWrapper: document.getElementById('canvas-wrapper'),
      loader: document.getElementById('qrcode-loader'),
      logoInput: document.getElementById('logo-input'),
      logoPreview: document.getElementById('logo-preview'),
      logoPlaceholder: document.getElementById('logo-placeholder'),
      clearLogoBtn: document.getElementById('clear-logo-btn'),
      colorFgContainer: document.getElementById('color-fg-container'),
      colorBgContainer: document.getElementById('color-bg-container'),
      customFg: document.getElementById('custom-fg'),
      customBg: document.getElementById('custom-bg'),
      btns: {
        generate: document.getElementById('generate-btn'),
        download: document.getElementById('download-btn')
      }
    };

    /**
     * 初始化 UI
     */
    function init() {
      // 1. 生成颜色选择器
      renderColorOptions(colors, els.colorFgContainer, 'fg');
      renderColorOptions(bgColors, els.colorBgContainer, 'bg');

      // 2. 绑定事件
      bindEvents();

      // 3. 初始生成
      generateQR();
    }

    function renderColorOptions(colorList, container, type) {
      container.innerHTML = '';
      colorList.forEach(c => {
        const div = document.createElement('div');
        div.className = `color-option ${((type === 'fg' && c === state.fgColor) || (type === 'bg' && c === state.bgColor)) ? 'selected' : ''}`;
        div.style.backgroundColor = c;
        div.onclick = () => {
          // 移除选中
          container.querySelectorAll('.color-option').forEach(el => el.classList.remove('selected'));
          div.classList.add('selected');
          if (type === 'fg') {
             state.fgColor = c;
             els.customFg.value = c;
          } else {
             state.bgColor = c;
             els.customBg.value = c;
          }
          generateQR();
        };
        container.appendChild(div);
      });
    }

    function bindEvents() {
      // 样式按钮点击
      document.querySelectorAll('.style-btn').forEach(btn => {
        btn.addEventListener('click', function() {
          const category = this.dataset.category; // 'body' or 'eye'
          const style = this.dataset.style;
          
          // 更新 UI
          document.querySelectorAll(`.style-btn[data-category="${category}"]`).forEach(b => b.classList.remove('selected'));
          this.classList.add('selected');

          // 更新状态
          if (category === 'body') state.bodyStyle = style;
          if (category === 'eye') state.eyeStyle = style;
          
          generateQR();
        });
      });

      // 容错率按钮
      document.querySelectorAll('.err-btn').forEach(btn => {
        btn.addEventListener('click', function() {
           document.querySelectorAll('.err-btn').forEach(b => {
             b.classList.remove('border-primary', 'bg-blue-50', 'text-primary', 'font-bold');
             b.classList.remove('border-slate-200'); // Clean reset
           });
           this.classList.add('border-primary', 'bg-blue-50', 'text-primary', 'font-bold');
           state.errorLevel = this.dataset.level;
           generateQR();
        });
      });

      // 内容输入 (防抖)
      let timeout;
      els.content.addEventListener('input', (e) => {
        state.content = e.target.value || "https://www.example.com";
        clearTimeout(timeout);
        timeout = setTimeout(generateQR, 800);
      });

      // 自定义颜色
      els.customFg.addEventListener('input', (e) => {
        state.fgColor = e.target.value;
        document.querySelectorAll('#color-fg-container .color-option').forEach(el => el.classList.remove('selected'));
        generateQR(); // 实时性高一点
      });
      els.customBg.addEventListener('input', (e) => {
        state.bgColor = e.target.value;
        document.querySelectorAll('#color-bg-container .color-option').forEach(el => el.classList.remove('selected'));
        generateQR();
      });

      // Logo 上传
      els.logoInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (evt) => {
            const img = new Image();
            img.onload = () => {
              state.logoImg = img;
              // UI Update
              els.logoPreview.src = evt.target.result;
              els.logoPreview.classList.remove('hidden');
              els.logoPlaceholder.classList.add('hidden');
              els.clearLogoBtn.classList.remove('hidden');
              generateQR();
            };
            img.src = evt.target.result;
          };
          reader.readAsDataURL(file);
        }
      });

      // 清除 Logo
      els.clearLogoBtn.addEventListener('click', () => {
        state.logoImg = null;
        els.logoInput.value = '';
        els.logoPreview.classList.add('hidden');
        els.logoPlaceholder.classList.remove('hidden');
        els.clearLogoBtn.classList.add('hidden');
        generateQR();
      });

      // 按钮
      els.btns.generate.addEventListener('click', generateQR);
      els.btns.download.addEventListener('click', downloadQR);
    }

    /**
     * 核心逻辑：绘制二维码
     */
    function generateQR() {
      els.canvasWrapper.innerHTML = '';
      els.loader.classList.remove('hidden');

      // 使用 setTimeout 让出主线程以显示 Loader
      setTimeout(() => {
        try {
          // 1. 获取 QR 原始数据矩阵
          const qrData = QRCode.create(state.content, {
            errorCorrectionLevel: state.errorLevel
          });
          
          const modules = qrData.modules; // 包含 size 和 data (Uint8Array)
          const moduleCount = modules.size;
          
          // 2. 创建 Canvas
          const canvas = document.createElement('canvas');
          const ctx = canvas.getContext('2d');
          
          // 设置高分辨率
          const pixelSize = state.size / moduleCount; 
          canvas.width = state.size;
          canvas.height = state.size;
          
          // 调整 CSS 显示尺寸
          canvas.style.width = '300px';
          canvas.style.height = '300px';
          canvas.style.borderRadius = '8px';

          // 3. 绘制背景
          ctx.fillStyle = state.bgColor;
          ctx.fillRect(0, 0, canvas.width, canvas.height);

          // 4. 定义辅助函数
          // 判断坐标是否位于三个“码眼”探测区 (Position Detection Patterns)
          // 探测区大小通常是 7x7
          const isEye = (r, c) => {
            // 左上
            if (r < 7 && c < 7) return true;
            // 右上
            if (r < 7 && c >= moduleCount - 7) return true;
            // 左下
            if (r >= moduleCount - 7 && c < 7) return true;
            return false;
          };

          ctx.fillStyle = state.fgColor;

          // 5. 绘制主体 (Body)
          // 修复点：使用 modules.data 数组替代 modules.isDark() 方法
          for (let r = 0; r < moduleCount; r++) {
            for (let c = 0; c < moduleCount; c++) {
              // 检查数据位是否为 Dark (非0值)
              const isDark = modules.data[r * moduleCount + c];
              
              if (isDark && !isEye(r, c)) {
                const x = c * pixelSize;
                const y = r * pixelSize;
                const w = pixelSize;

                drawBodyModule(ctx, x, y, w, state.bodyStyle, r, c, modules);
              }
            }
          }

          // 6. 绘制码眼 (Eyes) - 需要独立绘制以保证风格统一
          drawEye(ctx, 0, 0, pixelSize, state.eyeStyle); // 左上
          drawEye(ctx, (moduleCount - 7) * pixelSize, 0, pixelSize, state.eyeStyle); // 右上
          drawEye(ctx, 0, (moduleCount - 7) * pixelSize, pixelSize, state.eyeStyle); // 左下

          // 7. 绘制 Logo
          if (state.logoImg) {
             const logoSize = state.size * 0.22; // Logo 占 22% 宽度
             const logoPos = (state.size - logoSize) / 2;
             
             // 绘制白色背景框 (圆角)
             ctx.fillStyle = state.bgColor;
             const border = pixelSize; // 边框宽度
             
             // 简单绘制一个圆角矩形背景
             roundRect(ctx, logoPos - border, logoPos - border, logoSize + border*2, logoSize + border*2, border*2);
             ctx.fill();

             // 绘制 Logo
             ctx.drawImage(state.logoImg, logoPos, logoPos, logoSize, logoSize);
          }

          els.canvasWrapper.appendChild(canvas);
          showNotification('二维码已刷新');

        } catch (e) {
          console.error(e);
          showNotification('生成失败', 'error');
        } finally {
          els.loader.classList.add('hidden');
        }
      }, 50);
    }

    /**
     * 绘制单个数据点
     */
    function drawBodyModule(ctx, x, y, size, style, row, col, modules) {
      const cx = x + size/2;
      const cy = y + size/2;
      
      switch (style) {
        case 'circle':
          ctx.beginPath();
          // 半径稍微大一点点填满视觉
          ctx.arc(cx, cy, size * 0.45, 0, Math.PI * 2); 
          ctx.fill();
          break;
          
        case 'liquid':
          // 液化效果：简化版 - 圆角矩形
          roundRect(ctx, x, y, size + 0.5, size + 0.5, size * 0.35);
          ctx.fill();
          break;
          
        case 'stripe-h':
          // 横条纹：高度减半，居中
          ctx.fillRect(x, y + size * 0.15, size + 0.5, size * 0.7);
          break;

        case 'star':
          drawStar(ctx, cx, cy, 5, size*0.5, size*0.25);
          ctx.fill();
          break;

        case 'square':
        default:
          ctx.fillRect(x, y, size + 0.6, size + 0.6); // +0.6 防止缝隙
          break;
      }
    }

    /**
     * 绘制单个码眼 (7x7)
     */
    function drawEye(ctx, x, y, modSize, style) {
      // 码眼由三部分组成：
      // 1. 外框 (7x7)
      // 2. 间隔 (5x5, 空白)
      // 3. 内核 (3x3, 实心)
      
      const size7 = modSize * 7;
      const size3 = modSize * 3;
      
      // 设置颜色 (当前使用前景色，如需独立颜色可在此修改)
      ctx.fillStyle = state.fgColor;
      ctx.strokeStyle = state.fgColor;
      
      // 中心点
      const cx = x + size7 / 2;
      const cy = y + size7 / 2;

      if (style === 'circle') {
        // 外圈
        ctx.beginPath();
        ctx.lineWidth = modSize;
        // 半径 = 3.5个单位 - 0.5个单位(线宽的一半) = 3个单位
        ctx.arc(cx, cy, modSize * 3, 0, Math.PI * 2);
        ctx.stroke();
        
        // 内点
        ctx.beginPath();
        ctx.arc(cx, cy, modSize * 1.5, 0, Math.PI * 2);
        ctx.fill();

      } else if (style === 'rounded') {
        // 外圈 (圆角矩形描边)
        ctx.lineWidth = modSize;
        ctx.beginPath();
        // 位置调整以适应描边
        roundRectPath(ctx, x + modSize/2, y + modSize/2, size7 - modSize, size7 - modSize, modSize * 2);
        ctx.stroke();
        
        // 内点 (圆角矩形填充)
        ctx.beginPath();
        roundRectPath(ctx, x + modSize*2, y + modSize*2, size3, size3, modSize);
        ctx.fill();

      } else {
        // Square (默认)
        // 外圈
        ctx.fillRect(x, y, size7, size7);
        // 挖空中间 (绘制背景色)
        ctx.fillStyle = state.bgColor;
        ctx.fillRect(x + modSize, y + modSize, modSize * 5, modSize * 5);
        // 绘制内核
        ctx.fillStyle = state.fgColor;
        ctx.fillRect(x + modSize * 2, y + modSize * 2, size3, size3);
      }
    }

    /**
     * 工具：绘制星星
     */
    function drawStar(ctx, cx, cy, spikes, outerRadius, innerRadius) {
      let rot = Math.PI / 2 * 3;
      let x = cx;
      let y = cy;
      let step = Math.PI / spikes;

      ctx.beginPath();
      ctx.moveTo(cx, cy - outerRadius);
      for (let i = 0; i < spikes; i++) {
        x = cx + Math.cos(rot) * outerRadius;
        y = cy + Math.sin(rot) * outerRadius;
        ctx.lineTo(x, y);
        rot += step;

        x = cx + Math.cos(rot) * innerRadius;
        y = cy + Math.sin(rot) * innerRadius;
        ctx.lineTo(x, y);
        rot += step;
      }
      ctx.lineTo(cx, cy - outerRadius);
      ctx.closePath();
    }

    /**
     * 工具：圆角矩形路径
     */
    function roundRectPath(ctx, x, y, w, h, r) {
      if (w < 2 * r) r = w / 2;
      if (h < 2 * r) r = h / 2;
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
    }

    /**
     * 工具：填充圆角矩形
     */
    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      roundRectPath(ctx, x, y, w, h, r);
      ctx.closePath();
    }

    function downloadQR() {
      const canvas = els.canvasWrapper.querySelector('canvas');
      if (!canvas) return;
      
      const link = document.createElement('a');
      link.download = `TechQR-${Date.now()}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
      showNotification('下载已开始');
    }

    function showNotification(text, type = 'success') {
      const noti = document.getElementById('notification');
      document.getElementById('notification-text').innerText = text;
      const icon = document.getElementById('notification-icon');
      
      if(type === 'error') {
        icon.className = 'fa fa-exclamation-circle mr-2 text-red-400';
      } else {
        icon.className = 'fa fa-check-circle mr-2 text-green-400';
      }

      noti.classList.remove('translate-y-20', 'opacity-0');
      setTimeout(() => {
        noti.classList.add('translate-y-20', 'opacity-0');
      }, 2500);
    }

    // 启动
    window.addEventListener('DOMContentLoaded', init);

  </script>
