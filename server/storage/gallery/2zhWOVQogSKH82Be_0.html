<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>物理白板 Pro+ (自动贴地版)</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; }
        
        /* 画布 */
        #canvas-container { width: 100vw; height: 100vh; background-image: radial-gradient(#ccc 1px, transparent 1px); background-size: 20px 20px; }

        /* 顶部场景菜单 */
        #scene-menu {
            position: absolute; top: 20px; right: 20px; display: flex; gap: 10px; z-index: 50;
        }
        .scene-btn {
            padding: 8px 15px; background: white; border: 1px solid #ddd; border-radius: 20px;
            cursor: pointer; font-size: 13px; color: #555; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            transition: all 0.2s;
        }
        .scene-btn:hover { background: #1890ff; color: white; border-color: #1890ff; }

        /* 属性控制面板 */
        #properties-panel {
            position: absolute; top: 20px; left: 20px;
            background: rgba(255, 255, 255, 0.95);
            padding: 15px; border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            display: none; width: 220px;
            backdrop-filter: blur(5px); z-index: 50;
        }
        .prop-row { margin-bottom: 12px; }
        .prop-label { font-size: 12px; color: #666; margin-bottom: 5px; display: flex; justify-content: space-between;}
        input[type=range] { width: 100%; cursor: pointer; }

        /* 底部工具栏 */
        #toolbar {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95); padding: 10px 25px; border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15); display: flex; gap: 18px;
            backdrop-filter: blur(10px); align-items: center; z-index: 100;
        }

        .tool-btn {
            display: flex; flex-direction: column; align-items: center; cursor: pointer;
            padding: 5px; border-radius: 8px; background: transparent; transition: 0.2s;
        }
        .tool-btn:hover { background: #f5f5fa; transform: translateY(-2px); }
        .tool-btn:active { transform: scale(0.95); }
        
        .icon { font-size: 24px; margin-bottom: 4px; display: flex; justify-content: center; align-items: center; width: 32px; height: 32px; }
        .label { font-size: 11px; color: #666; }
        .divider { width: 1px; height: 25px; background: #ddd; margin: 0 5px; }

        /* 图标绘制 */
        .shape-icon { width: 24px; height: 24px; border: 2px solid #555; box-sizing: border-box; }
        .shape-ball { border-radius: 50%; background: #ffccc7; border: none; }
        .shape-box { background: #ffe58f; border: none; }
        .shape-ramp { 
            width: 0; height: 0; border: none; background: transparent;
            border-bottom: 24px solid #b5f5ec; border-left: 24px solid transparent; 
        }
        
        .active-state { color: #1890ff; text-shadow: 0 0 8px rgba(24,144,255,0.4); }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="scene-menu">
        <div class="scene-btn" onclick="sceneRamp()">场景：斜面滑块</div>
        <div class="scene-btn" onclick="sceneLever()">场景：杠杆原理</div>
        <div class="scene-btn" onclick="sceneConveyor()">场景：传送带</div>
        <div class="scene-btn" onclick="scenePendulum()">场景：牛顿摆</div>
    </div>

    <div id="properties-panel">
        <div style="font-weight: bold; margin-bottom: 10px; font-size: 14px;">⚙️ 组件属性</div>
        <div class="prop-row">
            <span class="prop-label"><span>旋转角度</span><span id="angle-val">0°</span></span>
            <input type="range" id="angle-slider" min="-180" max="180" step="1" value="0">
        </div>
        <div class="prop-row">
            <span class="prop-label"><span>静摩擦力</span><span id="fric-val">0.5</span></span>
            <input type="range" id="friction-slider" min="0" max="1" step="0.05" value="0.5">
        </div>
        <div class="prop-row">
            <span class="prop-label"><span>弹性 (反弹)</span><span id="rest-val">0</span></span>
            <input type="range" id="restitution-slider" min="0" max="1.2" step="0.1" value="0">
        </div>
        <div style="font-size: 11px; color: #999; margin-top:5px">* 点击物体以选中，点击空白取消</div>
    </div>

    <div id="toolbar">
        <div class="tool-btn" onclick="spawnBall()"><div class="shape-icon shape-ball"></div><span class="label">小球</span></div>
        <div class="tool-btn" onclick="spawnBox()"><div class="shape-icon shape-box"></div><span class="label">木块</span></div>
        <div class="tool-btn" onclick="spawnPlank()"><div class="icon" style="background:#d9d9d9; height:8px; margin-top:12px;"></div><span class="label">长板</span></div>
        <div class="tool-btn" onclick="spawnRamp()"><div class="shape-icon shape-ramp"></div><span class="label">斜坡</span></div>
        <div class="tool-btn" onclick="spawnConveyor()"><div class="icon">⏩</div><span class="label">传送带</span></div>
        <div class="tool-btn" onclick="spawnRope()"><div class="icon">🧶</div><span class="label">绳子</span></div>
        
        <div class="divider"></div>

        <div class="tool-btn" id="forceBtn" onclick="toggleForce()">
            <div class="icon">📐</div><span class="label">受力</span>
        </div>
        <div class="tool-btn" onclick="resetScene()">
            <div class="icon">🗑️</div><span class="label">清空</span>
        </div>
    </div>

    <script>
        const Engine = Matter.Engine, Render = Matter.Render, Runner = Matter.Runner, 
              Bodies = Matter.Bodies, Composite = Matter.Composite, Mouse = Matter.Mouse, 
              MouseConstraint = Matter.MouseConstraint, Events = Matter.Events, 
              Vector = Matter.Vector, Body = Matter.Body, Constraint = Matter.Constraint,
              Composites = Matter.Composites;

        // --- 1. 全局配置变量 ---
        // 关键：定义地面位置，方便后续计算
        let GROUND_Y, GROUND_HEIGHT = 40, GROUND_OFFSET = 120;
        let GROUND_SURFACE_Y; // 地面上表面的 Y 坐标

        function updateGroundVars() {
            // 地面中心点 Y 坐标 (屏幕高度 - 偏移量)
            GROUND_Y = window.innerHeight - GROUND_OFFSET; 
            // 地面上表面 Y 坐标 (中心点 - 高度的一半)
            GROUND_SURFACE_Y = GROUND_Y - (GROUND_HEIGHT / 2);
        }
        updateGroundVars();

        // 初始化引擎
        const engine = Engine.create();
        const world = engine.world;
        
        const container = document.getElementById('canvas-container');
        const render = Render.create({
            element: container, engine: engine,
            options: {
                width: window.innerWidth, height: window.innerHeight,
                background: 'transparent', wireframes: false, showAngleIndicator: false
            }
        });

        Render.run(render);
        const runner = Runner.create();
        Runner.run(runner, engine);

        // 鼠标交互
        const mouse = Mouse.create(render.canvas);
        const mouseConstraint = MouseConstraint.create(engine, {
            mouse: mouse,
            constraint: { stiffness: 0.2, render: { visible: false } }
        });
        Composite.add(world, mouseConstraint);
        render.mouse = mouse;

        // 窗口大小改变时重新计算地面位置
        window.addEventListener('resize', () => {
            render.canvas.width = window.innerWidth;
            render.canvas.height = window.innerHeight;
            updateGroundVars();
            resetScene();
        });

        // --- 全局状态 ---
        let showForces = false;
        let selectedBody = null;
        let conveyorSpeed = 3;
        const C = { ball: '#ffccc7', box: '#ffe58f', ramp: '#b5f5ec', ground: '#595959', plank: '#d9c6a3', conveyor: '#69c0ff', rope: '#8c8c8c' };

        // --- 2. 生成组件核心逻辑 ---

        function spawnGround() {
            // 使用计算好的 GROUND_Y
            const ground = Bodies.rectangle(window.innerWidth/2, GROUND_Y, window.innerWidth, GROUND_HEIGHT, { 
                isStatic: true, render: { fillStyle: C.ground }, label: 'ground'
            });
            Composite.add(world, ground);
            
            // 底部安全网
            const bottom = Bodies.rectangle(window.innerWidth/2, window.innerHeight + 100, window.innerWidth*2, 100, { isStatic: true });
            Composite.add(world, bottom);
        }

        // 优化：斜坡生成函数
        function spawnRamp(x, y, width=200, height=100) {
            // 如果未指定位置，默认放在屏幕中间
            x = x || window.innerWidth/2;
            
            // 【关键优化】如果未指定Y，自动计算贴地位置
            // Matter.js 物体位置是中心点。
            // 所以 Y = 地面表面Y - 斜坡高度的一半
            if (y === undefined) {
                y = GROUND_SURFACE_Y - (height / 2);
            }

            // 使用梯形模拟斜坡
            const ramp = Bodies.fromVertices(x, y, [
                {x: 0, y: 0}, {x: width, y: 0}, {x: width, y: height}, {x: 0, y: 20} 
            ], {
                isStatic: true,
                render: { fillStyle: C.ramp, strokeStyle: '#555', lineWidth: 2 },
                label: 'ramp',
                friction: 0.5
            }, true);

            // 修正生成后的重心偏移，确保它视觉上在正确位置
            // 有时候 fromVertices 会自动调整中心，这里我们不需要额外旋转，直接加进去
            Composite.add(world, ramp);
            return ramp;
        }

        function spawnBall(x, y, r=25) {
            x = x || window.innerWidth/2 + (Math.random()-0.5)*50;
            y = y || 100;
            const ball = Bodies.circle(x, y, r, {
                restitution: 0.7, friction: 0.05, density: 0.04,
                render: { fillStyle: C.ball, strokeStyle: '#555', lineWidth: 2 }
            });
            Composite.add(world, ball);
            return ball;
        }

        function spawnBox(x, y, w=50, h=50) {
            x = x || window.innerWidth/2 + (Math.random()-0.5)*50;
            y = y || 100; // 空中生成
            const box = Bodies.rectangle(x, y, w, h, {
                friction: 0.5,
                render: { fillStyle: C.box, strokeStyle: '#555', lineWidth: 2 }
            });
            Composite.add(world, box);
            return box;
        }

        function spawnPlank(x, y, w=300, h=15) {
            x = x || window.innerWidth/2;
            y = y || 200;
            const plank = Bodies.rectangle(x, y, w, h, {
                density: 0.005,
                render: { fillStyle: C.plank, strokeStyle: '#555', lineWidth: 2 }
            });
            Composite.add(world, plank);
            return plank;
        }

        function spawnConveyor(x, y, w=500, h=20) {
            x = x || window.innerWidth/2;
            // 默认贴地生成
            y = y || (GROUND_SURFACE_Y - h/2);
            
            const belt = Bodies.rectangle(x, y, w, h, {
                isStatic: true, label: 'conveyor', friction: 1,
                render: { fillStyle: C.conveyor, strokeStyle: '#555', lineWidth: 2 }
            });
            Composite.add(world, belt);
            return belt;
        }

        function spawnRope(x, y) {
            x = x || window.innerWidth/2; y = y || 100;
            const group = Body.nextGroup(true);
            const rope = Composites.stack(x, y, 10, 1, 0, 0, function(x, y) {
                return Bodies.rectangle(x, y, 20, 10, { 
                    collisionFilter: { group: group }, render: { fillStyle: C.rope }
                });
            });
            Composites.chain(rope, 0.5, 0, -0.5, 0, { stiffness: 0.8, length: 2, render: { type: 'line' } });
            const pin = Constraint.create({
                bodyB: rope.bodies[0], pointB: { x: -10, y: 0 },
                pointA: { x: x, y: y }, stiffness: 1
            });
            Composite.add(world, [rope, pin]);
        }

        // --- 3. 属性面板与交互 ---

        const propPanel = document.getElementById('properties-panel');
        const uiRefs = {
            angle: document.getElementById('angle-slider'),
            angleVal: document.getElementById('angle-val'),
            fric: document.getElementById('friction-slider'),
            fricVal: document.getElementById('fric-val'),
            rest: document.getElementById('restitution-slider'),
            restVal: document.getElementById('rest-val')
        };

        Events.on(mouseConstraint, 'mousedown', function(event) {
            const bodies = Composite.allBodies(world);
            const clickedBodies = Matter.Query.point(bodies, event.mouse.position);
            
            if (clickedBodies.length > 0 && clickedBodies[0].label !== 'ground') {
                selectedBody = clickedBodies[0];
                propPanel.style.display = 'block';
                
                // 更新面板数值
                const deg = Math.round(selectedBody.angle * (180/Math.PI));
                uiRefs.angle.value = deg; uiRefs.angleVal.innerText = deg + "°";
                
                uiRefs.fric.value = selectedBody.friction; uiRefs.fricVal.innerText = selectedBody.friction.toFixed(2);
                
                uiRefs.rest.value = selectedBody.restitution; uiRefs.restVal.innerText = selectedBody.restitution.toFixed(1);
            } else {
                selectedBody = null;
                propPanel.style.display = 'none';
            }
        });

        // UI 监听
        uiRefs.angle.addEventListener('input', (e) => {
            if(selectedBody) {
                Body.setAngle(selectedBody, e.target.value * (Math.PI/180));
                uiRefs.angleVal.innerText = e.target.value + "°";
            }
        });
        uiRefs.fric.addEventListener('input', (e) => {
            if(selectedBody) {
                selectedBody.friction = parseFloat(e.target.value);
                uiRefs.fricVal.innerText = selectedBody.friction.toFixed(2);
            }
        });
        uiRefs.rest.addEventListener('input', (e) => {
            if(selectedBody) {
                selectedBody.restitution = parseFloat(e.target.value);
                uiRefs.restVal.innerText = selectedBody.restitution.toFixed(1);
            }
        });

        // --- 4. 物理与渲染循环 ---
        
        Events.on(engine, 'beforeUpdate', function() {
            Composite.allBodies(world).forEach(body => {
                if (body.label !== 'conveyor' && !body.isStatic) {
                    Composite.allBodies(world).forEach(other => {
                        if (other.label === 'conveyor' && Matter.Bounds.overlaps(body.bounds, other.bounds)) {
                            if(Matter.SAT.collides(body, other).collided) {
                                Body.setVelocity(body, { x: conveyorSpeed, y: body.velocity.y });
                                Body.setAngularVelocity(body, 0.15);
                            }
                        }
                    });
                }
            });
        });

        Events.on(render, 'afterRender', function() {
            const ctx = render.context;
            // 传送带动画
            const time = engine.timing.timestamp;
            const offset = (time * 0.15) % 20;
            ctx.strokeStyle = 'rgba(255,255,255,0.6)';
            ctx.lineWidth = 2;
            Composite.allBodies(world).forEach(body => {
                if (body.label === 'conveyor') {
                    ctx.beginPath();
                    ctx.moveTo(body.bounds.min.x + offset, body.bounds.min.y);
                    ctx.lineTo(body.bounds.max.x, body.bounds.min.y);
                    ctx.setLineDash([10, 10]);
                    ctx.lineDashOffset = -offset;
                    ctx.stroke();
                    ctx.setLineDash([]);
                }
            });

            // 受力箭头
            if (showForces) {
                ctx.lineWidth = 2; ctx.font = "12px Arial";
                Composite.allBodies(world).forEach(body => {
                    if (body.isStatic) return;
                    drawArrow(ctx, body.position, {x:0, y:50}, '#ff4d4f', 'G'); // 重力
                    if (Vector.magnitude(body.velocity) > 0.2) {
                        drawArrow(ctx, body.position, Vector.mult(body.velocity, 8), '#52c41a', 'v'); // 速度
                    }
                });
            }
        });

        function drawArrow(ctx, start, vector, color, text) {
            const end = Vector.add(start, vector);
            const angle = Math.atan2(vector.y, vector.x);
            ctx.beginPath(); ctx.strokeStyle = color; ctx.fillStyle = color;
            ctx.moveTo(start.x, start.y); ctx.lineTo(end.x, end.y); ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(end.x, end.y);
            ctx.lineTo(end.x - 8*Math.cos(angle-Math.PI/6), end.y - 8*Math.sin(angle-Math.PI/6));
            ctx.lineTo(end.x - 8*Math.cos(angle+Math.PI/6), end.y - 8*Math.sin(angle+Math.PI/6));
            ctx.fill();
            ctx.fillText(text, end.x+10, end.y);
        }

        // --- 5. 场景管理 ---

        function resetScene() {
            Composite.clear(world);
            Composite.add(world, mouseConstraint);
            spawnGround();
            propPanel.style.display = 'none';
            selectedBody = null;
        }

        // 场景：斜面滑块 (完美贴地)
        function sceneRamp() {
            resetScene();
            const cx = window.innerWidth/2;
            
            // 生成斜坡，高度100，自动贴地
            const ramp = spawnRamp(cx, undefined, 250, 100);
            
            // 旋转30度
            Body.setAngle(ramp, -Math.PI/6); 
            
            // 因为旋转了，中心点高度不变，但底部会翘起来或陷下去
            // 我们需要手动修正一下旋转后的位置，使其看起来接触地面
            // 计算：旋转后最低点需要贴合 GROUND_SURFACE_Y
            // 简单做法：直接设置一个经过调试的 Y 坐标，或者使用三角函数计算
            // 这里为了效果直接调整位置：
            Body.setPosition(ramp, { x: cx, y: GROUND_SURFACE_Y - 40 }); 

            spawnBox(cx - 100, 100, 40, 40);
        }

        function sceneLever() {
            resetScene();
            const cx = window.innerWidth/2;
            // 支点贴地
            const fulcrum = Bodies.polygon(cx, GROUND_SURFACE_Y - 15, 3, 30, { 
                isStatic: true, render: { fillStyle: '#888'} 
            });
            Body.rotate(fulcrum, Math.PI/6);
            Composite.add(world, fulcrum);

            spawnPlank(cx, GROUND_SURFACE_Y - 50, 400, 15);
            spawnBall(cx - 150, 0, 30);
            spawnBox(cx + 100, 0, 40, 40);
        }

        function sceneConveyor() {
            resetScene();
            spawnConveyor(window.innerWidth/2, undefined, 600, 20);
            for(let i=0; i<4; i++) setTimeout(() => spawnBox(window.innerWidth/2 - 250, 0, 40, 40), i*600);
        }
        
        function scenePendulum() {
            resetScene();
            spawnRope(window.innerWidth/2, 100);
            spawnBox(window.innerWidth/2 - 150, GROUND_SURFACE_Y - 25, 50, 50);
        }

        function toggleForce() {
            showForces = !showForces;
            const btn = document.getElementById('forceBtn');
            const icon = btn.querySelector('.icon');
            icon.classList.toggle('active-state', showForces);
        }

        // 启动默认场景
        resetScene();

    </script>
</body>
</html>
