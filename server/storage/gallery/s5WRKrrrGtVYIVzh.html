<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Airbus A320 - 极速起飞版</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: #1b262c; 
            display: flex;
        }

        #canvas-container {
            flex-grow: 1;
            height: 100vh;
            position: relative;
            overflow: hidden;
            background: #87CEEB;
        }

        #sidebar {
            width: 300px;
            height: 100vh;
            background-color: #0f171e;
            color: #ecf0f1;
            padding: 20px;
            box-sizing: border-box;
            border-left: 2px solid #34495e;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 10;
        }

        h1 { font-size: 20px; margin: 0; color: #3498db; border-bottom: 1px solid #34495e; padding-bottom: 10px; }
        
        .data-card {
            background: #1c2a35;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #2c3e50;
        }

        .data-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
            font-size: 12px;
        }
        .value { font-family: 'Consolas', monospace; font-weight: bold; font-size: 13px; }
        .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 5px; }

        .controls { margin-top: auto; display: flex; flex-direction: column; gap: 10px; }
        
        button {
            background: #2980b9;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            transition: background 0.2s;
        }
        button:hover { background: #3498db; transform: scale(1.02); }
        button:disabled { background: #34495e; cursor: not-allowed; transform: none; }
        #resetBtn { background: #c0392b; }

        #status-bar {
            font-size: 14px;
            text-align: center;
            font-weight: bold;
            color: #f39c12;
            padding: 5px;
            background: rgba(0,0,0,0.2);
            border-radius: 4px;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="sidebar">
        <h1>A320 Physics Demo</h1>
        
        <div class="data-card">
            <div class="data-row" style="color:#2ecc71;">
                <span><span class="dot" style="background:#2ecc71"></span>推力 Thrust</span> 
                <span class="value" id="val-thrust">0 kN</span>
            </div>
            <div class="data-row" style="color:#e74c3c;">
                <span><span class="dot" style="background:#e74c3c"></span>阻力 Drag</span> 
                <span class="value" id="val-drag">0 kN</span>
            </div>
            <div class="data-row" style="color:#3498db;">
                <span><span class="dot" style="background:#3498db"></span>升力 Lift</span> 
                <span class="value" id="val-lift">0 kN</span>
            </div>
            <div class="data-row" style="color:#f1c40f;">
                <span><span class="dot" style="background:#f1c40f"></span>重力 Weight</span> 
                <span class="value" id="val-weight">764 kN</span>
            </div>
        </div>

        <div class="data-card">
            <div class="data-row"><span>速度 Speed</span> <span class="value" id="val-speed">0 km/h</span></div>
            <div class="data-row"><span>高度 Alt</span> <span class="value" id="val-alt">0 m</span></div>
            <div class="data-row"><span>距离 Dist</span> <span class="value" id="val-dist">0 m</span></div>
        </div>

        <div id="status-bar">等待起飞 (WAITING)</div>

        <div class="controls">
            <button id="startBtn">🚀 立即起飞</button>
            <button id="resetBtn">↺ 重置</button>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';

        // --- 1. 物理参数 (魔改版：为了演示效果，增强了推力) ---
        const MASS = 60000; // 减轻重量 (kg)
        const WEIGHT_N = 764000; // 显示用的重力数值 (保持A320真实数据)
        const SIM_GRAVITY = 9.8;
        
        // 真实A320推力约240kN，这里为了演示加速快，设为 600kN
        const MAX_THRUST_N = 600000; 
        
        // 起飞速度 Vr
        const VR_SPEED_MS = 70; // 约 250 km/h

        // 系数
        const DRAG_COEFF = 15; 
        // 保证在VR速度时，升力 > 重力 (为了演示，升力系数调大)
        const LIFT_COEFF = (MASS * SIM_GRAVITY) / (VR_SPEED_MS * VR_SPEED_MS) * 1.2;

        // --- 2. 场景初始化 ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 100, 2000);

        const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 10000);
        camera.position.set(-60, 20, 60);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        // 灯光
        scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 0.8));
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight.position.set(-100, 200, 100);
        dirLight.castShadow = true;
        scene.add(dirLight);

        // --- 3. 环境 (超长跑道) ---
        const ground = new THREE.Mesh(
            new THREE.PlaneGeometry(20000, 20000),
            new THREE.MeshLambertMaterial({ color: 0x2e7d32 })
        );
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.2;
        scene.add(ground);

        const runway = new THREE.Mesh(
            new THREE.PlaneGeometry(10000, 60),
            new THREE.MeshPhongMaterial({ color: 0x333333 })
        );
        runway.rotation.x = -Math.PI / 2;
        runway.position.x = 2000; // 跑道向前延伸
        runway.receiveShadow = true;
        scene.add(runway);

        // 跑道标志线 (视觉参照物)
        const lineGeo = new THREE.PlaneGeometry(50, 2);
        const lineMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
        for(let i=0; i<100; i++) {
            const line = new THREE.Mesh(lineGeo, lineMat);
            line.rotation.x = -Math.PI/2;
            line.position.set(-200 + i * 80, 0.1, 0);
            scene.add(line);
        }

        // --- 4. 飞机模型 ---
        const planeGroup = new THREE.Group();
        scene.add(planeGroup);

        // 材质
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.2 });
        const wingMat = new THREE.MeshStandardMaterial({ color: 0xdddddd, roughness: 0.3 });
        const engineMat = new THREE.MeshStandardMaterial({ color: 0x7f8c8d });

        // 机身
        const fuselage = new THREE.Mesh(new THREE.CapsuleGeometry(2.2, 20, 4, 16), bodyMat);
        fuselage.rotation.z = Math.PI / 2;
        fuselage.castShadow = true;
        planeGroup.add(fuselage);

        // 驾驶舱
        const cockpit = new THREE.Mesh(new THREE.BoxGeometry(2, 1.8, 2), new THREE.MeshStandardMaterial({color:0x111111}));
        cockpit.position.set(8.5, 1.2, 0);
        planeGroup.add(cockpit);

        // 机翼 (自定义形状)
        const wingShape = new THREE.Shape();
        wingShape.moveTo(3, 0);
        wingShape.lineTo(-3, 0);
        wingShape.lineTo(-7, 14);
        wingShape.lineTo(-4, 14);
        const wingGeo = new THREE.ExtrudeGeometry(wingShape, { depth: 0.3, bevelEnabled:false });
        wingGeo.rotateX(Math.PI/2);
        const wings = new THREE.Mesh(wingGeo, wingMat);
        wings.position.set(1, -1, 0);
        wings.castShadow = true;
        planeGroup.add(wings);
        
        // 右翼 (镜像)
        const wingsR = wings.clone();
        wingsR.scale.z = -1;
        planeGroup.add(wingsR);

        // 尾翼
        const tailV = new THREE.Mesh(new THREE.BoxGeometry(4, 5, 0.4), new THREE.MeshStandardMaterial({color:0x003366}));
        tailV.position.set(-9, 2.5, 0);
        // 简单切角
        tailV.geometry.translate(-1,0,0); 
        tailV.rotation.z = -0.2;
        planeGroup.add(tailV);

        const tailH = new THREE.Mesh(new THREE.BoxGeometry(3, 0.2, 8), wingMat);
        tailH.position.set(-9, 1, 0);
        planeGroup.add(tailH);

        // 引擎
        const engineGeo = new THREE.CylinderGeometry(1.2, 1.2, 3, 16);
        engineGeo.rotateZ(Math.PI/2);
        const engL = new THREE.Mesh(engineGeo, engineMat);
        engL.position.set(0, -1.8, 4);
        planeGroup.add(engL);
        const engR = engL.clone();
        engR.position.set(0, -1.8, -4);
        planeGroup.add(engR);

        // 初始位置
        planeGroup.position.set(-300, 3.2, 0); // 轮子高度修正

        // --- 5. 力的箭头 (ArrowHelpers) ---
        const arrowOrigin = new THREE.Vector3(0, 0, 0);
        const headL = 2.5; 
        const headW = 1.5;

        // 创建箭头函数
        function createArrow(dir, color) {
            return new THREE.ArrowHelper(new THREE.Vector3(dir[0], dir[1], dir[2]), arrowOrigin, 1, color, headL, headW);
        }

        const thrustA = createArrow([1,0,0], 0x2ecc71); planeGroup.add(thrustA);
        const dragA = createArrow([-1,0,0], 0xe74c3c); planeGroup.add(dragA);
        const liftA = createArrow([0,1,0], 0x3498db); planeGroup.add(liftA);
        const weightA = createArrow([0,-1,0], 0xf1c40f); scene.add(weightA); // 重力在场景中

        // --- 6. 模拟逻辑 ---
        const ui = {
            thrust: document.getElementById('val-thrust'),
            drag: document.getElementById('val-drag'),
            lift: document.getElementById('val-lift'),
            speed: document.getElementById('val-speed'),
            alt: document.getElementById('val-alt'),
            dist: document.getElementById('val-dist'),
            status: document.getElementById('status-bar'),
            startBtn: document.getElementById('startBtn'),
            resetBtn: document.getElementById('resetBtn')
        };

        let state = {
            running: false,
            speed: 0,
            distance: 0,
            altitude: 0,
            phase: 'ground' // ground, rotate, air
        };

        // 视觉比例
        const ARROW_SCALE = 0.00004;

        function update(dt) {
            // 物理计算
            let thrust = 0, drag = 0, lift = 0;

            if (state.running) {
                thrust = MAX_THRUST_N; // 全推力

                // 阻力
                drag = DRAG_COEFF * state.speed * state.speed;

                // 升力
                lift = LIFT_COEFF * state.speed * state.speed;
                if (state.phase === 'rotate' || state.phase === 'air') lift *= 1.3; // 攻角增升

                // 加速度 a = F/m
                const accX = (thrust - drag) / MASS;
                state.speed += accX * dt;
                state.distance += state.speed * dt;

                // 状态机
                if (state.phase === 'ground') {
                    if (state.speed > VR_SPEED_MS) {
                        state.phase = 'rotate';
                        ui.status.innerText = "V1 ROTATE (抬轮)";
                    }
                } 
                else if (state.phase === 'rotate') {
                    // 视觉抬轮
                    if (planeGroup.rotation.z < 0.25) {
                        planeGroup.rotation.z += 0.5 * dt;
                        // 抬轮期间稍微离地一点
                        state.altitude += 0.5 * dt;
                    } else {
                        state.phase = 'air';
                        ui.status.innerText = "POSITIVE CLIMB (爬升)";
                    }
                } 
                else if (state.phase === 'air') {
                    // 强制爬升逻辑 (让演示更爽)
                    const climbRate = state.speed * Math.sin(planeGroup.rotation.z);
                    state.altitude += climbRate * dt;
                }
            }

            // 更新位置
            planeGroup.position.x = -300 + state.distance * 0.5; // 视觉速度缩放
            planeGroup.position.y = 3.2 + state.altitude * 0.5;

            // 限制飞机不要飞出太远
            if(state.distance > 3000 && state.running) {
                ui.status.innerText = "CRUISE (巡航)";
            }

            // 更新箭头
            thrustA.setLength(Math.max(0.1, thrust * ARROW_SCALE), headL, headW);
            dragA.setLength(Math.max(0.1, drag * ARROW_SCALE), headL, headW);
            liftA.setLength(Math.max(0.1, lift * ARROW_SCALE), headL, headW);
            weightA.setLength(WEIGHT_N * ARROW_SCALE, headL, headW); // 固定重力长度
            weightA.position.copy(planeGroup.position);

            // 更新 UI
            ui.thrust.innerText = (thrust/1000).toFixed(0) + " kN";
            ui.drag.innerText = (drag/1000).toFixed(0) + " kN";
            ui.lift.innerText = (lift/1000).toFixed(0) + " kN";
            ui.speed.innerText = (state.speed * 3.6).toFixed(0) + " km/h";
            ui.alt.innerText = state.altitude.toFixed(1) + " m";
            ui.dist.innerText = state.distance.toFixed(0) + " m";

            // 相机跟随
            const camTarget = new THREE.Vector3(-50, 15, 60); // 相对位置
            // 旋转矩阵让相机稍微跟随机身旋转一点，更有动感
            const rotMatrix = new THREE.Matrix4().makeRotationZ(planeGroup.rotation.z * 0.5);
            camTarget.applyMatrix4(rotMatrix);
            // 加上机身位置
            const finalCamPos = camTarget.add(planeGroup.position);
            
            camera.position.lerp(finalCamPos, 0.1);
            camera.lookAt(planeGroup.position.x + 30, planeGroup.position.y, 0);
        }

        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            update(clock.getDelta());
            renderer.render(scene, camera);
        }

        // 按钮事件
        ui.startBtn.onclick = () => {
            state.running = true;
            ui.startBtn.disabled = true;
            ui.status.innerText = "ROLLING (滑跑)";
        };

        ui.resetBtn.onclick = () => {
            state.running = false;
            state.speed = 0;
            state.distance = 0;
            state.altitude = 0;
            state.phase = 'ground';
            planeGroup.position.set(-300, 3.2, 0);
            planeGroup.rotation.set(0,0,0);
            ui.startBtn.disabled = false;
            ui.status.innerText = "WAITING";
            
            // 重置相机
            camera.position.set(-350, 20, 60);
            camera.lookAt(-300, 3, 0);
        };

        window.addEventListener('resize', () => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });

        animate();
    </script>
</body>
</html>
