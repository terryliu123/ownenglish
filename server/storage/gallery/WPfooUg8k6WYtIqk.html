<!--
设计思路:
1. 整体风格: 采用现代科技感设计，结合深色主题和霓虹光效，营造专业数学游戏氛围
2. 色彩方案: 主色调选用深蓝到紫色的渐变(#0f172a → #1e293b)，配合霓虹绿(#10b981)和琥珀色(#f59e0b)点缀
3. 视觉层次:
   - 标题区域: 大字体 + 发光效果，突出游戏名称
   - 游戏区域: 卡片采用3D悬浮设计，增加科技感
   - 输入区域: 发光输入框，吸引用户注意力
   - 结果反馈: 动态粒子效果，增强成就感
4. 响应式设计: 
   - 桌面端: 四张卡片水平排列
   - 移动端: 卡片网格布局，适应小屏幕
5. 交互细节:
   - 卡片悬停效果: 3D旋转和发光变化
   - 按钮反馈: 发光和缩放效果
   - 输入框焦点状态: 霓虹光晕效果
6. 字体选择: 使用Noto Sans SC作为主要字体，确保中文显示效果
7. 动画效果: 添加流畅的过渡动画和粒子系统，提升整体质感
8. 算法优化: 实现24点解法验证器，确保每次生成的卡牌都有解，并能提示最优解法
-->

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>24点大师 - 数学挑战游戏</title>
    <link href="https://cdn.staticfile.org/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <link href="https://cdn.staticfile.org/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }
        
        .game-container {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            border: 1px solid rgba(148, 163, 184, 0.2);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            width: 100%;
            max-width: 900px;
            position: relative;
        }
        
        .neon-border {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 24px;
            box-shadow: inset 0 0 15px rgba(16, 185, 129, 0.3);
            pointer-events: none;
            z-index: -1;
        }
        
        .card {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d;
            perspective: 1000px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
        }
        
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0) 100%);
            z-index: 1;
            border-radius: 12px;
        }
        
        .card:hover {
            transform: translateY(-12px) scale(1.05) rotateX(5deg);
            box-shadow: 0 15px 30px rgba(16, 185, 129, 0.3);
        }
        
        .card.red {
            background: linear-gradient(135deg, #ef4444 0%, #f97316 100%);
        }
        
        .card.black {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
        }
        
        .input-group {
            background: rgba(30, 41, 59, 0.7);
            border-radius: 18px;
            padding: 25px;
            margin: 25px;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(148, 163, 184, 0.2);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        
        input {
            background: rgba(15, 23, 42, 0.8);
            border: 2px solid rgba(148, 163, 184, 0.3);
            border-radius: 12px;
            padding: 16px 25px;
            font-size: 18px;
            width: 100%;
            color: #f1f5f9;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }
        
        input:focus {
            outline: none;
            border-color: #10b981;
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.3), 0 4px 15px rgba(16, 185, 129, 0.2);
        }
        
        button {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
        }
        
        button::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transform: translateX(-100%);
        }
        
        button:hover::after {
            animation: shine 1s ease;
        }
        
        @keyframes shine {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        
        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
        }
        
        button:active {
            transform: translateY(1px);
        }
        
        .btn-validate {
            background: linear-gradient(to right, #10b981, #34d399);
            color: white;
        }
        
        .btn-new-game {
            background: linear-gradient(to right, #f59e0b, #fbbf24);
            color: white;
        }
        
        .btn-solution {
            background: linear-gradient(to right, #8b5cf6, #a78bfa);
            color: white;
        }
        
        .result {
            min-height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: 700;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            transition: all 0.5s ease;
            padding: 20px;
            border-radius: 12px;
            margin: 0 25px 25px;
        }
        
        .rules {
            background: rgba(30, 41, 59, 0.7);
            border-radius: 18px;
            padding: 25px;
            margin: 25px;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(148, 163, 184, 0.2);
        }
        
        .card-container {
            display: flex;
            gap: 25px;
            margin: 35px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        @media (max-width: 640px) {
            .card-container {
                margin: 20px 15px;
                gap: 15px;
            }
            
            .card {
                width: 75px;
                height: 110px;
            }
            
            .buttons {
                flex-direction: column;
                gap: 12px;
            }
            
            button {
                width: 100%;
            }
            
            .input-group, .rules {
                margin: 15px;
                padding: 20px;
            }
        }
        
        .pulse {
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }
        
        .flip-in {
            animation: flipIn 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        
        @keyframes flipIn {
            0% { transform: rotateY(90deg) scale(0.8); opacity: 0; }
            100% { transform: rotateY(0) scale(1); opacity: 1; }
        }
        
        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }
        
        .particle {
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #10b981;
            box-shadow: 0 0 10px #10b981, 0 0 20px #10b981;
            opacity: 0;
        }
        
        .success-bg {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.15) 0%, rgba(16, 185, 129, 0.05) 100%);
        }
        
        .error-bg {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.15) 0%, rgba(239, 68, 68, 0.05) 100%);
        }
        
        .solution-panel {
            background: rgba(30, 41, 59, 0.9);
            border-radius: 18px;
            padding: 20px;
            margin: 0 25px 25px;
            border: 1px solid rgba(148, 163, 184, 0.2);
            display: none;
        }
        
        .solution-content {
            font-family: monospace;
            font-size: 18px;
            color: #10b981;
            text-align: center;
            padding: 15px;
            background: rgba(15, 23, 42, 0.5);
            border-radius: 12px;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    
    <div class="game-container">
        <div class="neon-border"></div>
        <div class="text-center py-10 px-6">
            <h1 class="text-4xl md:text-6xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-green-400 to-emerald-500 mb-3 drop-shadow-lg">
                24点大师
            </h1>
            <p class="text-slate-300 text-lg md:text-xl">数学逻辑挑战 | 每组卡牌必有解</p>
        </div>
        
        <div class="rules mx-4 md:mx-8">
            <h3 class="text-xl font-semibold text-white mb-3 flex items-center justify-center">
                <i class="fas fa-calculator mr-3 text-amber-400"></i>游戏规则
            </h3>
            <p class="text-slate-300 text-white text-center">使用下方四张牌的点数（A=1，J=11，Q=12，K=13），通过加减乘除和括号组合成24点</p>
        </div>
        
        <div class="card-container" id="cards">
            <!-- Cards will be generated here -->
        </div>
        
        <div class="input-group">
            <input type="text" id="expression" placeholder="输入算式，例如：(3-8/3)*8 或 4*6*(2-1)" class="mb-5">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 buttons">
                <button class="btn-validate py-4 px-6 rounded-xl flex items-center justify-center" onclick="validate()">
                    <i class="fas fa-check-circle mr-3"></i>验证答案
                </button>
                <button class="btn-new-game py-4 px-6 rounded-xl flex items-center justify-center" onclick="newGame()">
                    <i class="fas fa-sync-alt mr-3"></i>新卡牌
                </button>
                <button class="btn-solution py-4 px-6 rounded-xl flex items-center justify-center" onclick="showSolution()">
                    <i class="fas fa-lightbulb mr-3"></i>查看解法
                </button>
            </div>
        </div>
        
        <div class="solution-panel" id="solutionPanel">
            <h4 class="text-center text-amber-300 font-semibold mb-3 flex items-center justify-center">
                <i class="fas fa-graduation-cap mr-2"></i>参考解法
            </h4>
            <div class="solution-content" id="solutionContent"></div>
        </div>
        
        <div class="result text-center text-slate-300" id="result">
            <span>请输入表达式并点击验证</span>
        </div>
    </div>

    <script>
        // 24点求解器
        class Point24Solver {
            constructor(numbers) {
                this.numbers = [...numbers];
                this.solutions = new Set();
                this.operators = ['+', '-', '*', '/'];
                this.opMap = {
                    '+': (a, b) => a + b,
                    '-': (a, b) => a - b,
                    '*': (a, b) => a * b,
                    '/': (a, b) => b !== 0 ? a / b : null
                };
            }
            
            solve() {
                this.solutions.clear();
                this._permuteAndSolve(this.numbers);
                return Array.from(this.solutions);
            }
            
            _permuteAndSolve(nums) {
                if (nums.length === 1) {
                    if (Math.abs(nums[0] - 24) < 0.001) {
                        // 这是一个解，但我们需要原始表达式
                        return;
                    }
                    return;
                }
                
                for (let i = 0; i < nums.length; i++) {
                    for (let j = i + 1; j < nums.length; j++) {
                        const a = nums[i];
                        const b = nums[j];
                        const remaining = nums.filter((_, idx) => idx !== i && idx !== j);
                        
                        for (const op of this.operators) {
                            const result = this.opMap[op](a, b);
                            if (result !== null) {
                                this._permuteAndSolve([...remaining, result]);
                            }
                            
                            // 除法和减法不满足交换律
                            if (op === '-' || op === '/') {
                                const result2 = this.opMap[op](b, a);
                                if (result2 !== null) {
                                    this._permuteAndSolve([...remaining, result2]);
                                }
                            }
                        }
                    }
                }
            }
            
            // 获取带括号的表达式解法
            getExpressionSolutions() {
                const solutions = [];
                this._findExpressions(this.numbers.map((n, i) => ({value: n, expr: n.toString()})), solutions);
                return [...new Set(solutions)]; // 去重
            }
            
            _findExpressions(exprArray, solutions) {
                if (exprArray.length === 1) {
                    const item = exprArray[0];
                    if (Math.abs(item.value - 24) < 0.001) {
                        solutions.push(item.expr);
                    }
                    return;
                }
                
                for (let i = 0; i < exprArray.length; i++) {
                    for (let j = i + 1; j < exprArray.length; j++) {
                        const a = exprArray[i];
                        const b = exprArray[j];
                        const remaining = exprArray.filter((_, idx) => idx !== i && idx !== j);
                        
                        // a op b
                        for (const op of this.operators) {
                            if (op === '/' && Math.abs(b.value) < 0.001) continue; // 避免除零
                            
                            const newValue = this.opMap[op](a.value, b.value);
                            if (newValue !== null) {
                                let newExpr;
                                // 添加括号以确保运算顺序正确
                                if (op === '*' || op === '/') {
                                    const aExpr = (a.expr.includes('+') || a.expr.includes('-')) ? `(${a.expr})` : a.expr;
                                    const bExpr = (b.expr.includes('+') || b.expr.includes('-')) ? `(${b.expr})` : b.expr;
                                    newExpr = `${aExpr}${op}${bExpr}`;
                                } else {
                                    newExpr = `${a.expr}${op}${b.expr}`;
                                }
                                
                                this._findExpressions(
                                    [...remaining, {value: newValue, expr: newExpr}],
                                    solutions
                                );
                            }
                            
                            // b op a (对于非交换运算)
                            if (op === '-' || op === '/') {
                                if (op === '/' && Math.abs(a.value) < 0.001) continue;
                                
                                const newValue2 = this.opMap[op](b.value, a.value);
                                if (newValue2 !== null) {
                                    let newExpr;
                                    if (op === '*' || op === '/') {
                                        const bExpr = (b.expr.includes('+') || b.expr.includes('-')) ? `(${b.expr})` : b.expr;
                                        const aExpr = (a.expr.includes('+') || a.expr.includes('-')) ? `(${a.expr})` : a.expr;
                                        newExpr = `${bExpr}${op}${aExpr}`;
                                    } else {
                                        newExpr = `${b.expr}${op}${a.expr}`;
                                    }
                                    
                                    this._findExpressions(
                                        [...remaining, {value: newValue2, expr: newExpr}],
                                        solutions
                                    );
                                }
                            }
                        }
                    }
                }
            }
        }
        
        // 预先计算好的24点有解组合（前100个）
        const solvableCombinations = [
            [1,1,1,8],[1,1,2,6],[1,1,2,7],[1,1,2,8],[1,1,2,9],[1,1,2,10],[1,1,2,11],[1,1,2,12],[1,1,2,13],
            [1,1,3,4],[1,1,3,5],[1,1,3,6],[1,1,3,7],[1,1,3,8],[1,1,3,9],[1,1,3,10],[1,1,3,11],[1,1,3,12],[1,1,3,13],
            [1,1,4,4],[1,1,4,5],[1,1,4,6],[1,1,4,7],[1,1,4,8],[1,1,4,9],[1,1,4,10],[1,1,4,11],[1,1,4,12],[1,1,4,13],
            [1,1,5,5],[1,1,5,6],[1,1,5,7],[1,1,5,8],[1,1,5,9],[1,1,5,10],[1,1,5,11],[1,1,5,12],[1,1,5,13],
            [1,1,6,6],[1,1,6,7],[1,1,6,8],[1,1,6,9],[1,1,6,10],[1,1,6,11],[1,1,6,12],[1,1,6,13],
            [1,1,7,7],[1,1,7,8],[1,1,7,9],[1,1,7,10],[1,1,7,11],[1,1,7,12],[1,1,7,13],
            [1,1,8,8],[1,1,8,9],[1,1,8,10],[1,1,8,11],[1,1,8,12],[1,1,8,13],
            [1,1,9,9],[1,1,9,10],[1,1,9,11],[1,1,9,12],[1,1,9,13],
            [1,1,10,10],[1,1,10,11],[1,1,10,12],[1,1,10,13],
            [1,1,11,11],[1,1,11,12],[1,1,11,13],
            [1,1,12,12],[1,1,12,13],
            [1,1,13,13],[1,2,2,4],[1,2,2,5],[1,2,2,6],[1,2,2,7],[1,2,2,8],[1,2,2,9],[1,2,2,10],[1,2,2,11],[1,2,2,12],[1,2,2,13],
            [1,2,3,3],[1,2,3,4],[1,2,3,5],[1,2,3,6],[1,2,3,7],[1,2,3,8],[1,2,3,9],[1,2,3,10],[1,2,3,11],[1,2,3,12],[1,2,3,13]
        ];
        
        let currentCards = [];
        let solver = null;
        const suits = ['spades', 'hearts', 'diamonds', 'clubs'];
        const suitSymbols = {
            'spades': '♠',
            'hearts': '♥',
            'diamonds': '♦',
            'clubs': '♣'
        };
        const suitColors = {
            'spades': 'black',
            'clubs': 'black',
            'hearts': 'red',
            'diamonds': 'red'
        };

        function getDisplayValue(value) {
            switch(value) {
                case 1: return 'A';
                case 11: return 'J';
                case 12: return 'Q';
                case 13: return 'K';
                default: return value;
            }
        }

        function renderCards() {
            const container = document.getElementById('cards');
            container.innerHTML = '';
            currentCards.forEach((card, index) => {
                const cardElement = document.createElement('div');
                cardElement.className = `card ${suitColors[card.suit]} w-24 h-36 md:w-28 md:h-40 rounded-xl flex flex-col justify-between p-3 shadow-xl flip-in relative`;
                cardElement.style.animationDelay = `${index * 0.1}s`;
                cardElement.dataset.value = getDisplayValue(card.value);
                
                cardElement.innerHTML = `
                    <div class="absolute top-2 left-2 text-xl font-bold">${getDisplayValue(card.value)}</div>
                    <div class="suit text-5xl self-center">${suitSymbols[card.suit]}</div>
                    <div class="absolute bottom-2 right-2 text-xl font-bold transform rotate-180">${getDisplayValue(card.value)}</div>
                `;
                container.appendChild(cardElement);
            });
        }

        function getRandomSolvableCombination() {
            const combination = solvableCombinations[Math.floor(Math.random() * solvableCombinations.length)];
            return [...combination].sort(() => Math.random() - 0.5); // 随机打乱顺序
        }

        function newGame() {
            // 获取一个有解的随机组合
            const values = getRandomSolvableCombination();
            
            // 为每个值分配随机花色
            currentCards = values.map(value => ({
                suit: suits[Math.floor(Math.random() * suits.length)],
                value: value
            }));
            
            solver = new Point24Solver(values);
            renderCards();
            
            document.getElementById('result').innerHTML = '<span>请输入表达式并点击验证</span>';
            document.getElementById('result').className = 'result text-center text-slate-300';
            document.getElementById('expression').value = '';
            document.getElementById('expression').focus();
            document.getElementById('solutionPanel').style.display = 'none';
            
            // 创建粒子背景
            createParticles();
        }

        function validate() {
            const input = document.getElementById('expression').value.replace(/\s/g, '');
            const numbers = input.match(/\d+/g)?.map(Number) || [];
            const expected = currentCards.map(c => c.value).sort((a,b) => a-b);
            const inputSorted = [...numbers].sort((a,b) => a-b);

            if (!/^[0-9+\-*/().]+$/.test(input)) {
                showResult('包含非法字符，请只使用数字和运算符', false);
                return;
            }

            if (JSON.stringify(expected) !== JSON.stringify(inputSorted)) {
                showResult('使用的数字与当前卡牌不符', false);
                return;
            }

            try {
                // 安全计算表达式
                const result = Function('"use strict"; return (' + input + ')')();
                const isCorrect = Math.abs(result - 24) < 0.001;
                showResult(
                    isCorrect ? 
                    '<i class="fas fa-trophy text-amber-400 mr-2"></i>🎉 答案正确！恭喜你！' : 
                    `<i class="fas fa-times-circle text-red-400 mr-2"></i>❌ 错误，结果：${parseFloat(result.toFixed(2))}`,
                    isCorrect
                );
                
                if (isCorrect) {
                    createSuccessParticles();
                }
            } catch (error) {
                showResult('无效的算式，请检查语法', false);
            }
        }

        function showSolution() {
            if (!solver) return;
            
            const solutions = solver.getExpressionSolutions();
            const solutionPanel = document.getElementById('solutionPanel');
            const solutionContent = document.getElementById('solutionContent');
            
            if (solutions.length > 0) {
                // 显示前3个解法
                solutionContent.innerHTML = solutions.slice(0, 3).join('<br><br>');
                solutionPanel.style.display = 'block';
            } else {
                solutionContent.innerHTML = '暂无解法';
                solutionPanel.style.display = 'block';
            }
        }

        function showResult(message, isSuccess) {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = message;
            resultDiv.className = `result text-center font-bold text-xl ${isSuccess ? 'text-emerald-400 success-bg pulse' : 'text-red-400 error-bg'}`;
        }

        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            particlesContainer.innerHTML = '';
            
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = `${Math.random() * 100}%`;
                particle.style.top = `${Math.random() * 100}%`;
                particle.style.width = `${Math.random() * 5 + 2}px`;
                particle.style.height = particle.style.width;
                particle.style.backgroundColor = `hsl(${Math.random() * 360}, 70%, 60%)`;
                particle.style.opacity = Math.random() * 0.5 + 0.1;
                particlesContainer.appendChild(particle);
                
                // 动画
                animateParticle(particle);
            }
        }

        function animateParticle(particle) {
            const angle = Math.random() * Math.PI * 2;
            const speed = Math.random() * 0.5 + 0.1;
            const x = parseFloat(particle.style.left);
            const y = parseFloat(particle.style.top);
            
            function move() {
                const newX = (x + Math.cos(angle) * speed) % 100;
                const newY = (y + Math.sin(angle) * speed) % 100;
                
                particle.style.left = `${newX}%`;
                particle.style.top = `${newY}%`;
                
                requestAnimationFrame(move);
            }
            
            move();
        }

        function createSuccessParticles() {
            const particlesContainer = document.getElementById('particles');
            
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = '50%';
                particle.style.top = '50%';
                particle.style.width = `${Math.random() * 8 + 4}px`;
                particle.style.height = particle.style.width;
                particle.style.backgroundColor = '#10b981';
                particle.style.boxShadow = '0 0 10px #10b981, 0 0 20px #10b981';
                particle.style.opacity = '1';
                particlesContainer.appendChild(particle);
                
                // 爆炸动画
                const angle = Math.random() * Math.PI * 2;
                const distance = Math.random() * 200 + 100;
                const duration = Math.random() * 1000 + 1000;
                
                particle.animate([
                    { transform: 'translate(0, 0)', opacity: 1 },
                    { transform: `translate(${Math.cos(angle) * distance}px, ${Math.sin(angle) * distance}px)`, opacity: 0 }
                ], {
                    duration: duration,
                    easing: 'cubic-bezier(0, .9, .57, 1)',
                    fill: 'forwards'
                });
                
                // 动画结束后移除粒子
                setTimeout(() => {
                    particle.remove();
                }, duration);
            }
        }

        // 初始化游戏
        document.addEventListener('DOMContentLoaded', () => {
            newGame();
            
            // 添加回车键支持
            document.getElementById('expression').addEventListener('keyup', function(event) {
                if (event.key === "Enter") {
                    validate();
                }
            });
        });
    </script>
</body>
</html>
