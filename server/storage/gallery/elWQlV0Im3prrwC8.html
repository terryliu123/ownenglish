<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>快乐小掌柜</title>
    <style>
        /* 基础样式 */
        body {
            font-family: 'Comic Sans MS', '微软雅黑', sans-serif;
            background-color: #FFEEDD;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #333;
        }
        
        .game-container {
            width: 100%;
            max-width: 800px;
            background-color: #FFF;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            padding: 20px;
            position: relative;
            overflow: hidden;
            border: 5px solid #FFAA33;
        }
        
        /* 顶部信息栏 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 3px dotted #FFCC00;
        }
        
        .game-title {
            font-size: 32px;
            color: #FF5500;
            margin: 0;
            text-shadow: 3px 3px 0 #FFCC00;
            font-weight: bold;
        }
        
        .score-display {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .score, .lives {
            background-color: #FFEE99;
            padding: 10px 15px;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 3px 0 #FFCC00;
            border: 2px solid #FFAA33;
        }
        
        /* 场景选择 */
        .scene-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
        }
        
        .scene-btn {
            background-color: #66CCFF;
            color: white;
            border: none;
            padding: 12px 18px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
            font-size: 16px;
            box-shadow: 0 3px 0 #3399CC;
        }
        
        .scene-btn:hover {
            background-color: #55BBEE;
            transform: scale(1.05);
        }
        
        .scene-btn.active {
            background-color: #FF9966;
            box-shadow: 0 0 0 3px #FFCC00;
        }
        
        /* 商品展示区 */
        .items-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .item {
            background-color: #FFF;
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 4px solid #DDFFDD;
            position: relative;
            overflow: hidden;
        }
        
        .item:hover {
            transform: translateY(-5px) rotate(2deg);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
            border-color: #66CCFF;
        }
        
        .item.selected {
            border-color: #FF9966;
            background-color: #FFF9E6;
            animation: bounce 0.5s;
        }
        
        .item-img {
            width: 70px;
            height: 70px;
            object-fit: contain;
            margin-bottom: 10px;
            transition: all 0.3s;
        }
        
        .item:hover .item-img {
            transform: scale(1.1);
        }
        
        .item-name {
            font-weight: bold;
            margin: 5px 0;
            font-size: 18px;
            color: #3366CC;
        }
        
        .item-price {
            color: #FF3366;
            font-weight: bold;
            font-size: 20px;
            background-color: #FFF0F5;
            padding: 3px 10px;
            border-radius: 10px;
            display: inline-block;
        }
        
        /* 游戏主区域 */
        .game-area {
            background-color: #F0F9FF;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            border: 4px dashed #66CCFF;
            position: relative;
        }
        
        .current-task {
            text-align: center;
            margin-bottom: 25px;
            min-height: 80px;
        }
        
        .task-item {
            font-size: 28px;
            font-weight: bold;
            color: #FF9966;
            margin-bottom: 10px;
        }
        
        .task-price {
            font-size: 40px;
            color: #FF3366;
            margin: 15px 0;
            font-weight: bold;
            text-shadow: 2px 2px 0 #FFEEDD;
        }
        
        /* 钱币选择区 */
        .money-selection {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin-bottom: 25px;
            padding: 15px;
            background-color: #FFF;
            border-radius: 15px;
            border: 3px solid #FFCC99;
            overflow-x: auto;
            max-width: 100%;
        }
        
        .money-btn {
            background-color: #66CC99;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            transition: all 0.2s;
            position: relative;
            min-width: 80px;
            box-shadow: 0 4px 0 #339966;
        }
        
        .money-btn:hover {
            background-color: #55BB88;
            transform: scale(1.05);
        }
        
        .money-btn:active {
            transform: scale(0.95);
        }
        
        .money-btn .count {
            position: absolute;
            top: -10px;
            right: -10px;
            background-color: #FF3366;
            color: white;
            width: 25px;
            height: 25px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }
        
        .money-img {
            width: 40px;
            height: 40px;
            object-fit: contain;
            margin-bottom: 5px;
        }
        
        .money-name {
            font-size: 16px;
        }
        
        /* 已选信息 */
        .selected-info {
            background-color: #FFF;
            padding: 15px;
            border-radius: 15px;
            margin: 15px 0;
            border: 3px solid #CCEEFF;
        }
        
        .selected-money {
            text-align: center;
            min-height: 30px;
            font-weight: bold;
            color: #3366CC;
            font-size: 18px;
        }
        
        .total-amount {
            font-size: 24px;
            color: #66CC66;
            margin: 10px 0;
            text-align: center;
            font-weight: bold;
        }
        
        /* 操作按钮 */
        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 20px;
        }
        
        .submit-btn, .reset-btn {
            padding: 15px 30px;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 18px;
            box-shadow: 0 4px 0 rgba(0,0,0,0.2);
        }
        
        .submit-btn {
            background-color: #66CC66;
            color: white;
        }
        
        .submit-btn:hover {
            background-color: #55BB55;
            transform: translateY(-2px);
        }
        
        .submit-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 rgba(0,0,0,0.2);
        }
        
        .reset-btn {
            background-color: #FF6666;
            color: white;
        }
        
        .reset-btn:hover {
            background-color: #EE5555;
            transform: translateY(-2px);
        }
        
        .reset-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 rgba(0,0,0,0.2);
        }
        
        /* 反馈信息 */
        .feedback {
            text-align: center;
            margin-top: 20px;
            min-height: 40px;
            font-weight: bold;
            font-size: 24px;
            padding: 10px;
            border-radius: 10px;
        }
        
        .success {
            color: #66CC66;
            animation: bounce 0.5s;
            background-color: #F0FFF0;
        }
        
        .error {
            color: #FF6666;
            animation: shake 0.5s;
            background-color: #FFF0F0;
        }
        
        /* 成就弹窗 */
        .achievement {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: #FFEE99;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            z-index: 100;
            text-align: center;
            display: none;
            border: 5px solid #FFAA33;
            max-width: 80%;
        }
        
        .achievement.show {
            display: block;
            animation: pop 0.5s;
        }
        
        .achievement-icon {
            font-size: 60px;
            margin-bottom: 15px;
            display: block;
        }
        
        .achievement-title {
            font-size: 28px;
            color: #FF6600;
            margin-bottom: 15px;
            font-weight: bold;
        }
        
        .achievement-desc {
            font-size: 18px;
            color: #666;
            margin-bottom: 0;
        }
        
        /* 动画效果 */
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-20px);}
            60% {transform: translateY(-10px);}
        }
        
        @keyframes shake {
            0%, 100% {transform: translateX(0);}
            10%, 30%, 50%, 70%, 90% {transform: translateX(-5px);}
            20%, 40%, 60%, 80% {transform: translateX(5px);}
        }
        
        @keyframes pop {
            0% {transform: translate(-50%, -50%) scale(0.5); opacity: 0;}
            80% {transform: translate(-50%, -50%) scale(1.1); opacity: 1;}
            100% {transform: translate(-50%, -50%) scale(1); opacity: 1;}
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        .money-flying {
            position: absolute;
            width: 40px;
            height: 40px;
            background-size: contain;
            background-repeat: no-repeat;
            z-index: 10;
            animation: fly 1s forwards;
        }
        
        @keyframes fly {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(0.5) translate(var(--tx), var(--ty)); opacity: 0; }
        }
        
        /* 新手引导 */
        .tutorial {
            background-color: #E6F7FF;
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
            border-left: 6px solid #66CCFF;
        }
        
        .tutorial-title {
            color: #3366CC;
            margin-top: 0;
            font-size: 20px;
            font-weight: bold;
        }
        
        .tutorial-content {
            margin-bottom: 0;
            font-size: 16px;
            line-height: 1.6;
        }
        
        /* 响应式设计 */
        @media (max-width: 600px) {
            .items-container {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .money-btn {
                min-width: 70px;
                padding: 12px;
            }
            
            .game-title {
                font-size: 24px;
            }
            
            .task-price {
                font-size: 32px;
            }
            
            .action-buttons {
                gap: 15px;
            }
            
            .submit-btn, .reset-btn {
                padding: 12px 20px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1 class="game-title">快乐小掌柜</h1>
            <div class="score-display">
                <div class="score">积分: <span id="score">0</span></div>
                <div class="lives">生命: <span id="lives">❤️❤️❤️</span></div>
            </div>
        </div>
        
        <div class="scene-selector">
            <button class="scene-btn active" data-scene="supermarket">超 市</button>
            <button class="scene-btn" data-scene="stationery">文具店</button>
            <button class="scene-btn" data-scene="fastfood">甜品站</button>
        </div>
        
        <div class="items-container" id="items-container">
            <!-- 商品将通过JavaScript动态生成 -->
        </div>
        
        <div class="game-area">
            <div class="current-task">
                <div class="task-item">请选择一个商品</div>
                <div class="task-price" id="task-price"></div>
            </div>
            
            <div class="money-selection" id="money-selection">
                <!-- 货币选择按钮将通过JavaScript动态生成 -->
            </div>
            
            <div class="selected-info">
                <div class="selected-money" id="selected-money">
                    已选: 0元
                </div>
                <div class="total-amount" id="total-amount">
                    总计: 0元
                </div>
            </div>
            
            <div class="action-buttons">
                <button class="submit-btn" id="submit-btn">提交支付</button>
                <button class="reset-btn" id="reset-btn">重新选择</button>
            </div>
            
            <div class="feedback" id="feedback"></div>
        </div>
        
        <div class="tutorial">
            <h3 class="tutorial-title">📢 游戏说明</h3>
            <p class="tutorial-content">
                1. 点击商品查看价格<br>
                2. 选择合适的人民币组合支付<br>
                3. 点击"提交支付"检查答案<br>
                4. 用最少张数支付可获得"智慧星"奖励!
            </p>
        </div>
    </div>
    
    <div class="achievement" id="achievement">
        <div class="achievement-icon" id="achievement-icon">🏆</div>
        <div class="achievement-title" id="achievement-title">成就解锁!</div>
        <div class="achievement-desc" id="achievement-desc"></div>
    </div>
    
    <script>
        // 游戏数据
        const gameData = {
            scenes: {
                supermarket: {
                    name: "超市",
                    items: [
                        { name: "草莓", price: 12.5, image: "🍓" },
                        { name: "牛奶", price: 8, image: "🥛" },
                        { name: "面包", price: 6.5, image: "🍞" },
                        { name: "鸡蛋", price: 9.8, image: "🥚" },
                        { name: "苹果", price: 5.2, image: "🍎" },
                        { name: "香蕉", price: 3.5, image: "🍌" },
                        { name: "西瓜", price: 15, image: "🍉" },
                        { name: "饼干", price: 7.8, image: "🍪" }
                    ]
                },
                stationery: {
                    name: "文具店",
                    items: [
                        { name: "铅笔盒", price: 24, image: "✏️" },
                        { name: "橡皮", price: 1.2, image: "🧼" },
                        { name: "笔记本", price: 5.5, image: "📓" },
                        { name: "水彩笔", price: 12.8, image: "🖍️" },
                        { name: "剪刀", price: 6.5, image: "✂️" },
                        { name: "胶水", price: 3.8, image: "🧴" },
                        { name: "尺子", price: 2.5, image: "📏" },
                        { name: "书包", price: 48, image: "🎒" }
                    ]
                },
                fastfood: {
                    name: "甜品站",
                    items: [
                        { name: "蛋糕", price: 35, image: "🍰" },
                        { name: "冰淇淋", price: 6.8, image: "🍦" },
                        { name: "棒棒糖", price: 3.5, image: "🍭" },
                        { name: "巧克力", price: 8.2, image: "🍫" },
                        { name: "布丁", price: 5.5, image: "🍮" },
                        { name: "甜甜圈", price: 7.5, image: "🍩" },
                        { name: "果汁", price: 4.8, image: "🧃" },
                        { name: "糖果", price: 2.2, image: "🍬" }
                    ]
                }
            },
            moneyTypes: [
                { value: 100, name: "100元", image: "💵" },
                { value: 50, name: "50元", image: "💵" },
                { value: 20, name: "20元", image: "💵" },
                { value: 10, name: "10元", image: "💵" },
                { value: 5, name: "5元", image: "💵" },
                { value: 1, name: "1元", image: "💰" },
                { value: 0.5, name: "5角", image: "🪙" },
                { value: 0.1, name: "1角", image: "🪙" }
            ],
            achievements: [
                { id: "first", title: "第一次成功!", desc: "完成了第一次支付", icon: "🎯", check: (game) => game.stats.successCount >= 1 },
                { id: "combo3", title: "三连击!", desc: "连续3次正确支付", icon: "⚡", check: (game) => game.stats.combo >= 3 },
                { id: "optimal5", title: "省钱小能手", desc: "完成5次最优支付", icon: "💎", check: (game) => game.stats.optimalCount >= 5 },
                { id: "perfect", title: "完美小掌柜", desc: "无错误通关一个场景", icon: "🏆", check: (game) => game.stats.perfectCount >= 8 }
            ]
        };
        
        // 游戏状态
        const gameState = {
            currentScene: "supermarket",
            selectedItem: null,
            selectedMoney: {},
            score: 0,
            lives: 3,
            stats: {
                successCount: 0,
                errorCount: 0,
                combo: 0,
                perfectCount: 0,
                optimalCount: 0,
                scenePerfect: 0
            },
            lastSuccess: false
        };
        
        // DOM元素
        const elements = {
            itemsContainer: document.getElementById("items-container"),
            moneySelection: document.getElementById("money-selection"),
            taskPrice: document.getElementById("task-price"),
            selectedMoney: document.getElementById("selected-money"),
            totalAmount: document.getElementById("total-amount"),
            submitBtn: document.getElementById("submit-btn"),
            resetBtn: document.getElementById("reset-btn"),
            feedback: document.getElementById("feedback"),
            scoreDisplay: document.getElementById("score"),
            livesDisplay: document.getElementById("lives"),
            achievement: document.getElementById("achievement"),
            achievementTitle: document.getElementById("achievement-title"),
            achievementDesc: document.getElementById("achievement-desc"),
            achievementIcon: document.getElementById("achievement-icon"),
            sceneBtns: document.querySelectorAll(".scene-btn")
        };
        
        // 初始化游戏
        function initGame() {
            renderItems();
            renderMoneyButtons();
            setupEventListeners();
            updateUI();
        }
        
        // 渲染商品列表
        function renderItems() {
            elements.itemsContainer.innerHTML = "";
            const items = gameData.scenes[gameState.currentScene].items;
            
            items.forEach((item, index) => {
                const itemElement = document.createElement("div");
                itemElement.className = "item";
                itemElement.dataset.name = item.name;
                itemElement.dataset.price = item.price;
                itemElement.dataset.index = index;
                
                itemElement.innerHTML = `
                    <div class="item-img">${item.image}</div>
                    <div class="item-name">${item.name}</div>
                    <div class="item-price">${formatPrice(item.price)}元</div>
                `;
                
                itemElement.addEventListener("click", () => selectItem(item));
                elements.itemsContainer.appendChild(itemElement);
            });
        }
        
        // 渲染货币选择按钮
        function renderMoneyButtons() {
            elements.moneySelection.innerHTML = "";
            
            gameData.moneyTypes.forEach(money => {
                const btn = document.createElement("button");
                btn.className = "money-btn";
                btn.dataset.value = money.value;
                btn.innerHTML = `
                    <div class="money-img">${money.image}</div>
                    <div class="money-name">${money.name}</div>
                    <div class="count">0</div>
                `;
                
                btn.addEventListener("click", () => selectMoney(money.value));
                elements.moneySelection.appendChild(btn);
            });
        }
        
        // 设置事件监听器
        function setupEventListeners() {
            // 场景切换按钮
            elements.sceneBtns.forEach(btn => {
                btn.addEventListener("click", () => {
                    elements.sceneBtns.forEach(b => b.classList.remove("active"));
                    btn.classList.add("active");
                    gameState.currentScene = btn.dataset.scene;
                    gameState.selectedItem = null;
                    gameState.selectedMoney = {};
                    gameState.stats.scenePerfect = 0;
                    renderItems();
                    updateUI();
                    showFeedback(`欢迎来到${gameData.scenes[gameState.currentScene].name}！`, "success");
                });
            });
            
            // 提交按钮
            elements.submitBtn.addEventListener("click", checkAnswer);
            
            // 重置按钮
            elements.resetBtn.addEventListener("click", resetSelection);
        }
        
        // 选择商品
        function selectItem(item) {
            // 移除之前选中的商品的高亮
            document.querySelectorAll(".item.selected").forEach(el => {
                el.classList.remove("selected");
            });
            
            // 高亮当前选中的商品
            const itemElement = document.querySelector(`.item[data-name="${item.name}"]`);
            itemElement.classList.add("selected");
            
            gameState.selectedItem = item;
            gameState.selectedMoney = {};
            updateUI();
            
            // 显示价格提示
            showFeedback(`请支付: ${formatPrice(item.price)}元`, "success");
        }
        
        // 选择货币
        function selectMoney(value) {
            if (!gameState.selectedItem) {
                showFeedback("请先选择商品!", "error");
                return;
            }
            
            if (!gameState.selectedMoney[value]) {
                gameState.selectedMoney[value] = 0;
            }
            
            gameState.selectedMoney[value]++;
            updateUI();
        }
        
        // 更新UI
        function updateUI() {
            // 更新商品价格显示
            if (gameState.selectedItem) {
                elements.taskPrice.textContent = `${formatPrice(gameState.selectedItem.price)}元`;
            } else {
                elements.taskPrice.textContent = "";
            }
            
            // 更新货币按钮计数
            Object.keys(gameState.selectedMoney).forEach(value => {
                const count = gameState.selectedMoney[value];
                const btn = document.querySelector(`.money-btn[data-value="${value}"] .count`);
                if (btn) btn.textContent = count;
            });
            
            // 更新已选金额显示
            const selectedText = getSelectedMoneyText();
            elements.selectedMoney.textContent = selectedText;
            
            // 更新总金额
            const total = calculateTotal();
            elements.totalAmount.textContent = `总计: ${formatPrice(total)}元`;
            
            // 更新积分和生命值
            elements.scoreDisplay.textContent = gameState.score;
            elements.livesDisplay.textContent = "❤️".repeat(gameState.lives);
        }
        
        // 计算已选货币总金额
        function calculateTotal() {
            return Object.entries(gameState.selectedMoney).reduce((total, [value, count]) => {
                return total + (parseFloat(value) * count);
            }, 0);
        }
        
        // 获取已选货币文本描述
        function getSelectedMoneyText() {
            if (Object.keys(gameState.selectedMoney).length === 0) {
                return "已选: 0元";
            }
            
            const parts = [];
            Object.entries(gameState.selectedMoney).forEach(([value, count]) => {
                if (count > 0) {
                    const money = gameData.moneyTypes.find(m => m.value == value);
                    parts.push(`${count}张${money.name}`);
                }
            });
            
            return "已选: " + parts.join(" + ");
        }
        
        // 检查答案
        function checkAnswer() {
            if (!gameState.selectedItem) {
                showFeedback("请先选择商品!", "error");
                return;
            }
            
            const total = calculateTotal();
            const price = gameState.selectedItem.price;
            const diff = Math.abs(total - price);
            
            // 检查是否完全匹配
            if (diff < 0.001) { // 处理浮点数精度问题
                handleSuccess();
            } else if (total < price) {
                handleError(`金额不足! 还差${formatPrice(price - total)}元`);
            } else {
                handleError(`金额过多! 多了${formatPrice(total - price)}元`);
            }
        }
        
        // 处理成功
        function handleSuccess() {
            // 计算是否是最优解
            const isOptimal = checkOptimalSolution();
            
            // 更新状态
            gameState.stats.successCount++;
            gameState.stats.combo++;
            gameState.stats.scenePerfect++;
            
            if (isOptimal) {
                gameState.stats.optimalCount++;
            }
            
            // 检查是否完美通关当前场景
            if (gameState.stats.scenePerfect >= gameData.scenes[gameState.currentScene].items.length) {
                gameState.stats.perfectCount++;
                showAchievement({
                    title: "完美通关!",
                    desc: `你在${gameData.scenes[gameState.currentScene].name}中全部正确!`,
                    icon: "🏅"
                });
            }
            
            // 计算得分
            let points = 10;
            if (isOptimal) points += 5;
            if (gameState.stats.combo >= 3) points += 5;
            
            gameState.score += points;
            gameState.lastSuccess = true;
            
            // 显示反馈
            let feedbackText = `支付成功! (+${points}分)`;
            if (isOptimal) feedbackText += " 💎最优解!";
            if (gameState.stats.combo >= 3) feedbackText += " ⚡连击x"+gameState.stats.combo;
            
            showFeedback(feedbackText, "success");
            
            // 播放货币飞入动画
            playMoneyAnimation();
            
            // 检查成就
            checkAchievements();
            
            // 重置选择
            setTimeout(() => {
                resetSelection();
                updateUI();
            }, 1500);
        }
        
        // 处理错误
        function handleError(message) {
            gameState.lives--;
            gameState.stats.errorCount++;
            gameState.stats.combo = 0;
            gameState.stats.scenePerfect = 0;
            gameState.lastSuccess = false;
            
            showFeedback(message, "error");
            
            if (gameState.lives <= 0) {
                setTimeout(() => {
                    alert(`游戏结束! 你的最终得分是: ${gameState.score}`);
                    resetGame();
                }, 1000);
            }
            
            updateUI();
        }
        
        // 检查是否是最优解
        function checkOptimalSolution() {
            if (!gameState.selectedItem) return false;
            
            const price = gameState.selectedItem.price;
            const selectedValues = Object.entries(gameState.selectedMoney)
                .filter(([_, count]) => count > 0)
                .map(([value]) => parseFloat(value))
                .sort((a, b) => b - a); // 从大到小排序
            
            // 简单的最优解检查：是否使用了最少张数
            let remaining = price;
            let optimalCount = 0;
            const availableMoney = gameData.moneyTypes.map(m => m.value).sort((a, b) => b - a);
            
            for (const value of availableMoney) {
                const count = Math.floor(remaining / value);
                optimalCount += count;
                remaining = parseFloat((remaining - count * value).toFixed(1));
                
                if (remaining < 0.001) break; // 处理浮点数精度
            }
            
            const actualCount = Object.values(gameState.selectedMoney).reduce((a, b) => a + b, 0);
            
            return actualCount <= optimalCount;
        }
        
        // 播放货币飞入动画
        function playMoneyAnimation() {
            const moneyElements = document.querySelectorAll(".money-btn[data-value]");
            const target = document.querySelector(".task-price");
            
            if (!target) return;
            
            const targetRect = target.getBoundingClientRect();
            const targetX = targetRect.left + targetRect.width / 2;
            const targetY = targetRect.top + targetRect.height / 2;
            
            moneyElements.forEach(btn => {
                const value = btn.dataset.value;
                const count = gameState.selectedMoney[value] || 0;
                
                if (count > 0) {
                    const btnRect = btn.getBoundingClientRect();
                    const startX = btnRect.left + btnRect.width / 2;
                    const startY = btnRect.top + btnRect.height / 2;
                    
                    for (let i = 0; i < count; i++) {
                        setTimeout(() => {
                            const money = document.createElement("div");
                            money.className = "money-flying";
                            money.innerHTML = gameData.moneyTypes.find(m => m.value == value).image;
                            money.style.left = startX + "px";
                            money.style.top = startY + "px";
                            money.style.setProperty("--tx", (targetX - startX) + "px");
                            money.style.setProperty("--ty", (targetY - startY) + "px");
                            
                            document.body.appendChild(money);
                            
                            setTimeout(() => {
                                money.remove();
                            }, 1000);
                        }, i * 200);
                    }
                }
            });
        }
        
        // 显示反馈信息
        function showFeedback(message, type) {
            elements.feedback.textContent = message;
            elements.feedback.className = "feedback " + type;
            
            setTimeout(() => {
                elements.feedback.textContent = "";
                elements.feedback.className = "feedback";
            }, 2000);
        }
        
        // 检查成就
        function checkAchievements() {
            gameData.achievements.forEach(achievement => {
                if (achievement.check(gameState) && !gameState[`achievement_${achievement.id}`]) {
                    showAchievement(achievement);
                    gameState[`achievement_${achievement.id}`] = true;
                }
            });
        }
        
        // 显示成就
        function showAchievement(achievement) {
            elements.achievementIcon.textContent = achievement.icon || "🏆";
            elements.achievementTitle.textContent = achievement.title;
            elements.achievementDesc.textContent = achievement.desc;
            elements.achievement.classList.add("show");
            
            setTimeout(() => {
                elements.achievement.classList.remove("show");
            }, 3000);
        }
        
        // 重置选择
        function resetSelection() {
            gameState.selectedMoney = {};
            updateUI();
        }
        
        // 重置游戏
        function resetGame() {
            gameState.score = 0;
            gameState.lives = 3;
            gameState.selectedItem = null;
            gameState.selectedMoney = {};
            gameState.stats = {
                successCount: 0,
                errorCount: 0,
                combo: 0,
                perfectCount: 0,
                optimalCount: 0,
                scenePerfect: 0
            };
            
            // 重置成就标记
            gameData.achievements.forEach(achievement => {
                gameState[`achievement_${achievement.id}`] = false;
            });
            
            updateUI();
            showFeedback("游戏已重置，重新开始吧！", "success");
        }
        
        // 格式化价格显示
        function formatPrice(price) {
            // 处理整数
            if (price % 1 === 0) {
                return price;
            }
            
            // 处理小数
            const yuan = Math.floor(price);
            const jiao = Math.round((price - yuan) * 10);
            
            if (yuan === 0) {
                return `${jiao}角`;
            } else {
                return `${yuan}元${jiao}角`;
            }
        }
        
        // 初始化游戏
        initGame();
    </script>
</body>
</html>
