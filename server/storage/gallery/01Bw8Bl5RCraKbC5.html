<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教育数据看板 - 星空背景</title>
    <link href="https://cdn.staticfile.org/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <link href="https://cdn.staticfile.org/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        @keyframes twinkle {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 1; }
        }
        
        @keyframes cardEntrance {
            0% {
                opacity: 0;
                transform: translateY(30px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes fadeIn {
            0% {
                opacity: 0;
            }
            100% {
                opacity: 1;
            }
        }
        
        .star {
            position: absolute;
            background-color: white;
            border-radius: 50%;
            animation: twinkle linear infinite;
        }
        
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: radial-gradient(ellipse at bottom, #1b2735 0%, #090a0f 100%);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            opacity: 0;
            animation: cardEntrance 0.6s forwards;
        }
        
        .glass-card:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
        }
        
        .chart-container {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            opacity: 0;
            animation: fadeIn 0.8s forwards;
        }
        
        .table-container {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            opacity: 0;
            animation: fadeIn 1s forwards;
        }
        
        .stat-card-1 { background: linear-gradient(135deg, rgba(236, 72, 153, 0.3) 0%, rgba(219, 39, 119, 0.3) 100%); }
        .stat-card-2 { background: linear-gradient(135deg, rgba(59, 130, 246, 0.3) 0%, rgba(37, 99, 235, 0.3) 100%); }
        .stat-card-3 { background: linear-gradient(135deg, rgba(16, 185, 129, 0.3) 0%, rgba(5, 150, 105, 0.3) 100%); }
        .stat-card-4 { background: linear-gradient(135deg, rgba(245, 158, 11, 0.3) 0%, rgba(217, 119, 6, 0.3) 100%); }
        
        .text-glow {
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }
        
        table {
            background: rgba(255, 255, 255, 0.03);
        }
        
        th {
            background: rgba(255, 255, 255, 0.1);
        }
        
        tr:hover {
            background: rgba(255, 255, 255, 0.08) !important;
        }
        
        /* 图表容器样式 */
        .chart-wrapper {
            position: relative;
            height: 300px;
        }
        
        /* 数字动画 */
        .number-animate {
            display: inline-block;
            overflow: hidden;
            vertical-align: bottom;
        }
        
        .number-digit {
            display: inline-block;
            transition: all 0.5s ease;
        }
        
        .header-title {
            opacity: 0;
            animation: fadeIn 1s forwards;
        }
    </style>
</head>
<body>
    <!-- 星空背景 -->
    <div id="stars"></div>
    
    <!-- 第一排：统计数据卡片 -->
    <div class="text-white py-8 px-4 mb-8">
        <div class="container mx-auto text-center">
            <h1 class="text-3xl md:text-4xl font-bold mb-2 text-glow header-title">2025-2026学年第一学期 全学科选择课程统计</h1>
        </div>
    </div>

    <div class="container mx-auto px-4 -mt-8">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
            <div class="stat-card-1 glass-card rounded-xl p-6 text-center text-white" style="animation-delay: 0.1s">
                <i class="fas fa-book text-3xl mb-3"></i>
                <h3 class="text-lg font-medium mb-1">课程门类</h3>
                <p class="text-3xl font-bold" id="courseTotal">0</p>
            </div>
            <div class="stat-card-2 glass-card rounded-xl p-6 text-center text-white" style="animation-delay: 0.3s">
                <i class="fas fa-graduation-cap text-3xl mb-3"></i>
                <h3 class="text-lg font-medium mb-1">课程数量</h3>
                <p class="text-3xl font-bold" id="clubTotal">0</p>
            </div>
            <div class="stat-card-3 glass-card rounded-xl p-6 text-center text-white" style="animation-delay: 0.5s">
                <i class="fas fa-user-graduate text-3xl mb-3"></i>
                <h3 class="text-lg font-medium mb-1">学生总数</h3>
                <p class="text-3xl font-bold" id="studentTotal">0</p>
            </div>
            <div class="stat-card-4 glass-card rounded-xl p-6 text-center text-white" style="animation-delay: 0.7s">
                <i class="fas fa-chart-line text-3xl mb-3"></i>
                <h3 class="text-lg font-medium mb-1">学生人次</h3>
                <p class="text-3xl font-bold" id="studentTimesTotal">0</p>
            </div>
        </div>
    </div>

    <!-- 第二排：饼图 -->
    <div class="container mx-auto px-4 mb-8">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="chart-container glass-card" style="animation-delay: 0.9s">
                <h3 class="text-xl font-semibold mb-4 text-center text-white">课程门类统计</h3>
                <div class="chart-wrapper">
                    <canvas id="coursePieChart"></canvas>
                </div>
            </div>
            <div class="chart-container glass-card" style="animation-delay: 1.1s">
                <h3 class="text-xl font-semibold mb-4 text-center text-white">课程数量统计</h3>
                <div class="chart-wrapper">
                    <canvas id="clubPieChart"></canvas>
                </div>
            </div>
            <div class="chart-container glass-card" style="animation-delay: 1.3s">
                <h3 class="text-xl font-semibold mb-4 text-center text-white">学科学生人次占比</h3>
                <div class="chart-wrapper">
                    <canvas id="studentPieChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <!-- 第三排：柱状图 -->
    <div class="container mx-auto px-4 mb-8">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="chart-container glass-card" style="animation-delay: 1.5s">
                <h3 class="text-xl font-semibold mb-4 text-center text-white">各学科学生参与人次</h3>
                <div class="chart-wrapper">
                    <canvas id="studentCountBarChart"></canvas>
                </div>
            </div>
            <div class="chart-container glass-card" style="animation-delay: 1.7s">
                <h3 class="text-xl font-semibold mb-4 text-center text-white">各学科学生参与人数</h3>
                <div class="chart-wrapper">
                    <canvas id="studentNumBarChart"></canvas>
                </div>
            </div>
            <div class="chart-container glass-card" style="animation-delay: 1.9s">
                <h3 class="text-xl font-semibold mb-4 text-center text-white">课程门类分布</h3>
                <div class="chart-wrapper">
                    <canvas id="courseBarChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <!-- 第四排：数据表格 -->
    <div class="container mx-auto px-4 mb-8">
        <div class="table-container" style="animation-delay: 2.1s">
            <h3 class="text-xl font-semibold mb-4 text-center text-white">详细数据统计表</h3>
            <div class="overflow-x-auto">
                <table class="min-w-full text-white">
                    <thead>
                        <tr>
                            <th class="py-3 px-4 text-left">序号</th>
                            <th class="py-3 px-4 text-left">类别</th>
                            <th class="py-3 px-4 text-left">课程门类（门）</th>
                            <th class="py-3 px-4 text-left">课程数量（个）</th>
                            <th class="py-3 px-4 text-left">学生数量（人次）</th>
                            <th class="py-3 px-4 text-left">学生数量（人数）</th>
                            <th class="py-3 px-4 text-left">人数占比</th>
                        </tr>
                    </thead>
                    <tbody id="dataTableBody">
                        <!-- 数据将通过JavaScript动态生成 -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // 创建星空背景
        function createStars() {
            const starsContainer = document.getElementById('stars');
            const starCount = 200;
            
            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.classList.add('star');
                
                // 随机位置和大小
                const size = Math.random() * 3;
                const posX = Math.random() * 100;
                const posY = Math.random() * 100;
                const duration = Math.random() * 5 + 3;
                const delay = Math.random() * 5;
                
                star.style.width = `${size}px`;
                star.style.height = `${size}px`;
                star.style.left = `${posX}%`;
                star.style.top = `${posY}%`;
                star.style.animationDuration = `${duration}s`;
                star.style.animationDelay = `${delay}s`;
                
                starsContainer.appendChild(star);
            }
        }

        // 数字动画函数
        function animateNumber(elementId, targetNumber, duration = 2000) {
            const element = document.getElementById(elementId);
            let start = 0;
            const increment = targetNumber / (duration / 16);
            
            const timer = setInterval(() => {
                start += increment;
                if (start >= targetNumber) {
                    element.textContent = targetNumber.toLocaleString();
                    clearInterval(timer);
                } else {
                    element.textContent = Math.floor(start).toLocaleString();
                }
            }, 16);
        }

        // 确保Chart.js加载完成后再初始化图表
        function initCharts() {
            if (typeof Chart !== 'undefined') {
                // 数据定义
                const chartSubjects = ['语文', '数学', '英语', '科学', '体育', '音乐', '美术', '劳动', '团体操', '全人大讲堂'];
                const chartCourseData = [21, 7, 6, 24, 21, 13, 26, 6, 6, 12];
                const chartClubData = [31, 35, 12, 64, 81, 19, 28, 12, 10, 12];
                const chartStudentCountData = [1550, 1750, 600, 2762, 2949, 2071, 1108, 480, 2000, 6695];
                const chartStudentNumData = [1550, 1750, 600, 2464, 2475, 1976, 1012, 480, 2000, 6695];
                const totalCount = 6695;

                // 颜色配置 - 确保所有颜色都不重复
                const uniqueColors = [
                    'rgba(236, 72, 153, 0.8)',   // 粉色 - 语文
                    'rgba(59, 130, 246, 0.8)',    // 蓝色 - 数学
                    'rgba(16, 185, 129, 0.8)',    // 绿色 - 英语
                    'rgba(245, 158, 11, 0.8)',    // 黄色 - 科学
                    'rgba(239, 68, 68, 0.8)',     // 红色 - 体育
                    'rgba(139, 92, 246, 0.8)',    // 紫色 - 音乐
                    'rgba(6, 182, 212, 0.8)',     // 青色 - 美术
                    'rgba(249, 115, 22, 0.8)',    // 橙色 - 劳动
                    'rgba(124, 58, 237, 0.8)',    // 深紫色 - 团体操
                    'rgba(219, 39, 119, 0.8)'     // 深粉色 - 全人大讲堂
                ];
                
                const borderColors = [
                    'rgba(236, 72, 153, 1)', 
                    'rgba(59, 130, 246, 1)', 
                    'rgba(16, 185, 129, 1)', 
                    'rgba(245, 158, 11, 1)', 
                    'rgba(239, 68, 68, 1)', 
                    'rgba(139, 92, 246, 1)', 
                    'rgba(6, 182, 212, 1)', 
                    'rgba(249, 115, 22, 1)', 
                    'rgba(124, 58, 237, 1)', 
                    'rgba(219, 39, 119, 1)'
                ];

                // 自定义数据标签插件
                const dataLabelPlugin = {
                    id: 'dataLabelPlugin',
                    afterDatasetsDraw(chart) {
                        const { ctx, data, chartArea: { top, bottom, left, right, width, height } } = chart;
                        ctx.save();
                        
                        if (chart.config.type === 'pie') {
                            chart.getDatasetMeta(0).data.forEach((datapoint, index) => {
                                const { x, y } = datapoint.tooltipPosition();
                                const halfCircle = Math.PI / 180;
                                const dataTotal = data.datasets[0].data.reduce((a, b) => a + b, 0);
                                const currentValue = data.datasets[0].data[index];
                                const percentage = parseFloat(((currentValue / dataTotal) * 100).toFixed(1));
                                
                                if (percentage > 3) {
                                    ctx.font = 'bold 12px sans-serif';
                                    ctx.fillStyle = '#fff';
                                    ctx.textAlign = 'center';
                                    ctx.textBaseline = 'middle';
                                    ctx.fillText(`${percentage}%`, x, y);
                                }
                            });
                        } else if (chart.config.type === 'bar') {
                            chart.getDatasetMeta(0).data.forEach((datapoint, index) => {
                                const { x, y } = datapoint.tooltipPosition();
                                const currentValue = data.datasets[0].data[index];
                                
                                ctx.font = 'bold 12px sans-serif';
                                ctx.fillStyle = '#fff';
                                ctx.textAlign = 'center';
                                ctx.textBaseline = 'bottom';
                                ctx.fillText(currentValue, x, y - 5);
                            });
                        }
                        
                        ctx.restore();
                    }
                };

                // 创建饼图
                function createPieChart(canvasId, data, label) {
                    const ctx = document.getElementById(canvasId).getContext('2d');
                    return new Chart(ctx, {
                        type: 'pie',
                        data: {
                            labels: chartSubjects,
                            datasets: [{
                                data: data,
                                backgroundColor: uniqueColors,
                                borderColor: borderColors,
                                borderWidth: 1
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: {
                                legend: {
                                    position: 'bottom',
                                    labels: {
                                        padding: 15,
                                        usePointStyle: true,
                                        color: 'rgba(255, 255, 255, 0.9)',
                                        font: {
                                            size: 12
                                        }
                                    }
                                },
                                tooltip: {
                                    callbacks: {
                                        label: function(context) {
                                            return `${context.label}: ${context.raw}`;
                                        }
                                    }
                                }
                            }
                        },
                        plugins: [dataLabelPlugin]
                    });
                }

                // 创建饼图（学生人次占比，使用完整的10个科目）
                function createStudentPieChart(canvasId, data, label) {
                    const ctx = document.getElementById(canvasId).getContext('2d');
                    return new Chart(ctx, {
                        type: 'pie',
                        data: {
                            labels: chartSubjects,
                            datasets: [{
                                data: data,
                                backgroundColor: uniqueColors,
                                borderColor: borderColors,
                                borderWidth: 1
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: {
                                legend: {
                                    position: 'bottom',
                                    labels: {
                                        padding: 15,
                                        usePointStyle: true,
                                        color: 'rgba(255, 255, 255, 0.9)',
                                        font: {
                                            size: 12
                                        }
                                    }
                                },
                                tooltip: {
                                    callbacks: {
                                        label: function(context) {
                                            return `${context.label}: ${context.raw}`;
                                        }
                                    }
                                }
                            }
                        },
                        plugins: [dataLabelPlugin]
                    });
                }

                // 创建柱状图
                function createBarChart(canvasId, data, label) {
                    const ctx = document.getElementById(canvasId).getContext('2d');
                    return new Chart(ctx, {
                        type: 'bar',
                        data: {
                            labels: chartSubjects,
                            datasets: [{
                                label: label,
                                data: data,
                                backgroundColor: 'rgba(99, 102, 241, 0.6)',
                                borderColor: 'rgba(99, 102, 241, 1)',
                                borderWidth: 1
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            scales: {
                                y: {
                                    beginAtZero: true,
                                    grid: {
                                        color: 'rgba(255, 255, 255, 0.1)'
                                    },
                                    ticks: {
                                        color: 'rgba(255, 255, 255, 0.7)'
                                    }
                                },
                                x: {
                                    grid: {
                                        color: 'rgba(255, 255, 255, 0.1)'
                                    },
                                    ticks: {
                                        color: 'rgba(255, 255, 255, 0.7)'
                                    }
                                }
                            },
                            plugins: {
                                legend: {
                                    labels: {
                                        color: 'rgba(255, 255, 255, 0.9)'
                                    }
                                },
                                tooltip: {
                                    callbacks: {
                                        label: function(context) {
                                            return `${context.dataset.label}: ${context.raw}`;
                                        }
                                    }
                                }
                            }
                        },
                        plugins: [dataLabelPlugin]
                    });
                }

                // 生成表格数据
                function generateTableData() {
                    const tbody = document.getElementById('dataTableBody');
                    tbody.innerHTML = '';
                    
                    chartSubjects.forEach((subject, index) => {
                        const percentage = ((chartStudentNumData[index] / totalCount) * 100).toFixed(2);
                        const row = `
                            <tr class="border-b border-white border-opacity-10">
                                <td class="py-3 px-4">${index + 1}</td>
                                <td class="py-3 px-4 font-medium">${subject}</td>
                                <td class="py-3 px-4">${chartCourseData[index]}</td>
                                <td class="py-3 px-4">${chartClubData[index]}</td>
                                <td class="py-3 px-4">${chartStudentCountData[index].toLocaleString()}</td>
                                <td class="py-3 px-4">${chartStudentNumData[index].toLocaleString()}</td>
                                <td class="py-3 px-4">${percentage}%</td>
                            </tr>
                        `;
                        tbody.innerHTML += row;
                    });
                    
                    // 添加总计行
                    const totalRow = `
                        <tr class="bg-white bg-opacity-10 font-bold">
                            <td class="py-3 px-4">总计</td>
                            <td class="py-3 px-4"></td>
                            <td class="py-3 px-4">${chartCourseData.reduce((a, b) => a + b, 0)}</td>
                            <td class="py-3 px-4">${chartClubData.reduce((a, b) => a + b, 0)}</td>
                            <td class="py-3 px-4">${chartStudentCountData.reduce((a, b) => a + b, 0).toLocaleString()}</td>
                            <td class="py-3 px-4">${chartStudentNumData.reduce((a, b) => a + b, 0).toLocaleString()}</td>
                            <td class="py-3 px-4">100%</td>
                        </tr>
                    `;
                    tbody.innerHTML += totalRow;
                }

                // 创建图表
                createPieChart('coursePieChart', chartCourseData, '课程门类');
                createPieChart('clubPieChart', chartClubData, '课程数量');
                createStudentPieChart('studentPieChart', chartStudentNumData, '学生人数');

                // 创建柱状图
                createBarChart('studentCountBarChart', chartStudentCountData, '学生参与人次');
                createBarChart('studentNumBarChart', chartStudentNumData, '学生参与人数');
                createBarChart('courseBarChart', chartCourseData, '课程门类');

                // 生成表格数据
                generateTableData();
            } else {
                // 如果Chart.js还未加载完成，等待一段时间再尝试
                setTimeout(initCharts, 100);
            }
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 创建星空背景
            createStars();
            
            // 动画加载统计数据卡片
            setTimeout(() => {
                animateNumber('courseTotal', 142);
                animateNumber('clubTotal', 304);
                animateNumber('studentTotal', 6695);
                animateNumber('studentTimesTotal', 21965);
            }, 500);
            
            // 加载Chart.js
            const script = document.createElement('script');
            script.src = 'https://cdn.staticfile.org/Chart.js/3.9.1/chart.min.js';
            script.onload = function() {
                // 初始化图表
                setTimeout(initCharts, 1000);
            };
            document.head.appendChild(script);
        });
    </script>
</body>
</html>
