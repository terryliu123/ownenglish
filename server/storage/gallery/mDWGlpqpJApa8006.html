<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarvis AR System v2.0</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', 'Courier New', monospace;
        }

        /* 容器用于叠放视频和3D画布 */
        .ar-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        /* 1. 摄像头背景层 */
        .input_video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; /* 保证视频填满屏幕 */
            transform: scaleX(-1); /* 镜像翻转，符合镜子直觉 */
            z-index: 0;
            filter: brightness(0.7) contrast(1.2) hue-rotate(180deg) saturate(0.5); /* 滤镜：让现实世界看起来冷酷一点 */
        }

        /* 2. Three.js 3D 层 */
        #output_canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            transform: scaleX(-1); /* 必须和视频层一样翻转，否则手和物体对不上 */
        }

        /* 3. HUD 界面层 */
        .hud-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
            background: radial-gradient(circle at center, transparent 60%, rgba(0, 20, 20, 0.8) 100%);
            box-shadow: inset 0 0 50px rgba(0, 255, 255, 0.1);
        }

        /* UI 元素 */
        .status-bar {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            color: #0ff;
            text-align: center;
            font-size: 14px;
            letter-spacing: 2px;
            text-shadow: 0 0 5px #0ff;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 20px;
            border: 1px solid #0ff;
            border-radius: 20px;
        }

        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #0ff;
            font-size: 20px;
            text-align: center;
            z-index: 10;
        }

        /* 瞄准准星 */
        .reticle {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 200px;
            height: 200px;
            transform: translate(-50%, -50%);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 50%;
        }
        .reticle::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 1px;
            background: rgba(0, 255, 255, 0.3);
        }
        .reticle::before {
            content: '';
            position: absolute;
            left: 50%;
            top: 0;
            height: 100%;
            width: 1px;
            background: rgba(0, 255, 255, 0.3);
        }

        /* 装饰用的网格线 */
        .grid-line {
            position: absolute;
            background: rgba(0, 255, 255, 0.2);
        }
    </style>

    <!-- 核心库 -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="loading" class="loading">
        INITIALIZING PROTOCOLS...<br>
        <span style="font-size:12px; color: #aaa;">请允许摄像头权限</span>
    </div>

    <div class="ar-container">
        <!-- 视频层 -->
        <video class="input_video" playsinline></video>
        <!-- 3D 层 -->
        <canvas id="output_canvas"></canvas>
        
        <!-- HUD 层 -->
        <div class="hud-overlay">
            <div class="reticle"></div>
            <div class="status-bar" id="statusText">SYSTEM STANDBY</div>
            
            <!-- 装饰线 -->
            <div class="grid-line" style="top: 10%; left: 0; width: 100%; height: 1px;"></div>
            <div class="grid-line" style="bottom: 10%; left: 0; width: 100%; height: 1px;"></div>
        </div>
    </div>

<script>
    // --- 1. Three.js 初始化 ---
    const canvas = document.getElementById('output_canvas');
    const scene = new THREE.Scene();
    // 注意：这里没有背景色，背景是透明的，从而看到底下的 video

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = 5;

    const renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setClearColor(0x000000, 0); // 完全透明

    // 灯光
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);
    const dirLight = new THREE.DirectionalLight(0x00ffff, 1);
    dirLight.position.set(2, 5, 5);
    scene.add(dirLight);

    // --- 2. 创建高科技 3D 物体 ---

    // A. 核心能量球 (The Arc Reactor)
    const sphereGroup = new THREE.Group();
    scene.add(sphereGroup);

    // 外层线框
    const wireGeo = new THREE.IcosahedronGeometry(1, 1);
    const wireMat = new THREE.MeshBasicMaterial({ color: 0x00ffff, wireframe: true, opacity: 0.5, transparent: true });
    const wireMesh = new THREE.Mesh(wireGeo, wireMat);
    sphereGroup.add(wireMesh);

    // 内核 (实心发光)
    const coreGeo = new THREE.OctahedronGeometry(0.6, 0);
    const coreMat = new THREE.MeshPhongMaterial({ 
        color: 0x00ff00, 
        emissive: 0x004400,
        shininess: 100,
        transparent: true,
        opacity: 0.8
    });
    const coreMesh = new THREE.Mesh(coreGeo, coreMat);
    sphereGroup.add(coreMesh);

    // 旋转光环
    const ringGeo = new THREE.TorusGeometry(1.4, 0.05, 16, 100);
    const ringMat = new THREE.MeshBasicMaterial({ color: 0x00ffff, opacity: 0.3, transparent: true });
    const ringMesh = new THREE.Mesh(ringGeo, ringMat);
    sphereGroup.add(ringMesh);

    // B. 双手连接线 (Laser Beam)
    // 当检测到两只手时，在两手之间画一条线
    const lineMaterial = new THREE.LineBasicMaterial({ color: 0x00ff00, transparent: true, opacity: 0 });
    const lineGeometry = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0), new THREE.Vector3(0,0,0)]);
    const connectionLine = new THREE.Line(lineGeometry, lineMaterial);
    scene.add(connectionLine);

    // C. 悬浮数据面板 (Floating UI)
    const cards = [];
    function createCard() {
        const w = 1.2, h = 0.8;
        const geo = new THREE.PlaneGeometry(w, h);
        
        // 生成纹理
        const cvs = document.createElement('canvas');
        cvs.width = 200; cvs.height = 150;
        const ctx = cvs.getContext('2d');
        ctx.fillStyle = "rgba(0, 20, 20, 0.6)";
        ctx.fillRect(0,0,200,150);
        ctx.strokeStyle = "#00ffff";
        ctx.lineWidth = 4;
        ctx.strokeRect(5,5,190,140);
        ctx.fillStyle = "#00ffff";
        ctx.font = "20px Arial";
        ctx.fillText("TARGETING", 20, 40);
        ctx.fillStyle = "rgba(0, 255, 255, 0.5)";
        ctx.fillRect(20, 60, Math.random()*150, 10);
        ctx.fillRect(20, 80, Math.random()*150, 10);

        const tex = new THREE.CanvasTexture(cvs);
        const mat = new THREE.MeshBasicMaterial({ map: tex, transparent: true, side: THREE.DoubleSide, opacity: 0.7 });
        const mesh = new THREE.Mesh(geo, mat);
        
        // 随机位置
        mesh.position.set((Math.random()-0.5)*10, (Math.random()-0.5)*6, -2);
        scene.add(mesh);
        cards.push(mesh);
    }
    for(let i=0; i<4; i++) createCard();


    // --- 3. MediaPipe 逻辑 (支持双手) ---
    
    const videoElement = document.getElementsByClassName('input_video')[0];
    const statusText = document.getElementById('statusText');
    
    let targetPos = new THREE.Vector3(0, 0, 0);
    let targetScale = 1;
    let handMode = "NONE"; // NONE, ONE, TWO

    function onResults(results) {
        document.getElementById('loading').style.display = 'none';

        const hands = results.multiHandLandmarks;

        if (hands && hands.length > 0) {
            
            // --- 情况 A: 双手检测 (TWO HANDS) ---
            if (hands.length === 2) {
                handMode = "TWO";
                statusText.innerText = "DUAL HAND TRACKING // SCALE CONTROL";
                
                // 获取两只手的中心点
                // 9号点是中指根部，比较稳定
                const hand1 = hands[0][9]; 
                const hand2 = hands[1][9];

                // 1. 计算两手中点 -> 设置球体位置
                const midX = (hand1.x + hand2.x) / 2;
                const midY = (hand1.y + hand2.y) / 2;
                
                // 映射坐标 (MediaPipe 0..1 -> Three.js -5..5)
                const x = (midX - 0.5) * 12;
                const y = -(midY - 0.5) * 8;
                targetPos.set(x, y, 0);

                // 2. 计算两手距离 -> 设置球体大小
                // 简单的欧几里得距离
                const dist = Math.sqrt(Math.pow(hand1.x - hand2.x, 2) + Math.pow(hand1.y - hand2.y, 2));
                
                // 映射距离到缩放 (距离0.1 -> 缩放0.5, 距离0.8 -> 缩放3.0)
                let s = dist * 4; 
                if (s < 0.5) s = 0.5;
                if (s > 4) s = 4;
                targetScale = s;

                // 3. 更新连接线
                const h1Pos = new THREE.Vector3((hand1.x - 0.5) * 12, -(hand1.y - 0.5) * 8, 0);
                const h2Pos = new THREE.Vector3((hand2.x - 0.5) * 12, -(hand2.y - 0.5) * 8, 0);
                const points = [h1Pos, h2Pos];
                connectionLine.geometry.setFromPoints(points);
                connectionLine.material.opacity = 0.8; // 显示线

            } 
            // --- 情况 B: 单手检测 (ONE HAND) ---
            else {
                handMode = "ONE";
                statusText.innerText = "SINGLE HAND // PINCH TO SCALE";

                const landmarks = hands[0];
                const wrist = landmarks[0];
                const thumb = landmarks[4];
                const index = landmarks[8];

                // 1. 位置跟随手腕
                const x = (wrist.x - 0.5) * 12;
                const y = -(wrist.y - 0.5) * 8;
                targetPos.set(x, y, 0);

                // 2. 捏合缩放
                const pinchDist = Math.sqrt(Math.pow(thumb.x - index.x, 2) + Math.pow(thumb.y - index.y, 2));
                let s = (pinchDist - 0.02) * 10;
                if(s < 0.5) s = 0.5;
                if(s > 2.5) s = 2.5;
                targetScale = s;

                connectionLine.material.opacity = 0; // 隐藏连接线
            }

        } else {
            handMode = "NONE";
            statusText.innerText = "SCANNING FOR USER...";
            // 没手时回到中心
            targetPos.set(0, 0, 0);
            targetScale = 0.8;
            connectionLine.material.opacity = 0;
        }
    }

    // MediaPipe Hands 配置
    const hands = new Hands({locateFile: (file) => {
        return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
    }});

    hands.setOptions({
        maxNumHands: 2, // 关键：允许两只手
        modelComplexity: 1,
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5
    });

    hands.onResults(onResults);

    const cameraUtils = new Camera(videoElement, {
        onFrame: async () => {
            await hands.send({image: videoElement});
        },
        width: 1280,
        height: 720
    });
    cameraUtils.start();


    // --- 4. 动画循环 ---
    function animate() {
        requestAnimationFrame(animate);

        // 平滑插值 (让动作看起来有重量感)
        sphereGroup.position.lerp(targetPos, 0.1);
        
        // 缩放插值
        const s = sphereGroup.scale.x;
        const newS = s + (targetScale - s) * 0.1;
        sphereGroup.scale.set(newS, newS, newS);

        // 自转特效
        wireMesh.rotation.y += 0.01;
        wireMesh.rotation.z -= 0.005;
        coreMesh.rotation.x += 0.02;
        ringMesh.rotation.x += 0.01;
        ringMesh.rotation.y += 0.01;

        // 根据状态改变颜色
        if (handMode === "TWO") {
            // 双手模式 - 能量全开 (红色核心)
            coreMat.color.setHex(0xff3300);
            coreMat.emissive.setHex(0x551100);
        } else {
            // 单手/待机 - 正常绿色
            coreMat.color.setHex(0x00ff00);
            coreMat.emissive.setHex(0x004400);
        }

        // 卡片互动
        cards.forEach((card, idx) => {
            // 简单悬浮
            card.position.y += Math.sin(Date.now()*0.002 + idx)*0.005;
            card.lookAt(camera.position); // 始终面向屏幕

            // 排斥逻辑
            const dist = sphereGroup.position.distanceTo(card.position);
            if (dist < 1.5 * newS) {
                 const dir = new THREE.Vector3().subVectors(card.position, sphereGroup.position).normalize();
                 card.position.add(dir.multiplyScalar(0.05));
            }
        });

        renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

</script>
</body>
</html>
