<!DOCTYPE html><html lang="zh-CN"><head><meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' data: blob: https://cdnjs.cloudflare.com https://cdn.jsdelivr.net https://code.jquery.com https://unpkg.com https://d3js.org https://threejs.org https://cdn.plot.ly https://stackpath.bootstrapcdn.com https://maps.googleapis.com https://cdn.tailwindcss.com https://ajax.googleapis.com https://kit.fontawesome.com https://cdn.datatables.net https://maxcdn.bootstrapcdn.com https://code.highcharts.com https://tako-static-assets-production.s3.amazonaws.com https://www.youtube.com https://fonts.googleapis.com https://fonts.gstatic.com https://pfst.cf2.poecdn.net https://puc.poecdn.net https://i.imgur.com https://wikimedia.org https://*.icons8.com https://*.giphy.com https://picsum.photos https://images.unsplash.com; frame-src 'self' https://www.youtube.com https://trytako.com; child-src 'self'; manifest-src 'self'; worker-src 'self'; upgrade-insecure-requests; block-all-mixed-content;">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>追及相遇问题互动游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(45deg, #ff6b6b, #ffa726);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .game-area {
            padding: 30px;
        }

        .mode-selector {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .mode-btn {
            flex: 1;
            min-width: 150px;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            background: #f0f0f0;
            color: #333;
        }

        .mode-btn.active {
            background: #4CAF50;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(76,175,80,0.3);
        }

        .track {
            width: 100%;
            height: 100px;
            background: #e0e0e0;
            border-radius: 10px;
            position: relative;
            margin: 20px 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .track.linear::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 2px;
            background: repeating-linear-gradient(
                to right,
                #666 0px,
                #666 20px,
                transparent 20px,
                transparent 40px
            );
        }

        .circular-track {
            width: 300px;
            height: 300px;
            border: 8px solid #666;
            border-radius: 50%;
            position: relative;
            background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
            margin: 20px auto;
        }

        .circular-track::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 4px;
            height: 4px;
            background: #333;
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }

        .circular-track::after {
            content: '起点';
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            background: #4CAF50;
            color: white;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: bold;
        }

        .person {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: all 0.1s linear;
            z-index: 2;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        .person1 {
            background: #ff4757;
            color: white;
        }

        .person2 {
            background: #3742fa;
            color: white;
        }

        /* 线性跑道中的人物位置 */
        .track.linear .person {
            top: 50%;
            transform: translateY(-50%);
        }

        /* 环形跑道中的人物位置 */
        .circular-track .person {
            top: 50%;
            left: 50%;
            transform-origin: 0 0;
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }

        .control-group {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            border: 2px solid #e9ecef;
        }

        .control-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #495057;
        }

        .control-group input, .control-group select {
            width: 100%;
            padding: 10px;
            border: 2px solid #dee2e6;
            border-radius: 5px;
            font-size: 16px;
        }

        .control-group input:focus, .control-group select:focus {
            outline: none;
            border-color: #007bff;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        .btn-primary {
            background: #007bff;
            color: white;
        }

        .btn-primary:hover {
            background: #0056b3;
            transform: translateY(-2px);
        }

        .btn-success {
            background: #28a745;
            color: white;
        }

        .btn-success:hover {
            background: #1e7e34;
            transform: translateY(-2px);
        }

        .btn-warning {
            background: #ffc107;
            color: #212529;
        }

        .btn-warning:hover {
            background: #e0a800;
            transform: translateY(-2px);
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn-danger:hover {
            background: #c82333;
            transform: translateY(-2px);
        }

        .results {
            background: #e7f3ff;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            border-left: 5px solid #007bff;
        }

        .formula-box {
            background: #fff3cd;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            border-left: 4px solid #ffc107;
        }

        .knowledge-points {
            background: #d1ecf1;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
        }

        .timer {
            font-size: 18px;
            font-weight: bold;
            color: #007bff;
            text-align: center;
            margin: 10px 0;
        }

        .circular-mode-selector {
            margin-bottom: 20px;
            text-align: center;
        }

        .circular-mode-selector label {
            font-weight: bold;
            margin-right: 10px;
        }

        .circular-mode-selector select {
            padding: 8px 15px;
            border: 2px solid #007bff;
            border-radius: 5px;
            font-size: 16px;
        }

        @media (max-width: 768px) {
            .controls {
                grid-template-columns: 1fr;
            }
            
            .action-buttons {
                flex-direction: column;
            }
            
            .mode-selector {
                flex-direction: column;
            }

            .circular-track {
                width: 250px;
                height: 250px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏃‍♂️ 追及相遇问题互动游戏 🏃‍♀️</h1>
            <p>通过动画演示学习速度、时间、路程的关系</p>
        </div>

        <div class="game-area">
            <div class="mode-selector">
                <button class="mode-btn active" onclick="setMode('chase')">追及问题</button>
                <button class="mode-btn" onclick="setMode('meet')">相遇问题</button>
                <button class="mode-btn" onclick="setMode('circular')">环形跑道</button>
            </div>

            <div class="circular-mode-selector" id="circularModeSelector" style="display: none;">
                <label>环形模式：</label>
                <select id="circularMode" onchange="updateCircularMode()">
                    <option value="chase">同向追及</option>
                    <option value="meet">相向相遇</option>
                </select>
            </div>

            <div class="track linear" id="track">
                <div class="person person1" id="person1">🏃‍♂️</div>
                <div class="person person2" id="person2">🏃‍♀️</div>
            </div>

            <div class="circular-track" id="circularTrack" style="display: none;">
                <div class="person person1" id="circularPerson1">🏃‍♂️</div>
                <div class="person person2" id="circularPerson2">🏃‍♀️</div>
            </div>

            <div class="timer" id="timer">时间: 0.0 秒</div>

            <div class="controls">
                <div class="control-group">
                    <label>红色选手速度 (米/秒)</label>
                    <input type="number" id="speed1" value="5" min="1" max="20">
                </div>
                <div class="control-group">
                    <label>蓝色选手速度 (米/秒)</label>
                    <input type="number" id="speed2" value="3" min="1" max="20">
                </div>
                <div class="control-group" id="distanceGroup">
                    <label>总距离 (米)</label>
                    <input type="number" id="distance" value="100" min="50" max="500">
                </div>
                <div class="control-group" id="circumferenceGroup" style="display: none;">
                    <label>跑道周长 (米)</label>
                    <input type="number" id="circumference" value="300" min="100" max="1000">
                </div>
                <div class="control-group" id="initialDistanceGroup">
                    <label>初始距离差 (米)</label>
                    <input type="number" id="initialDistance" value="20" min="0" max="100">
                </div>
            </div>

            <div class="action-buttons">
                <button class="btn btn-primary" onclick="startAnimation()">开始模拟</button>
                <button class="btn btn-warning" onclick="pauseAnimation()">暂停</button>
                <button class="btn btn-danger" onclick="resetAnimation()">重置</button>
                <button class="btn btn-success" onclick="calculateResult()">计算结果</button>
            </div>

            <div class="results" id="results" style="display: none;">
                <h3>📊 计算结果</h3>
                <div id="calculation"></div>
            </div>

            <div class="formula-box">
                <h3>💡 相关公式</h3>
                <div id="formulas">
                    <p><strong>基本公式：</strong> 路程 = 速度 × 时间</p>
                    <p><strong>追及时间：</strong> 时间 = 距离差 ÷ (快速度 - 慢速度)</p>
                </div>
            </div>

            <div class="knowledge-points">
                <h3>📚 知识要点</h3>
                <div id="knowledgeContent">
                    <p>• 追及问题：两人同向运动，快者追慢者</p>
                    <p>• 关键是理解相对速度的概念</p>
                    <p>• 注意初始位置的影响</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentMode = 'chase';
        let circularModeType = 'chase';
        let animationId = null;
        let startTime = 0;
        let isRunning = false;
        let isPaused = false;
        let pausedTime = 0;

        const linearTrack = document.getElementById('track');
        const circularTrack = document.getElementById('circularTrack');
        const person1 = document.getElementById('person1');
        const person2 = document.getElementById('person2');
        const circularPerson1 = document.getElementById('circularPerson1');
        const circularPerson2 = document.getElementById('circularPerson2');
        const timer = document.getElementById('timer');
        const results = document.getElementById('results');
        const calculation = document.getElementById('calculation');

        function setMode(mode) {
            currentMode = mode;
            
            // 更新按钮状态
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            // 显示/隐藏相应的跑道
            if (mode === 'circular') {
                linearTrack.style.display = 'none';
                circularTrack.style.display = 'block';
                document.getElementById('circularModeSelector').style.display = 'block';
                document.getElementById('distanceGroup').style.display = 'none';
                document.getElementById('circumferenceGroup').style.display = 'block';
            } else {
                linearTrack.style.display = 'flex';
                circularTrack.style.display = 'none';
                document.getElementById('circularModeSelector').style.display = 'none';
                document.getElementById('distanceGroup').style.display = 'block';
                document.getElementById('circumferenceGroup').style.display = 'none';
            }

            updateModeInterface();
            resetAnimation();
        }

        function updateCircularMode() {
            circularModeType = document.getElementById('circularMode').value;
            updateModeInterface();
            resetAnimation();
        }

        function updateModeInterface() {
            const initialDistanceGroup = document.getElementById('initialDistanceGroup');
            const formulas = document.getElementById('formulas');
            const knowledgeContent = document.getElementById('knowledgeContent');

            switch(currentMode) {
                case 'chase':
                    initialDistanceGroup.style.display = 'block';
                    formulas.innerHTML = `
                        <p><strong>基本公式：</strong> 路程 = 速度 × 时间</p>
                        <p><strong>追及时间：</strong> 时间 = 距离差 ÷ (快速度 - 慢速度)</p>
                        <p><strong>追及路程：</strong> 路程 = 快速度 × 追及时间</p>
                    `;
                    knowledgeContent.innerHTML = `
                        <p>• 追及问题：两人同向运动，快者在后追慢者</p>
                        <p>• 关键是理解相对速度 = 快速度 - 慢速度</p>
                        <p>• 初始距离差影响追及时间</p>
                        <p>• 当快者追上慢者时，两人走过的时间相同</p>
                    `;
                    break;
                    
                case 'meet':
                    initialDistanceGroup.style.display = 'none';
                    formulas.innerHTML = `
                        <p><strong>基本公式：</strong> 路程 = 速度 × 时间</p>
                        <p><strong>相遇时间：</strong> 时间 = 总距离 ÷ (速度1 + 速度2)</p>
                        <p><strong>相遇路程：</strong> 路程1 = 速度1 × 相遇时间</p>
                    `;
                    knowledgeContent.innerHTML = `
                        <p>• 相遇问题：两人相向而行，从两端出发</p>
                        <p>• 相对速度 = 速度1 + 速度2</p>
                        <p>• 相遇时，两人走过的时间相同</p>
                        <p>• 两人走过的路程之和等于总距离</p>
                    `;
                    break;
                    
                case 'circular':
                    initialDistanceGroup.style.display = 'none';
                    if (circularModeType === 'chase') {
                        formulas.innerHTML = `
                            <p><strong>环形追及：</strong> 时间 = 跑道周长 ÷ (快速度 - 慢速度)</p>
                            <p><strong>说明：</strong> 快者需要比慢者多跑一圈才能追上</p>
                        `;
                        knowledgeContent.innerHTML = `
                            <p>• 环形同向追及：两人同时同地同向出发</p>
                            <p>• 快者需要比慢者多跑一个周长才能追上</p>
                            <p>• 追及时间 = 周长 ÷ 速度差</p>
                            <p>• 追及时快者比慢者多跑了一圈</p>
                        `;
                    } else {
                        formulas.innerHTML = `
                            <p><strong>环形相遇：</strong> 时间 = 跑道周长 ÷ (速度1 + 速度2)</p>
                            <p><strong>说明：</strong> 两人合起来跑完一圈就相遇</p>
                        `;
                        knowledgeContent.innerHTML = `
                            <p>• 环形相向相遇：两人同时从同一点相向出发</p>
                            <p>• 两人合起来跑完一个周长就相遇</p>
                            <p>• 相遇时间 = 周长 ÷ 速度和</p>
                            <p>• 相遇点到起点的距离 = 快者速度 × 相遇时间</p>
                        `;
                    }
                    break;
            }
        }

        function resetAnimation() {
            if (animationId) {
                cancelAnimationFrame(animationId);
            }
            
            isRunning = false;
            isPaused = false;
            pausedTime = 0;
            timer.textContent = '时间: 0.0 秒';
            results.style.display = 'none';

            if (currentMode === 'circular') {
                resetCircularAnimation();
            } else {
                resetLinearAnimation();
            }
        }

        function resetLinearAnimation() {
            const trackWidth = linearTrack.clientWidth - 40;
            
            switch(currentMode) {
                case 'chase':
                    const initialDist = parseInt(document.getElementById('initialDistance').value) || 0;
                    const distance = parseInt(document.getElementById('distance').value);
                    const pixelsPerMeter = trackWidth / distance;
                    person1.style.left = '0px';
                    person2.style.left = (initialDist * pixelsPerMeter) + 'px';
                    break;
                    
                case 'meet':
                    person1.style.left = '0px';
                    person2.style.left = (trackWidth) + 'px';
                    break;
            }
        }

        function resetCircularAnimation() {
            if (circularModeType === 'chase') {
                // 同向追及：两人都从顶部开始，红色在前
                setCircularPosition(circularPerson1, 0);  // 红色在起点
                setCircularPosition(circularPerson2, 30); // 蓝色稍微后一点
            } else {
                // 相向相遇：两人从同一点相向出发
                setCircularPosition(circularPerson1, 0);  // 红色从起点顺时针
                setCircularPosition(circularPerson2, 0);  // 蓝色从起点逆时针
            }
        }

        function setCircularPosition(person, angle) {
            const radius = 130; // 半径
            const centerX = 130;
            const centerY = 130;
            const x = centerX + radius * Math.cos((angle - 90) * Math.PI / 180);
            const y = centerY + radius * Math.sin((angle - 90) * Math.PI / 180);
            person.style.left = (x - 20) + 'px';
            person.style.top = (y - 20) + 'px';
        }

        function startAnimation() {
            if (isPaused) {
                isPaused = false;
                startTime = Date.now() - pausedTime;
            } else {
                startTime = Date.now();
                pausedTime = 0;
            }
            
            isRunning = true;
            animate();
        }

        function pauseAnimation() {
            if (isRunning && !isPaused) {
                isPaused = true;
                isRunning = false;
                pausedTime = Date.now() - startTime;
                if (animationId) {
                    cancelAnimationFrame(animationId);
                }
            }
        }

        function animate() {
            if (!isRunning) return;

            const currentTime = (Date.now() - startTime) / 1000;
            timer.textContent = `时间: ${currentTime.toFixed(1)} 秒`;

            if (currentMode === 'circular') {
                animateCircular(currentTime);
            } else {
                animateLinear(currentTime);
            }

            animationId = requestAnimationFrame(animate);
        }

        function animateLinear(time) {
            const speed1 = parseFloat(document.getElementById('speed1').value);
            const speed2 = parseFloat(document.getElementById('speed2').value);
            const distance = parseFloat(document.getElementById('distance').value);
            const trackWidth = linearTrack.clientWidth - 40;
            const pixelsPerMeter = trackWidth / distance;

            switch(currentMode) {
                case 'chase':
                    const initialDist = parseFloat(document.getElementById('initialDistance').value) || 0;
                    const pos1 = speed1 * time * pixelsPerMeter;
                    const pos2 = (speed2 * time + initialDist) * pixelsPerMeter;
                    
                    person1.style.left = Math.min(pos1, trackWidth) + 'px';
                    person2.style.left = Math.min(pos2, trackWidth) + 'px';
                    
                    if (speed1 > speed2 && pos1 >= pos2) {
                        isRunning = false;
                        showResult(`🎉 追及成功！用时 ${time.toFixed(1)} 秒`);
                    }
                    break;
                    
                case 'meet':
                    const pos1_meet = speed1 * time * pixelsPerMeter;
                    const pos2_meet = trackWidth - (speed2 * time * pixelsPerMeter);
                    
                    person1.style.left = Math.min(pos1_meet, trackWidth) + 'px';
                    person2.style.left = Math.max(pos2_meet, 0) + 'px';
                    
                    if (pos1_meet >= pos2_meet) {
                        isRunning = false;
                        showResult(`🤝 相遇成功！用时 ${time.toFixed(1)} 秒，相遇点距起点 ${(pos1_meet/pixelsPerMeter).toFixed(1)} 米`);
                    }
                    break;
            }
        }

        function animateCircular(time) {
            const speed1 = parseFloat(document.getElementById('speed1').value);
            const speed2 = parseFloat(document.getElementById('speed2').value);
            const circumference = parseFloat(document.getElementById('circumference').value);

            if (circularModeType === 'chase') {
                // 同向追及
                const distance1 = speed1 * time;
                const distance2 = speed2 * time;
                const angle1 = (distance1 / circumference) * 360;
                const angle2 = (distance2 / circumference) * 360 + 30; // 蓝色初始位置偏移30度

                setCircularPosition(circularPerson1, angle1);
                setCircularPosition(circularPerson2, angle2);

                // 检查追及（当红色比蓝色多跑一圈时）
                if (speed1 > speed2 && (distance1 - distance2) >= circumference) {
                    isRunning = false;
                    showResult(`🏆 环形追及成功！用时 ${time.toFixed(1)} 秒，红色选手多跑了 ${((distance1 - distance2)/circumference).toFixed(1)} 圈`);
                }
            } else {
                // 相向相遇
                const distance1 = speed1 * time;
                const distance2 = speed2 * time;
                const angle1 = (distance1 / circumference) * 360;
                const angle2 = -(distance2 / circumference) * 360; // 蓝色逆时针

                setCircularPosition(circularPerson1, angle1);
                setCircularPosition(circularPerson2, angle2);

                // 检查相遇（当两人走过的距离之和等于周长时）
                if ((distance1 + distance2) >= circumference) {
                    isRunning = false;
                    const meetAngle = (distance1 / circumference) * 360;
                    showResult(`🤝 环形相遇成功！用时 ${time.toFixed(1)} 秒，相遇点位于起点 ${meetAngle.toFixed(0)}° 处`);
                }
            }
        }

        function showResult(message) {
            results.style.display = 'block';
            calculation.innerHTML = `<p style="font-size: 18px; color: #28a745;">${message}</p>`;
        }

        function calculateResult() {
            const speed1 = parseFloat(document.getElementById('speed1').value);
            const speed2 = parseFloat(document.getElementById('speed2').value);
            let resultHtml = '<h4>📐 理论计算：</h4>';

            if (currentMode === 'circular') {
                const circumference = parseFloat(document.getElementById('circumference').value);
                
                if (circularModeType === 'chase') {
                    if (speed1 <= speed2) {
                        resultHtml += '<p style="color: red;">❌ 红色选手速度必须大于蓝色选手才能追上！</p>';
                    } else {
                        const chaseTime = circumference / (speed1 - speed2);
                        const distance1 = speed1 * chaseTime;
                        const distance2 = speed2 * chaseTime;
                        resultHtml += `
                            <p><strong>追及时间：</strong> ${circumference} ÷ (${speed1} - ${speed2}) = ${chaseTime.toFixed(2)} 秒</p>
                            <p><strong>红色选手总路程：</strong> ${speed1} × ${chaseTime.toFixed(2)} = ${distance1.toFixed(2)} 米</p>
                            <p><strong>蓝色选手总路程：</strong> ${speed2} × ${chaseTime.toFixed(2)} = ${distance2.toFixed(2)} 米</p>
                            <p><strong>路程差：</strong> ${distance1.toFixed(2)} - ${distance2.toFixed(2)} = ${(distance1-distance2).toFixed(2)} 米 (正好一圈)</p>
                        `;
                    }
                } else {
                    const meetTime = circumference / (speed1 + speed2);
                    const distance1 = speed1 * meetTime;
                    const distance2 = speed2 * meetTime;
                    resultHtml += `
                        <p><strong>相遇时间：</strong> ${circumference} ÷ (${speed1} + ${speed2}) = ${meetTime.toFixed(2)} 秒</p>
                        <p><strong>红色选手路程：</strong> ${speed1} × ${meetTime.toFixed(2)} = ${distance1.toFixed(2)} 米</p>
                        <p><strong>蓝色选手路程：</strong> ${speed2} × ${meetTime.toFixed(2)} = ${distance2.toFixed(2)} 米</p>
                        <p><strong>总路程：</strong> ${distance1.toFixed(2)} + ${distance2.toFixed(2)} = ${(distance1 + distance2).toFixed(2)} 米 (正好一圈)</p>
                    `;
                }
            } else {
                // 线性跑道的计算（保持原有逻辑）
                const distance = parseFloat(document.getElementById('distance').value);
                
                switch(currentMode) {
                    case 'chase':
                        const initialDistance = parseFloat(document.getElementById('initialDistance').value) || 0;
                        if (speed1 <= speed2) {
                            resultHtml += '<p style="color: red;">❌ 红色选手速度必须大于蓝色选手才能追上！</p>';
                        } else {
                            const chaseTime = initialDistance / (speed1 - speed2);
                            const chaseDistance = speed1 * chaseTime;
                            resultHtml += `
                                <p><strong>追及时间：</strong> ${initialDistance} ÷ (${speed1} - ${speed2}) = ${chaseTime.toFixed(2)} 秒</p>
                                <p><strong>追及点距离起点：</strong> ${speed1} × ${chaseTime.toFixed(2)} = ${chaseDistance.toFixed(2)} 米</p>
                                <p><strong>慢者走过距离：</strong> ${speed2} × ${chaseTime.toFixed(2)} = ${(speed2 * chaseTime).toFixed(2)} 米</p>
                            `;
                        }
                        break;
                        
                    case 'meet':
                        const meetTime = distance / (speed1 + speed2);
                        const distance1 = speed1 * meetTime;
                        const distance2 = speed2 * meetTime;
                        resultHtml += `
                            <p><strong>相遇时间：</strong> ${distance} ÷ (${speed1} + ${speed2}) = ${meetTime.toFixed(2)} 秒</p>
                            <p><strong>红色选手走过：</strong> ${speed1} × ${meetTime.toFixed(2)} = ${distance1.toFixed(2)} 米</p>
                            <p><strong>蓝色选手走过：</strong> ${speed2} × ${meetTime.toFixed(2)} = ${distance2.toFixed(2)} 米</p>
                            <p><strong>验证：</strong> ${distance1.toFixed(2)} + ${distance2.toFixed(2)} = ${(distance1 + distance2).toFixed(2)} 米</p>
                        `;
                        break;
                }
            }

            results.style.display = 'block';
            calculation.innerHTML = resultHtml;
        }

        // 初始化
        updateModeInterface();
        resetAnimation();

        // 输入值改变时重置动画
        document.querySelectorAll('input, select').forEach(element => {
            element.addEventListener('change', resetAnimation);
        });
    </script>


</body></html>
