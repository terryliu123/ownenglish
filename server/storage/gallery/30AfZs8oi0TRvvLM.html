<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一次函数的应用：追及问题</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #222;
            color: #eee;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            margin-top: 20px;
            font-weight: 300;
            font-size: 24px;
            letter-spacing: 1px;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            width: 95%;
            max-width: 1200px;
        }

        .card {
            background: #2a2a2a;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            padding: 15px;
            border: 1px solid #333;
        }

        .graph-box {
            flex: 1;
            min-width: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .motion-box {
            flex: 1;
            min-width: 400px;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        canvas {
            background-color: #222;
            border-radius: 4px;
            cursor: crosshair;
        }

        .track-container {
            position: relative;
            width: 100%;
            height: 300px;
            background: #1e1e1e;
            margin-top: 10px;
            border-radius: 4px;
            border-bottom: 2px solid #555;
        }

        .road-line {
            position: absolute;
            top: 50%;
            width: 100%;
            height: 2px;
            background: repeating-linear-gradient(90deg, #555 0, #555 10px, transparent 10px, transparent 20px);
        }

        .vehicle {
            position: absolute;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: left 0.05s linear; /* 优化平滑度 */
            z-index: 10;
        }

        .vehicle-label {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            font-weight: bold;
            white-space: nowrap;
        }

        .vehicle-A { background-color: #FF5252; top: 60%; }
        .vehicle-B { background-color: #FFD700; top: 40%; }

        .distance-marker {
            position: absolute;
            top: 50%;
            height: 2px;
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-50%);
            pointer-events: none;
        }
        .distance-text {
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            color: #aaa;
            font-size: 12px;
        }

        .controls {
            margin-top: 20px;
            background: #333;
            padding: 15px 30px;
            border-radius: 50px;
            display: flex;
            gap: 20px;
            align-items: center;
            width: 80%;
            max-width: 800px;
        }

        input[type=range] {
            flex: 1;
            accent-color: #00A1E9;
            cursor: pointer;
        }

        button {
            background-color: #00A1E9;
            border: none;
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background-color: #008bc9; }

        .info-panel {
            display: flex;
            gap: 30px;
            font-family: monospace;
            font-size: 16px;
            color: #ddd;
        }

        .highlight { color: #FF5252; font-weight: bold; }
    </style>
</head>
<body>

    <h1>一次函数的应用：追及问题</h1>

    <div class="container">
        <div class="card graph-box">
            <h3 style="margin:0 0 10px 0; color:#aaa;">S-t 函数图像 (S为间距)</h3>
            <canvas id="graphCanvas" width="450" height="300"></canvas>
        </div>

        <div class="card motion-box">
            <h3 style="margin:0 0 10px 0; color:#aaa;">实际运动演示 (俯视图)</h3>
            <div class="track-container" id="trackArea">
                <div class="road-line"></div>
                <div class="vehicle vehicle-B" id="carB">
                    <div class="vehicle-label" style="color:#FFD700">B</div>
                </div>
                <div class="vehicle vehicle-A" id="carA">
                    <div class="vehicle-label" style="color:#FF5252">A</div>
                </div>
                <div class="distance-marker" id="distLine"></div>
                <div class="distance-text" id="distText">相距 100km</div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button id="playBtn">播放 / 暂停</button>
        <!-- 修正点：step改为任意小的值，防止卡顿 -->
        <input type="range" id="timeSlider" min="0" max="8" step="0.01" value="0">
        
        <div class="info-panel">
            <div>t = <span id="valT" class="highlight">0.00</span> h</div>
            <div>S = <span id="valS" class="highlight">100.00</span> km</div>
        </div>
    </div>

<script>
    const graphCanvas = document.getElementById('graphCanvas');
    const gCtx = graphCanvas.getContext('2d');
    const carA = document.getElementById('carA');
    const carB = document.getElementById('carB');
    const distLine = document.getElementById('distLine');
    const distText = document.getElementById('distText');
    const timeSlider = document.getElementById('timeSlider');
    const playBtn = document.getElementById('playBtn');
    const valT = document.getElementById('valT');
    const valS = document.getElementById('valS');

    const V_diff = 25; 
    const Initial_Dist = 100;
    const Max_Time = 8;

    let currentTime = 0;
    let isPlaying = false;
    let animationId = null;

    const padding = 40;
    const gWidth = graphCanvas.width;
    const gHeight = graphCanvas.height;

    function mapToCanvas(t, s) {
        const x = padding + (t / Max_Time) * (gWidth - 2 * padding);
        const Max_S_Display = 120; 
        const y = (gHeight - padding) - (s / Max_S_Display) * (gHeight - 2 * padding);
        return {x, y};
    }

    function calculateDistance(t) {
        return Math.abs(Initial_Dist - V_diff * t);
    }

    function drawGraph() {
        gCtx.clearRect(0, 0, gWidth, gHeight);

        gCtx.strokeStyle = "#fff";
        gCtx.lineWidth = 2;
        gCtx.beginPath();
        gCtx.moveTo(padding, padding);
        gCtx.lineTo(padding, gHeight - padding);
        gCtx.moveTo(padding, gHeight - padding);
        gCtx.lineTo(gWidth - padding, gHeight - padding);
        gCtx.stroke();

        gCtx.fillStyle = "#fff";
        gCtx.font = "14px Arial";
        gCtx.fillText("O", padding - 15, gHeight - padding + 15);
        gCtx.fillText("t/h", gWidth - 40, gHeight - padding + 5);
        gCtx.fillText("S/km", padding - 10, padding - 10);

        for(let i=0; i<=Max_Time; i++) {
            let pos = mapToCanvas(i, 0);
            gCtx.beginPath();
            gCtx.moveTo(pos.x, pos.y);
            gCtx.lineTo(pos.x, pos.y - 5);
            gCtx.stroke();
            gCtx.fillText(i, pos.x - 4, pos.y + 20);
        }
        for(let s=0; s<=100; s+=25) {
            let pos = mapToCanvas(0, s);
            gCtx.beginPath();
            gCtx.moveTo(pos.x, pos.y);
            gCtx.lineTo(pos.x + 5, pos.y);
            gCtx.stroke();
            if(s>0) gCtx.fillText(s, pos.x - 25, pos.y + 5);
        }

        gCtx.strokeStyle = "#aaa"; 
        gCtx.lineWidth = 1;
        
        const pStart = mapToCanvas(0, 100);
        const pMeet = mapToCanvas(4, 0);
        const pEnd = mapToCanvas(Max_Time, calculateDistance(Max_Time));

        gCtx.strokeStyle = "#fff";
        gCtx.lineWidth = 3;
        gCtx.beginPath();
        gCtx.moveTo(pStart.x, pStart.y);
        gCtx.lineTo(pMeet.x, pMeet.y);
        gCtx.lineTo(pEnd.x, pEnd.y);
        gCtx.stroke();

        const currentS = calculateDistance(currentTime);
        const pCurrent = mapToCanvas(currentTime, currentS);

        gCtx.setLineDash([5, 5]);
        gCtx.strokeStyle = "#888";
        gCtx.lineWidth = 1;
        gCtx.beginPath(); gCtx.moveTo(pCurrent.x, pCurrent.y); gCtx.lineTo(pCurrent.x, gHeight - padding); gCtx.stroke();
        gCtx.beginPath(); gCtx.moveTo(pCurrent.x, pCurrent.y); gCtx.lineTo(padding, pCurrent.y); gCtx.stroke();
        gCtx.setLineDash([]);

        gCtx.fillStyle = "#FFD700";
        gCtx.beginPath();
        gCtx.arc(pCurrent.x, pCurrent.y, 6, 0, Math.PI*2);
        gCtx.fill();

        if (Math.abs(currentTime - 6) < 0.1) {
            const p6 = mapToCanvas(6, 50);
            gCtx.fillStyle = "#fff";
            gCtx.fillText("(6, 50)", p6.x + 10, p6.y);
        }
    }

    function updateMotion() {
        const Total_Display_Km = 700;
        const trackWidth = document.getElementById('trackArea').offsetWidth;
        
        const posA_km = 75 * currentTime;
        const posB_km = 100 + 50 * currentTime;

        const pxA = (posA_km / Total_Display_Km) * trackWidth;
        const pxB = (posB_km / Total_Display_Km) * trackWidth;

        carA.style.left = pxA + "px";
        carB.style.left = pxB + "px";

        const minPx = Math.min(pxA, pxB);
        const widthPx = Math.abs(pxA - pxB);
        
        distLine.style.left = minPx + "px";
        distLine.style.width = widthPx + "px";
        
        const S = calculateDistance(currentTime);
        distText.innerText = `相距 ${S.toFixed(2)} km`;

        valT.innerText = currentTime.toFixed(2);
        valS.innerText = S.toFixed(2);

        if (S < 1) {
            valS.style.color = "#4CAF50";
            distText.innerText = "追上了！";
            distText.style.color = "#4CAF50";
        } else {
            valS.style.color = "#FF5252";
            distText.style.color = "#aaa";
        }
    }

    function loop() {
        if (!isPlaying) return;
        
        // 修正逻辑：直接操作变量，不依赖DOM读取
        currentTime += 0.03; // 播放速度
        
        if (currentTime > Max_Time) {
            currentTime = 0;
        }
        
        // 同步更新滑块
        timeSlider.value = currentTime;
        
        drawGraph();
        updateMotion();
        
        animationId = requestAnimationFrame(loop);
    }

    timeSlider.addEventListener('input', (e) => {
        currentTime = parseFloat(e.target.value);
        drawGraph();
        updateMotion();
    });

    playBtn.addEventListener('click', () => {
        isPlaying = !isPlaying;
        if (isPlaying) {
            playBtn.textContent = "暂停";
            loop();
        } else {
            playBtn.textContent = "播放";
            cancelAnimationFrame(animationId);
        }
    });

    drawGraph();
    updateMotion();

    window.addEventListener('resize', () => {
        drawGraph();
        updateMotion();
    });

</script>
</body>
</html>
