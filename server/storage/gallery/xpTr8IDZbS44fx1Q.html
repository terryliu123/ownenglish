<meta charset="utf-8">
<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 定义水流的渐变色 -->
    <linearGradient id="waterGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4fc3f7;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#0288d1;stop-opacity:0.9" />
    </linearGradient>
    
    <!-- 定义玻璃反光效果 -->
    <linearGradient id="glassShine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:white;stop-opacity:0.1" />
      <stop offset="40%" style="stop-color:white;stop-opacity:0" />
      <stop offset="60%" style="stop-color:white;stop-opacity:0" />
      <stop offset="100%" style="stop-color:white;stop-opacity:0.1" />
    </linearGradient>

    <!-- 剪切路径：定义集气瓶内部区域，用于限制水位 -->
    <clipPath id="bottleClip">
      <rect x="250" y="150" width="140" height="200" rx="10" ry="10" />
    </clipPath>

    <!-- 剪切路径：定义烧杯内部区域 -->
    <clipPath id="beakerClip">
      <path d="M500,200 L500,340 Q500,350 510,350 L610,350 Q620,350 620,340 L620,200 Z" />
    </clipPath>
  </defs>

  <!-- 背景 -->
  <rect width="100%" height="100%" fill="#3b4252" />

  <!-- 标题 -->
  <text x="400" y="50" text-anchor="middle" fill="white" font-size="24" font-family="Arial, sans-serif" font-weight="bold">排水集气法演示 (万能瓶)</text>

  <!-- ==================== 装置主体 ==================== -->

  <!-- 1. 集气瓶 (Bottle) -->
  <g transform="translate(0,0)">
    <!-- 瓶塞 -->
    <path d="M260,150 L380,150 L370,130 L270,130 Z" fill="#90a4ae" stroke="white" stroke-width="2"/>
    
    <!-- 瓶身轮廓 -->
    <rect x="250" y="150" width="140" height="200" rx="10" ry="10" fill="url(#glassShine)" stroke="white" stroke-width="3"/>
    
    <!-- 瓶内水位 (动画核心) -->
    <g clip-path="url(#bottleClip)">
      <rect x="250" y="150" width="140" height="200" fill="url(#waterGrad)">
        <!-- 动画：水位下降 (height减小，y坐标增加) -->
        <animate attributeName="y" from="150" to="300" dur="6s" repeatCount="indefinite" />
        <animate attributeName="height" from="200" to="50" dur="6s" repeatCount="indefinite" />
      </rect>
    </g>

    <!-- 进气管 (左侧短管) -->
    <polyline points="180,120 290,120 290,160" fill="none" stroke="white" stroke-width="4" stroke-linecap="round"/>
    <text x="180" y="110" fill="#fff" font-size="14">气体进入</text>
    <!-- 进气流向箭头 -->
    <path d="M200,120 L230,120" stroke="#4fc3f7" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- 排水管 (右侧长管 - 瓶内部分) -->
    <line x1="350" y1="120" x2="350" y2="330" stroke="white" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- 2. 连接管与烧杯 -->
  <g>
    <!-- 连接导管 (瓶外部分) -->
    <polyline points="350,120 350,100 550,100 550,250" fill="none" stroke="white" stroke-width="4" stroke-linejoin="round" stroke-linecap="round"/>

    <!-- 导管内的水流动画 -->
    <path d="M350,330 L350,100 L550,100 L550,280" fill="none" stroke="#4fc3f7" stroke-width="2" stroke-dasharray="10,5">
       <animate attributeName="stroke-dashoffset" from="0" to="-100" dur="1s" repeatCount="indefinite" />
    </path>

    <!-- 烧杯 (Beaker) -->
    <path d="M500,180 L500,340 Q500,350 510,350 L610,350 Q620,350 620,340 L620,180" fill="url(#glassShine)" stroke="white" stroke-width="3"/>
    <!-- 烧杯嘴 -->
    <path d="M490,180 L500,180" stroke="white" stroke-width="3"/>

    <!-- 烧杯内水位 (动画核心) -->
    <g clip-path="url(#beakerClip)">
      <rect x="500" y="350" width="120" height="0" fill="url(#waterGrad)">
        <!-- 动画：水位上升 (y减小，height增加) -->
        <animate attributeName="y" from="350" to="200" dur="6s" repeatCount="indefinite" />
        <animate attributeName="height" from="0" to="150" dur="6s" repeatCount="indefinite" />
      </rect>
      <!-- 气泡/水花效果 -->
      <circle cx="550" cy="340" r="3" fill="rgba(255,255,255,0.6)">
         <animate attributeName="cy" values="340;330;340" dur="2s" repeatCount="indefinite"/>
         <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>

  <!-- 标注文字 -->
  <text x="200" y="250" fill="white" font-size="16" font-weight="bold">水</text>
  <line x1="220" y1="245" x2="260" y2="245" stroke="white" stroke-width="1"/>

  <!-- 气体聚集区域示意 -->
  <text x="320" y="180" fill="white" font-size="14" opacity="0">
    气体
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.2;0.5;1" dur="6s" repeatCount="indefinite"/>
  </text>

</svg>
