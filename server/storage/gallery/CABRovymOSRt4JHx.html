<!-- 
设计思路：
这是一个用于教学三角形按边分类的互动数字教具。目标是创建一个直观、美观且教育性强的工具。

核心设计理念：
1. 视觉风格：采用黑板风格背景(#222)，营造课堂氛围，白色元素在深色背景上清晰可见
2. 交互方式：通过拖拽三角形顶点实时改变形状，立即反馈分类结果
3. 教学辅助：
   - 大字号分类结果显示，便于学生观察
   - 实时显示三边长度，帮助理解分类依据
   - 预设按钮快速展示标准形状
4. 用户体验：
   - 响应式设计适配不同设备
   - 触摸支持增强移动端体验
   - 直观的视觉反馈（悬停指针变化）
5. 技术实现：
   - Canvas绘图保证性能
   - 精确的数学计算确保准确性
   - 浮点数容差处理提高稳定性
-->

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>三角形分类教学工具</title>
  <link href="https://cdn.staticfile.org/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
  <link href="https://cdn.staticfile.org/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Noto Sans SC', sans-serif;
      background: linear-gradient(135deg, #1a202c 0%, #2d3748 100%);
      min-height: 100vh;
    }
    
    .canvas-container {
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    canvas {
      background-color: #2d3748;
      cursor: crosshair;
    }
    
    .triangle-type {
      text-shadow: 0 4px 6px rgba(0, 0, 0, 0.5);
      font-family: 'Noto Serif SC', serif;
      transition: all 0.3s ease;
    }
    
    .control-btn {
      transition: all 0.2s ease;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }
    
    .control-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 8px rgba(0, 0, 0, 0.15);
    }
    
    .point-label {
      font-family: 'Times New Roman', serif;
      font-weight: bold;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
    }
    
    .length-label {
      font-family: 'Noto Sans SC', sans-serif;
      font-weight: 500;
      background: rgba(45, 55, 72, 0.8);
      backdrop-filter: blur(4px);
      border-radius: 4px;
      padding: 2px 6px;
    }
    
    .glow-effect {
      animation: glow 2s infinite alternate;
    }
    
    @keyframes glow {
      from { box-shadow: 0 0 5px rgba(255, 255, 255, 0.3); }
      to { box-shadow: 0 0 20px rgba(255, 255, 255, 0.6); }
    }
  </style>
</head>
<body class="text-gray-100 flex flex-col items-center justify-center p-4 md:p-8">
  <div class="max-w-4xl w-full">
    <!-- 标题区域 -->
    <div class="text-center mb-8">
      <h1 class="text-3xl md:text-4xl font-bold mb-2 bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-teal-400">
        三角形的分类：按边分
      </h1>
      <p class="text-gray-400">拖拽顶点改变形状，观察分类变化</p>
    </div>
    
    <!-- 控制按钮 -->
    <div class="flex flex-wrap justify-center gap-3 mb-6">
      <button onclick="setToEquilateral()" class="control-btn bg-gradient-to-r from-blue-500 to-blue-600 hover:from-blue-600 hover:to-blue-700 text-white px-4 py-2 rounded-lg flex items-center">
        <i class="fas fa-draw-polygon mr-2"></i>等边三角形
      </button>
      <button onclick="setToIsosceles()" class="control-btn bg-gradient-to-r from-purple-500 to-purple-600 hover:from-purple-600 hover:to-purple-700 text-white px-4 py-2 rounded-lg flex items-center">
        <i class="fas fa-shapes mr-2"></i>等腰三角形
      </button>
      <button onclick="resetShape()" class="control-btn bg-gradient-to-r from-gray-600 to-gray-700 hover:from-gray-700 hover:to-gray-800 text-white px-4 py-2 rounded-lg flex items-center">
        <i class="fas fa-redo mr-2"></i>重置
      </button>
    </div>
    
    <!-- 画布容器 -->
    <div class="canvas-container relative mx-auto mb-6">
      <canvas id="geoCanvas" width="800" height="500"></canvas>
      <div id="resultText" class="triangle-type absolute bottom-6 left-0 right-0 text-center text-2xl font-bold text-white"></div>
    </div>
    
    <!-- 说明文字 -->
    <div class="text-center text-gray-400 bg-gray-800 bg-opacity-50 rounded-xl p-4 max-w-2xl mx-auto">
      <p class="mb-2">
        <i class="fas fa-info-circle mr-2 text-blue-400"></i>
        拖动顶点 <span class="font-bold text-white">A, B, C</span> 改变三角形形状
      </p>
      <p>
        <i class="fas fa-ruler-combined mr-2 text-green-400"></i>
        观察边长数值与三角形分类的关系
      </p>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('geoCanvas');
    const ctx = canvas.getContext('2d');
    const resultText = document.getElementById('resultText');

    // 初始顶点坐标
    let points = {
      A: { x: 400, y: 100 },
      B: { x: 200, y: 400 },
      C: { x: 600, y: 400 }
    };

    let draggingPoint = null;

    // 辅助函数：计算两点距离 (像素)
    function dist(p1, p2) {
      return Math.sqrt(Math.pow(p1.x - p2.x, 2) + Math.pow(p1.y - p2.y, 2));
    }

    // 辅助函数：计算显示用的边长 (将像素转换为模拟单位，比例 20px = 1单位)
    function getLength(p1, p2) {
      const pxDist = dist(p1, p2);
      return (pxDist / 20).toFixed(1); // 保留一位小数
    }

    // 绘制函数
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // 1. 计算边长数值
      const lenc = getLength(points.A, points.B); // AB边 (c)
      const lenb = getLength(points.A, points.C); // AC边 (b)
      const lena = getLength(points.B, points.C); // BC边 (a)

      // 2. 判断类型并更新文字
      updateClassification(parseFloat(lena), parseFloat(lenb), parseFloat(lenc));

      // 3. 绘制三角形连线
      ctx.beginPath();
      ctx.moveTo(points.A.x, points.A.y);
      ctx.lineTo(points.B.x, points.B.y);
      ctx.lineTo(points.C.x, points.C.y);
      ctx.closePath();
      ctx.lineWidth = 3;
      ctx.strokeStyle = "#ffffff";
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.stroke();

      // 4. 绘制边长文字
      drawLabel(points.A, points.B, lenc);
      drawLabel(points.A, points.C, lenb);
      drawLabel(points.B, points.C, lena);

      // 5. 绘制顶点
      drawPoint(points.A, "A");
      drawPoint(points.B, "B");
      drawPoint(points.C, "C");
    }

    // 绘制边长标签 (在边中点)
    function drawLabel(p1, p2, text) {
      const midX = (p1.x + p2.x) / 2;
      const midY = (p1.y + p2.y) / 2;
      
      ctx.save();
      ctx.fillStyle = "rgba(45, 55, 72, 0.8)";
      ctx.font = "16px 'Noto Sans SC'";
      const metrics = ctx.measureText(text);
      const w = metrics.width;
      ctx.fillRect(midX - w/2 - 6, midY - 12, w + 12, 24);
      
      ctx.fillStyle = "#e2e8f0";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(text, midX, midY);
      ctx.restore();
    }

    // 绘制顶点
    function drawPoint(p, label) {
      ctx.fillStyle = "#ffffff";
      ctx.beginPath();
      ctx.arc(p.x, p.y, 10, 0, Math.PI * 2);
      ctx.fill();
      
      // 发光效果
      const gradient = ctx.createRadialGradient(
        p.x, p.y, 10,
        p.x, p.y, 15
      );
      gradient.addColorStop(0, "rgba(255, 255, 255, 0.8)");
      gradient.addColorStop(1, "rgba(255, 255, 255, 0)");
      
      ctx.beginPath();
      ctx.arc(p.x, p.y, 15, 0, Math.PI * 2);
      ctx.fillStyle = gradient;
      ctx.fill();
      
      // 顶点字母
      ctx.fillStyle = "#1a202c";
      ctx.font = "bold 20px 'Noto Sans SC'";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      
      // 根据位置调整字母偏移
      let offX = 0, offY = 0;
      if (label === 'A') { offY = -25; }
      if (label === 'B') { offX = -25; offY = 15; }
      if (label === 'C') { offX = 25; offY = 15; }
      
      ctx.fillText(label, p.x + offX, p.y + offY);
    }

    // 核心逻辑：分类判断
    function updateClassification(a, b, c) {
      let type = "不等边三角形";
      let color = "#ffffff";
      let fontSize = "2rem";

      if (Math.abs(a - b) < 0.1 && Math.abs(b - c) < 0.1) {
        type = "等边三角形";
        color = "#00e5ff";
        fontSize = "2.2rem";
      } else if (Math.abs(a - b) < 0.1 || Math.abs(b - c) < 0.1 || Math.abs(a - c) < 0.1) {
        type = "等腰三角形";
        color = "#ffd700";
        fontSize = "2.1rem";
      }

      resultText.innerText = type;
      resultText.style.color = color;
      resultText.style.fontSize = fontSize;
    }

    // --- 预设功能 ---
    function resetShape() {
      points = { 
        A: { x: 400, y: 100 }, 
        B: { x: 200, y: 400 }, 
        C: { x: 600, y: 400 } 
      };
      draw();
    }

    function setToEquilateral() {
      // 设为边长300px的等边三角形
      const h = 300 * (Math.sqrt(3)/2);
      points.B = { x: 250, y: 400 };
      points.C = { x: 550, y: 400 };
      points.A = { x: 400, y: 400 - h };
      draw();
    }

    function setToIsosceles() {
      // 设为等腰 (底边B-C，顶点A在垂直平分线上)
      points.B = { x: 250, y: 400 };
      points.C = { x: 550, y: 400 };
      points.A = { x: 400, y: 150 }; // A在中心线上
      draw();
    }

    // --- 鼠标交互 ---
    function getMousePos(evt) {
      const rect = canvas.getBoundingClientRect();
      return {
        x: evt.clientX - rect.left,
        y: evt.clientY - rect.top
      };
    }

    canvas.addEventListener('mousedown', (e) => {
      const pos = getMousePos(e);
      ['A', 'B', 'C'].forEach(key => {
        if (dist(pos, points[key]) < 20) {
          draggingPoint = key;
        }
      });
    });

    canvas.addEventListener('mousemove', (e) => {
      const pos = getMousePos(e);
      
      if (draggingPoint) {
        // 限制范围
        pos.x = Math.max(10, Math.min(canvas.width - 10, pos.x));
        pos.y = Math.max(10, Math.min(canvas.height - 10, pos.y));
        
        points[draggingPoint] = pos;
        draw();
      } else {
        let cursor = 'default';
        ['A', 'B', 'C'].forEach(key => {
          if (dist(pos, points[key]) < 20) cursor = 'pointer';
        });
        canvas.style.cursor = cursor;
      }
    });

    window.addEventListener('mouseup', () => {
      draggingPoint = null;
    });

    // 触摸屏支持
    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      const touch = e.touches[0];
      const rect = canvas.getBoundingClientRect();
      const pos = { 
        x: touch.clientX - rect.left, 
        y: touch.clientY - rect.top 
      };
      ['A', 'B', 'C'].forEach(key => {
        if (dist(pos, points[key]) < 30) draggingPoint = key;
      });
    }, {passive: false});

    canvas.addEventListener('touchmove', (e) => {
      e.preventDefault();
      if (draggingPoint) {
        const touch = e.touches[0];
        const rect = canvas.getBoundingClientRect();
        points[draggingPoint] = { 
          x: Math.max(10, Math.min(canvas.width - 10, touch.clientX - rect.left)),
          y: Math.max(10, Math.min(canvas.height - 10, touch.clientY - rect.top))
        };
        draw();
      }
    }, {passive: false});
    
    window.addEventListener('touchend', () => draggingPoint = null);

    // 初始化
    draw();
  </script>
</body>
</html>
